refs:
  row*:
    eventListeners:
      click:
        handler: handleRowClick
  line*:
    eventListeners:
      editor-focus:
        handler: handleLineFocus
      editor-blur:
        handler: handleLineBlur
      content-change:
        handler: handleLineContentChange
      composition-state-changed:
        handler: handleLineCompositionStateChanged
      line-split-request:
        handler: handleLineSplitRequest
      line-merge-request:
        handler: handleLineMergeRequest
      line-paste-request:
        handler: handleLinePasteRequest
      line-navigate-request:
        handler: handleLineNavigateRequest
styles:
  rvn-lexical-line-editor:
    font-size: 16px
    font-family: inherit
    line-height: 1.5
    word-break: break-word
template:
  - 'rtgl-view#container w=f tabindex=0 g=xs style="outline: none;"':
      - $for line, i in lines:
          - 'rtgl-view#row${line.domRefSuffix} data-line-id="${line.id}" d=h w=f style="background-color: ${line.backgroundColor};"':
              - $if showLineNumbers:
                  - rtgl-view h=f w=32 ah=e mr=md pt=sm:
                      - rtgl-text s=sm c=${line.lineColor}: ${line.lineNumber}
              - rtgl-view wh=24 br=f mr=sm:
                  - $if line.characterFileId:
                      - rvn-file-image fileId=${line.characterFileId} w=24 h=24 br=f: null
              - rtgl-view d=h w=f:
                  - rtgl-view w=f mr=md:
                      - 'rvn-lexical-line-editor#line${line.domRefSuffix} data-line-id="${line.id}" :content=${line.dialogueContent} style="width: 100%"': null
                  - rtgl-view d=h g=sm:
                      - $if line.background:
                          - rtgl-view pos=rel:
                              - $if line.background.fileId:
                                  - rvn-file-image w=36 h=24 fileId=${line.background.fileId}: null
                                $else:
                                  - rtgl-view w=36 h=24 av=c ah=c:
                                      - rtgl-svg svg=image wh=24: null
                      - $if line.characterSprites:
                          - rtgl-view pos=rel:
                              - $if line.characterSprites.items && line.characterSprites.items.length > 0:
                                  - rtgl-view d=h:
                                      - $for sprite in line.characterSprites.items:
                                          - rvn-file-image fileId=${sprite.fileId} w=20 h=24 br=f: null
                                $else:
                                  - rtgl-view w=36 h=24 av=c ah=c:
                                      - rtgl-svg svg=character wh=24: null
                      - $if line.visual:
                          - rtgl-view pos=rel:
                              - $if line.visual.items && line.visual.items.length > 0:
                                  - rtgl-view d=h:
                                      - $for visual in line.visual.items:
                                          - rvn-file-image fileId=${visual.fileId} w=36 h=24: null
                                $else:
                                  - rtgl-view w=36 h=24 av=c ah=c:
                                      - rtgl-svg svg=image wh=24: null
                      - $if line.sectionTransition:
                          - rtgl-view wh=24 av=c ah=c:
                              - rtgl-svg svg="transition" wh=24: null
                      - $if line.hasDialogueLayout:
                          - rtgl-view d=h av=c g=xs:
                              - rtgl-view pos=rel w=24 h=24 av=c ah=c:
                                  - rtgl-svg svg="dialogue" wh=24: null
                              - rtgl-text s=xs c=mu-fg: ${line.dialogueModeLabel}
