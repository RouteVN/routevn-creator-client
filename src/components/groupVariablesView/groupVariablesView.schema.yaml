componentName: rvn-group-variables-view
propsSchema:
  type: object
  properties:
    flatGroups:
      type: array
      description: Array of variable groups to display
    navTitle:
      type: string
      description: Optional title to display in the header
    selectedItemId:
      type: string
      description: ID of currently selected item
    readonly:
      type: boolean
      description: Whether the view should disable add/edit/delete affordances
methods:
  type: object
  properties:
    openEditDialog:
      description: Opens the variable edit dialog for an item id.
      params: []
      returns: void
