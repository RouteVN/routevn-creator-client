componentName: rvn-group-variables-view
propsSchema:
  type: object
  properties:
    flatGroups:
      type: array
      description: Array of variable groups to display
    navTitle:
      type: string
      description: Optional title to display in the header
    selectedItemId:
      type: string
      description: ID of currently selected item
    selectedFolderId:
      type: string
      description: ID of currently selected folder
    tagFilterOptions:
      type: array
      description: Available tag filter options
    selectedTagFilterValues:
      type: array
      description: Selected tag filter values
    tagFilterPlaceholder:
      type: string
      description: Placeholder for the tag filter control
    showTagFilter:
      type: boolean
      description: Whether to show the header tag filter
    showSearch:
      type: boolean
      description: Whether to show the header search input
    searchInFilterPopover:
      type: boolean
      description: Whether search should render inside the filter popover
    showMenuButton:
      type: boolean
      description: Whether to show the mobile menu button
    mobileLayout:
      type: boolean
      description: Whether to use the mobile layout
    readonly:
      type: boolean
      description: Whether the view should disable add/edit/delete affordances
methods:
  type: object
  properties:
    openEditDialog:
      description: Opens the variable edit dialog for an item id.
      params: []
      returns: void
    appendTagIdToForm:
      description: Appends a tag id into the currently open variable form.
      params: []
      returns: void
