refs:
  searchInput:
    eventListeners:
      value-input:
        handler: handleSearchInput
  tagFilterButton:
    eventListeners:
      click:
        handler: handleTagFilterButtonClick
  tagFilterPopover:
    eventListeners:
      close:
        handler: handleTagFilterPopoverClose
  tagFilterOption*:
    eventListeners:
      click:
        handler: handleTagFilterOptionClick
  tagFilterClear:
    eventListeners:
      click:
        handler: handleTagFilterClearClick
  tagFilterApply:
    eventListeners:
      click:
        handler: handleTagFilterApplyClick
  menuButton:
    eventListeners:
      click:
        handler: handleMenuClick
  group*:
    eventListeners:
      click:
        handler: handleGroupClick
  variableItem*:
    eventListeners:
      click:
        handler: handleVariableItemClick
  addVariableButton*:
    eventListeners:
      click:
        handler: handleAddVariableClick
  addVariableEmpty*:
    eventListeners:
      click:
        handler: handleAddVariableClick
  addVariableDialog:
    eventListeners:
      close:
        handler: handleCloseDialog
  variableForm:
    eventListeners:
      form-action:
        handler: handleFormActionClick
      form-change:
        handler: handleDialogFormChange
      add-option-click:
        handler: handleFormAddOptionClick
  enumAddValueButton:
    eventListeners:
      click:
        handler: handleEnumAddValueClick
  enumValuePopover:
    eventListeners:
      close:
        handler: handleEnumValuePopoverClose
  enumValueForm:
    eventListeners:
      form-action:
        handler: handleEnumValueFormAction
  enumValueItem*:
    eventListeners:
      contextmenu:
        handler: handleEnumValueContextMenu
  enumValueMenu:
    eventListeners:
      close:
        handler: handleEnumValueMenuClose
      item-click:
        handler: handleEnumValueMenuClick
  row*:
    eventListeners:
      click:
        handler: handleRowClick
      dblclick:
        handler: handleRowDoubleClick
      contextmenu:
        handler: handleRowContextMenu
  contextMenu:
    eventListeners:
      close:
        handler: handleCloseContextMenu
      item-click:
        handler: handleContextMenuClickItem
template:
  - 'rtgl-view w=f h=f g=sm style="min-width: 0; min-height: 0;"':
      - 'rtgl-view h=48 w=f bgc=bg bwb=xs ph=md av=c d=h g=md style="position: sticky; top: 0px; z-index: 1000;"':
          - rtgl-view w=1fg d=h av=c g=md:
              - $if showMenuButton:
                  - rtgl-view#menuButton w=36 h=36 ah=c av=c cur=pointer:
                      - rtgl-svg svg=hamburger wh=22 c=mu-fg: null
              - $if navTitle:
                  - rtgl-text: ${navTitle}
          - $if showSearch:
              - rtgl-input#searchInput s=sm placeholder="Search variables..." value=${searchQuery} h=1fg: null
          - $if showTagFilter:
              - rtgl-view#tagFilterButton w=36 h=36 bw=xs br=md ah=c av=c cur=pointer bgc=${tagFilterButtonBackgroundColor} bc=${tagFilterButtonBorderColor}:
                  - rtgl-svg svg=filter wh=16 c=${tagFilterButtonIconColor}: null
      - 'rtgl-view h=1fg w=f sv style="min-width: 0; min-height: 0;"':
          - $if flatGroups.length > 0:
              - $for group, i in flatGroups:
                  - rtgl-view w=f ph=md pos=rel:
                      - 'rtgl-view d=h w=f av=c bgc=${group.headerBackgroundColor} z=100 pv=sm style="position: sticky; top: 0px;"':
                          - rtgl-view#groupRef${i} data-group-id=${group.id} d=h av=c g=md cur=pointer:
                              - $if group.isCollapsed:
                                  - rtgl-svg wh=16 svg=folderArrowRight: null
                                $else:
                                  - rtgl-svg wh=16 svg=folderArrowDown: null
                              - rtgl-svg wh=16 svg=folder: null
                              - rtgl-text: ${group.fullLabel}
                          - rtgl-view w=1fg: null
                          - $if !readonly:
                              - rtgl-button#addVariableButtonRef${i} data-group-id=${group.id} s=sm w=1fg pre=plus: Add
                      - $if !group.isCollapsed:
                          - rtgl-view w=f mb=md p=sm:
                              - $if group.hasChildren:
                                  - rtgl-view w=f:
                                      - rtgl-view d=h w=f pv=sm bwb=xs g=md:
                                          - rtgl-view w=2fg:
                                              - rtgl-text c=mu-fg s=sm: Name
                                          - rtgl-view w=1fg:
                                              - rtgl-text c=mu-fg s=sm: Scope
                                          - rtgl-view w=1fg:
                                              - rtgl-text c=mu-fg s=sm: Type
                                          - rtgl-view w=1fg:
                                              - rtgl-text c=mu-fg s=sm: Default
                                      - $for item, j in group.children:
                                          - $if item.isSelected:
                                              - rtgl-view#rowRef${i}x${j} data-item-id=${item.id} d=h w=f pv=md bwb=xs cur=pointer g=md bgc=mu h-bgc=mu br=sm:
                                                  - rtgl-view w=2fg d=h av=c g=sm:
                                                      - rtgl-text s=sm: ${item.name}
                                                      - $if item.isEnum:
                                                          - rtgl-tag v=mu: Enum
                                                  - rtgl-view w=1fg:
                                                      - rtgl-text s=sm: ${item.scope}
                                                  - rtgl-view w=1fg:
                                                      - rtgl-text s=sm: ${item.variableType}
                                                  - rtgl-view w=1fg:
                                                      - rtgl-text s=sm: ${item.default}
                                            $else:
                                              - rtgl-view#rowRef${i}x${j} data-item-id=${item.id} d=h w=f pv=md bwb=xs cur=pointer g=md h-bgc=mu:
                                                  - rtgl-view w=2fg d=h av=c g=sm:
                                                      - rtgl-text s=sm: ${item.name}
                                                      - $if item.isEnum:
                                                          - rtgl-tag v=mu: Enum
                                                  - rtgl-view w=1fg:
                                                      - rtgl-text s=sm: ${item.scope}
                                                  - rtgl-view w=1fg:
                                                      - rtgl-text s=sm: ${item.variableType}
                                                  - rtgl-view w=1fg:
                                                      - rtgl-text s=sm: ${item.default}
                                $else:
                                  - $if readonly:
                                      - rtgl-view w=f h=150 av=c ah=c:
                                          - rtgl-text c=mu-fg: No variables in this group
                                    $else:
                                      - rtgl-view#addVariableEmptyRef${i} data-group-id=${group.id} w=f h=150 av=c ah=c g=md bw=xs bc=bo br=md cur=pointer:
                                          - rtgl-svg svg=plus wh=24: null
                                          - rtgl-text: Add Variable
            $elif searchQuery || selectedTagFilterValues.length > 0:
              - rtgl-view w=f h=400 av=c ah=c:
                  - rtgl-text s=lg c=mu-fg: No variables found
            $else:
              - rtgl-view w=f h=f av=c ah=c:
                  - rtgl-text s=lg c=mu-fg: No data
                  - rtgl-view h=64: null
          - $if flatGroups.length > 0:
              - rtgl-view h=33vh: null
  - $if !readonly:
      - rtgl-dialog#addVariableDialog s=md ?open=${isDialogOpen}:
          - rtgl-view slot=content g=md:
              - rtgl-form#variableForm key=${dialogKey} :defaultValues=${defaultValues} :form=${form} w=f :context=${context}:
                  - 'rtgl-view slot="enum-values" d=v w=f g=sm':
                      - $if enumValues.length > 0:
                          - rtgl-view d=h wrap g=sm w=f:
                              - $for option, i in enumValues:
                                  - rtgl-view#enumValueItemRef${i} data-index=${option.index} d=h av=c g=xs ph=md pv=xs bw=xs bc=bo br=md bgc=bg h-bgc=mu cur=context-menu:
                                      - rtgl-text s=sm: ${option.label}
                        $else:
                          - rtgl-text s=sm c=mu-fg: No values yet
                      - rtgl-view d=h w=f:
                          - rtgl-button#enumAddValueButton s=sm v=se pre=plus: Add Value
      - rtgl-dropdown-menu#contextMenu :items=${dropdownMenu.items} ?open=${dropdownMenu.isOpen} x=${dropdownMenu.x} y=${dropdownMenu.y}: null
      - rtgl-popover#enumValuePopover ?open=${enumValuePopover.isOpen} x=${enumValuePopover.x} y=${enumValuePopover.y} place=bs content-w=260 content-g=sm content-ph=md content-pv=md:
          - rtgl-form#enumValueForm key=${enumValuePopover.key} :defaultValues=${enumValueDefaultValues} :form=${enumValueForm} w=f: null
      - rtgl-dropdown-menu#enumValueMenu :items=${enumValueMenu.items} ?open=${enumValueMenu.isOpen} x=${enumValueMenu.x} y=${enumValueMenu.y}: null
  - rtgl-popover#tagFilterPopover ?open=${tagFilterPopover.isOpen} x=${tagFilterPopover.position.x} y=${tagFilterPopover.position.y} place=bs content-w=320 content-g=sm content-sv=true content-ph=md content-pv=md:
      - $if showFilterPopoverSearch:
          - rtgl-text s=md: Filter
          - rtgl-input#searchInput s=sm placeholder="Search variables..." value=${searchQuery} w=f: null
      - $if !tagFilterPopover.hasOptions:
          - rtgl-text s=sm c=mu-fg: No tags available
      - $if tagFilterPopover.hasOptions:
          - rtgl-view d=h wrap g=sm w=f:
              - $for option, i in tagFilterPopover.options:
                  - rtgl-view#tagFilterOptionRef${i} data-tag-id=${option.value} cur=pointer:
                      - 'rtgl-tag v=mu style="${option.tagStyle}"':
                          ${option.label}
      - rtgl-view d=h av=c g=sm w=f pt=sm:
          - rtgl-view w=1fg: null
          - rtgl-button#tagFilterClear v=se s=sm ?disabled=${tagFilterPopover.clearDisabled}: Clear
          - rtgl-button#tagFilterApply v=pr s=sm: Save
