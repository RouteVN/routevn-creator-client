refs:
  mobileSidebarItem*:
    eventListeners:
      click:
        handler: handleItemClick
template:
  - rtgl-view d=v w=${w} h=${h} bgc=bg:
      - rtgl-view d=v w=f h=f p=lg g=lg sv:
          - $for section, sectionIndex in sections:
              - rtgl-view d=v w=f g=xs:
                  - rtgl-view h=32 w=f av=c ph=xs:
                      - rtgl-text s=xs c=mu-fg: ${section.label}
                  - $for item, itemIndex in section.items:
                      - rtgl-view#mobileSidebarItem${sectionIndex}x${itemIndex} data-item-id=${item.id} w=f h=48 d=h av=c g=sm ph=md br=lg bgc=${item.bgc} h-bgc=mu cur=pointer:
                          - rtgl-svg wh=20 svg=${item.icon} c=fg: null
                          - rtgl-text s=sm: ${item.label}
