refs:
  rulerTrack:
    eventListeners:
      mousemove:
        handler: handleRulerMouseMove
      mouseleave:
        handler: handleRulerMouseLeave
  track*:
    eventListeners:
      mousemove:
        handler: handleTrackMouseMove
      mouseleave:
        handler: handleTrackMouseLeave
      click:
        handler: handleTrackClick
  keyframe*:
    eventListeners:
      click:
        handler: handleKeyframeClick
      contextmenu:
        handler: handleKeyframeRightClick
  propertyName*:
    eventListeners:
      click:
        handler: handlePropertyNameClick
  initialValue*:
    eventListeners:
      click:
        handler: handleInitialValueClick
template:
  - rtgl-view g=md w=f pos=rel:
      - $if showRuler || (showTracks && selectedProperties.length > 0):
          - rtgl-view d=v w=f g=xs:
              - $if showRuler:
                  - rtgl-view d=h w=f av=e:
                      - rtgl-view w=72: null
                      - rtgl-view h=24 w=24 mr=sm ml=sm: null
                      - 'rtgl-view#rulerTrack w=f h=48 pos=rel style="min-width: 0; overflow: visible;"':
                          - $if hoverIndicatorVisible:
                              - 'rtgl-view pos=abs style="${hoverIndicatorLabelStyle}"':
                                  - rtgl-text s=xs c=fg: ${hoverIndicatorTimeLabel}
                              - 'rtgl-view pos=abs bgc=fg op="0.5" style="${hoverIndicatorRulerStyle}"': null
                          - $for tick, tickIndex in rulerTicks:
                              - 'rtgl-view key=${tick.id} pos=abs bgc=ac op="0.8" style="${tick.tickStyle}"': null
                              - $if tick.label:
                                  - 'rtgl-view pos=abs style="${tick.labelStyle}"':
                                      - rtgl-text s=xs c=mu-fg: ${tick.label}
              - $if showTracks:
                  - $for property, pIndex in selectedProperties:
                      - rtgl-view d=h w=f av=c:
                          - rtgl-view w=72 av=c d=h ah=c:
                              - rtgl-text#propertyName${pIndex} data-property=${property.name} s=xs cur=pointer: ${property.name}
                          - rtgl-view h=24 w=24 av=c ah=e mr=sm ml=sm:
                              - rtgl-text#initialValue${pIndex} data-property=${property.name} data-interactive=${property.initialValueInteractive} s=xs cur=${property.initialValueCursor}: ${property.initialValue}
                          - 'rtgl-view#track${pIndex} data-property=${property.name} data-track-mode=${property.trackMode} d=h w=f h=24 bgc=mu br=sm g=xs pos=rel style="min-width: 0; overflow: hidden; cursor: ${property.trackCursor};"':
                              - $if trackIndicatorVisible:
                                  - 'rtgl-view pos=abs bgc=fg op="0.5" style="${hoverIndicatorTrackStyle}"': null
                              - $if property.hoverTarget:
                                  - 'rtgl-view pos=abs bgc=pr br=sm op="0.14" style="top: 0; bottom: 0; left: ${property.hoverTarget.zoneLeft}px; width: ${property.hoverTarget.zoneWidth}px; pointer-events: none; z-index: 2;"': null
                                  - $if property.hoverTarget.mode == 'empty':
                                      - 'rtgl-view pos=abs bgc=pr br=f w=16 h=16 ah=c av=c style="top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 4;"':
                                          - rtgl-text s=xs c=bg: +
                                  - $if property.hoverTarget.mode != 'empty':
                                      - 'rtgl-view pos=abs bgc=pr style="top: 2px; bottom: 2px; left: ${property.hoverTarget.indicatorLeft}px; width: 2px; transform: translateX(-1px); pointer-events: none; z-index: 4;"': null
                                      - 'rtgl-view pos=abs bgc=pr br=f w=16 h=16 ah=c av=c style="top: 50%; left: ${property.hoverTarget.chipLeft}px; transform: translate(-50%, -50%); pointer-events: none; z-index: 4;"':
                                          - rtgl-text s=xs c=bg: +
                              - $if property.auto:
                                  - 'rtgl-view d=h p=xs h=f bgc=ac br=sm ah=c av=c style="width: ${property.auto.widthPercent}%"':
                                      - rtgl-text s=xs: ${property.auto.label}
                                  - $if property.fillerWidthPercent && property.fillerWidthPercent > 0:
                                      - 'rtgl-view d=h h=f style="width: ${property.fillerWidthPercent}%"': null
                                $else:
                                  - $if property.keyframes && property.keyframes.length > 0:
                                      - $for keyframe, j in property.keyframes:
                                          - 'rtgl-view#keyframe${pIndex}x${j} data-keyframe=true data-property=${property.name} data-index=${j} d=h p=xs h=f bgc=ac br=sm ah=e av=e mr=xs cur=pointer style="width: ${keyframe.widthPercent}%"':
                                              - rtgl-text s=xs: ${keyframe.value}
                                      - $if property.fillerWidthPercent && property.fillerWidthPercent > 0:
                                          - 'rtgl-view d=h h=f style="width: ${property.fillerWidthPercent}%"': null
                                    $else:
                                      - rtgl-view d=h p=xs h=f w=1fg br=sm ah=c av=c:
                                          - $if property.emptyLabelVisible:
                                              - rtgl-text s=xs: No keyframes
