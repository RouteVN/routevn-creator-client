componentName: rvn-keyframe-timeline
propsSchema:
  type: object
  properties:
    totalDuration:
      type: string
      description: Total duration of the animation (e.g., "4s")
    selectedProperties:
      type: array
      description: Array of selected animation properties (for dialog usage)
      items:
        type: object
        properties:
          name:
            type: string
          initialValue:
            type: number
    properties:
      type: object
      description: Animation properties object with initialValue and keyframes
    defaultValues:
      type: object
      description: Property default values used to determine default-value display
    timelineDuration:
      type: number
      description: Optional shared duration in milliseconds used for timeline sizing
    showTotalDuration:
      type: boolean
      description: Whether the timeline should render its duration header
    showRuler:
      type: boolean
      description: Whether the timeline should render its ruler row
    showTracks:
      type: boolean
      description: Whether the timeline should render its property tracks
    interactiveRuler:
      type: boolean
      description: Whether the ruler should emit hover events and render the local hover indicator
    indicatorVisible:
      type: boolean
      description: Whether the timeline should render an external playhead indicator
    indicatorTimeMs:
      type: number
      description: Optional external indicator time in milliseconds
    side:
      type: string
      description: Optional timeline context key included in emitted events
    tracks:
      type: array
      description: Array of animation tracks
      items:
        type: object
        properties:
          name:
            type: string
          keyframes:
            type: array
            items:
              type: object
              properties:
                start:
                  type: number
                duration:
                  type: number
    editable:
      type: string
      description: Whether the timeline is editable or not
