refs:
  searchInput:
    eventListeners:
      value-input:
        handler: handleSearchInput
  tagFilterButton:
    eventListeners:
      click:
        handler: handleTagFilterButtonClick
  tagFilterPopover:
    eventListeners:
      close:
        handler: handleTagFilterPopoverClose
  tagFilterOption*:
    eventListeners:
      click:
        handler: handleTagFilterOptionClick
  tagFilterClear:
    eventListeners:
      click:
        handler: handleTagFilterClearClick
  tagFilterApply:
    eventListeners:
      click:
        handler: handleTagFilterApplyClick
  menuButton:
    eventListeners:
      click:
        handler: handleMenuClick
  contextMenu:
    eventListeners:
      close:
        handler: handleCloseContextMenu
      item-click:
        handler: handleContextMenuClickItem
  zoomSlider:
    eventListeners:
      value-change:
        handler: handleZoomChange
      value-input:
        handler: handleZoomChange
  zoomOut:
    eventListeners:
      click:
        handler: handleZoomOut
  zoomIn:
    eventListeners:
      click:
        handler: handleZoomIn
  addBtn*:
    eventListeners:
      click:
        handler: handleAddButtonClick
  groupToggle*:
    eventListeners:
      click:
        handler: handleGroupClick
  item*:
    eventListeners:
      click:
        handler: handleItemClick
      dblclick:
        handler: handleItemDoubleClick
      contextmenu:
        handler: handleItemContextMenu
template:
  - 'rtgl-view w=f h=f g=sm style="min-width: 0; min-height: 0;"':
      - 'rtgl-view h=48 w=f bgc=bg bwb=xs ph=md av=c style="position: sticky; top: 0px; z-index: 1000;"':
          - rtgl-view w=f d=h av=c g=md wrap:
              - rtgl-view av=c g=sm d=h w=1fg:
                  - $if showMenuButton:
                      - rtgl-view#menuButton w=36 h=36 ah=c av=c cur=pointer:
                          - rtgl-svg svg=hamburger wh=22 c=mu-fg: null
                  - $if navTitle:
                      - rtgl-text: ${navTitle}
              - $if showZoomControls:
                  - rtgl-view d=h av=c g=sm:
                      - rtgl-button#zoomOut sq v="gh" s=sm: '-'
                      - rtgl-slider#zoomSlider w=120 min=${zoomControlMin} max=${zoomControlMax} step=${zoomControlStep} value=${zoomControlValue}: null
                      - rtgl-button#zoomIn sq v="gh" s=sm: +
              - $if showSearch:
                  - rtgl-input#searchInput s=sm placeholder=${searchPlaceholder} value=${searchQuery} h=1fg: null
              - $if showTagFilter:
                  - rtgl-view#tagFilterButton w=36 h=36 bw=xs br=md ah=c av=c cur=pointer bgc=${tagFilterButtonBackgroundColor} bc=${tagFilterButtonBorderColor}:
                      - rtgl-svg svg=filter wh=16 c=${tagFilterButtonIconColor}: null
      - 'rtgl-view h=1fg w=f sv style="min-width: 0;"':
          - $if groups.length > 0:
              - $for group, gIndex in groups:
                  - rtgl-view w=f ph=md pos=rel:
                      - 'rtgl-view d=h w=f av=c bgc=bg z=100 pv=sm style="position: sticky; top: 0px;"':
                          - rtgl-view#groupToggleRef${gIndex} data-group-id=${group.id} d=h av=c g=md cur=pointer:
                              - $if group.isCollapsed:
                                  - rtgl-svg wh=16 svg=folderArrowRight: null
                                $else:
                                  - rtgl-svg wh=16 svg=folderArrowDown: null
                              - rtgl-svg wh=16 svg=folder: null
                              - rtgl-text: ${group.fullLabel}
                          - rtgl-view w=1fg: null
                          - $if canAdd:
                              - rtgl-button#addBtnHeaderRef${gIndex} data-group-id=${group.id} s=sm w=1fg pre=plus: ${addText}
                      - $if !group.isCollapsed:
                          - 'rtgl-grid w=f ph=sm pt=md pb=sm mb=lg g=md cols="${cardGridColumns}" style="min-width: 0;"':
                              - $if group.hasChildren:
                                  - $for item, itemIndex in group.children:
                                      - rtgl-view#itemRef${gIndex}x${itemIndex} data-item-id=${item.id} w=${item.itemWidth} cur=pointer bw=xs bc=${item.itemBorderColor} h-bc=${item.itemHoverBorderColor} br=md style="${item.itemContainerStyle}":
                                          - $if item.cardKind == 'color':
                                              - 'rtgl-view d=v w=f p=md g=md br=md style="overflow: hidden;"':
                                                  - $if item.useFullWidthCatalogPreview:
                                                      - 'rtgl-view w=f br=sm style="aspect-ratio: ${item.previewAspectRatio}; overflow: hidden; background-color: ${item.swatchHex};"': null
                                                    $else:
                                                      - 'rtgl-view w=f h=120 br=sm style="background-color: ${item.swatchHex};"': null
                                                  - rtgl-text s=xs c=mu-fg ellipsis w=f: ${item.name}
                                            $elif item.cardKind == 'layout':
                                              - $if item.cardVariant == 'thumbnail':
                                                  - 'rtgl-view w=${item.layoutPreviewWidth} br=md style="overflow: hidden; max-width: 100%;"':
                                                      - $if item.useFullWidthCatalogPreview:
                                                          - 'rtgl-view w=f br=md style="aspect-ratio: ${item.previewAspectRatio}; overflow: hidden;"':
                                                              - $if item.previewFileId:
                                                                  - rvn-file-image fileId=${item.previewFileId} w=f h=f: null
                                                                $else:
                                                                  - rtgl-view w=f h=f av=c ah=c bgc=mu-fg:
                                                                      - rtgl-text s=sm c=mu-fg: No thumbnail
                                                        $elif item.previewFileId:
                                                          - rvn-file-image fileId=${item.previewFileId} w=f h=120: null
                                                        $else:
                                                          - rtgl-view w=f h=120 av=c ah=c bgc=mu-fg:
                                                              - rtgl-text s=sm c=mu-fg: No thumbnail
                                                      - rtgl-view d=v w=f g=xs ph=md pt=sm pb=md:
                                                          - rtgl-text s=sm ellipsis w=f: ${item.name}
                                                          - $if item.typeInfo || item.typeInfoSvg:
                                                              - rtgl-view d=h av=c w=f:
                                                                  - $if item.typeInfo:
                                                                      - rtgl-view w=f:
                                                                          - rtgl-text s=xs c=mu-fg ellipsis w=f: ${item.typeInfo}
                                                                  - $if item.typeInfoSvg:
                                                                      - rtgl-svg svg=${item.typeInfoSvg} wh=14 c=mu-fg: null
                                                $else:
                                                  - $if item.useFullWidthCatalogPreview:
                                                      - 'rtgl-view w=f d=v ah=c av=c br=md p=md g=sm style="aspect-ratio: ${item.previewAspectRatio}; overflow: hidden;"':
                                                          - rtgl-text s=md ellipsis w=f: ${item.name}
                                                          - $if item.subtitle:
                                                              - rtgl-text s=sm c=mu-fg ellipsis w=f: ${item.subtitle}
                                                    $else:
                                                      - rtgl-view w=225 h=152 d=v ah=c av=c br=md p=md g=sm:
                                                          - rtgl-text s=md ellipsis w=f: ${item.name}
                                                          - $if item.subtitle:
                                                              - rtgl-text s=sm c=mu-fg ellipsis w=f: ${item.subtitle}
                                            $elif item.cardKind == 'transform':
                                              - rtgl-view w=f p=md g=md br=md:
                                                  - $if item.useFullWidthCatalogPreview:
                                                      - 'rtgl-view w=f br=md style="aspect-ratio: ${item.previewAspectRatio}; overflow: hidden;"':
                                                          - rvn-transform-thumbnail :item=${item} canvas-aspect-ratio="${item.previewAspectRatio}" w=f h=f: null
                                                    $else:
                                                      - rvn-transform-thumbnail :item=${item} canvas-aspect-ratio="${item.previewAspectRatio}" w=${item.transformPreviewWidth} h=120: null
                                                  - rtgl-text s=xs c=mu-fg ellipsis w=f: ${item.name}
                                            $elif item.cardKind == 'animation':
                                              - rtgl-view w=f h=1fg bgc=bg br=md p=md:
                                                  - rtgl-text s=h4 mb=md: ${item.name}
                                                  - rtgl-text s=xs c=mu-fg mb=md: 'Type: ${item.animationTypeLabel}'
                                                  - $if item.animationType == 'transition':
                                                      - rtgl-view d=v w=f g=md:
                                                          - rvn-keyframe-timeline w=f ?showRuler=true ?showTracks=false timelineDuration=${item.transitionTimelineDuration}: null
                                                          - rtgl-view d=v w=f g=xs:
                                                              - rtgl-text s=xs c=mu-fg: Out
                                                              - rvn-keyframe-timeline w=f ?showTotalDuration=false ?showRuler=false timelineDuration=${item.transitionTimelineDuration} :properties=${item.prevProperties}: null
                                                          - rtgl-view d=v w=f g=xs:
                                                              - rtgl-text s=xs c=mu-fg: In
                                                              - rvn-keyframe-timeline w=f ?showTotalDuration=false ?showRuler=false timelineDuration=${item.transitionTimelineDuration} :properties=${item.nextProperties}: null
                                                    $else:
                                                      - rvn-keyframe-timeline w=f ?showRuler=true :properties=${item.updateProperties}: null
                                            $else:
                                              - rtgl-view w=225 h=152 d=v ah=c av=c br=md p=md g=sm:
                                                  - rtgl-text s=md ellipsis w=f: ${item.name}
                                                  - $if item.subtitle:
                                                      - rtgl-text s=sm c=mu-fg ellipsis w=f: ${item.subtitle}
                                $else:
                                  - $if canAdd:
                                      - 'rtgl-view#addBtnEmptyRef${gIndex} data-group-id=${group.id} w=f h=150 av=c ah=c g=md bw=xs bc=bo br=md cur=pointer style="grid-column: 1 / -1;"':
                                          - rtgl-svg svg=plus wh=24: null
                                          - rtgl-text: ${addText}
            $elif searchQuery || selectedTagFilterValues.length > 0:
              - rtgl-view w=f h=400 av=c ah=c:
                  - rtgl-text s=lg c=mu-fg: ${emptyMessage}
            $else:
              - rtgl-view w=f h=f av=c ah=c:
                  - rtgl-text s=lg c=mu-fg: No data
  - rtgl-popover#tagFilterPopover ?open=${tagFilterPopover.isOpen} x=${tagFilterPopover.position.x} y=${tagFilterPopover.position.y} place=bs content-w=320 content-g=sm content-sv=true content-ph=md content-pv=md:
      - $if !tagFilterPopover.hasOptions:
          - rtgl-text s=sm c=mu-fg: No tags available
      - $if tagFilterPopover.hasOptions:
          - rtgl-view d=h wrap g=sm w=f:
              - $for option, i in tagFilterPopover.options:
                  - rtgl-view#tagFilterOptionRef${i} data-tag-id=${option.value} cur=pointer:
                      - 'rtgl-tag v=mu style="${option.tagStyle}"':
                          ${option.label}
      - rtgl-view d=h av=c g=sm w=f pt=sm:
          - rtgl-view w=1fg: null
          - rtgl-button#tagFilterClear v=se s=sm ?disabled=${tagFilterPopover.clearDisabled}: Clear
          - rtgl-button#tagFilterApply v=pr s=sm: Save
  - rtgl-dropdown-menu#contextMenu :items=${dropdownMenu.items} ?open=${dropdownMenu.isOpen} x=${dropdownMenu.x} y=${dropdownMenu.y}: null
