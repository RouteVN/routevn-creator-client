componentName: rvn-catalog-resources-view
propsSchema:
  type: object
  properties:
    navTitle:
      type: string
      description: Optional title to display in the header
    groups:
      type: array
      description: Array of normalized catalog groups to display
    selectedItemId:
      type: string
      description: ID of the currently selected item
    searchQuery:
      type: string
      description: Current search query
    searchPlaceholder:
      type: string
      description: Placeholder text for search input
    emptyMessage:
      type: string
      description: Message to show when no items match
    tagFilterOptions:
      type: array
      description: Available tag filter options
    selectedTagFilterValues:
      type: array
      description: Currently selected tag ids
    tagFilterPlaceholder:
      type: string
      description: Placeholder text for the tag filter
    showTagFilter:
      type: boolean
      description: Whether the tag filter should be shown
    showSearch:
      type: boolean
      description: Whether to render the search input
    showMenuButton:
      type: boolean
      description: Whether to show a menu icon in the header
    addText:
      type: string
      description: Text to display in add affordances
    canAdd:
      type: boolean
      description: Whether add actions should be shown
    mobileLayout:
      type: boolean
      description: Whether cards should use the touch/mobile full-width layout
    itemContextMenuItems:
      type: array
      description: Context menu items for catalog cards
