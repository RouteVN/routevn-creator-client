componentName: rvn-catalog-resources-view
propsSchema:
  type: object
  properties:
    navTitle:
      type: string
      description: Optional title to display in the header
    groups:
      type: array
      description: Array of normalized catalog groups to display
    selectedItemId:
      type: string
      description: ID of the currently selected item
    selectedFolderId:
      type: string
      description: ID of the currently selected folder
    searchQuery:
      type: string
      description: Current search query
    searchPlaceholder:
      type: string
      description: Placeholder text for search input
    emptyMessage:
      type: string
      description: Message to show when no items match
    tagFilterOptions:
      type: array
      description: Available tag filter options
    selectedTagFilterValues:
      type: array
      description: Currently selected tag ids
    tagFilterPlaceholder:
      type: string
      description: Placeholder text for the tag filter
    showTagFilter:
      type: boolean
      description: Whether the tag filter should be shown
    showSearch:
      type: boolean
      description: Whether to render the search input
    searchInFilterPopover:
      type: boolean
      description: Whether search should render inside the filter popover
    showZoomControls:
      type: boolean
      description: Whether to show zoom controls
    zoomControlMode:
      type: string
      enum:
        - columns
      description: Whether zoom controls should control grid columns
    defaultItemsPerRow:
      type: number
      description: Initial column count when zoom controls use column mode
    itemsPerRowConfigKey:
      type: string
      description: Optional user config key for persisted column count
    fixedItemsPerRow:
      type: number
      description: Optional fixed column count when zoom controls are not used
    showMenuButton:
      type: boolean
      description: Whether to show a menu icon in the header
    addText:
      type: string
      description: Text to display in add affordances
    canAdd:
      type: boolean
      description: Whether add actions should be shown
    mobileLayout:
      type: boolean
      description: Whether cards should use the touch/mobile full-width layout
    itemContextMenuItems:
      type: array
      description: Context menu items for catalog cards
methods:
  type: object
  properties:
    zoomIn:
      description: Increases catalog grid zoom by one step.
      params: []
      returns: void
    zoomOut:
      description: Decreases catalog grid zoom by one step.
      params: []
      returns: void
