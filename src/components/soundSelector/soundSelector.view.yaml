refs:
  container: {}
  soundItem*:
    eventListeners:
      click:
        handler: handleSoundItemClick
template:
  - 'rtgl-view#container h=1fg sv g=lg style="outline: none;"':
      - $for group, i in groups:
          - 'rtgl-view#groupRef${i} data-group-id=${group.id} mb=sm w=f bgc=bg style="position: sticky; top: 0"':
              - rtgl-view d=h av=c g=md:
                  - rtgl-svg svg=folder wh=16: null
                  - rtgl-text: ${group.fullLabel}
          - rtgl-view d=h w=f wrap g=md:
              - $for item, j in group.children:
                  - rtgl-view#soundItemRef${i}x${j} data-item-id=${item.id} bw=xs bc=${item.itemBorderColor} h-bc=${item.itemHoverBorderColor} br=md cur=pointer key=${item.id}:
                      - 'rtgl-view br=md w=220 pos=rel overflow=hidden style="${item.soundCardStyle}"':
                          - $if item.waveformDataFileId:
                              - rtgl-view w=f h=120 bwb=xs bc=bo bgc=mu overflow=hidden:
                                  - rvn-waveform-visualizer waveformDataFileId=${item.waveformDataFileId} w=f h=f: null
                            $else:
                              - rtgl-view w=f h=120 bwb=xs bc=bo bgc=mu av=c ah=c:
                                  - rtgl-svg svg=play wh=24 c=mu-fg: null
                          - rtgl-view w=f p=md:
                              - rtgl-text s=xs c=mu-fg ellipsis w=f: ${item.name}
