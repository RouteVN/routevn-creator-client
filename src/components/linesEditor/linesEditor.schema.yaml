componentName: rvn-lines-editor
propsSchema:
  type: object
  properties:
    lines:
      type: array
      items:
        type: object
        properties: null
    selectedLineId:
      type: string
    sectionLineChanges:
      type: object
methods:
  type: object
  properties:
    syncContentLine:
      description: Forces one rendered line element to match the current lines prop.
      params: []
      returns: void
    syncAllContentLines:
      description: Forces all rendered line elements to match the current lines prop.
      params: []
      returns: void
