componentName: rvn-lines-editor
propsSchema:
  type: object
  properties:
    lines:
      type: array
      items:
        type: object
        properties: null
    selectedLineId:
      type: string
methods:
  type: object
  properties:
    syncContentLine:
      description: Forces one rendered line element to match the current lines prop.
      params: []
      returns: void
    syncAllContentLines:
      description: Forces all rendered line elements to match the current lines prop.
      params: []
      returns: void
    focusLine:
      description: Focuses a rendered line and applies caret/navigation state.
      params: []
      returns: void
    focusContainer:
      description: Focuses the outer block-mode container.
      params: []
      returns: void
    scrollLineIntoView:
      description: Scrolls a rendered line into view within the editor viewport.
      params: []
      returns: void
