elementName: rvn-lines-editor

handleBeforeMountviewDataSchema:
  type: object
  properties:
    selectedLineId:
      type: string
    mode:
      type: string

propsSchema:
  type: object
  properties:
    lines:
      type: array
      items:
        type: object
        properties:
    selectedLineId:
      type: string

refs:
  container:
    eventListeners:
      keydown:
        handler: handleContainerKeyDown
  line-*:
    eventListeners:
      focus:
        handler: handleOnFocus
      blur:
        handler: handleLineBlur
      input:
        handler: handleOnInput
      # mousedown:
      #   handler: handleBlockMouseDown
      mouseup:
        handler: handleLineMouseUp
      # beforeinput:
      #   handler: handleBlockBeforeInput
      # compositionend:
      #   handler: handleBlockCompositionEnd
      # compositionstart:
      #   handler: handleBlockCompositionStart
      keydown:
        handler: handleLineKeyDown
  preview-*:
    eventListeners:
      contextmenu:
        handler: handlePreviewRightClick

styles:
  'div[contenteditable="true"]':
    font-size: 16px
    font-family: inherit
    line-height: 1.5
  'div[contenteditable="true"]:focus':
    outline: none

template:
  - $if ready:
      - 'rtgl-view#container w=f tabindex=0 style="outline: none;"':
          - $for line, i in lines:
              - 'rtgl-view d=h w=f style="background-color: ${line.backgroundColor};"':
                  - rtgl-view h=f w=32 ah=e mr=md pt=sm:
                      - rtgl-text s=sm c=${line.lineColor}: ${line.lineNumber}
                  - rtgl-view wh=16 br=f mr=md:
                      - $if line.characterFileId:
                          - rvn-file-image fileId=${line.characterFileId} w=16 h=16 br=f:
                  - rtgl-view d=h w=f:
                      - rtgl-view w=f:
                          - 'div#line-${line.id} style="width: 100%; padding-bottom: 4px;" contenteditable=true': ${line.actions.dialogue.content[0].text}
                          - $if line.sectionTransition:
                              - rtgl-view#preview-sectionTransition data-type="sectionTransition" data-id="${line.id}" d=h:
                                  - rtgl-svg svg="transition" wh=16:
                                  - rtgl-svg svg="section" wh=16:
                                  - rtgl-text s=sm: "Transition to section: ${line.transitionTarget}"
                          - $if line.hasChoices:
                              - rtgl-view#preview-choice data-type="choice" data-id="${line.id}" d=v:
                                  - rtgl-view d=h:
                                      - rtgl-svg svg="choices" wh=16:
                                      - rtgl-text s=sm: "Choices:"
                                  - $for choice in line.choices:
                                      - rtgl-view d=h ml=sm:
                                          - rtgl-text s=sm: "• ${choice.content}"

                      - rtgl-view d=h:
                          # Background
                          - $if line.changes.background:
                              - $if line.changes.background.type == 'deleted':
                                  - 'rtgl-view#preview-background data-type="background" data-id="${line.id}" pos=rel d=v':
                                      - $if line.changes.background.fileId:
                                          - rvn-file-image w=36 h=24 fileId=${line.changes.background.fileId} mr=sm:
                                        $else:
                                          - rtgl-svg svg=image wh=24:
                                      - 'rtgl-svg svg="x-close" wh=14 pos=abs cor=c':
                                $else:
                                  - rtgl-view#preview-background data-type="background" data-id="${line.id}" d=h:
                                      - $if line.changes.background.fileId:
                                          - rvn-file-image w=36 h=24 fileId=${line.changes.background.fileId} mr=sm:
                                        $else:
                                          - rtgl-svg svg=image wh=24:

                          # Characters added
                          - $if line.changes.characters.added.length > 0:
                              - rtgl-view#preview-character data-type="character" data-id="${line.id}" d=h mr=sm:
                                  - $for sprite in line.changes.characters.added:
                                      - rvn-file-image fileId=${sprite.fileId} w=20 h=24 br=f:

                          # Characters updated
                          - $if line.changes.characters.updated.length > 0:
                              - rtgl-view#preview-character data-type="character" data-id="${line.id}" d=h mr=sm:
                                  - $for sprite in line.changes.characters.updated:
                                      - rvn-file-image fileId=${sprite.fileId} w=20 h=24 br=f:

                          # Characters deleted
                          - $if line.changes.characters.deleted.length > 0:
                              - 'rtgl-view#preview-character data-type="character" data-id="${line.id}" d=h mr=sm pos=rel':
                                  - $for sprite in line.changes.characters.deleted:
                                      - rtgl-view d=v pos=rel:
                                          - rvn-file-image fileId=${sprite.fileId} w=20 h=24 br=f:
                                          - 'rtgl-svg svg="x-close" wh=14 pos=abs cor=c':

                          # Dialogue
                          - $if line.changes.dialogue:
                              - $if line.changes.dialogue.type == 'deleted':
                                  - 'rtgl-view pos=rel d=v':
                                      - rtgl-svg#preview-dialogue data-type="dialogue" data-id="${line.id}" svg="dialogue" wh=24 mr=sm:
                                      - 'rtgl-svg svg="x-close" wh=14 pos=abs cor=c':
                                $else:
                                  - rtgl-svg#preview-dialogue data-type="dialogue" data-id="${line.id}" svg="dialogue" wh=24 mr=sm:

                          # Base
                          - $if line.changes.base:
                              - $if line.changes.base.type == 'deleted':
                                  - 'rtgl-view pos=rel d=v':
                                      - rtgl-svg#preview-base data-type="base" data-id="${line.id}" svg="screen" wh=24 mr=sm:
                                      - 'rtgl-svg svg="x-close" wh=14 pos=abs cor=c':
                                $else:
                                  - rtgl-svg#preview-base data-type="base" data-id="${line.id}" svg="screen" wh=24 mr=sm:

                          # BGM
                          - $if line.changes.bgm:
                              - $if line.changes.bgm.type == 'deleted':
                                  - 'rtgl-view pos=rel d=v':
                                      - rtgl-svg#preview-bgm data-type="bgm" data-id="${line.id}" svg="music" wh=24 mr=sm:
                                      - 'rtgl-svg svg="x-close" wh=14 pos=abs cor=c':
                                $else:
                                  - rtgl-svg#preview-bgm data-type="bgm" data-id="${line.id}" svg="music" wh=24 mr=sm:

                          # SFX (always show, no change detection)
                          - $if line.hasSfx:
                              - rtgl-svg#preview-sfx data-type="sfx" data-id="${line.id}" svg="audio" wh=24:
