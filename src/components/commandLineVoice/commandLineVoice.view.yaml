refs:
  form:
    eventListeners:
      form-change:
        handler: handleFormChange
  voiceChannel:
    eventListeners:
      click:
        handler: handleChannelClick
      keydown:
        handler: handleChannelKeyDown
  channelSelectButton:
    eventListeners:
      click:
        handler: handleChannelClick
  emptyAddButton:
    eventListeners:
      click:
        handler: handleEmptyAddClick
  insertBeforeButton*:
    eventListeners:
      click:
        handler: handleEdgeAddClick
  insertAfterButton*:
    eventListeners:
      click:
        handler: handleEdgeAddClick
  soundClip*:
    eventListeners:
      click:
        handler: handleSoundClick
      dblclick:
        handler: handleSoundDoubleClick
      contextmenu:
        handler: handleSoundContextMenu
      keydown:
        handler: handleSoundKeyDown
  soundDragSurface*:
    eventListeners:
      pointerdown:
        handler: handleSoundDragPointerDown
  submitButton:
    eventListeners:
      click:
        handler: handleSubmitClick
  breadcumb:
    eventListeners:
      item-click:
        handler: handleBreadcumbClick
  rvnAudioPlayer:
    eventListeners:
      audio-player-close:
        handler: handleAudioPlayerClose
styles:
  ".voiceChannel":
    box-sizing: border-box
    min-width: "0"
    overflow-x: auto
    overflow-y: hidden
  ".voiceTimelineTrack":
    min-width: 100%
    position: relative
  ".voiceSoundClip":
    box-sizing: border-box
    min-width: 56px
    overflow: hidden
    outline: none
    position: absolute
  ".voiceSoundClipContent":
    box-sizing: border-box
    min-width: "0"
    overflow: hidden
  ".voiceSoundWaveformArea":
    flex: "0 0 94px"
    height: 94px
    position: relative
    width: 100%
  ".voiceSoundDragSurface":
    bottom: "0"
    cursor: grab
    left: "0"
    position: absolute
    right: "0"
    top: "0"
    touch-action: none
    user-select: none
    z-index: "3"
  ".voiceSoundDragSurface:active":
    cursor: grabbing
  ".voiceSoundClip:focus-visible":
    box-shadow: 0 0 0 2px var(--ring) inset
  ".voiceInsertZone":
    appearance: none
    background: transparent
    border: "0"
    bottom: "0"
    color: var(--primary-foreground)
    cursor: pointer
    font-family: inherit
    font-size: 20px
    font-weight: 600
    opacity: "0"
    padding: "0"
    position: absolute
    top: "0"
    transition: opacity 120ms ease, background 120ms ease
    width: "min(44px, 50%)"
    z-index: "5"
  ".voiceInsertZone:hover":
    background: var(--primary)
    opacity: "0.88"
  ".voiceInsertZone:focus-visible":
    background: var(--primary)
    opacity: "0.88"
    outline: "2px solid var(--ring)"
    outline-offset: -2px
  ".voiceInsertBefore":
    left: "0"
  ".voiceInsertAfter":
    right: "0"
  ".voiceEmptyAdd":
    appearance: none
    background: transparent
    border: "0"
    color: var(--muted-foreground)
    cursor: pointer
    font-family: inherit
    font-size: 30px
    height: 100%
    padding: "0"
    width: 100%
  ".voiceEmptyAdd:hover":
    color: var(--foreground)
  ".voiceEmptyAdd:focus-visible":
    box-shadow: 0 0 0 2px var(--ring) inset
    outline: none
  ".voiceChannelSelect":
    align-items: center
    appearance: none
    background: transparent
    border: "0"
    border-bottom: "1px solid var(--border)"
    color: var(--muted-foreground)
    cursor: pointer
    display: flex
    flex: "0 0 24px"
    font-family: inherit
    font-size: 12px
    height: 24px
    justify-content: space-between
    padding: "0 8px"
    text-align: left
    width: 100%
  ".voiceChannelSelect:hover":
    color: var(--foreground)
  ".voiceChannelSelect:focus-visible":
    box-shadow: 0 0 0 2px var(--ring) inset
    outline: none
template:
  - rtgl-view w=f h=f p=lg:
      - rtgl-view d=h g=md: null
      - rtgl-breadcrumb#breadcumb :items=${breadcrumb}: null
      - 'rtgl-view h=1fg sv w=f g=lg mt=lg style="min-height: 0;"':
          - 'rtgl-view#voiceChannel.voiceChannel w=f d=v pos=rel bgc=mu bw=xs bc=${channelBorderColor} h-bc=${channelHoverBorderColor} br=sm tabindex=0 role=group aria-label="${channelLabel}" style="height: ${channelHeightPx}px;"':
              - 'button#channelSelectButton.voiceChannelSelect type=button aria-label="${channelLabel}"':
                  - span: ${channelLabel}
                  - span: ${channelDurationLabel}
              - $if sounds.length == 0:
                  - 'rtgl-view w=f h=126 bgc=bg bwb=xs bc=${channelBorderColor} style="min-height: 0;"':
                      - 'button#emptyAddButton.voiceEmptyAdd type=button aria-label="${addAudioLabel}"': "+"
                $else:
                  - 'rtgl-view.voiceTimelineTrack data-timeline-track=true data-timeline-duration-ms=${timelineDurationMs} w=f pos=rel style="height: ${timelineHeightPx}px; min-width: 100%;"':
                      - $for sound, i in sounds:
                          - 'rtgl-view#soundClip${i}.voiceSoundClip data-sound-id=${sound.id} d=v pos=abs overflow=hidden bw=xs bc=${sound.itemBorderColor} h-bc=${sound.itemHoverBorderColor} cur=pointer tabindex=0 role=button aria-label="${sound.name}" style="box-sizing: border-box; min-width: 56px; left: ${sound.leftPercent}%; top: ${sound.topPx}px; width: ${sound.widthPercent}%; height: 126px;"':
                              - rtgl-view.voiceSoundClipContent d=v w=f h=f:
                                  - div.voiceSoundWaveformArea:
                                      - $if sound.waveformDataFileId:
                                          - rvn-waveform-visualizer waveformDataFileId=${sound.waveformDataFileId} w=f h=94: null
                                        $else:
                                          - rtgl-view w=f h=94 av=c ah=c:
                                              - rtgl-text s=sm c=mu-fg: No waveform
                                      - 'div#soundDragSurface${i}.voiceSoundDragSurface data-sound-id=${sound.id}': null
                                      - 'button#insertBeforeButton${i}.voiceInsertZone.voiceInsertBefore type=button data-insert-index=${sound.insertBeforeIndex} aria-label="${addBeforeLabel}"': "+"
                                      - 'button#insertAfterButton${i}.voiceInsertZone.voiceInsertAfter type=button data-insert-index=${sound.insertAfterIndex} aria-label="${addAfterLabel}"': "+"
                                  - rtgl-view d=h w=f h=30 ph=sm av=c g=sm:
                                      - rtgl-text s=xs c=mu-fg ellipsis w=1fg: ${sound.name}
                                      - 'rtgl-text s=xs c=mu-fg style="flex: 0 0 auto;"': ${sound.durationLabel}
          - rtgl-view w=f g=md:
              - rtgl-view w=f:
                  - rtgl-text s=md: ${selectionHeading}
                  - rtgl-text s=sm c=mu-fg: ${selectionName}
              - rtgl-form#form key=${selectionKey} :form=${form} :defaultValues=${defaultValues}: null
      - 'rtgl-view d=h av=c ah=e w=f g=lg style="flex: 0 0 auto;"':
          - rtgl-button#submitButton: Submit
  - $if showAudioPlayer:
      - 'rtgl-view h=72 pos=fix edge=b z=1001 style="left: 0px; right: 0px;"':
          - rvn-audio-player#rvnAudioPlayer fileId=${playingSound.fileId} autoPlay=true :title=${playingSound.title}: null
