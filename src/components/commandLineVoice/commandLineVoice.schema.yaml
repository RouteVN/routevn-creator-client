componentName: rvn-command-line-voice
propsSchema:
  type: object
  properties:
    voice:
      type: object
      properties:
        sounds:
          type: array
          items:
            type: object
            required: [id, resourceId]
            properties:
              id:
                type: string
              resourceId:
                type: string
              loop:
                type: boolean
              volume:
                type: number
              startDelayMs:
                type: number
        resourceId:
          type: string
          description: Legacy single-sound Voice resource
        loop:
          type: boolean
          description: Whether to repeat the complete Voice channel timeline
        interruption:
          type: string
          enum: [immediate, loopEnd]
          description: How channel playback stops when interrupted
        volume:
          type: number
          description: Voice channel volume from 0 to 100
        startDelayMs:
          type: number
          description: Legacy single-sound start delay
    currentSceneId:
      type: string
