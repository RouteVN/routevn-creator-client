componentName: rvn-font-preview
propsSchema:
  type: object
  properties:
    previewText:
      type: string
      description: Text to display in preview
    fontFamily:
      type: string
      description: Font family to use
    fontFamilies:
      type: array
      description: Ordered font families to use
      items:
        type: string
    fileId:
      type: string
      description: File ID for the font file
    fileIds:
      type: array
      description: Ordered file IDs for the font files
      items:
        type: string
    fontSize:
      type: string
      description: Font size in pixels
      default: '100'
    lineHeight:
      type: string
      description: Line height (e.g., 1.5, 1.2, 24px)
      default: '1.5'
    fontWeight:
      type: string
      description: Font weight
      default: normal
    color:
      type: string
      description: Text color
      default: currentColor
    strokeColor:
      type: string
      description: Text outline color
      default: transparent
    strokeWidth:
      type: string
      description: Text outline width in pixels
      default: '0'
    shadowColor:
      type: string
      description: Text shadow color
      default: transparent
    shadowAlpha:
      type: string
      description: Text shadow opacity
      default: '1'
    shadowBlur:
      type: string
      description: Text shadow blur radius in pixels
      default: '0'
    shadowOffsetX:
      type: string
      description: Horizontal text shadow offset in pixels
      default: '2'
    shadowOffsetY:
      type: string
      description: Vertical text shadow offset in pixels
      default: '2'
    width:
      type: string
      description: Preview container width
      default: '200'
    height:
      type: string
      description: Preview container height
      default: '150'
    padding:
      type: string
      description: Preview container padding in pixels
      default: '0'
    backgroundColor:
      type: string
      description: Background color
      default: transparent
    textAlign:
      type: string
      description: Text alignment
      default: left
    av:
      type: string
      description: Vertical alignment
      default: ''
    ah:
      type: string
      description: Horizontal alignment
      default: ''
    showBorder:
      type: string
      description: Whether to show border around preview
      default: 'true'
    mode:
      type: string
      description: Use a live Route Graphics canvas or a generated thumbnail
      enum: [live, thumbnail]
      default: thumbnail
