componentName: rvn-media-resources-view
propsSchema:
  type: object
  properties:
    navTitle:
      type: string
      description: Optional title to display in the header
    groups:
      type: array
      description: Array of normalized media groups to display
    selectedItemId:
      type: string
      description: ID of the currently selected item
    searchQuery:
      type: string
      description: Current search query
    uploadText:
      type: string
      description: Text to display in upload affordances
    uploadIcon:
      type: string
      description: Icon to display in upload affordances
    acceptedFileTypes:
      type: array
      description: Array of accepted file extensions
    searchPlaceholder:
      type: string
      description: Placeholder text for search input
    showSearch:
      type: boolean
      description: Whether to render the search input
    tagFilterOptions:
      type: array
      description: Tag filter options for the header selector
    selectedTagFilterValues:
      type: array
      description: Selected tag ids for the header selector
    tagFilterPlaceholder:
      type: string
      description: Placeholder text for the tag filter selector
    showTagFilter:
      type: boolean
      description: Whether to render the tag filter control
    emptyMessage:
      type: string
      description: Message to show when no items match
    imageHeight:
      type: number
      description: Base height for image cards
    maxWidth:
      type: number
      description: Base width for image cards
    showZoomControls:
      type: boolean
      description: Whether to show zoom controls
    showBackButton:
      type: boolean
      description: Whether to show a back button in the header
    showMenuButton:
      type: boolean
      description: Whether to show a menu icon in the header
    canUpload:
      type: boolean
      description: Whether upload actions should be shown
    progressiveRender:
      type: boolean
      description: Whether to progressively render media cards
    lazyImageCards:
      type: boolean
      description: Whether image card thumbnails should lazy-load
    showImageCardPreview:
      type: boolean
      description: Whether image cards should render preview media
    itemContextMenuItems:
      type: array
      description: Context menu items for media cards
    scrollBottomPadding:
      type: string
      description: Extra bottom padding inside the scroll container
methods:
  type: object
  properties:
    scrollItemIntoView:
      description: Scrolls a rendered media card into view when needed.
      params: []
      returns: void
