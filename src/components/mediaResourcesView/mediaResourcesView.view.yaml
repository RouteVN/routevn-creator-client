refs:
  scrollContainer: {}
  searchInput:
    eventListeners:
      value-input:
        handler: handleSearchInput
  tagFilterButton:
    eventListeners:
      click:
        handler: handleTagFilterButtonClick
  tagFilterPopover:
    eventListeners:
      close:
        handler: handleTagFilterPopoverClose
  tagFilterOption*:
    eventListeners:
      click:
        handler: handleTagFilterOptionClick
  tagFilterClear:
    eventListeners:
      click:
        handler: handleTagFilterClearClick
  tagFilterApply:
    eventListeners:
      click:
        handler: handleTagFilterApplyClick
  backButton:
    eventListeners:
      click:
        handler: handleBackClick
  menuButton:
    eventListeners:
      click:
        handler: handleMenuClick
  contextMenu:
    eventListeners:
      close:
        handler: handleCloseContextMenu
      item-click:
        handler: handleContextMenuClickItem
  zoomButton:
    eventListeners:
      click:
        handler: handleZoomButtonClick
  zoomPopover:
    eventListeners:
      close:
        handler: handleZoomPopoverClose
  zoomSlider:
    eventListeners:
      value-change:
        handler: handleZoomChange
      value-input:
        handler: handleZoomChange
  zoomOut:
    eventListeners:
      click:
        handler: handleZoomOut
  zoomIn:
    eventListeners:
      click:
        handler: handleZoomIn
  uploadBtn*:
    eventListeners:
      click:
        handler: handleUploadButtonClick
  groupToggle*:
    eventListeners:
      click:
        handler: handleGroupClick
  item*:
    eventListeners:
      click:
        handler: handleItemClick
      dblclick:
        handler: handleItemDoubleClick
      mouseenter:
        handler: handleItemMouseEnter
      mouseleave:
        handler: handleItemMouseLeave
      contextmenu:
        handler: handleItemContextMenu
  groupDrop*:
    eventListeners:
      dragenter:
        handler: handleDragEnter
      dragover:
        handler: handleDragOver
      dragleave:
        handler: handleDragLeave
      drop:
        handler: handleDrop
  previewAction*:
    eventListeners:
      click:
        handler: handlePreviewActionClick
template:
  - 'rtgl-view w=f h=f g=sm style="min-width: 0; min-height: 0;"':
      - 'rtgl-view h=48 w=f bgc=bg bwb=xs ph=md av=c style="position: sticky; top: 0px; z-index: 1000;"':
          - rtgl-view w=f d=h av=c g=md wrap:
              - rtgl-view av=c g=sm d=h w=1fg:
                  - $if showMenuButton:
                      - rtgl-view#menuButton w=36 h=36 ah=c av=c cur=pointer:
                          - rtgl-svg svg=hamburger wh=22 c=mu-fg: null
                  - $if showBackButton:
                      - rtgl-button#backButton sq pre="chevronLeft" v="gh" mr=sm: null
                  - $if navTitle:
                      - rtgl-text: ${navTitle}
              - rtgl-view d=h av=c g=md:
                  - $if showInlineZoomControls:
                      - rtgl-view d=h av=c g=sm:
                          - rtgl-button#zoomOut sq v="gh" s=sm: '-'
                          - rtgl-slider#zoomSlider w=120 min=${zoomControlMin} max=${zoomControlMax} step=${zoomControlStep} value=${zoomControlValue}: null
                          - rtgl-button#zoomIn sq v="gh" s=sm: +
                  - $if showZoomPopoverButton:
                      - rtgl-view#zoomButton w=36 h=36 bw=xs br=md ah=c av=c cur=pointer bgc=bg bc=bo:
                          - rtgl-svg svg=zoomIn wh=16 c=mu-fg: null
                  - $if showSearch:
                      - rtgl-input#searchInput s=sm placeholder=${searchPlaceholder} value=${searchQuery} h=1fg: null
                  - $if showTagFilter:
                      - rtgl-view#tagFilterButton w=36 h=36 bw=xs br=md ah=c av=c cur=pointer bgc=${tagFilterButtonBackgroundColor} bc=${tagFilterButtonBorderColor}:
                          - rtgl-svg svg=filter wh=16 c=${tagFilterButtonIconColor}: null
      - 'rtgl-view#scrollContainer h=1fg w=f sv style="min-width: 0; min-height: 0; padding-bottom: ${scrollBottomPadding}; box-sizing: border-box;"':
          - $if groups.length > 0:
              - $for group, gIndex in groups:
                  - rtgl-view#groupDropRef${gIndex} data-group-id=${group.id} w=f ph=md pos=rel:
                      - 'rtgl-view d=h w=f av=c bgc=${group.headerBackgroundColor} z=100 pv=sm style="position: sticky; top: 0px;"':
                          - rtgl-view#groupToggleRef${gIndex} data-group-id=${group.id} d=h av=c g=md cur=pointer:
                              - $if group.isCollapsed:
                                  - rtgl-svg wh=16 svg=folderArrowRight: null
                                $else:
                                  - rtgl-svg wh=16 svg=folderArrowDown: null
                              - rtgl-svg wh=16 svg=folder: null
                              - rtgl-text: ${group.fullLabel}
                          - rtgl-view w=1fg: null
                          - $if canUpload:
                              - rtgl-button#uploadBtnHeaderRef${gIndex} data-group-id=${group.id} s=sm w=1fg pre=${uploadIcon}: ${uploadText}
                      - rtgl-view w=f pos=rel:
                          - $if !group.isCollapsed:
                              - 'rtgl-grid w=f ph=sm pt=md pb=sm mb=lg g=md cols="${cardGridColumns}" style="min-width: 0;"':
                                  - $if group.hasChildren:
                                      - $for item, itemIndex in group.children:
                                          - rtgl-view#itemRef${gIndex}x${itemIndex} key=${item.id} data-item-id=${item.domItemId} cur=${item.cursor} bw=xs bc=${item.itemBorderColor} h-bc=${item.itemHoverBorderColor} br=md style="${item.itemContainerStyle}":
                                              - $if item.cardKind == 'image':
                                                  - 'rtgl-view br=md w=${item.imageCardWidth} pos=rel overflow=hidden style="${item.imageCardStyle}"':
                                                      - $if showImageCardPreview:
                                                          - $if item.useFullWidthImageCard:
                                                              - 'rtgl-view w=f br=md style="aspect-ratio: ${item.previewAspectRatio}; overflow: hidden;"':
                                                                  - $if item.isProcessing:
                                                                      - rtgl-view w=f h=f br=md bw=xs bc=bo av=c ah=c:
                                                                          - rtgl-text s=sm c=mu-fg: Processing...
                                                                    $elif lazyImageCards && item.shouldLazyLoadPreview:
                                                                      - rvn-file-image br=md w=f h=f fileId=${item.previewFileId} lazy: null
                                                                    $else:
                                                                      - rvn-file-image br=md w=f h=f fileId=${item.previewFileId}: null
                                                            $else:
                                                              - $if item.isProcessing:
                                                                  - rtgl-view w=f h=${imageHeight} br=md bw=xs bc=bo av=c ah=c:
                                                                      - rtgl-text s=sm c=mu-fg: Processing...
                                                                $else:
                                                                  - $if lazyImageCards && item.shouldLazyLoadPreview:
                                                                      - rvn-file-image br=md w=f h=${imageHeight} fileId=${item.previewFileId} lazy: null
                                                                    $else:
                                                                      - rvn-file-image br=md w=f h=${imageHeight} fileId=${item.previewFileId}: null
                                                      - $if item.showPreviewIcon:
                                                          - 'rtgl-view#previewActionRef${gIndex}x${itemIndex} data-item-id=${item.id} br=f w=32 h=32 pos=abs z=2 ah=c av=c cur=pointer style="top: 6px; right: 6px; background-color: #000;"':
                                                              - rtgl-svg svg=zoomIn wh=22 c=white: null
                                                      - rtgl-view w=f p=md:
                                                          - rtgl-text s=xs c=mu-fg ellipsis w=f: ${item.name}
                                                $elif item.cardKind == 'video':
                                                  - 'rtgl-view br=md pos=rel w=${item.mediaCardWidth} overflow=hidden style="${item.mediaCardStyle}"':
                                                      - $if item.useFullWidthMediaPreview:
                                                          - 'rtgl-view w=f br=md style="aspect-ratio: ${item.previewAspectRatio}; overflow: hidden;"':
                                                              - $if item.isProcessing:
                                                                  - rtgl-view w=f h=f br=md bw=xs bc=bo av=c ah=c:
                                                                      - rtgl-text s=sm c=mu-fg: Processing...
                                                                $elif item.thumbnailFileId:
                                                                  - rvn-file-image br=md w=f h=f fileId=${item.thumbnailFileId}: null
                                                                $else:
                                                                  - rtgl-view w=f h=f br=md bw=xs bc=bo av=c ah=c:
                                                                      - rtgl-text s=xs c=mu-fg: No thumbnail
                                                        $elif item.isProcessing:
                                                          - rtgl-view w=f h=${mediaHeight} br=md bw=xs bc=bo av=c ah=c:
                                                              - rtgl-text s=sm c=mu-fg: Processing...
                                                        $elif item.thumbnailFileId:
                                                          - rvn-file-image br=md w=f h=${mediaHeight} fileId=${item.thumbnailFileId}: null
                                                        $else:
                                                          - rtgl-view w=f h=${mediaHeight} br=md bw=xs bc=bo av=c ah=c:
                                                              - rtgl-text s=xs c=mu-fg: No thumbnail
                                                      - $if item.showPreviewIcon:
                                                          - 'rtgl-view#previewActionRef${gIndex}x${itemIndex} data-item-id=${item.id} br=f w=32 h=32 pos=abs z=2 ah=c av=c cur=pointer style="top: 6px; right: 6px; background-color: #000;"':
                                                              - rtgl-svg svg=play wh=24 c=white: null
                                                      - rtgl-view w=f p=md:
                                                          - rtgl-text s=xs c=mu-fg ellipsis w=f: ${item.name}
                                                $elif item.cardKind == 'sound':
                                                  - 'rtgl-view br=md pos=rel w=${item.mediaCardWidth} overflow=hidden style="${item.mediaCardStyle}"':
                                                      - $if item.useFullWidthMediaPreview:
                                                          - 'rtgl-view w=f br=md style="aspect-ratio: ${item.previewAspectRatio}; overflow: hidden;"':
                                                              - $if item.isProcessing:
                                                                  - rtgl-view w=f h=f br=md bw=xs bc=bo av=c ah=c:
                                                                      - rtgl-text s=sm c=mu-fg: Processing...
                                                                $elif item.waveformDataFileId:
                                                                  - rvn-waveform-visualizer key=${item.waveformDataFileId}-${item.mediaCardWidth}x16x9 waveformDataFileId=${item.waveformDataFileId} w=f h=f: null
                                                                $else:
                                                                  - rtgl-view w=f h=f br=md bw=xs bc=bo av=c ah=c:
                                                                      - rtgl-text s=xs c=mu-fg: No waveform
                                                        $elif item.isProcessing:
                                                          - rtgl-view w=f h=${mediaHeight} br=md bw=xs bc=bo av=c ah=c:
                                                              - rtgl-text s=sm c=mu-fg: Processing...
                                                        $elif item.waveformDataFileId:
                                                          - rvn-waveform-visualizer key=${item.waveformDataFileId}-${item.mediaCardWidth}x${mediaHeight} waveformDataFileId=${item.waveformDataFileId} w=f h=${mediaHeight}: null
                                                        $else:
                                                          - rtgl-view w=f h=${mediaHeight} br=md bw=xs bc=bo av=c ah=c:
                                                              - rtgl-text s=xs c=mu-fg: No waveform
                                                      - $if item.showPreviewIcon:
                                                          - 'rtgl-view#previewActionRef${gIndex}x${itemIndex} data-item-id=${item.id} br=f w=32 h=32 pos=abs z=2 ah=c av=c cur=pointer style="top: 6px; right: 6px; background-color: #000;"':
                                                              - rtgl-svg svg=play wh=24 c=white: null
                                                      - rtgl-view w=f p=md:
                                                          - rtgl-text s=xs c=mu-fg ellipsis w=f: ${item.name}
                                                $elif item.cardKind == 'font':
                                                  - 'rtgl-view w=${item.mediaCardWidth} d=v br=md overflow=hidden style="${item.mediaCardStyle}"':
                                                      - $if item.useFullWidthFontPreview:
                                                          - 'rtgl-view w=f br=md style="aspect-ratio: ${item.previewAspectRatio}; overflow: hidden;"':
                                                              - $if item.isProcessing:
                                                                  - rtgl-view w=f h=f br=md bw=xs bc=bo av=c ah=c:
                                                                      - rtgl-text s=sm c=mu-fg: Processing...
                                                                $else:
                                                                  - rvn-font-preview fontFamily=${item.fontFamily} previewText="${item.previewText}" fileId=${item.fontFileId} fontSize=60 width=f height=f padding=8 av=c ah=c: null
                                                        $elif item.isProcessing:
                                                          - rtgl-view w=f h=${mediaHeight} br=md bw=xs bc=bo av=c ah=c:
                                                              - rtgl-text s=sm c=mu-fg: Processing...
                                                        $else:
                                                          - rvn-font-preview fontFamily=${item.fontFamily} previewText="${item.previewText}" fileId=${item.fontFileId} fontSize=60 width=${item.fontPreviewWidth} height=${mediaHeight} av=c ah=c: null
                                                      - rtgl-view w=f p=md:
                                                          - rtgl-text s=xs c=mu-fg ellipsis w=${item.mediaTextWidth}: ${item.name}
                                                $else:
                                                  - rtgl-view p=md g=md w=${mediaWidth} d=v br=md:
                                                      - rtgl-text s=xs c=mu-fg ellipsis w=${mediaWidth}: ${item.name}
                                    $else:
                                      - $if canUpload:
                                          - 'rtgl-view#uploadBtnEmptyRef${gIndex} data-group-id=${group.id} w=f h=150 bw=xs br=md ah=c av=c g=sm cur=pointer style="grid-column: 1 / -1;"':
                                              - rtgl-svg svg=${uploadIcon} wh=32: null
                                              - rtgl-text: ${uploadText}
                          - $if draggingGroupId == group.id:
                              - 'rtgl-view d=h av=c pos=abs w=f h=f bw=md bc=pr style="top: 0; bottom: 0; left: 0; right: 0;"':
                                  - 'rtgl-view pos=abs w=f h=f bgc=se op="0.5" style="top: 0; bottom: 0; left: 0; right: 0;"': null
                                  - rtgl-view w=f h=f av=c ah=c pos=rel z=1:
                                      - rtgl-text s=lg: Drop files to upload to ${group.fullLabel}
            $elif searchQuery || selectedTagFilterValues.length > 0:
              - rtgl-view w=f h=400 av=c ah=c:
                  - rtgl-text s=lg c=mu-fg: ${emptyMessage}
            $else:
              - rtgl-view w=f h=f av=c ah=c g=lg:
                  - $if canUpload:
                      - rtgl-view#uploadBtnRoot w=300 h=200 bw=xs bc=bo br=md ah=c av=c g=sm cur=pointer:
                          - rtgl-svg svg=${uploadIcon} wh=32: null
                          - rtgl-text: ${uploadText}
                    $else:
                      - rtgl-text s=lg c=mu-fg: No data
  - rtgl-popover#tagFilterPopover ?open=${tagFilterPopover.isOpen} x=${tagFilterPopover.position.x} y=${tagFilterPopover.position.y} place=bs content-w=320 content-g=sm content-sv=true content-ph=md content-pv=md:
      - $if showFilterPopoverSearch:
          - rtgl-text s=md: Filter
          - rtgl-input#searchInput s=sm placeholder=${searchPlaceholder} value=${searchQuery} w=f: null
      - $if !tagFilterPopover.hasOptions:
          - rtgl-text s=sm c=mu-fg: No tags available
      - $if tagFilterPopover.hasOptions:
          - rtgl-view d=h wrap g=sm w=f:
              - $for option, i in tagFilterPopover.options:
                  - rtgl-view#tagFilterOptionRef${i} data-tag-id=${option.value} cur=pointer:
                      - 'rtgl-tag v=mu style="${option.tagStyle}"':
                          ${option.label}
      - rtgl-view d=h av=c g=sm w=f pt=sm:
          - rtgl-view w=1fg: null
          - rtgl-button#tagFilterClear v=se s=sm ?disabled=${tagFilterPopover.clearDisabled}: Clear
          - rtgl-button#tagFilterApply v=pr s=sm: Save
  - $if showZoomPopoverButton:
      - rtgl-popover#zoomPopover ?open=${zoomPopover.isOpen} x=${zoomPopover.position.x} y=${zoomPopover.position.y} place=bs content-w=260 content-g=sm content-ph=md content-pv=md:
          - rtgl-text s=md: Zoom
          - rtgl-view d=h av=c g=sm w=f:
              - rtgl-button#zoomOut sq v="gh" s=sm: '-'
              - rtgl-slider#zoomSlider w=160 min=${zoomControlMin} max=${zoomControlMax} step=${zoomControlStep} value=${zoomControlValue}: null
              - rtgl-button#zoomIn sq v="gh" s=sm: +
  - rtgl-dropdown-menu#contextMenu :items=${dropdownMenu.items} ?open=${dropdownMenu.isOpen} x=${dropdownMenu.x} y=${dropdownMenu.y}: null
