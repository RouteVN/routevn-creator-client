componentName: rvn-command-line-screen
propsSchema:
  type: object
  properties:
    screen:
      type: object
      properties:
        animations:
          type: object
          properties:
            resourceId:
              type: string
        opacity:
          type: number
          minimum: 0
          maximum: 1
        blur:
          type: object
          properties:
            x:
              type: number
            y:
              type: number
            quality:
              type: number
            kernelSize:
              type: number
              enum:
                - 5
                - 7
                - 9
                - 11
                - 13
                - 15
            repeatEdgePixels:
              type: boolean
