componentName: rvn-command-line-background
propsSchema:
  type: object
  properties:
    backgroundTransformEditor:
      type: object
    background:
      type: object
      properties:
        resourceId:
          type: string
        colorId:
          type: string
        opacity:
          type: number
          minimum: 0
          maximum: 1
        blur:
          type:
            - object
            - "null"
          properties:
            x:
              type: number
            y:
              type: number
            quality:
              type: number
            kernelSize:
              type: number
              enum:
                - 5
                - 7
                - 9
                - 11
                - 13
                - 15
            repeatEdgePixels:
              type: boolean
        transformId:
          type: string
        x:
          type: number
        y:
          type: number
        anchorX:
          type: number
        anchorY:
          type: number
        scaleX:
          type: number
        scaleY:
          type: number
        rotation:
          type: number
        originX:
          type: number
        originY:
          type: number
        animations:
          type: object
          properties:
            resourceId:
              type: string
            playback:
              type: object
              properties:
                continuity:
                  type: string
        loop:
          type: boolean
