refs:
  rvnImageSelector:
    eventListeners:
      image-selected:
        handler: handleImageSelected
      image-dblclick:
        handler: handleImageDoubleClick
  resourceItem*:
    eventListeners:
      click:
        handler: handleResourceItemClick
  submitButton:
    eventListeners:
      click:
        handler: handleSubmitClick
  breadcumb:
    eventListeners:
      item-click:
        handler: handleBreadcumbActionsClick
  buttonSelect:
    eventListeners:
      click:
        handler: handleButtonSelectClick
  tabs:
    eventListeners:
      item-click:
        handler: handleTabClick
  searchInput:
    eventListeners:
      value-input:
        handler: handleSearchInput
  form:
    eventListeners:
      form-field-event:
        handler: handleFormExtra
      form-change:
        handler: handleFormInputChange
  customTransformButton:
    eventListeners:
      click:
        handler: handleCustomTransformButtonClick
  customTransformChip*:
    eventListeners:
      click:
        handler: handleCustomTransformButtonClick
  backgroundTransformPreviewCanvasHost: {}
  backgroundTransformEditorDoneButton:
    eventListeners:
      click:
        handler: handleCustomTransformDoneButtonClick
  backgroundImage:
    eventListeners:
      click:
        handler: handleBackgroundImageClick
      contextmenu:
        handler: handleBackgroundImageRightClick
  baseFileExplorer:
    eventListeners:
      item-click:
        handler: handleFileExplorerClickItem
  previewOverlay:
    eventListeners:
      click:
        action: hideFullImagePreview
styles:
  ".backgroundResourceThumbnailTransparencyGrid":
    background-color: "#eef2f7"
    background-image: 'linear-gradient(45deg, #94a3b8 25%, transparent 25%), linear-gradient(-45deg, #94a3b8 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #94a3b8 75%), linear-gradient(-45deg, transparent 75%, #94a3b8 75%)'
    background-position: "0 0, 0 6px, 6px -6px, -6px 0"
    background-repeat: repeat
    background-size: 12px 12px
template:
  - 'rtgl-view w=f h=f p=lg pos=rel style="min-width: 0; min-height: 0; overflow: hidden;"':
      - rtgl-view d=h g=md: null
      - rtgl-breadcrumb#breadcumb :items=${breadcrumb}: null
      - $if mode == 'current':
          - 'rtgl-view h=1fg sv w=f style="min-height: 0;"':
              - rtgl-form#form key=${dialogueForm.key} :form=${dialogueForm.form} :defaultValues=${dialogueForm.defaultValues}:
                  - $if selectedResource:
                      - $if selectedResource.resourceType == 'image':
                          - rtgl-view#backgroundImage slot=background cur=pointer bw=xs bc=${selectedResource.itemBorderColor} h-bc=${selectedResource.itemHoverBorderColor} br=md:
                              - 'rtgl-view br=md w=200 pos=rel overflow=hidden style="${selectedResource.resourceCardStyle}"':
                                  - 'div.backgroundResourceThumbnailTransparencyGrid style="display: block; width: 100%; aspect-ratio: ${selectedResource.previewAspectRatio}; overflow: hidden;"':
                                      - rvn-file-image w=f h=f fileId=${selectedResource.fileId}: null
                                  - rtgl-view w=f p=md:
                                      - rtgl-text s=xs c=mu-fg ellipsis w=f: ${selectedResource.name}
                        $elif selectedResource.resourceType == 'layout':
                          - rtgl-view#backgroundImage slot=background cur=pointer bw=xs bc=${selectedResource.itemBorderColor} h-bc=${selectedResource.itemHoverBorderColor} br=md:
                              - 'rtgl-view w=225 br=md overflow=hidden style="${selectedResource.resourceCardStyle}"':
                                  - 'rtgl-view w=f style="aspect-ratio: ${selectedResource.previewAspectRatio}; overflow: hidden;"':
                                      - $if selectedResource.fileId:
                                          - rvn-file-image fileId=${selectedResource.fileId} w=f h=f: null
                                        $else:
                                          - rtgl-view w=f h=f av=c ah=c bgc=mu-fg:
                                              - rtgl-text s=sm c=mu-fg: ${noThumbnailLabel}
                                  - rtgl-view d=v w=f g=xs p=md:
                                      - rtgl-text s=xs c=mu-fg ellipsis w=f: ${selectedResource.name}
                                      - $if selectedResource.typeInfo:
                                          - rtgl-text s=xs c=mu-fg ellipsis w=f: ${selectedResource.typeInfo}
                        $elif selectedResource.resourceType == 'video':
                          - rtgl-view#backgroundImage slot=background cur=pointer bw=xs bc=${selectedResource.itemBorderColor} h-bc=${selectedResource.itemHoverBorderColor} br=md:
                              - 'rtgl-view br=md pos=rel w=200 overflow=hidden style="${selectedResource.resourceCardStyle}"':
                                  - 'rtgl-view w=f pos=rel style="aspect-ratio: ${selectedResource.previewAspectRatio}; overflow: hidden;"':
                                      - rvn-file-image w=f h=f fileId=${selectedResource.fileId}: null
                                      - rtgl-view pos=abs w=f h=f av=c ah=c bgc=bg-60:
                                          - rtgl-icon icon=play s=xl c=fg: null
                                  - rtgl-view w=f p=md:
                                      - rtgl-text s=xs c=mu-fg ellipsis w=f: ${selectedResource.name}
                        $else:
                          - 'rtgl-view#backgroundImage w=355 bw=xs bc=bo h-bc=ac br=md bgc=mu av=c ah=c cur=pointer slot=background style="aspect-ratio: 16 / 9;"':
                              - rtgl-text s=md c=mu-fg: ${selectBackgroundLabel}
                    $else:
                      - 'rtgl-view#backgroundImage w=355 bw=xs bc=bo h-bc=ac br=md bgc=mu av=c ah=c cur=pointer slot=background style="aspect-ratio: 16 / 9;"':
                          - rtgl-text s=md c=mu-fg: ${selectBackgroundLabel}
                  - rtgl-view slot=custom-transform d=h av=c w=f g=md:
                      - rtgl-view d=h av=c w=1fg g=sm wrap:
                          - $for item, i in customTransformDetails:
                              - 'rtgl-view#customTransformChip${i} d=h av=c g=sm bw=xs bc=bo h-bc=pr br=full bgc=mu ph=md pv=sm cur=pointer style="max-width: 220px; box-sizing: border-box;"':
                                  - rtgl-text s=xs c=mu-fg ellipsis: ${item.label}
                                  - 'rtgl-text s=sm style="font-variant-numeric: tabular-nums; white-space: nowrap;"': ${item.value}
                      - rtgl-button#customTransformButton v=se: ${editButtonLabel}
          - 'rtgl-view d=h av=c ah=e w=f g=lg style="flex: 0 0 auto;"':
              - rtgl-button#submitButton: ${submitButtonLabel}
      - $if backgroundTransformEditor.isOpen:
          - 'rtgl-view pos=abs edge=f z=20 bgc=bg d=v style="pointer-events: auto; min-width: 0; min-height: 0;"':
              - rtgl-view h=48 bwb=xs w=f d=h av=c ph=md g=md:
                  - rtgl-text s=sm w=1fg: ${transformEditorTitle}
                  - rtgl-button#backgroundTransformEditorDoneButton v=pr: ${doneButtonLabel}
              - 'rtgl-view w=f h=1fg ah=c av=c style="min-width: 0; min-height: 0;"':
                  - 'rtgl-view h=f style="width: ${backgroundTransformEditor.previewMaxWidth}; max-width: 100%; min-width: 0; min-height: 0;"':
                      - rvn-scene-editor-preview-canvas#backgroundTransformPreviewCanvasHost canvas-aspect-ratio="${backgroundTransformEditor.canvasAspectRatio}": null
              - rtgl-view w=f bwt=xs d=h av=c ph=md pv=sm g=lg bgc=bg wrap:
                  - rtgl-view d=h av=c g=xs:
                      - rtgl-text s=xs c=mu-fg: x
                      - rtgl-text s=sm: ${backgroundTransformEditor.metrics.x}
                  - rtgl-view d=h av=c g=xs:
                      - rtgl-text s=xs c=mu-fg: y
                      - rtgl-text s=sm: ${backgroundTransformEditor.metrics.y}
                  - rtgl-view d=h av=c g=xs:
                      - rtgl-text s=xs c=mu-fg: scaleX
                      - rtgl-text s=sm: ${backgroundTransformEditor.metrics.scaleX}
                  - rtgl-view d=h av=c g=xs:
                      - rtgl-text s=xs c=mu-fg: scaleY
                      - rtgl-text s=sm: ${backgroundTransformEditor.metrics.scaleY}
      - $if mode == 'gallery':
          - rtgl-view d=h w=f av=c g=md:
              - rtgl-tabs#tabs selected-tab=${tab} :items=${tabs}: null
              - rtgl-view w=1fg: null
              - rtgl-input#searchInput s=sm placeholder=${searchPlaceholder} value=${searchQuery} h=1fg: null
          - 'rtgl-view d=h w=f g=lg mt=sm h=1fg style="min-height: 0;"':
              - $if showImageSelectorFileExplorer:
                  - rtgl-view h=f w=1fg sv:
                      - rvn-base-file-explorer#baseFileExplorer :items=${items}: null
              - rtgl-view h=f w=2fg sv g=lg:
                  - $if tab == 'image':
                      - rvn-image-selector#rvnImageSelector selectedImageId=${tempSelectedResourceId} searchQuery=${searchQuery}: null
                    $elif tab == 'layout':
                      - $for group, i in groups:
                          - rtgl-view g=md:
                              - rtgl-view d=h av=c g=md:
                                  - rtgl-svg svg=folder wh=16: null
                                  - rtgl-text: ${group.fullLabel}
                              - rtgl-view d=h w=f wrap g=lg:
                                  - $for item, j in group.children:
                                      - rtgl-view#resourceItem${i}x${j} data-resource-id=${item.id} cur=pointer bw=xs bc=${item.itemBorderColor} h-bc=${item.itemHoverBorderColor} br=md:
                                          - 'rtgl-view w=225 br=md overflow=hidden style="${item.resourceCardStyle}"':
                                              - 'rtgl-view w=f style="aspect-ratio: ${item.previewAspectRatio}; overflow: hidden;"':
                                                  - $if item.previewFileId:
                                                      - rvn-file-image fileId=${item.previewFileId} w=f h=f: null
                                                    $else:
                                                      - rtgl-view w=f h=f av=c ah=c bgc=mu-fg:
                                                          - rtgl-text s=sm c=mu-fg: ${noThumbnailLabel}
                                              - rtgl-view d=v w=f g=xs p=md:
                                                  - rtgl-text s=xs c=mu-fg ellipsis w=f: ${item.name}
                                                  - $if item.typeInfo:
                                                      - rtgl-text s=xs c=mu-fg ellipsis w=f: ${item.typeInfo}
                    $elif tab == 'video':
                      - $for group, i in groups:
                          - rtgl-view g=md:
                              - rtgl-view d=h av=c g=md:
                                  - rtgl-svg svg=folder wh=16: null
                                  - rtgl-text: ${group.fullLabel}
                              - rtgl-view d=h w=f wrap g=lg:
                                  - $for item, j in group.children:
                                      - rtgl-view#resourceItem${i}x${j} data-resource-id=${item.id} cur=pointer bw=xs bc=${item.itemBorderColor} h-bc=${item.itemHoverBorderColor} br=md:
                                          - 'rtgl-view br=md pos=rel w=200 overflow=hidden style="${item.resourceCardStyle}"':
                                              - 'rtgl-view w=f pos=rel style="aspect-ratio: ${item.previewAspectRatio}; overflow: hidden;"':
                                                  - rvn-file-image w=f h=f fileId=${item.previewFileId}: null
                                                  - rtgl-view pos=abs w=f h=f av=c ah=c bgc=bg-60:
                                                      - rtgl-icon icon=play s=xl c=fg: null
                                              - rtgl-view w=f p=md:
                                                  - rtgl-text s=xs c=mu-fg ellipsis w=f: ${item.name}
          - 'rtgl-view d=h av=c ah=e w=f g=lg style="flex: 0 0 auto;"':
              - rtgl-button#buttonSelect: ${selectButtonLabel}

  - $when: fullImagePreviewVisible
    rtgl-view#previewOverlay pos=fix edge=f z=3000 cur=pointer:
      - rtgl-view w=f h=f pos=fix edge=f bgc=bg: null
      - $if fullImagePreviewFileId:
          - rtgl-view pos=fix edge=f ah=c av=c z=3001:
              - rvn-file-image fileId=${fullImagePreviewFileId} w=80% h=80% bc=ac bw=xs br=md: null
