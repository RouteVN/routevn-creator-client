componentName: rvn-base-file-explorer
propsSchema:
  type: object
  properties:
    items:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
          id:
            type: string
          iconCornerBadge:
            type: boolean
          iconColor:
            type: string
          iconCssColor:
            type: string
          textColor:
            type: string
          visibilityToggle:
            type: boolean
          hidden:
            type: boolean
          effectivelyHidden:
            type: boolean
          visibilityToggleAlwaysVisible:
            type: boolean
          visibilityIcon:
            type: string
          visibilityLabel:
            type: string
          contextMenuItems:
            type: array
          level:
            type: number
          hasChildren:
            type: boolean
          parentId:
            type: string
          dragOptions:
            type: object
            properties:
              canMoveToRoot:
                type: boolean
    contextMenuItems:
      type: array
      description: Menu items for right-clicking on an item
    folderContextMenuItems:
      type: array
      description: Menu items for right-clicking on a folder item
    itemContextMenuItems:
      type: array
      description: Menu items for right-clicking on a non-folder item
    emptyContextMenuItems:
      type: array
      description: Menu items for right-clicking on empty space
    draggable:
      type: boolean
      description: Enable drag and drop reordering
    allowDrag:
      type: boolean
      description: Custom drag enable flag (preferred over native draggable attr)
    shrinkable:
      type: boolean
      description: Show folder expand/collapse controls
    startCollapsed:
      type: boolean
      description: Collapse expandable folders on initial mount
    dropdownMenu:
      type: boolean
      description: Enable context menu dropdown on right-click
    no-empty-message:
      type: boolean
      description: Whether to show the empty message when there are no items
    bottom-empty-space-height:
      type: string
      description: Minimum empty area kept after the last item for scrolling and empty-space context menus
methods:
  type: object
  properties:
    selectItem:
      description: Selects an item by id in the explorer list.
      params: []
      returns: void
    getSelectedItem:
      description: Returns the currently selected explorer item and folder state.
      params: []
      returns: object
    clearSelection:
      description: Clears the current explorer selection.
      params: []
      returns: void
    navigateSelection:
      description: Moves explorer selection across visible items.
      params: []
      returns: object
    setSelectedFolderExpanded:
      description: Expands or collapses the selected folder item when possible.
      params: []
      returns: object
    setFolderCollapsed:
      description: Expands or collapses a specific folder item.
      params: []
      returns: void
