refs:
  breadcrumb:
    eventListeners:
      item-click:
        handler: handleBreadcrumbClick
  addBranchButton:
    eventListeners:
      click:
        handler: handleAddBranchClick
  addDefaultButton:
    eventListeners:
      click:
        handler: handleAddDefaultClick
  defaultBranch:
    eventListeners:
      click:
        handler: handleBranchClick
      contextmenu:
        handler: handleBranchContextMenu
  conditionalBranch*:
    eventListeners:
      click:
        handler: handleBranchClick
      contextmenu:
        handler: handleBranchContextMenu
  branchMenuButton*:
    eventListeners:
      click:
        handler: handleBranchMenuButtonClick
      keydown:
        handler: handleBranchMenuButtonKeyDown
  variableSelect:
    eventListeners:
      value-change:
        handler: handleVariableSelectChange
  operatorSelect:
    eventListeners:
      value-change:
        handler: handleOperatorSelectChange
  valueInput:
    eventListeners:
      value-input:
        handler: handleValueInputChange
  booleanSelect:
    eventListeners:
      value-change:
        handler: handleBooleanSelectChange
  enumValueSelect:
    eventListeners:
      value-change:
        handler: handleEnumValueSelectChange
  oneOfValueInput*:
    eventListeners:
      value-input:
        handler: handleOneOfValueChange
  oneOfBooleanSelect*:
    eventListeners:
      value-change:
        handler: handleOneOfValueChange
  oneOfEnumValueSelect*:
    eventListeners:
      value-change:
        handler: handleOneOfValueChange
  addOneOfValueButton:
    eventListeners:
      click:
        handler: handleAddOneOfValueClick
  removeOneOfValueButton*:
    eventListeners:
      click:
        handler: handleRemoveOneOfValueClick
  branchActionsEditor:
    eventListeners:
      actions-change:
        handler: handleBranchActionsChange
      action-delete:
        handler: handleBranchActionsDelete
      close:
        handler: handleNestedActionsClose
  saveBranchButton:
    eventListeners:
      click:
        handler: handleSaveBranchClick
  submitButton:
    eventListeners:
      click:
        handler: handleSubmitClick
  dropdownMenu:
    eventListeners:
      close:
        handler: handleDropdownMenuClose
      item-click:
        handler: handleDropdownMenuClickItem
template:
  - rtgl-view w=f h=f p=lg:
      - $if mode == 'current' && initiated:
          - rtgl-breadcrumb#breadcrumb :items=${breadcrumb}: null
          - 'rtgl-view h=1fg sv w=f style="min-height: 0;"':
              - rtgl-view g=md mt=md w=f:
                  - rtgl-text s=sm c=mu-fg: ${branchesLabel}
                  - $for branch in branches:
                      - rtgl-view#conditionalBranch${branch.id} data-branch-id=${branch.id} cur=pointer d=h av=c ah=s g=md p=md bgc=mu h-bgc=ac br=md w=f:
                          - rtgl-view d=v w=1fg:
                              - rtgl-text s=sm: ${branch.summary}
                              - rtgl-text s=xs c=mu-fg: ${branch.actionsSummary}
                          - 'rtgl-button#branchMenuButton${branch.id} data-branch-id=${branch.id} sq s=sm v=gh pre=ellipsis title="${branchMenuButtonLabel}" aria-label="${branchMenuButtonLabel}" aria-haspopup=menu aria-keyshortcuts="${branch.menuKeyShortcuts}"': null
                  - rtgl-button#addBranchButton v=ol w=f mt=md: ${addBranchButton}
                  - rtgl-text s=sm c=mu-fg mt=md: ${defaultBranchLabel}
                  - $if hasDefaultBranch:
                      - rtgl-view#defaultBranch data-branch-id=${defaultBranch.id} cur=pointer d=h av=c ah=s g=md p=md bgc=mu h-bgc=ac br=md w=f:
                          - rtgl-view d=v w=1fg:
                              - rtgl-text s=sm: ${defaultBranch.summary}
                              - rtgl-text s=xs c=mu-fg: ${defaultBranch.actionsSummary}
                          - 'rtgl-button#branchMenuButtonDefault data-branch-id=${defaultBranch.id} sq s=sm v=gh pre=ellipsis title="${branchMenuButtonLabel}" aria-label="${branchMenuButtonLabel}" aria-haspopup=menu aria-keyshortcuts="${defaultBranch.menuKeyShortcuts}"': null
                  - $if !hasDefaultBranch:
                      - rtgl-button#addDefaultButton v=ol w=f: ${addDefaultBranchButton}
          - 'rtgl-view d=h av=c ah=e w=f g=lg style="flex: 0 0 auto;"':
              - rtgl-button#submitButton ?disabled=${!hasBranches}: ${submitButton}
      - $if mode == 'editBranch' && initiated:
          - rtgl-breadcrumb#breadcrumb :items=${breadcrumb}: null
          - 'rtgl-view h=1fg sv w=f style="min-height: 0;"':
              - rtgl-view g=md mt=md w=f:
                  - $if !isEditingDefault:
                      - rtgl-view g=md w=f:
                          - rtgl-text s=sm c=mu-fg: ${conditionLabel}
                          - $if isEditingUnsupportedCondition:
                              - rtgl-text s=sm c=mu-fg mt=md: ${unsupportedConditionLabel}
                          - $if !isEditingUnsupportedCondition:
                              - rtgl-text s=sm c=mu-fg mt=md: ${variableLabel}
                              - rtgl-select#variableSelect w=f :selectedValue=${tempBranch.variableId} :options=${variableOptions} placeholder="${variablePlaceholder}": null
                              - $if tempBranch.variableId:
                                  - rtgl-text s=sm c=mu-fg mt=md: ${operatorLabel}
                                  - rtgl-select#operatorSelect w=f :selectedValue=${tempBranch.op} :options=${operatorOptions}: null
                              - $if showValueField && valueInputType == 'number':
                                  - rtgl-text s=sm c=mu-fg mt=md: ${valueLabel}
                                  - rtgl-input-number#valueInput w=f placeholder="${valueNumberPlaceholder}" value=${tempBranch.value}: null
                              - $if showValueField && valueInputType == 'boolean':
                                  - rtgl-text s=sm c=mu-fg mt=md: ${valueLabel}
                                  - rtgl-select#booleanSelect w=f :selectedValue=${tempBranch.booleanValue} :options=${booleanOptions}: null
                              - $if showValueField && showEnumValueSelect:
                                  - rtgl-text s=sm c=mu-fg mt=md: ${valueLabel}
                                  - rtgl-select#enumValueSelect w=f :selectedValue=${tempBranch.value} :options=${enumValueOptions} placeholder="${valueSelectPlaceholder}": null
                              - $if showValueField && valueInputType == 'string' && !showEnumValueSelect:
                                  - rtgl-text s=sm c=mu-fg mt=md: ${valueLabel}
                                  - rtgl-input#valueInput w=f placeholder="${valueTextPlaceholder}" value=${tempBranch.value}: null
                              - $if showOneOfValueFields:
                                  - rtgl-text s=sm c=mu-fg mt=md: ${valueLabel}
                                  - rtgl-view g=sm w=f:
                                      - $for oneOfValue, i in oneOfValues:
                                          - rtgl-view d=h av=c g=sm w=f:
                                              - $if valueInputType == 'number':
                                                  - rtgl-view w=1fg:
                                                      - rtgl-input-number#oneOfValueInput${i} data-index=${i} w=f placeholder="${valueNumberPlaceholder}" value=${oneOfValue}: null
                                              - $if valueInputType == 'boolean':
                                                  - rtgl-view w=1fg:
                                                      - rtgl-select#oneOfBooleanSelect${i} data-index=${i} w=f :selectedValue=${oneOfValue} :options=${booleanOneOfOptions}: null
                                              - $if showEnumValueSelect:
                                                  - rtgl-view w=1fg:
                                                      - rtgl-select#oneOfEnumValueSelect${i} data-index=${i} w=f :selectedValue=${oneOfValue} :options=${enumValueOptions} placeholder="${valueSelectPlaceholder}": null
                                              - $if valueInputType == 'string' && !showEnumValueSelect:
                                                  - rtgl-view w=1fg:
                                                      - rtgl-input#oneOfValueInput${i} data-index=${i} w=f placeholder="${valueTextPlaceholder}" value=${oneOfValue}: null
                                              - 'rtgl-button#removeOneOfValueButton${i} data-index=${i} sq s=sm v=gh pre=x ?disabled=${oneOfValues.length == 1} style="${oneOfRemoveButtonStyle}" title="${removeValueButton}" aria-label="${removeValueButton}"': null
                                      - rtgl-button#addOneOfValueButton s=sm v=se pre=plus w=f: ${addValueButton}
                      - rtgl-view w=f h=1 bgc=mu mt=lg mb=sm: null
                  - rtgl-view g=md w=f:
                      - rtgl-text s=sm c=mu-fg: ${actionsLabel}
                      - rvn-system-actions#branchActionsEditor :showSelected=${true} :actions=${branchActions} actionType=system :hiddenModes=${hiddenModes} :allowedModes=${branchActionAllowedModes} :showEmbeddedClose=${false}: null
          - 'rtgl-view d=h av=c ah=e w=f g=lg style="flex: 0 0 auto;"':
              - rtgl-button#saveBranchButton ?disabled=${!canSaveBranch}: ${saveButtonPrefix} ${editBranchTitle}
  - rtgl-dropdown-menu#dropdownMenu :items=${dropdownMenu.items} x=${dropdownMenu.position.x} y=${dropdownMenu.position.y} ?open=${dropdownMenu.isOpen}: null
