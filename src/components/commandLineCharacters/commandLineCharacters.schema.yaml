componentName: rvn-command-line-characters
propsSchema:
  type: object
  properties:
    backgroundTransformEditor:
      type: object
    character:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              transformId:
                type: string
              x:
                type: number
              y:
                type: number
              anchorX:
                type: number
              anchorY:
                type: number
              scaleX:
                type: number
              scaleY:
                type: number
              rotation:
                type: number
              originX:
                type: number
              originY:
                type: number
              opacity:
                type: number
                minimum: 0
                maximum: 1
              blur:
                type:
                  - object
                  - "null"
                properties:
                  x:
                    type: number
                  y:
                    type: number
                  quality:
                    type: number
                  kernelSize:
                    type: number
                    enum:
                      - 5
                      - 7
                      - 9
                      - 11
                      - 13
                      - 15
                  repeatEdgePixels:
                    type: boolean
              animations:
                type: object
                properties:
                  resourceId:
                    type: string
              sprites:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    resourceId:
                      type: string
              spriteName:
                type: string
    presentationState:
      type: object
