refs:
  addCharacterButton:
    eventListeners:
      click:
        handler: handleAddCharacterClick
  removeCharacter*:
    eventListeners:
      click:
        handler: handleRemoveCharacterClick
  .characterRow:
    eventListeners:
      contextmenu:
        handler: handleCharacterContextMenu
  characterSpriteBox*:
    eventListeners:
      click:
        handler: handleCharacterClick
  baseFileExplorer:
    eventListeners:
      item-click:
        handler: handleFileExplorerItemClick
  galleryScroll: {}
  searchInput:
    eventListeners:
      value-input:
        handler: handleSearchInput
  spriteItem*:
    eventListeners:
      click:
        handler: handleSpriteItemClick
      dblclick:
        handler: handleSpriteItemDoubleClick
  previewOverlay:
    eventListeners:
      click:
        action: hideFullImagePreview
  submitButton:
    eventListeners:
      click:
        handler: handleSubmitClick
  breadcumb:
    eventListeners:
      item-click:
        handler: handleBreadcumbClick
  spriteGroupTabs:
    eventListeners:
      item-click:
        handler: handleSpriteGroupTabClick
  buttonSelect:
    eventListeners:
      click:
        handler: handleButtonSelectClick
  form:
    eventListeners:
      form-field-event:
        handler: handleFormExtra
      form-change:
        handler: handleFormChange
  dropdownMenu:
    eventListeners:
      close:
        handler: handleDropdownMenuClose
      item-click:
        handler: handleDropdownMenuClickItem
  transform*:
    eventListeners:
      value-change:
        handler: handleTransformChange
  customTransformMode*:
    eventListeners:
      value-change:
        handler: handleTransformModeChange
  customTransformButton*:
    eventListeners:
      click:
        handler: handleCustomTransformButtonClick
  customTransformChip*:
    eventListeners:
      click:
        handler: handleCustomTransformButtonClick
  backgroundTransformPreviewCanvasHost: {}
  backgroundTransformEditorDoneButton:
    eventListeners:
      click:
        handler: handleCustomTransformDoneButtonClick
  animation*:
    eventListeners:
      value-change:
        handler: handleAnimationChange
  opacity*:
    eventListeners:
      value-input:
        handler: handleOpacityInput
  blurToggle*:
    eventListeners:
      value-change:
        handler: handleBlurToggleChange
  blurX*:
    eventListeners:
      value-input:
        handler: handleBlurFieldInput
  blurY*:
    eventListeners:
      value-input:
        handler: handleBlurFieldInput
  blurQuality*:
    eventListeners:
      value-input:
        handler: handleBlurFieldInput
  blurKernelSize*:
    eventListeners:
      value-change:
        handler: handleBlurFieldChange
  blurRepeatEdgePixels*:
    eventListeners:
      value-change:
        handler: handleBlurFieldChange
  .characterSpriteGroupBox:
    eventListeners:
      click:
        handler: handleCharacterSpriteGroupBoxClick
  characterItem*:
    eventListeners:
      click:
        handler: handleCharacterItemClick
styles:
  ".commandLineCharacterThumbnailTransparencyGrid":
    background-color: "#eef2f7"
    background-image: 'linear-gradient(45deg, #94a3b8 25%, transparent 25%), linear-gradient(-45deg, #94a3b8 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #94a3b8 75%), linear-gradient(-45deg, transparent 75%, #94a3b8 75%)'
    background-position: "0 0, 0 6px, 6px -6px, -6px 0"
    background-repeat: repeat
    background-size: 12px 12px
  ".commandLineCharacterFullPreviewTransparencyGrid":
    background-color: "#eef2f7"
    background-image: 'linear-gradient(45deg, #94a3b8 25%, transparent 25%), linear-gradient(-45deg, #94a3b8 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #94a3b8 75%), linear-gradient(-45deg, transparent 75%, #94a3b8 75%)'
    background-position: "0 0, 0 12px, 12px -12px, -12px 0"
    background-repeat: repeat
    background-size: 24px 24px
template:
  - 'rtgl-view w=f h=f p=lg pos=rel style="min-width: 0; min-height: 0; overflow: hidden;"':
      - $if mode == 'current':
          - rtgl-view d=h g=md:
              - rtgl-breadcrumb#breadcumb :items=${breadcrumb}: null
          - 'rtgl-view h=1fg sv w=f style="min-height: 0;"':
              - rtgl-view g=md w=f:
                  - rtgl-form#form :form=${form} :defaultValues=${defaultValues}:
                      - rtgl-view#charactersContainer slot=characters g=md w=f:
                          - $for character, i in defaultValues.characters:
                              - rtgl-view#character${i}.characterRow data-index=${character.characterIndex} data-character-id=${character.id} d=h g=md av=t pv=md br=md w=f:
                                  - 'rtgl-view#characterSpriteBox${i} data-index=${character.characterIndex} cur=pointer bw=xs bc=bo h-bc=ac br=sm style="align-self: flex-start; flex: 0 0 auto;"':
                                      - rtgl-view p=md g=md br=md:
                                          - $if character.hasSpritePreview:
                                              - 'div.commandLineCharacterThumbnailTransparencyGrid style="display: block; width: 200px; height: 120px; overflow: hidden; border-radius: 4px;"':
                                                  - rvn-stacked-file-images :layers=${character.spritePreviewLayers} w=f h=f br=sm spritesheetBr=none spritesheetCheckerCellSize=6 showSpritesheetCheckerboard=false lazy: null
                                            $else:
                                              - rtgl-view w=200 h=120 av=c ah=c bgc=mu-fg:
                                                  - rtgl-text s=sm c=mu-fg: ${noSpriteLabel}
                                          - rtgl-text s=xs c=mu-fg ellipsis w=200: ${character.displayName}
                                  - rtgl-view w=1fg g=sm:
                                      - rtgl-text s=sm c=mu-fg: ${transformLabel}
                                      - rtgl-segmented-control#customTransformMode${i} data-index=${character.characterIndex} w=f no-clear :selectedValue=${character.customTransform} :options=${defaultValues.transformModeOptions}: null
                                      - $if character.customTransform:
                                          - rtgl-view d=h av=c w=f g=md:
                                              - rtgl-view d=h av=c w=1fg g=sm wrap:
                                                  - $for item, j in character.customTransformDetails:
                                                      - 'rtgl-view#customTransformChip${i}x${j} data-index=${character.characterIndex} d=h av=c g=sm bw=xs bc=bo h-bc=pr br=full bgc=mu ph=md pv=sm cur=pointer style="max-width: 220px; box-sizing: border-box;"':
                                                          - rtgl-text s=xs c=mu-fg ellipsis: ${item.label}
                                                          - 'rtgl-text s=sm style="font-variant-numeric: tabular-nums; white-space: nowrap;"': ${item.value}
                                              - rtgl-button#customTransformButton${i} data-index=${character.characterIndex} v=se: ${editButtonLabel}
                                        $else:
                                          - rtgl-text s=sm c=mu-fg: ${predefinedTransformLabel}
                                          - rtgl-select#transform${i} data-index=${character.characterIndex} key=${character.transformId} :options=${defaultValues.transformOptions} :selectedValue=${character.transformId} w=f no-clear: null
                                      - rtgl-text s=sm c=mu-fg: ${opacityLabel}
                                      - rtgl-slider-input#opacity${i} data-index=${character.characterIndex} key=${character.id} min=0 max=1 step=0.01 w=f value=${character.opacity}: null
                                      - rtgl-text s=sm c=mu-fg: ${blurLabel}
                                      - rtgl-segmented-control#blurToggle${i} data-index=${character.characterIndex} w=f no-clear :selectedValue=${character.blurEnabled} :options=${defaultValues.blurToggleOptions}: null
                                      - $if character.blurEnabled:
                                          - rtgl-view d=h wrap g=sm w=f:
                                              - rtgl-view w=90 g=xs:
                                                  - rtgl-text s=xs c=mu-fg: X
                                                  - rtgl-input#blurX${i} data-index=${character.characterIndex} data-blur-field=x type=number w=f value=${character.blur.x}: null
                                              - rtgl-view w=90 g=xs:
                                                  - rtgl-text s=xs c=mu-fg: Y
                                                  - rtgl-input#blurY${i} data-index=${character.characterIndex} data-blur-field=y type=number w=f value=${character.blur.y}: null
                                              - rtgl-view w=90 g=xs:
                                                  - rtgl-text s=xs c=mu-fg: ${qualityLabel}
                                                  - rtgl-input#blurQuality${i} data-index=${character.characterIndex} data-blur-field=quality type=number min=1 step=1 w=f value=${character.blur.quality}: null
                                              - rtgl-view w=120 g=xs:
                                                  - rtgl-text s=xs c=mu-fg: ${kernelLabel}
                                                  - rtgl-select#blurKernelSize${i} data-index=${character.characterIndex} data-blur-field=kernelSize w=f no-clear :selectedValue=${character.blur.kernelSize} :options=${defaultValues.blurKernelSizeOptions}: null
                                              - rtgl-view w=160 g=xs:
                                                  - rtgl-text s=xs c=mu-fg: ${repeatEdgeLabel}
                                                  - rtgl-segmented-control#blurRepeatEdgePixels${i} data-index=${character.characterIndex} data-blur-field=repeatEdgePixels w=f no-clear :selectedValue=${character.blur.repeatEdgePixels} :options=${defaultValues.blurRepeatEdgeOptions}: null
                                      - rtgl-text s=sm c=mu-fg: ${animationLabel}
                                      - rtgl-select#animation${i} data-index=${character.characterIndex} key=${character.animationId} :options=${defaultValues.animationOptions} :selectedValue=${character.animationId} w=f placeholder=${selectAnimationPlaceholder}: null
                                      - $if character.showSpriteGroupBoxes:
                                          - rtgl-text s=sm c=mu-fg: ${spriteGroupsLabel}
                                          - rtgl-view d=h wrap g=xs w=f:
                                              - $for spriteGroup, j in character.spriteGroupBoxes:
                                                  - 'rtgl-view.characterSpriteGroupBox data-index=${character.characterIndex} data-sprite-group-id=${spriteGroup.id} d=h av=c g=xs ph=md pv=xs cur=pointer bw=xs bc=bo h-bc=pr br=sm bgc=${spriteGroup.backgroundColor}':
                                                      - rtgl-text s=xs: ${spriteGroup.name}
                  - rtgl-button#addCharacterButton v=ol w=f mt=md: ${addCharacterButtonLabel}
          - 'rtgl-view d=h av=c ah=e w=f g=lg style="flex: 0 0 auto;"':
              - rtgl-button#submitButton: ${submitButtonLabel}
      - $if mode == 'character-select':
          - rtgl-view d=h g=md:
              - rtgl-breadcrumb#breadcumb :items=${breadcrumb}: null
          - rtgl-view d=h w=f av=c g=md:
              - rtgl-view w=1fg: null
              - rtgl-input#searchInput s=sm placeholder=${searchPlaceholder} value=${searchQuery} h=1fg: null
          - 'rtgl-view d=h w=f g=lg mt=sm h=1fg style="min-height: 0;"':
              - rtgl-view h=f w=1fg sv:
                  - rvn-base-file-explorer#baseFileExplorer :items=${items}: null
              - rtgl-view#galleryScroll h=f w=2fg sv g=lg:
                  - $for group, i in groups:
                      - rtgl-view data-group-id=${group.id} g=md:
                          - rtgl-view d=h av=c g=md:
                              - rtgl-svg svg=folder wh=16: null
                              - rtgl-text: ${group.fullLabel}
                          - rtgl-view d=h w=f wrap g=lg:
                              - $for item, j in group.children:
                                  - rtgl-view#characterItem${i}x${j} data-character-id=${item.id} cur=pointer bw=xs bc=${item.itemBorderColor} h-bc=${item.itemHoverBorderColor} br=sm:
                                      - rtgl-view p=md g=md br=md:
                                          - $if item.fileId:
                                              - 'div.commandLineCharacterThumbnailTransparencyGrid style="display: block; width: 200px; height: 120px; overflow: hidden; border-radius: 4px;"':
                                                  - rvn-file-image fileId=${item.fileId} w=f h=f br=sm: null
                                            $else:
                                              - rtgl-view w=200 h=120 av=c ah=c bgc=mu-fg:
                                                  - rtgl-text s=sm c=mu-fg: ${noAvatarLabel}
                                          - rtgl-text s=xs c=mu-fg ellipsis w=200: ${item.name}
      - $if mode == 'sprite-select':
          - rtgl-view d=h g=md:
              - rtgl-breadcrumb#breadcumb :items=${breadcrumb}: null
          - $if showSpriteGroupTabs:
              - rtgl-tabs#spriteGroupTabs :items=${spriteSelectionTabs} selected-tab=${selectedSpriteGroupId}: null
          - rtgl-view d=h w=f av=c g=md:
              - rtgl-view w=1fg: null
              - rtgl-input#searchInput s=sm placeholder=${searchPlaceholder} value=${searchQuery} h=1fg: null
          - 'rtgl-view d=h w=f g=lg mt=sm h=1fg style="min-height: 0;"':
              - rtgl-view h=f w=1fg sv:
                  - rvn-base-file-explorer#baseFileExplorer :items=${spriteItems}: null
              - rtgl-view#galleryScroll h=f w=2fg sv g=lg:
                  - $for group, i in spriteGroups:
                      - rtgl-view data-group-id=${group.id} g=md:
                          - rtgl-view d=h av=c g=md:
                              - rtgl-svg svg=folder wh=16: null
                              - rtgl-text: ${group.fullLabel}
                          - rtgl-view d=h w=f wrap g=lg:
                              - $for item, j in group.children:
                                  - rtgl-view#spriteItem${i}x${j} data-sprite-id=${item.id} cur=pointer bw=xs bc=${item.itemBorderColor} h-bc=${item.itemHoverBorderColor} br=sm:
                                      - rtgl-view p=md g=md br=md:
                                          - $if item.previewKind == 'spritesheet':
                                              - 'rvn-spritesheet-preview key=${item.previewKey} previewKey=${item.previewKey} fileId=${item.previewFileId} :atlas=${item.previewAtlas} :animation=${item.previewAnimation} w=200 h=120 br=sm checkerCellSize=6 showCheckerboard=true emptyLabel="${noPreviewLabel}"': null
                                            $else:
                                              - 'div.commandLineCharacterThumbnailTransparencyGrid style="display: block; width: 200px; height: 120px; overflow: hidden; border-radius: 4px;"':
                                                  - rvn-file-image fileId=${item.previewFileId} w=f h=f br=sm: null
                                          - rtgl-text s=xs c=mu-fg ellipsis w=200: ${item.name}
          - 'rtgl-view d=h av=c ah=e w=f g=lg style="flex: 0 0 auto;"':
              - rtgl-button#buttonSelect: ${selectButtonLabel}
  - $if fullImagePreviewVisible:
      - rtgl-view#previewOverlay pos=fix edge=f z=3000 cur=pointer:
          - rtgl-view w=f h=f pos=fix edge=f bgc=bg: null
          - $if fullImagePreviewFileId:
              - rtgl-view pos=fix edge=f ah=c av=c z=3001:
                  - $if fullImagePreviewKind == 'spritesheet':
                      - 'rvn-spritesheet-preview key=${fullImagePreviewKey} previewKey=${fullImagePreviewKey} fileId=${fullImagePreviewFileId} :atlas=${fullImagePreviewAtlas} :animation=${fullImagePreviewAnimation} w=80% h=80% checkerCellSize=12 showCheckerboard=true emptyLabel="${noPreviewLabel}"': null
                    $else:
                      - 'div.commandLineCharacterFullPreviewTransparencyGrid style="display: block; width: 80%; height: 80%; overflow: hidden; border-radius: 6px; box-shadow: 0 0 0 1px var(--accent);"':
                          - rvn-file-image fileId=${fullImagePreviewFileId} w=f h=f br=md: null
  - rtgl-dropdown-menu#dropdownMenu :items=${dropdownMenu.items} x=${dropdownMenu.position.x} y=${dropdownMenu.position.y} ?open=${dropdownMenu.isOpen}: null
  - $if backgroundTransformEditor.isOpen:
      - 'rtgl-view pos=abs edge=f z=20 bgc=bg d=v style="pointer-events: auto; min-width: 0; min-height: 0;"':
          - rtgl-view h=48 bwb=xs w=f d=h av=c ph=md g=md:
              - rtgl-text s=sm w=1fg: ${transformEditorTitle}
              - rtgl-button#backgroundTransformEditorDoneButton v=pr: ${doneButtonLabel}
          - 'rtgl-view w=f h=1fg ah=c av=c style="min-width: 0; min-height: 0;"':
              - 'rtgl-view h=f style="width: ${backgroundTransformEditor.previewMaxWidth}; max-width: 100%; min-width: 0; min-height: 0;"':
                  - rvn-scene-editor-preview-canvas#backgroundTransformPreviewCanvasHost canvas-aspect-ratio="${backgroundTransformEditor.canvasAspectRatio}": null
          - rtgl-view w=f bwt=xs d=h av=c ph=md pv=sm g=lg bgc=bg wrap:
              - rtgl-view d=h av=c g=xs:
                  - rtgl-text s=xs c=mu-fg: x
                  - rtgl-text s=sm: ${backgroundTransformEditor.metrics.x}
              - rtgl-view d=h av=c g=xs:
                  - rtgl-text s=xs c=mu-fg: y
                  - rtgl-text s=sm: ${backgroundTransformEditor.metrics.y}
              - rtgl-view d=h av=c g=xs:
                  - rtgl-text s=xs c=mu-fg: scaleX
                  - rtgl-text s=sm: ${backgroundTransformEditor.metrics.scaleX}
              - rtgl-view d=h av=c g=xs:
                  - rtgl-text s=xs c=mu-fg: scaleY
                  - rtgl-text s=sm: ${backgroundTransformEditor.metrics.scaleY}
