refs:
  addCharacterButton:
    eventListeners:
      click:
        handler: handleAddCharacterClick
  removeCharacter*:
    eventListeners:
      click:
        handler: handleRemoveCharacterClick
  .characterRow:
    eventListeners:
      contextmenu:
        handler: handleCharacterContextMenu
  characterSpriteBox*:
    eventListeners:
      click:
        handler: handleCharacterClick
  baseFileExplorer:
    eventListeners:
      item-click:
        handler: handleFileExplorerItemClick
  galleryScroll: {}
  searchInput:
    eventListeners:
      value-input:
        handler: handleSearchInput
  spriteItem*:
    eventListeners:
      click:
        handler: handleSpriteItemClick
      dblclick:
        handler: handleSpriteItemDoubleClick
  previewOverlay:
    eventListeners:
      click:
        action: hideFullImagePreview
  submitButton:
    eventListeners:
      click:
        handler: handleSubmitClick
  breadcumb:
    eventListeners:
      item-click:
        handler: handleBreadcumbClick
  spriteGroupTabs:
    eventListeners:
      item-click:
        handler: handleSpriteGroupTabClick
  buttonSelect:
    eventListeners:
      click:
        handler: handleButtonSelectClick
  form:
    eventListeners:
      form-field-event:
        handler: handleFormExtra
      form-change:
        handler: handleFormChange
  dropdownMenu:
    eventListeners:
      close:
        handler: handleDropdownMenuClose
      item-click:
        handler: handleDropdownMenuClickItem
  transform*:
    eventListeners:
      value-change:
        handler: handleTransformChange
  animationMode*:
    eventListeners:
      value-change:
        handler: handleAnimationModeChange
  updateAnimation*:
    eventListeners:
      value-change:
        handler: handleAnimationChange
  transitionAnimation*:
    eventListeners:
      value-change:
        handler: handleAnimationChange
  .characterSpriteGroupBox:
    eventListeners:
      click:
        handler: handleCharacterSpriteGroupBoxClick
  characterItem*:
    eventListeners:
      click:
        handler: handleCharacterItemClick
template:
  - rtgl-view w=f h=f p=lg:
      - $if mode == 'current':
          - rtgl-view d=h g=md:
              - rtgl-breadcrumb#breadcumb :items=${breadcrumb}: null
          - rtgl-view h=1fg sv w=f:
              - rtgl-view g=md w=f:
                  - rtgl-form#form :form=${form} :defaultValues=${defaultValues}:
                      - rtgl-view#charactersContainer slot=characters g=md w=f:
                          - $for character, i in defaultValues.characters:
                              - rtgl-view#character${i}.characterRow data-index=${i} data-character-id=${character.id} d=h g=md av=t pv=md br=md w=f:
                                  - rtgl-view#characterSpriteBox${i} data-index=${i} cur=pointer bw=xs bc=bo h-bc=ac br=sm:
                                      - rtgl-view p=md g=md br=md:
                                          - $if character.hasSpritePreview:
                                              - rvn-stacked-file-images :fileIds=${character.spritePreviewFileIds} w=200 h=120 br=sm lazy: null
                                            $else:
                                              - rtgl-view w=200 h=120 av=c ah=c bgc=mu-fg:
                                                  - rtgl-text s=sm c=mu-fg: No Sprite
                                          - rtgl-text s=xs c=mu-fg ellipsis w=200: ${character.displayName}
                                  - rtgl-view w=1fg g=sm:
                                      - rtgl-text s=sm c=mu-fg: Transform
                                      - rtgl-select#transform${i} data-index=${i} key=${character.transformId} :options=${defaultValues.transformOptions} :selectedValue=${character.transformId} w=f no-clear: null
                                      - rtgl-text s=sm c=mu-fg: Animation
                                      - rtgl-segmented-control#animationMode${i} data-index=${i} key=${character.animationMode} :options=${defaultValues.animationModeOptions} :selectedValue=${character.animationMode} w=f no-clear: null
                                      - $if character.animationMode == 'update':
                                          - rtgl-select#updateAnimation${i} data-index=${i} key=${character.animationId} :options=${defaultValues.updateAnimationOptions} :selectedValue=${character.animationId} w=f no-clear: null
                                        $elif character.animationMode == 'transition':
                                          - rtgl-select#transitionAnimation${i} data-index=${i} key=${character.animationId} :options=${defaultValues.transitionAnimationOptions} :selectedValue=${character.animationId} w=f no-clear: null
                                      - $if character.showSpriteGroupBoxes:
                                          - rtgl-text s=sm c=mu-fg: Sprite Groups
                                          - rtgl-view d=h wrap g=xs w=f:
                                              - $for spriteGroup, j in character.spriteGroupBoxes:
                                                  - 'rtgl-view.characterSpriteGroupBox data-index=${i} data-sprite-group-id=${spriteGroup.id} d=h av=c g=xs ph=md pv=xs cur=pointer bw=xs bc=bo h-bc=pr br=sm bgc=mu':
                                                      - rtgl-text s=xs: ${spriteGroup.name}
                  - rtgl-button#addCharacterButton v=ol w=f mt=md: + Add Character
          - rtgl-view d=h av=c ah=e w=f g=lg:
              - rtgl-button#submitButton: Submit
      - $if mode == 'character-select':
          - rtgl-view d=h g=md:
              - rtgl-breadcrumb#breadcumb :items=${breadcrumb}: null
          - rtgl-view d=h w=f av=c g=md:
              - rtgl-view w=1fg: null
              - rtgl-input#searchInput s=sm placeholder=${searchPlaceholder} value=${searchQuery} h=1fg: null
          - 'rtgl-view d=h w=f g=lg mt=sm h=1fg style="min-height: 0;"':
              - rtgl-view h=f w=1fg sv:
                  - rvn-base-file-explorer#baseFileExplorer :items=${items}: null
              - rtgl-view#galleryScroll h=f w=2fg sv g=lg:
                  - $for group, i in groups:
                      - rtgl-view data-group-id=${group.id} g=md:
                          - rtgl-view d=h av=c g=md:
                              - rtgl-svg svg=folder wh=16: null
                              - rtgl-text: ${group.fullLabel}
                          - rtgl-view d=h w=f wrap g=lg:
                              - $for item, j in group.children:
                                  - rtgl-view#characterItem${i}x${j} data-character-id=${item.id} cur=pointer bw=xs bc=${item.itemBorderColor} h-bc=${item.itemHoverBorderColor} br=sm:
                                      - rtgl-view p=md g=md br=md:
                                          - $if item.fileId:
                                              - rvn-file-image fileId=${item.fileId} w=200 h=120: null
                                            $else:
                                              - rtgl-view w=200 h=120 av=c ah=c bgc=mu-fg:
                                                  - rtgl-text s=sm c=mu-fg: No Avatar
                                          - rtgl-text s=xs c=mu-fg ellipsis w=200: ${item.name}
      - $if mode == 'sprite-select':
          - rtgl-view d=h g=md:
              - rtgl-breadcrumb#breadcumb :items=${breadcrumb}: null
          - $if showSpriteGroupTabs:
              - rtgl-tabs#spriteGroupTabs :items=${spriteSelectionTabs} selected-tab=${selectedSpriteGroupId}: null
          - rtgl-view d=h w=f av=c g=md:
              - rtgl-view w=1fg: null
              - rtgl-input#searchInput s=sm placeholder=${searchPlaceholder} value=${searchQuery} h=1fg: null
          - 'rtgl-view d=h w=f g=lg mt=sm h=1fg style="min-height: 0;"':
              - rtgl-view h=f w=1fg sv:
                  - rvn-base-file-explorer#baseFileExplorer :items=${spriteItems}: null
              - rtgl-view#galleryScroll h=f w=2fg sv g=lg:
                  - $for group, i in spriteGroups:
                      - rtgl-view data-group-id=${group.id} g=md:
                          - rtgl-view d=h av=c g=md:
                              - rtgl-svg svg=folder wh=16: null
                              - rtgl-text: ${group.fullLabel}
                          - rtgl-view d=h w=f wrap g=lg:
                              - $for item, j in group.children:
                                  - rtgl-view#spriteItem${i}x${j} data-sprite-id=${item.id} cur=pointer bw=xs bc=${item.itemBorderColor} h-bc=${item.itemHoverBorderColor} br=sm:
                                      - rtgl-view p=md g=md br=md:
                                          - rvn-file-image fileId=${item.fileId} w=200 h=120: null
                                          - rtgl-text s=xs c=mu-fg ellipsis w=200: ${item.name}
          - rtgl-view d=h av=c ah=e w=f g=lg:
              - rtgl-button#buttonSelect: Select
  - rtgl-dropdown-menu#dropdownMenu :items=${dropdownMenu.items} x=${dropdownMenu.position.x} y=${dropdownMenu.position.y} ?open=${dropdownMenu.isOpen}: null
  - $when: fullImagePreviewVisible
    rtgl-view#previewOverlay pos=fix edge=f z=3000 cur=pointer:
      - rtgl-view w=f h=f pos=fix edge=f bgc=bg: null
      - $if fullImagePreviewFileId:
          - rtgl-view pos=fix edge=f ah=c av=c z=3001:
              - rvn-file-image fileId=${fullImagePreviewFileId} w=80% h=80% bc=ac bw=xs br=md: null
