refs:
  form:
    eventListeners:
      form-change:
        handler: handleFormChange
  bgmChannel:
    eventListeners:
      click:
        handler: handleChannelClick
      keydown:
        handler: handleChannelKeyDown
  channelSelectButton:
    eventListeners:
      click:
        handler: handleChannelClick
  emptyAddButton:
    eventListeners:
      click:
        handler: handleEmptyAddClick
  insertBeforeButton*:
    eventListeners:
      click:
        handler: handleEdgeAddClick
  insertAfterButton*:
    eventListeners:
      click:
        handler: handleEdgeAddClick
  soundClip*:
    eventListeners:
      click:
        handler: handleSoundClick
      dblclick:
        handler: handleSoundDoubleClick
      contextmenu:
        handler: handleSoundContextMenu
      keydown:
        handler: handleSoundKeyDown
  soundDragSurface*:
    eventListeners:
      pointerdown:
        handler: handleSoundDragPointerDown
  baseFileExplorer:
    eventListeners:
      item-click:
        handler: handleFileExplorerItemClick
  galleryScroll: {}
  searchInput:
    eventListeners:
      value-input:
        handler: handleSearchInput
  resourceItem*:
    eventListeners:
      click:
        handler: handleResourceItemClick
      dblclick:
        handler: handleResourceItemDoubleClick
  submitButton:
    eventListeners:
      click:
        handler: handleSubmitClick
  breadcumb:
    eventListeners:
      item-click:
        handler: handleBreadcumbActionsClick
  buttonSelect:
    eventListeners:
      click:
        handler: handleButtonSelectClick
  rvnAudioPlayer:
    eventListeners:
      audio-player-close:
        handler: handleAudioPlayerClose
styles:
  ".bgmChannel":
    box-sizing: border-box
    min-width: "0"
    overflow-x: auto
    overflow-y: hidden
  ".bgmTimelineTrack":
    min-width: 100%
    position: relative
  ".bgmSoundClip":
    box-sizing: border-box
    min-width: 56px
    overflow: hidden
    outline: none
    position: absolute
  ".bgmSoundClipContent":
    box-sizing: border-box
    min-width: "0"
    overflow: hidden
  ".bgmSoundWaveformArea":
    flex: "0 0 94px"
    height: 94px
    position: relative
    width: 100%
  ".bgmSoundDragSurface":
    bottom: "0"
    cursor: grab
    left: "0"
    position: absolute
    right: "0"
    top: "0"
    touch-action: none
    user-select: none
    z-index: "3"
  ".bgmSoundDragSurface:active":
    cursor: grabbing
  ".bgmSoundClip:focus-visible":
    box-shadow: 0 0 0 2px var(--ring) inset
  ".bgmInsertZone":
    appearance: none
    background: transparent
    border: "0"
    bottom: "0"
    color: var(--primary-foreground)
    cursor: pointer
    font-family: inherit
    font-size: 20px
    font-weight: 600
    opacity: "0"
    padding: "0"
    position: absolute
    top: "0"
    transition: opacity 120ms ease, background 120ms ease
    width: "min(32px, 40%)"
    z-index: "5"
  ".bgmInsertZone:hover":
    background: var(--primary)
    opacity: "0.88"
  ".bgmInsertZone:focus-visible":
    background: var(--primary)
    opacity: "0.88"
    outline: "2px solid var(--ring)"
    outline-offset: -2px
  ".bgmInsertBefore":
    left: "0"
  ".bgmInsertAfter":
    right: "0"
  ".bgmEmptyAdd":
    appearance: none
    background: transparent
    border: "0"
    color: var(--muted-foreground)
    cursor: pointer
    font-family: inherit
    font-size: 30px
    height: 100%
    padding: "0"
    width: 100%
  ".bgmEmptyAdd:hover":
    color: var(--foreground)
  ".bgmEmptyAdd:focus-visible":
    box-shadow: 0 0 0 2px var(--ring) inset
    outline: none
  ".bgmChannelSelect":
    align-items: center
    appearance: none
    background: transparent
    border: "0"
    border-bottom: "1px solid var(--border)"
    color: var(--muted-foreground)
    cursor: pointer
    display: flex
    flex: "0 0 24px"
    font-family: inherit
    font-size: 12px
    height: 24px
    justify-content: space-between
    padding: "0 8px"
    text-align: left
    width: 100%
  ".bgmChannelSelect:hover":
    color: var(--foreground)
  ".bgmChannelSelect:focus-visible":
    box-shadow: 0 0 0 2px var(--ring) inset
    outline: none
template:
  - rtgl-view w=f h=f p=lg:
      - rtgl-view d=h g=md: null
      - rtgl-breadcrumb#breadcumb :items=${breadcrumb}: null
      - $if mode == 'current':
          - 'rtgl-view h=1fg sv w=f g=lg mt=lg style="min-height: 0;"':
              - 'rtgl-view#bgmChannel.bgmChannel w=f d=v pos=rel bgc=mu bw=xs bc=${channelBorderColor} h-bc=${channelHoverBorderColor} br=sm tabindex=0 role=group aria-label="${channelLabel}" style="height: ${channelHeightPx}px;"':
                  - 'button#channelSelectButton.bgmChannelSelect type=button aria-label="${channelLabel}"':
                      - span: ${channelLabel}
                      - span: ${channelDurationLabel}
                  - $if sounds.length == 0:
                      - 'rtgl-view w=f h=126 bgc=bg bwb=xs bc=${channelBorderColor} style="min-height: 0;"':
                          - 'button#emptyAddButton.bgmEmptyAdd type=button aria-label="${addAudioLabel}"': "+"
                    $else:
                      - 'rtgl-view.bgmTimelineTrack data-timeline-track=true data-timeline-duration-ms=${timelineDurationMs} w=f pos=rel style="height: ${timelineHeightPx}px; min-width: 100%;"':
                          - $for sound, i in sounds:
                              - 'rtgl-view#soundClip${i}.bgmSoundClip data-sound-id=${sound.id} d=v pos=abs overflow=hidden bw=xs bc=${sound.itemBorderColor} h-bc=${sound.itemHoverBorderColor} cur=pointer tabindex=0 role=button aria-label="${sound.name}" style="box-sizing: border-box; min-width: 56px; left: ${sound.leftPercent}%; top: ${sound.topPx}px; width: ${sound.widthPercent}%; height: 126px;"':
                                  - rtgl-view.bgmSoundClipContent d=v w=f h=f:
                                      - div.bgmSoundWaveformArea:
                                          - $if sound.waveformDataFileId:
                                              - rvn-waveform-visualizer waveformDataFileId=${sound.waveformDataFileId} w=f h=94: null
                                            $else:
                                              - rtgl-view w=f h=94 av=c ah=c:
                                                  - rtgl-text s=sm c=mu-fg: No waveform
                                          - 'div#soundDragSurface${i}.bgmSoundDragSurface data-sound-id=${sound.id}': null
                                          - 'button#insertBeforeButton${i}.bgmInsertZone.bgmInsertBefore type=button data-insert-index=${sound.insertBeforeIndex} aria-label="${addBeforeLabel}"': "+"
                                          - 'button#insertAfterButton${i}.bgmInsertZone.bgmInsertAfter type=button data-insert-index=${sound.insertAfterIndex} aria-label="${addAfterLabel}"': "+"
                                      - rtgl-view d=h w=f h=30 ph=sm av=c g=sm:
                                          - rtgl-text s=xs c=mu-fg ellipsis w=1fg: ${sound.name}
                                          - 'rtgl-text s=xs c=mu-fg style="flex: 0 0 auto;"': ${sound.durationLabel}
              - rtgl-view w=f g=md:
                  - rtgl-view w=f:
                      - rtgl-text s=md: ${selectionHeading}
                      - rtgl-text s=sm c=mu-fg: ${selectionName}
                  - rtgl-form#form key=${selectionKey} :form=${form} :defaultValues=${defaultValues}: null
          - 'rtgl-view d=h av=c ah=e w=f g=lg style="flex: 0 0 auto;"':
              - rtgl-button#submitButton: Submit
      - $if mode == 'gallery':
          - rtgl-view d=h w=f av=c g=md:
              - rtgl-view w=1fg: null
              - rtgl-input#searchInput s=sm placeholder=${searchPlaceholder} value=${searchQuery} h=1fg: null
          - 'rtgl-view d=h w=f g=lg mt=sm h=1fg style="min-height: 0;"':
              - rtgl-view h=f w=1fg sv:
                  - rvn-base-file-explorer#baseFileExplorer :items=${items}: null
              - rtgl-view#galleryScroll h=f w=2fg sv g=lg:
                  - $for group, i in groups:
                      - rtgl-view data-group-id=${group.id} g=md:
                          - rtgl-view d=h av=c g=md:
                              - rtgl-svg svg=folder wh=16: null
                              - rtgl-text: ${group.fullLabel}
                          - rtgl-view d=h w=f wrap g=lg:
                              - $for item, j in group.children:
                                  - rtgl-view#resourceItem${i}x${j} data-resource-id=${item.id} cur=pointer bw=xs bc=${item.itemBorderColor} h-bc=${item.itemHoverBorderColor} br=sm:
                                      - rtgl-view p=md g=md br=md:
                                          - $if item.waveformDataFileId:
                                              - rvn-waveform-visualizer waveformDataFileId=${item.waveformDataFileId} w=200 h=120: null
                                            $else:
                                              - rtgl-view w=200 h=120 av=c ah=c bgc=mu-fg:
                                                  - rtgl-text s=sm c=mu-fg: No waveform
                                          - rtgl-text s=xs c=mu-fg ellipsis w=200: ${item.name}
          - 'rtgl-view d=h av=c ah=e w=f g=lg style="flex: 0 0 auto;"':
              - rtgl-button#buttonSelect: Select
  - $if showAudioPlayer:
      - 'rtgl-view h=72 pos=fix edge=b z=1001 style="left: 0px; right: 0px;"':
          - rvn-audio-player#rvnAudioPlayer fileId=${playingSound.fileId} autoPlay=true :title=${playingSound.title}: null
