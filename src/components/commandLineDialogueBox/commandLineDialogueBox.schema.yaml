componentName: rvn-command-line-dialogue-box
propsSchema:
  type: object
  properties:
    layouts:
      type: array
      items:
        type: object
        properties:
          id:
            type: string
          name:
            type: string
    characters:
      type: array
      items:
        type: object
        properties:
          id:
            type: string
          name:
            type: string
          type:
            type: string
          fileId:
            type: string
          parentId:
            type: string
          sprites:
            type: object
          spriteGroups:
            type: array
    characterTree:
      type: array
    transforms:
      type: object
    animations:
      type: object
    dialogue:
      type: object
      properties:
        mode:
          type: string
        clearPage:
          type: boolean
        append:
          type: boolean
        persistCharacter:
          type: boolean
        ui:
          type: object
          properties:
            resourceId:
              type: string
        gui:
          type: object
          properties:
            resourceId:
              type: string
        characterId:
          type: string
        character:
          type: object
          properties:
            name:
              type: string
            sprite:
              type: object
