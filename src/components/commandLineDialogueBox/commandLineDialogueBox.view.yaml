refs:
  breadcumb:
    eventListeners:
      item-click:
        handler: handleBreadcumbClick
  dialogueForm:
    eventListeners:
      form-change:
        handler: handleFormChange
  characterSpriteBox:
    eventListeners:
      click:
        handler: handleCharacterSpriteBoxClick
      contextmenu:
        handler: handleCharacterSpriteBoxContextMenu
  characterSpriteMenuButton:
    eventListeners:
      click:
        handler: handleCharacterSpriteMenuButtonClick
  speakerSpriteTooltip:
    eventListeners:
      mouseenter:
        handler: handleSpeakerSpriteTooltipMouseEnter
      mouseleave:
        handler: handleSpeakerSpriteTooltipMouseLeave
      focus:
        handler: handleSpeakerSpriteTooltipMouseEnter
      blur:
        handler: handleSpeakerSpriteTooltipMouseLeave
  transform:
    eventListeners:
      value-change:
        handler: handleTransformChange
  animationMode:
    eventListeners:
      value-change:
        handler: handleAnimationModeChange
  updateAnimation:
    eventListeners:
      value-change:
        handler: handleAnimationChange
  transitionAnimation:
    eventListeners:
      value-change:
        handler: handleAnimationChange
  persistSprite:
    eventListeners:
      value-change:
        handler: handlePersistSpriteChange
  .characterSpriteGroupBox:
    eventListeners:
      click:
        handler: handleCharacterSpriteGroupBoxClick
  baseFileExplorer:
    eventListeners:
      item-click:
        handler: handleFileExplorerItemClick
  galleryScroll: {}
  searchInput:
    eventListeners:
      value-input:
        handler: handleSearchInput
  characterItem*:
    eventListeners:
      click:
        handler: handleCharacterItemClick
  spriteGroupTabs:
    eventListeners:
      item-click:
        handler: handleSpriteGroupTabClick
  spriteItem*:
    eventListeners:
      click:
        handler: handleSpriteItemClick
      dblclick:
        handler: handleSpriteItemDoubleClick
  previewOverlay:
    eventListeners:
      click:
        action: hideFullImagePreview
  buttonSelect:
    eventListeners:
      click:
        handler: handleButtonSelectClick
  submitButton:
    eventListeners:
      click:
        handler: handleSubmitClick
styles:
  ".commandLineDialogueBoxTooltipTrigger":
    align-items: center
    appearance: none
    background: transparent
    border: "1px solid var(--muted-foreground)"
    border-radius: 50%
    box-sizing: border-box
    color: var(--muted-foreground)
    cursor: help
    display: flex
    font-family: inherit
    font-size: 11px
    font-weight: 600
    height: 16px
    justify-content: center
    line-height: 1
    margin: 0
    padding: 0
    width: 16px
  ".commandLineDialogueBoxTooltipTrigger:focus-visible":
    outline: "2px solid var(--ring)"
    outline-offset: 2px
template:
  - rtgl-view w=f h=f p=lg:
      - $if mode == 'current':
          - rtgl-breadcrumb#breadcumb :items=${breadcrumb}: null
          - 'rtgl-view h=1fg sv w=f style="min-height: 0;"':
              - rtgl-form#dialogueForm :defaultValues=${defaultValues} :form=${form} :context=${context} w=f:
                  - rtgl-view slot=characterSprite g=md w=f:
                      - rtgl-view d=h g=md av=c:
                          - rtgl-text: ${speakerSpriteLabel}
                          - 'button#speakerSpriteTooltip.commandLineDialogueBoxTooltipTrigger type=button aria-label="${speakerSpriteTooltipContent}"': "?"
                      - rtgl-view d=h g=md av=t pv=md br=md w=f:
                          - rtgl-view#characterSpriteBox cur=pointer bw=xs bc=bo h-bc=ac br=sm:
                              - rtgl-view p=md g=md br=md:
                                  - $if selectedSpriteCharacter.hasSpritePreview:
                                      - rvn-stacked-file-images :layers=${selectedSpriteCharacter.spritePreviewLayers} w=200 h=120 br=sm lazy: null
                                    $else:
                                      - rtgl-view w=200 h=120 av=c ah=c bgc=mu-fg: null
                                  - rtgl-view d=h av=c g=xs w=200:
                                      - rtgl-text s=xs c=mu-fg ellipsis w=1fg: ${selectedSpriteCharacter.displayName}
                                      - $if characterSpriteEnabled:
                                          - 'rtgl-button#characterSpriteMenuButton sq s=sm v=gh pre=ellipsis title="${characterSpriteMenuLabel}" aria-label="${characterSpriteMenuLabel}" aria-haspopup=menu': null
                          - $if hasSpriteCharacter:
                              - rtgl-view w=1fg g=sm:
                                  - rtgl-text s=sm c=mu-fg: ${transformLabel}
                                  - rtgl-select#transform key=${spriteTransformId} :options=${transformOptions} :selectedValue=${spriteTransformId} w=f no-clear: null
                                  - rtgl-text s=sm c=mu-fg: ${animationLabel}
                                  - rtgl-segmented-control#animationMode key=${spriteAnimationMode} :options=${animationModeOptions} :selectedValue=${spriteAnimationMode} w=f no-clear: null
                                  - $if spriteAnimationMode == 'update':
                                      - rtgl-select#updateAnimation key=${spriteAnimationId} :options=${updateAnimationOptions} :selectedValue=${spriteAnimationId} w=f no-clear: null
                                    $elif spriteAnimationMode == 'transition':
                                      - rtgl-select#transitionAnimation key=${spriteAnimationId} :options=${transitionAnimationOptions} :selectedValue=${spriteAnimationId} w=f no-clear: null
                                  - rtgl-text s=sm c=mu-fg: ${persistSpriteLabel}
                                  - rtgl-segmented-control#persistSprite :options=${persistSpriteOptions} :selectedValue=${persistSprite} w=f no-clear: null
                                  - $if selectedSpriteCharacter.showSpriteGroupBoxes:
                                      - rtgl-text s=sm c=mu-fg: ${spriteGroupsLabel}
                                      - rtgl-view d=h wrap g=xs w=f:
                                          - $for spriteGroup, i in selectedSpriteCharacter.spriteGroupBoxes:
                                              - 'rtgl-view.characterSpriteGroupBox data-sprite-group-id=${spriteGroup.id} d=h av=c g=xs ph=md pv=xs cur=pointer bw=xs bc=bo h-bc=pr br=sm bgc=${spriteGroup.backgroundColor}':
                                                  - rtgl-text s=xs: ${spriteGroup.name}
          - 'rtgl-view d=h av=c ah=e w=f g=lg style="flex: 0 0 auto;"':
              - rtgl-button#submitButton ?disabled=${submitDisabled}: ${submitButtonLabel}
      - $if mode == 'character-select':
          - rtgl-view d=h g=md:
              - rtgl-breadcrumb#breadcumb :items=${breadcrumb}: null
          - rtgl-view d=h w=f av=c g=md:
              - rtgl-view w=1fg: null
              - rtgl-input#searchInput s=sm placeholder=${searchPlaceholder} value=${searchQuery} h=1fg: null
          - 'rtgl-view d=h w=f g=lg mt=sm h=1fg style="min-height: 0;"':
              - rtgl-view h=f w=1fg sv:
                  - rvn-base-file-explorer#baseFileExplorer :items=${items}: null
              - rtgl-view#galleryScroll h=f w=2fg sv g=lg:
                  - $for group, i in groups:
                      - rtgl-view data-group-id=${group.id} g=md:
                          - rtgl-view d=h av=c g=md:
                              - rtgl-svg svg=folder wh=16: null
                              - rtgl-text: ${group.fullLabel}
                          - rtgl-view d=h w=f wrap g=lg:
                              - $for item, j in group.children:
                                  - rtgl-view#characterItem${i}x${j} data-character-id=${item.id} cur=pointer bw=xs bc=${item.itemBorderColor} h-bc=${item.itemHoverBorderColor} br=sm:
                                      - rtgl-view p=md g=md br=md:
                                          - $if item.fileId:
                                              - rvn-file-image fileId=${item.fileId} w=200 h=120: null
                                            $else:
                                              - rtgl-view w=200 h=120 av=c ah=c bgc=mu-fg:
                                                  - rtgl-text s=sm c=mu-fg: ${noAvatarLabel}
                                          - rtgl-text s=xs c=mu-fg ellipsis w=200: ${item.name}
      - $if mode == 'sprite-select':
          - rtgl-view d=h g=md:
              - rtgl-breadcrumb#breadcumb :items=${breadcrumb}: null
          - $if showSpriteGroupTabs:
              - rtgl-tabs#spriteGroupTabs :items=${spriteSelectionTabs} selected-tab=${selectedSpriteGroupId}: null
          - rtgl-view d=h w=f av=c g=md:
              - rtgl-view w=1fg: null
              - rtgl-input#searchInput s=sm placeholder=${searchPlaceholder} value=${searchQuery} h=1fg: null
          - 'rtgl-view d=h w=f g=lg mt=sm h=1fg style="min-height: 0;"':
              - rtgl-view h=f w=1fg sv:
                  - rvn-base-file-explorer#baseFileExplorer :items=${spriteItems}: null
              - rtgl-view#galleryScroll h=f w=2fg sv g=lg:
                  - $for group, i in spriteGroups:
                      - rtgl-view data-group-id=${group.id} g=md:
                          - rtgl-view d=h av=c g=md:
                              - rtgl-svg svg=folder wh=16: null
                              - rtgl-text: ${group.fullLabel}
                          - rtgl-view d=h w=f wrap g=lg:
                              - $for item, j in group.children:
                                  - rtgl-view#spriteItem${i}x${j} data-sprite-id=${item.id} cur=pointer bw=xs bc=${item.itemBorderColor} h-bc=${item.itemHoverBorderColor} br=sm:
                                      - rtgl-view p=md g=md br=md:
                                          - $if item.previewKind == 'spritesheet':
                                              - 'rvn-spritesheet-preview key=${item.previewKey} previewKey=${item.previewKey} fileId=${item.previewFileId} :atlas=${item.previewAtlas} :animation=${item.previewAnimation} w=200 h=120 emptyLabel="${noPreviewLabel}"': null
                                            $else:
                                              - rvn-file-image fileId=${item.previewFileId} w=200 h=120: null
                                          - rtgl-text s=xs c=mu-fg ellipsis w=200: ${item.name}
          - 'rtgl-view d=h av=c ah=e w=f g=lg style="flex: 0 0 auto;"':
              - rtgl-button#buttonSelect: ${selectButtonLabel}
  - $if fullImagePreviewVisible:
      - rtgl-view#previewOverlay pos=fix edge=f z=3000 cur=pointer:
          - rtgl-view w=f h=f pos=fix edge=f bgc=bg: null
          - $if fullImagePreviewFileId:
              - rtgl-view pos=fix edge=f ah=c av=c z=3001:
                  - $if fullImagePreviewKind == 'spritesheet':
                      - 'rvn-spritesheet-preview key=${fullImagePreviewKey} previewKey=${fullImagePreviewKey} fileId=${fullImagePreviewFileId} :atlas=${fullImagePreviewAtlas} :animation=${fullImagePreviewAnimation} w=80% h=80% emptyLabel="${noPreviewLabel}"': null
                    $else:
                      - rvn-file-image fileId=${fullImagePreviewFileId} w=80% h=80% bc=ac bw=xs br=md: null
  - rtgl-tooltip ?open=${speakerSpriteTooltip.open} x=${speakerSpriteTooltip.x} y=${speakerSpriteTooltip.y} place="t" content="${speakerSpriteTooltipContent}": null
