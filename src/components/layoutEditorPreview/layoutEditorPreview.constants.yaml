dialogueForm:
  title: Preview
  description: Edit to see how the layout will look like with different data
  fields:
    - name: dialogue-character-name
      description: Character Name
      type: input-text
    - name: dialogue-content
      description: Dialogue Content
      type: input-text
    - name: dialogue-auto-mode
      label: Auto Mode
      type: segmented-control
      noClear: true
      options:
        - label: "False"
          value: false
        - label: "True"
          value: true
    - name: dialogue-skip-mode
      label: Skip Mode
      type: segmented-control
      noClear: true
      options:
        - label: "False"
          value: false
        - label: "True"
          value: true
    - name: dialogue-is-line-completed
      label: Line Completed
      type: segmented-control
      noClear: true
      options:
        - label: "False"
          value: false
        - label: "True"
          value: true

nvlForm:
  title: Preview
  description: Edit to see how the layout will look like with different content items
  fields:
    - name: linesNum
      type: select
      description: Number of Lines
      options:
        - label: "1"
          value: 1
        - label: "2"
          value: 2
        - label: "3"
          value: 3
        - label: "4"
          value: 4
        - label: "5"
          value: 5
        - label: "6"
          value: 6
      placeholder: Select number of lines
      required: true
    - "$each": 'line, i in lines'
      type: section
      fields:
        - name: 'characterName${i}'
          type: input-text
          description: Character name
          placeholder: Enter character name
        - name: 'line${i}'
          type: input-text
          description: Line content text
          placeholder: Enter line text

choiceForm:
  title: Preview
  description: Edit to see how the layout will look like with different data
  fields:
    - name: choicesNum
      type: select
      description: Number of Choices
      options:
        - label: "1"
          value: 1
        - label: "2"
          value: 2
        - label: "3"
          value: 3
        - label: "4"
          value: 4
        - label: "5"
          value: 5
        - label: "6"
          value: 6
      placeholder: Select number of choices
      required: true
    - "$each": 'choice, i in choices'
      name: 'choice${i}'
      type: input-text
      description: Choice content text
      placeholder: Enter choice text

historyForm:
  title: Preview
  description: Edit to see how the history layout will look like with different history entries
  fields:
    - name: linesNum
      type: select
      description: Number of History Lines
      options:
        - label: "1"
          value: 1
        - label: "2"
          value: 2
        - label: "3"
          value: 3
        - label: "4"
          value: 4
        - label: "5"
          value: 5
        - label: "6"
          value: 6
      placeholder: Select number of history lines
      required: true
    - "$each": 'text, i in texts'
      type: section
      fields:
        - name: 'characterName${i}'
          type: input-text
          description: Character name
          placeholder: Enter character name
        - name: 'text${i}'
          type: input-text
          description: History line text
          placeholder: Enter history line text

saveLoadForm:
  title: Preview
  description: Edit to see how the layout will look like with different save slot data
  fields:
    - "$when": "showSlotsNum"
      name: slotsNum
      type: select
      description: Number of Slots
      options:
        - label: "1"
          value: 1
        - label: "2"
          value: 2
        - label: "3"
          value: 3
        - label: "4"
          value: 4
        - label: "5"
          value: 5
        - label: "6"
          value: 6
      placeholder: Select number of slots
      required: true
    - "$each": 'slot, i in slots'
      type: section
      fields:
        - name: 'saveImageId${i}'
          type: select
          description: Save image
          clearable: true
          options: "${imageOptions}"
          placeholder: Select image
        - name: 'saveDate${i}'
          type: input-text
          description: Save date
          placeholder: Enter save date
