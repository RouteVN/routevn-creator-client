refs:
  dialogueForm:
    eventListeners:
      form-input:
        handler: handleDialogueFormChange
      form-change:
        handler: handleDialogueFormChange
  nvlForm:
    eventListeners:
      form-input:
        handler: handleNvlFormChange
      form-change:
        handler: handleNvlFormChange
  revealingSpeedInput:
    eventListeners:
      value-input:
        handler: handlePreviewRevealingSpeedInput
  choiceForm:
    eventListeners:
      form-input:
        handler: handleChoiceFormChange
      form-change:
        handler: handleChoiceFormChange
  saveLoadForm:
    eventListeners:
      form-input:
        handler: handleSaveLoadFormChange
      form-change:
        handler: handleSaveLoadFormChange
  previewVariablesForm:
    eventListeners:
      form-input:
        handler: handlePreviewVariablesFormChange
      form-change:
        handler: handlePreviewVariablesFormChange
  playPreviewButton:
    eventListeners:
      click:
        handler: handlePlayPreviewClick
template:
  - $if layoutType == 'dialogue':
      - rtgl-form#dialogueForm key=${dialogueFormKey} w=f :form=${dialogueForm} :defaultValues=${dialogueDefaultValues}: null
  - $if layoutType == 'nvl':
      - rtgl-form#nvlForm key=${nvlFormKey} w=f :form=${nvlForm} :defaultValues=${nvlDefaultValues} :context=${nvlContext}: null
  - $if layoutType == 'dialogue':
      - rtgl-view d=h av=c g=sm w=f ph=md pb=md:
          - rtgl-text s=sm c=mu-fg: Revealing Speed
          - rtgl-input#revealingSpeedInput type=number min=1 step=1 w=120 value=${previewRevealingSpeed}: null
          - rtgl-button#playPreviewButton v=ol: Play
  - $if layoutType == 'choice':
      - rtgl-form#choiceForm key=${choiceFormKey} w=f :form=${choiceForm} :defaultValues=${choiceDefaultValues} :context=${choicesContext}: null
  - $if hasSaveLoadPreview:
      - rtgl-form#saveLoadForm key=${saveLoadFormKey} w=f :form=${saveLoadForm} :defaultValues=${saveLoadDefaultValues} :context=${saveLoadContext}: null
  - $if hasPreviewVariables:
      - rtgl-form#previewVariablesForm key=${previewVariablesFormKey} w=f :form=${previewVariablesForm} :defaultValues=${previewVariablesDefaultValues}: null
