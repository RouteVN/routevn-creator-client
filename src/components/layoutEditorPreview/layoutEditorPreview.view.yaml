refs:
  previewBackgroundField:
    eventListeners:
      click:
        handler: handlePreviewBackgroundFieldClick
      contextmenu:
        handler: handlePreviewBackgroundFieldContextMenu
  dialogueForm:
    eventListeners:
      form-input:
        handler: handleDialogueFormChange
      form-change:
        handler: handleDialogueFormChange
  nvlForm:
    eventListeners:
      form-input:
        handler: handleNvlFormChange
      form-change:
        handler: handleNvlFormChange
  revealingSpeedInput:
    eventListeners:
      value-input:
        handler: handlePreviewRevealingSpeedInput
  choiceForm:
    eventListeners:
      form-input:
        handler: handleChoiceFormChange
      form-change:
        handler: handleChoiceFormChange
  historyForm:
    eventListeners:
      form-input:
        handler: handleHistoryFormChange
      form-change:
        handler: handleHistoryFormChange
  saveLoadForm:
    eventListeners:
      form-input:
        handler: handleSaveLoadFormChange
      form-change:
        handler: handleSaveLoadFormChange
  previewVariablesForm:
    eventListeners:
      form-input:
        handler: handlePreviewVariablesFormChange
      form-change:
        handler: handlePreviewVariablesFormChange
  baseFileExplorer:
    eventListeners:
      item-click:
        handler: handleFileExplorerClickItem
  imageSelectorDialog:
    eventListeners:
      close:
        handler: handleImageSelectorCancel
  imageSelector:
    eventListeners:
      image-selected:
        handler: handleImageSelected
      image-dblclick:
        handler: handleImageDoubleClick
  confirmImageSelection:
    eventListeners:
      click:
        handler: handleImageSelectorSubmit
  cancelImageSelection:
    eventListeners:
      click:
        handler: handleImageSelectorCancel
  dropdownMenu:
    eventListeners:
      close:
        handler: handleDropdownMenuClose
      item-click:
        handler: handleDropdownMenuClickItem
  playPreviewButton:
    eventListeners:
      click:
        handler: handlePlayPreviewClick
  previewOverlay:
    eventListeners:
      click:
        handler: handlePreviewOverlayClick
template:
  - $if previewBackgroundOnlyForm:
      - rtgl-form key=${previewBackgroundOnlyFormKey} w=f :form=${previewBackgroundOnlyForm}:
          - rtgl-view slot=${previewBackgroundSlot} g=xs:
              - rtgl-view#previewBackgroundField w=220 h=160 bw=xs bc=bo br=md cur=pointer av=c ah=c:
                  - $if previewBackgroundImageId:
                      - rvn-file-image imageId=${previewBackgroundImageId} source="thumbnail" w=220 h=160 br=md: null
                    $else:
                      - rtgl-text c=mu-fg ta=c: Select image
  - $if layoutType == 'dialogue':
      - rtgl-form#dialogueForm key=${dialogueFormKey} w=f :form=${dialogueForm} :defaultValues=${dialogueDefaultValues}:
          - rtgl-view slot=${previewBackgroundSlot} g=xs:
              - rtgl-view#previewBackgroundField w=220 h=160 bw=xs bc=bo br=md cur=pointer av=c ah=c:
                  - $if previewBackgroundImageId:
                      - rvn-file-image imageId=${previewBackgroundImageId} source="thumbnail" w=220 h=160 br=md: null
                    $else:
                      - rtgl-text c=mu-fg ta=c: Select image
  - $if layoutType == 'nvl':
      - rtgl-form#nvlForm key=${nvlFormKey} w=f :form=${nvlForm} :defaultValues=${nvlDefaultValues} :context=${nvlContext}:
          - rtgl-view slot=${previewBackgroundSlot} g=xs:
              - rtgl-view#previewBackgroundField w=220 h=160 bw=xs bc=bo br=md cur=pointer av=c ah=c:
                  - $if previewBackgroundImageId:
                      - rvn-file-image imageId=${previewBackgroundImageId} source="thumbnail" w=220 h=160 br=md: null
                    $else:
                      - rtgl-text c=mu-fg ta=c: Select image
  - $if layoutType == 'dialogue':
      - rtgl-view d=h av=c g=sm w=f ph=md pb=md:
          - rtgl-text s=sm c=mu-fg: Revealing Speed
          - rtgl-input#revealingSpeedInput type=number min=1 step=1 w=120 value=${previewRevealingSpeed}: null
          - rtgl-button#playPreviewButton v=ol: Play
  - $if layoutType == 'choice':
      - rtgl-form#choiceForm key=${choiceFormKey} w=f :form=${choiceForm} :defaultValues=${choiceDefaultValues} :context=${choicesContext}:
          - rtgl-view slot=${previewBackgroundSlot} g=xs:
              - rtgl-view#previewBackgroundField w=220 h=160 bw=xs bc=bo br=md cur=pointer av=c ah=c:
                  - $if previewBackgroundImageId:
                      - rvn-file-image imageId=${previewBackgroundImageId} source="thumbnail" w=220 h=160 br=md: null
                    $else:
                      - rtgl-text c=mu-fg ta=c: Select image
  - $if layoutType == 'history':
      - rtgl-form#historyForm key=${historyFormKey} w=f :form=${historyForm} :defaultValues=${historyDefaultValues} :context=${historyContext}:
          - rtgl-view slot=${previewBackgroundSlot} g=xs:
              - rtgl-view#previewBackgroundField w=220 h=160 bw=xs bc=bo br=md cur=pointer av=c ah=c:
                  - $if previewBackgroundImageId:
                      - rvn-file-image imageId=${previewBackgroundImageId} source="thumbnail" w=220 h=160 br=md: null
                    $else:
                      - rtgl-text c=mu-fg ta=c: Select image
  - $if hasPreviewVariables:
      - rtgl-form#previewVariablesForm key=${previewVariablesFormKey} w=f :form=${previewVariablesForm} :defaultValues=${previewVariablesDefaultValues}:
          - rtgl-view slot=${previewBackgroundSlot} g=xs:
              - rtgl-view#previewBackgroundField w=220 h=160 bw=xs bc=bo br=md cur=pointer av=c ah=c:
                  - $if previewBackgroundImageId:
                      - rvn-file-image imageId=${previewBackgroundImageId} source="thumbnail" w=220 h=160 br=md: null
                    $else:
                      - rtgl-text c=mu-fg ta=c: Select image
  - $if hasSaveLoadPreview:
      - rtgl-form#saveLoadForm key=${saveLoadFormKey} w=f :form=${saveLoadForm} :defaultValues=${saveLoadDefaultValues} :context=${saveLoadContext}:
          - rtgl-view slot=${previewBackgroundSlot} g=xs:
              - rtgl-view#previewBackgroundField w=220 h=160 bw=xs bc=bo br=md cur=pointer av=c ah=c:
                  - $if previewBackgroundImageId:
                      - rvn-file-image imageId=${previewBackgroundImageId} source="thumbnail" w=220 h=160 br=md: null
                    $else:
                      - rtgl-text c=mu-fg ta=c: Select image
  - rtgl-dropdown-menu#dropdownMenu :items=${dropdownMenu.items} x=${dropdownMenu.x} y=${dropdownMenu.y} ?open=${dropdownMenu.isOpen}: null
  - rtgl-dialog#imageSelectorDialog ?open=${imageSelectorDialog.open} s=xl:
      - rtgl-view slot=content d=v w=f g=md:
          - 'rtgl-view d=h w=f h=70vh g=lg style="min-width: 0; min-height: 0;"':
              - 'rtgl-view w=300 h=f style="min-width: 0; min-height: 0;"':
                  - rvn-base-file-explorer#baseFileExplorer :items=${fileExplorerItems} shrinkable: null
              - 'rtgl-view w=1fg h=f style="min-width: 0; min-height: 0;"':
                  - rvn-image-selector#imageSelector selectedImageId=${imageSelectorDialog.selectedImageId}: null
          - rtgl-view d=h g=sm w=f ah=e:
              - rtgl-button#cancelImageSelection variant=se: Cancel
              - rtgl-button#confirmImageSelection variant=pr: OK
  - $when: fullImagePreviewVisible
    rtgl-view#previewOverlay pos=fix edge=f z=3000 cur=pointer:
      - rtgl-view w=f h=f pos=fix edge=f bgc=bg: null
      - $if fullImagePreviewImageId:
          - rtgl-view pos=fix edge=f ah=c av=c z=3001:
              - rvn-file-image imageId=${fullImagePreviewImageId} w=80% h=80% bc=ac bw=xs br=md: null
