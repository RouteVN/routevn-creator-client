refs:
  commandLine*:
    eventListeners:
      back-to-actions:
        handler: handleBackToActions
      actionClicked:
        handler: handleActionClicked
      submit:
        handler: handleCommandLineSubmit
  addActionButton:
    eventListeners:
      click:
        handler: handleAddActionButtonClicked
  embeddedCloseButton:
    eventListeners:
      click:
        handler: handleEmbeddedCloseClick
  helpFloatingButton:
    eventListeners:
      click:
        handler: handleHelpFloatingButtonClick
  actionsDialog:
    eventListeners:
      close:
        handler: handleActionsDialogClose
  actionItem*:
    eventListeners:
      click:
        handler: handleActionItemClick
      contextmenu:
        handler: handleActionItemRightClick
  dropdownMenu:
    eventListeners:
      close:
        handler: handleDropdownMenuClose
      item-click:
        handler: handleDropdownMenuClickItem
template:
  - $if showSelected:
      - rtgl-view g=md w=f:
          - $if preview.background || preview.bgm || preview.sfx || preview.character || preview.visual || preview.sectionTransition || preview.resetStoryAtSection || preview.dialogue || preview.choice || preview.control || preview.nextLine || preview.toggleAutoMode || preview.toggleSkipMode || preview.toggleDialogueUI || preview.runtimeActions || preview.setNextLineConfig || preview.pushOverlay || preview.popOverlay || preview.updateVariable || preview.rollbackByOffset || preview.showConfirmDialog || preview.hideConfirmDialog || preview.saveSlot || preview.loadSlot:
              - $if preview.control:
                  - rtgl-view#actionItemControl data-mode=control g=md d=h av=c ph=md bgc=mu h-bgc=ac br=md h=36 w=f cur=pointer:
                      - rtgl-svg svg=control wh=24: null
                      - rtgl-text s=sm: ${preview.control.name}
              - $if preview.background:
                  - rtgl-view#actionItemBackground data-mode=background g=md d=h av=c ph=md bgc=mu br=md h-bgc=ac h=36 w=f cur=pointer:
                      - $if preview.background.type == 'image':
                          - rtgl-svg svg=image wh=24: null
                          - rvn-file-image fileId=${preview.background.fileId} w=50 h=35: null
                          - rtgl-text s=sm: ${preview.background.name}
                        $elif preview.background.type == 'video':
                          - rtgl-svg svg=video wh=24: null
                          - rvn-file-image fileId=${preview.background.thumbnailFileId} w=50 h=35: null
                          - rtgl-text s=sm: ${preview.background.name}
                        $elif preview.background.type == 'layout':
                          - rtgl-svg svg=layout wh=24: null
                          - rtgl-text s=sm: ${preview.background.name}
              - $if preview.bgm:
                  - rtgl-view#actionItemBgm data-mode=bgm g=md d=h av=c ph=md bgc=mu h-bgc=ac br=md h=36 w=f cur=pointer:
                      - rtgl-svg svg=music wh=24: null
                      - rtgl-text s=sm: ${preview.bgm.name}
              - $if preview.sfx:
                  - rtgl-view#actionItemSfx data-mode=sfx g=md d=h av=c ph=md bgc=mu h-bgc=ac br=md h=36 w=f cur=pointer:
                      - rtgl-svg svg=audio wh=24: null
                      - rtgl-text s=sm: ${preview.sfx.names}
              - $if preview.character:
                  - rtgl-view#actionItemCharacter data-mode=character g=md d=h av=c ph=md bgc=mu h-bgc=ac br=md h=36 w=f cur=pointer:
                      - rtgl-svg svg=character wh=24: null
                      - rtgl-view d=h g=sm av=c:
                          - $for charData, i in preview.character:
                              - $if charData.hasSpritePreview:
                                  - rvn-stacked-file-images :fileIds=${charData.spriteFileIds} w=32 h=32 br=f: null
              - $if preview.visual:
                  - rtgl-view#actionItemVisual data-mode=visual g=md d=h av=c ph=md bgc=mu h-bgc=ac br=md h=36 w=f cur=pointer:
                      - rtgl-svg svg=image wh=24: null
                      - rtgl-view d=h g=sm av=c:
                          - $for visualData, i in preview.visual.items:
                              - $if visualData.previewFileId:
                                  - rvn-file-image fileId=${visualData.previewFileId} w=32 h=32: null
              - $if preview.sectionTransition:
                  - rtgl-view#actionItemSectionTransition data-mode=sectionTransition g=md d=h av=c ph=md bgc=mu h-bgc=ac br=md h=36 w=f cur=pointer:
                      - rtgl-svg svg="transition" wh=24: null
                      - rtgl-text s=sm: ${preview.sectionTransition.label}
              - $if preview.resetStoryAtSection:
                  - rtgl-view#actionItemResetStoryAtSection data-mode=resetStoryAtSection g=md d=h av=c ph=md bgc=mu h-bgc=ac br=md h=36 w=f cur=pointer:
                      - rtgl-svg svg="settings" wh=24: null
                      - rtgl-text s=sm: ${preview.resetStoryAtSection.label}
              - $if preview.dialogue:
                  - rtgl-view#actionItemDialogue data-mode=dialogue g=md d=h av=c ph=md bgc=mu h-bgc=ac br=md w=f cur=pointer pv=md:
                      - rtgl-svg svg=dialogue wh=24: null
                      - rtgl-view d=h av=c g=xs wrap:
                          - rtgl-text s=sm: ${preview.dialogue.name}
                          - rtgl-text s=xs c=mu-fg: ${preview.dialogue.modeLabel}
                          - $if preview.dialogue.customCharacterNameLabel:
                              - rtgl-view bw=xs bc=bo br=sm ph=md pv=sm:
                                  - rtgl-text s=sm: ${preview.dialogue.customCharacterNameLabel}
                          - $if preview.dialogue.persistCharacterLabel:
                              - rtgl-view bw=xs bc=bo br=sm ph=md pv=sm:
                                  - rtgl-text s=sm: ${preview.dialogue.persistCharacterLabel}
              - $if preview.choice && preview.choice.items:
                  - rtgl-view#actionItemChoices data-mode=choice g=md d=h av=c ph=md bgc=mu h-bgc=ac br=md w=f cur=pointer pv=md:
                      - rtgl-svg svg=choices wh=24: null
                      - rtgl-view d=v g=sm:
                          - rtgl-view d=h g=sm wrap:
                              - $for choice in preview.choice.items:
                                  - rtgl-view bw=xs bc=bo br=sm ph=md pv=sm:
                                      - rtgl-text s=sm: ${choice.content}
              - $if preview.nextLine:
                  - rtgl-view#actionItemNextLine data-mode=nextLine g=md d=h av=c ph=md bgc=mu h-bgc=ac br=md h=36 w=f cur=pointer:
                      - rtgl-svg svg="settings" wh=24: null
                      - rtgl-text s=sm: Next Line
              - $if preview.toggleAutoMode:
                  - rtgl-view#actionItemToggleAutoMode data-mode=toggleAutoMode g=md d=h av=c ph=md bgc=mu h-bgc=ac br=md h=36 w=f cur=pointer:
                      - rtgl-svg svg="play" wh=24: null
                      - rtgl-text s=sm: Toggle Auto Mode
              - $if preview.toggleSkipMode:
                  - rtgl-view#actionItemToggleSkipMode data-mode=toggleSkipMode g=md d=h av=c ph=md bgc=mu h-bgc=ac br=md h=36 w=f cur=pointer:
                      - rtgl-svg svg="settings" wh=24: null
                      - rtgl-text s=sm: Toggle Skip Mode
              - $if preview.toggleDialogueUI:
                  - rtgl-view#actionItemToggleDialogueUI data-mode=toggleDialogueUI g=md d=h av=c ph=md bgc=mu h-bgc=ac br=md h=36 w=f cur=pointer:
                      - rtgl-svg svg="settings" wh=24: null
                      - rtgl-text s=sm: Toggle Dialogue Box Visibility
              - $if preview.runtimeActions:
                  - $for runtimeAction, i in preview.runtimeActions:
                      - rtgl-view#actionItemRuntime${i} data-mode=${runtimeAction.mode} g=md d=h av=c ph=md bgc=mu h-bgc=ac br=md h=36 w=f cur=pointer:
                          - rtgl-svg svg=${runtimeAction.icon} wh=24: null
                          - rtgl-text s=sm: ${runtimeAction.summary}
              - $if preview.pushOverlay:
                  - rtgl-view#actionItemPushOverlay data-mode=pushOverlay g=md d=h av=c ph=md bgc=mu h-bgc=ac br=md h=36 w=f cur=pointer:
                      - rtgl-svg svg="layers" wh=24: null
                      - rtgl-text s=sm: 'Push overlay: ${preview.pushOverlay.layout.name}'
              - $if preview.popOverlay:
                  - rtgl-view#actionItemPopOverlay data-mode=popOverlay g=md d=h av=c ph=md bgc=mu h-bgc=ac br=md h=36 w=f cur=pointer:
                      - rtgl-svg svg="layers" wh=24: null
                      - rtgl-text s=sm: Pop current overlay
              - $if preview.rollbackByOffset:
                  - rtgl-view#actionItemRollbackByOffset data-mode=rollbackByOffset g=md d=h av=c ph=md bgc=mu h-bgc=ac br=md h=36 w=f cur=pointer:
                      - rtgl-svg svg="settings" wh=24: null
                      - rtgl-text s=sm: ${preview.rollbackByOffset.summary}
              - $if preview.showConfirmDialog:
                  - rtgl-view#actionItemShowConfirmDialog data-mode=showConfirmDialog g=md d=h av=c ph=md bgc=mu h-bgc=ac br=md w=f cur=pointer pv=md:
                      - rtgl-svg svg="settings" wh=24: null
                      - rtgl-view d=v:
                          - rtgl-text s=sm: 'Show confirm dialog: ${preview.showConfirmDialog.layoutName}'
                          - rtgl-text s=xs c=mu-fg: 'Confirm: ${preview.showConfirmDialog.confirmActionCount} action(s), Cancel: ${preview.showConfirmDialog.cancelActionCount} action(s)'
              - $if preview.hideConfirmDialog:
                  - rtgl-view#actionItemHideConfirmDialog data-mode=hideConfirmDialog g=md d=h av=c ph=md bgc=mu h-bgc=ac br=md h=36 w=f cur=pointer:
                      - rtgl-svg svg="settings" wh=24: null
                      - rtgl-text s=sm: Hide confirm dialog
              - $if preview.saveSlot:
                  - rtgl-view#actionItemSaveSlot data-mode=saveSlot g=md d=h av=c ph=md bgc=mu h-bgc=ac br=md h=36 w=f cur=pointer:
                      - rtgl-svg svg="settings" wh=24: null
                      - rtgl-text s=sm: 'Save slot ${preview.saveSlot.label}'
              - $if preview.loadSlot:
                  - rtgl-view#actionItemLoadSlot data-mode=loadSlot g=md d=h av=c ph=md bgc=mu h-bgc=ac br=md h=36 w=f cur=pointer:
                      - rtgl-svg svg="settings" wh=24: null
                      - rtgl-text s=sm: 'Load slot ${preview.loadSlot.label}'
              - $if preview.setNextLineConfig:
                  - rtgl-view#actionItemSetNextLineConfig data-mode=setNextLineConfig g=md d=h av=c ph=md bgc=mu h-bgc=ac br=md h=36 w=f cur=pointer:
                      - rtgl-svg svg=settings wh=24: null
                      - rtgl-text s=sm: Next Line Config
              - $if preview.updateVariable:
                  - rtgl-view#actionItemUpdateVariable data-mode=updateVariable g=md d=h av=c ph=md bgc=mu h-bgc=ac br=md h=36 w=f cur=pointer:
                      - rtgl-svg svg=variable wh=24: null
                      - rtgl-text s=sm: ${preview.updateVariable.summary}
          - rtgl-button#addActionButton v=ol w=f: +
          - $if actionsType == 'system':
              - rtgl-view d=h av=c ah=e w=f g=lg:
                  - rtgl-button#embeddedCloseButton: Confirm
  - rtgl-dialog#actionsDialog key=${mode} ?open=${isActionsDialogOpen}:
      - $if isActionsDialogOpen:
          - rtgl-view slot=content w=${actionsDialogWidth} h=${actionsDialogHeight} pos=rel:
              - 'rtgl-view#helpFloatingButton pos=abs z=10 w=28 h=28 ah=c av=c bgc=bg bw=xs bc=bo h-bc=ac br=f cur=pointer style="top: 10px; right: 10px; box-shadow: 0 4px 12px rgba(15, 23, 42, 0.12);"':
                  - rtgl-text s=xs c=mu-fg: '?'
              - $if mode == "actions":
                  - rvn-command-line-actions#commandLineActions :actionsType=${actionsType} :hiddenModes=${hiddenModes}: null
                $elif mode == "dialogue":
                  - rvn-command-line-dialogue-box#commandLineDialogueBox :layouts=${dialogueLayouts} :characters=${allCharacters} :dialogue=${actions.dialogue}: null
                $elif mode == "choice":
                  - rvn-command-line-choices#commandLineChoices :layouts=${choiceLayouts} :choice=${actions.choice}: null
                $elif mode == "background":
                  - rvn-command-line-background#commandLineBackground data-mode="background" :background=${actions.background}: null
                $elif mode == "bgm":
                  - rvn-command-line-bgm#commandLineBgm :bgm=${actions.bgm}: null
                $elif mode == "sfx":
                  - rvn-command-line-sound-effects#commandLineSoundEffects :sfx=${actions.sfx}: null
                $elif mode == "character":
                  - rvn-command-line-characters#commandLineCharacters :character=${actions.character} :presentationState=${presentationState}: null
                $elif mode == "sectionTransition":
                  - rvn-command-line-section-transition#commandLineSectionTransition :sectionTransition=${actions.sectionTransition} :currentSceneId=${currentSceneId}: null
                $elif mode == "resetStoryAtSection":
                  - rvn-command-line-reset-story-at-section#commandLineResetStoryAtSection :resetStoryAtSection=${actions.resetStoryAtSection} :currentSceneId=${currentSceneId}: null
                $elif mode == "control":
                  - rvn-command-line-control#commandLineControl :controls=${controlLayouts} :control=${actions.control}: null
                $elif mode == "nextLine":
                  - rvn-command-line-next-line#commandLineNextLine :nextLine=${selectedLine.actions.nextLine}: null
                $elif mode == "toggleAutoMode":
                  - rvn-command-line-toggle-auto-mode#commandLineToggleAutoMode :toggleAutoMode=${actions.toggleAutoMode}: null
                $elif mode == "toggleSkipMode":
                  - rvn-command-line-toggle-skip-mode#commandLineToggleSkipMode :toggleSkipMode=${actions.toggleSkipMode}: null
                $elif mode == "toggleDialogueUI":
                  - rvn-command-line-toggle-dialogue-ui#commandLineToggleDialogueUI :toggleDialogueUI=${actions.toggleDialogueUI}: null
                $elif mode == "pushOverlay":
                  - rvn-command-line-push-overlay#commandLinePushOverlay :pushOverlay=${actions.pushOverlay}: null
                $elif mode == "popOverlay":
                  - rvn-command-line-pop-overlay#commandLinePopOverlay :popOverlay=${actions.popOverlay}: null
                $elif mode == "rollbackByOffset":
                  - rvn-command-line-rollback-by-offset#commandLineRollbackByOffset :rollbackByOffset=${actions.rollbackByOffset}: null
                $elif mode == "showConfirmDialog":
                  - rvn-command-line-show-confirm-dialog#commandLineShowConfirmDialog :layouts=${confirmDialogLayouts} :showConfirmDialog=${actions.showConfirmDialog}: null
                $elif mode == "hideConfirmDialog":
                  - rvn-command-line-hide-confirm-dialog#commandLineHideConfirmDialog :hideConfirmDialog=${actions.hideConfirmDialog}: null
                $elif mode == "saveSlot":
                  - rvn-command-line-save-slot#commandLineSaveSlot :saveSlot=${actions.saveSlot}: null
                $elif mode == "loadSlot":
                  - rvn-command-line-load-slot#commandLineLoadSlot :loadSlot=${actions.loadSlot}: null
                $elif mode == "visual":
                  - rvn-command-line-visual#commandLineVisual :visual=${actions.visual} :presentationState=${presentationState}: null
                $elif mode == "setNextLineConfig":
                  - rvn-command-line-set-next-line-config#commandLineSetNextLineConfig :setNextLineConfig=${actions.setNextLineConfig}: null
                $elif isRuntimeActionMode:
                  - rvn-command-line-runtime-action#commandLineRuntimeAction :mode=${mode} :action=${actions[mode]}: null
                $elif mode == "updateVariable":
                  - rvn-command-line-update-variable#commandLineUpdateVariable :updateVariable=${actions.updateVariable}: null
  - rtgl-dropdown-menu#dropdownMenu :items=${dropdownMenu.items} x=${dropdownMenu.position.x} y=${dropdownMenu.position.y} ?open=${dropdownMenu.isOpen}: null
