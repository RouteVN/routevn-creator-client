componentName: rvn-system-actions
propsSchema:
  type: object
  properties:
    actions:
      type: object
    selectedLineId:
      type: string
    selectedLine:
      type: object
    currentSceneId:
      type: string
    presentationState:
      type: object
    actionType:
      type: string
      enum:
        - presentation
        - system
    dialogVariant:
      type: string
      enum:
        - default
        - scene-editor-left
    dialogPanelWidth:
      type: string
    hiddenModes:
      type: array
      items:
        type: string
    allowedModes:
      type: array
      items:
        type: string
    showSelected:
      type: boolean
    showEmbeddedClose:
      type: boolean
