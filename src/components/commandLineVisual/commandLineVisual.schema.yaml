componentName: rvn-command-line-visual
propsSchema:
  type: object
  properties:
    backgroundTransformEditor:
      type: object
    visual:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              resourceId:
                type: string
              resourceType:
                type: string
              animationName:
                type: string
              transformId:
                type: string
              x:
                type: number
              y:
                type: number
              anchorX:
                type: number
              anchorY:
                type: number
              scaleX:
                type: number
              scaleY:
                type: number
              rotation:
                type: number
              originX:
                type: number
              originY:
                type: number
              layer:
                type: number
                enum:
                  - 10
                  - 30
                  - 50
                  - 70
                  - 90
              opacity:
                type: number
                minimum: 0
                maximum: 1
              blur:
                type:
                  - object
                  - "null"
                properties:
                  x:
                    type: number
                  y:
                    type: number
                  quality:
                    type: number
                  kernelSize:
                    type: number
                    enum:
                      - 5
                      - 7
                      - 9
                      - 11
                      - 13
                      - 15
                  repeatEdgePixels:
                    type: boolean
              animations:
                type: object
                properties:
                  resourceId:
                    type: string
    presentationState:
      type: object
