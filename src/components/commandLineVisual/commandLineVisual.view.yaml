refs:
  addVisualButton:
    eventListeners:
      click:
        handler: handleAddVisualClick
  addVisualPopover:
    eventListeners:
      close:
        handler: handleAddVisualPopoverClose
  addVisualForm:
    eventListeners:
      form-action:
        handler: handleAddVisualFormAction
  removeVisual*:
    eventListeners:
      click:
        handler: handleRemoveVisualClick
  visualImage*:
    eventListeners:
      click:
        handler: handleVisualClick
  visualItem*:
    eventListeners:
      contextmenu:
        handler: handleVisualContextMenu
  resourceItem*:
    eventListeners:
      click:
        handler: handleResourceItemClick
      dblclick:
        handler: handleResourceItemDoubleClick
  baseFileExplorer:
    eventListeners:
      item-click:
        handler: handleFileExplorerItemClick
  galleryScroll: {}
  searchInput:
    eventListeners:
      value-input:
        handler: handleSearchInput
  tabs:
    eventListeners:
      item-click:
        handler: handleTabClick
  previewOverlay:
    eventListeners:
      click:
        action: hideFullImagePreview
  submitButton:
    eventListeners:
      click:
        handler: handleSubmitClick
  breadcumb:
    eventListeners:
      item-click:
        handler: handleBreadcumbClick
  buttonSelect:
    eventListeners:
      click:
        handler: handleButtonSelectClick
  dropdownMenu:
    eventListeners:
      close:
        handler: handleDropdownMenuClose
      item-click:
        handler: handleDropdownMenuClickItem
  transform*:
    eventListeners:
      value-change:
        handler: handleTransformChange
  customTransformMode*:
    eventListeners:
      value-change:
        handler: handleTransformModeChange
  customTransformButton*:
    eventListeners:
      click:
        handler: handleCustomTransformButtonClick
  customTransformChip*:
    eventListeners:
      click:
        handler: handleCustomTransformButtonClick
  backgroundTransformPreviewCanvasHost: {}
  backgroundTransformEditorDoneButton:
    eventListeners:
      click:
        handler: handleCustomTransformDoneButtonClick
  animation*:
    eventListeners:
      value-change:
        handler: handleAnimationChange
  layer*:
    eventListeners:
      value-change:
        handler: handleLayerChange
  opacity*:
    eventListeners:
      value-input:
        handler: handleOpacityInput
  blurToggle*:
    eventListeners:
      value-change:
        handler: handleBlurToggleChange
  blurX*:
    eventListeners:
      value-input:
        handler: handleBlurFieldInput
  blurY*:
    eventListeners:
      value-input:
        handler: handleBlurFieldInput
  blurQuality*:
    eventListeners:
      value-input:
        handler: handleBlurFieldInput
  blurKernelSize*:
    eventListeners:
      value-change:
        handler: handleBlurFieldChange
  blurRepeatEdgePixels*:
    eventListeners:
      value-change:
        handler: handleBlurFieldChange
template:
  - 'rtgl-view w=f h=f p=lg pos=rel style="min-width: 0; min-height: 0; overflow: hidden;"':
      - $if mode == 'current':
          - rtgl-view d=h g=md:
              - rtgl-breadcrumb#breadcumb :items=${breadcrumb}: null
          - 'rtgl-view h=1fg sv w=f style="min-height: 0;"':
              - rtgl-view g=md w=f:
                  - $for visualGroup, groupIndex in defaultValues.visualGroups:
                      - rtgl-view g=sm w=f:
                          - rtgl-text s=sm c=fg: ${visualGroup.label}
                          - rtgl-view g=md w=f:
                              - $for visual, i in visualGroup.visuals:
                                  - rtgl-view#visualItem${groupIndex}x${i} data-index=${visual.visualIndex} data-visual-id=${visual.id} d=h g=md av=t p=md br=md w=f:
                                      - 'rtgl-view#visualImage${groupIndex}x${i} data-index=${visual.visualIndex} cur=pointer bw=xs bc=bo h-bc=ac br=sm style="align-self: flex-start; flex: 0 0 auto;"':
                                          - rtgl-view p=md g=md br=md:
                                              - $if visual.resourceType == 'video':
                                                  - rtgl-view pos=rel w=200 h=120:
                                                      - $if visual.fileId:
                                                          - rvn-file-image fileId=${visual.fileId} w=200 h=120: null
                                                        $else:
                                                          - rtgl-view w=200 h=120 av=c ah=c bgc=mu-fg:
                                                              - rtgl-text s=sm c=mu-fg: ${noThumbnailLabel}
                                                      - rtgl-view pos=abs w=f h=f av=c ah=c bgc=bg-60:
                                                          - rtgl-icon icon=play s=xl c=fg: null
                                                $elif visual.resourceType == 'layout':
                                                  - $if visual.fileId:
                                                      - rvn-file-image fileId=${visual.fileId} w=200 h=120: null
                                                    $else:
                                                      - rtgl-view w=200 h=120 av=c ah=c bgc=mu-fg:
                                                          - rtgl-text s=sm c=mu-fg: ${noThumbnailLabel}
                                                $elif visual.fileId:
                                                  - rvn-file-image fileId=${visual.fileId} w=200 h=120: null
                                                $else:
                                                  - rtgl-view w=200 h=120 av=c ah=c bgc=mu-fg:
                                                      - rtgl-text s=sm c=mu-fg: ${noResourceLabel}
                                              - rtgl-text s=xs c=mu-fg ellipsis w=200: ${visual.displayName}
                                      - rtgl-view w=1fg g=sm:
                                          - rtgl-text s=sm c=mu-fg: ${layerLabel}
                                          - rtgl-select#layer${groupIndex}x${i} data-index=${visual.visualIndex} key=${visual.layer} :options=${defaultValues.layerOptions} :selectedValue=${visual.layer} w=f no-clear: null
                                          - rtgl-text s=sm c=mu-fg: ${opacityLabel}
                                          - rtgl-slider-input#opacity${groupIndex}x${i} data-index=${visual.visualIndex} key=${visual.id} min=0 max=1 step=0.01 w=f value=${visual.opacity}: null
                                          - rtgl-text s=sm c=mu-fg: ${blurLabel}
                                          - rtgl-segmented-control#blurToggle${groupIndex}x${i} data-index=${visual.visualIndex} w=f no-clear :selectedValue=${visual.blurEnabled} :options=${defaultValues.blurToggleOptions}: null
                                          - $if visual.blurEnabled:
                                              - rtgl-view d=h wrap g=sm w=f:
                                                  - rtgl-view w=90 g=xs:
                                                      - rtgl-text s=xs c=mu-fg: X
                                                      - rtgl-input#blurX${groupIndex}x${i} data-index=${visual.visualIndex} data-blur-field=x type=number w=f value=${visual.blur.x}: null
                                                  - rtgl-view w=90 g=xs:
                                                      - rtgl-text s=xs c=mu-fg: Y
                                                      - rtgl-input#blurY${groupIndex}x${i} data-index=${visual.visualIndex} data-blur-field=y type=number w=f value=${visual.blur.y}: null
                                                  - rtgl-view w=90 g=xs:
                                                      - rtgl-text s=xs c=mu-fg: ${qualityLabel}
                                                      - rtgl-input#blurQuality${groupIndex}x${i} data-index=${visual.visualIndex} data-blur-field=quality type=number min=1 step=1 w=f value=${visual.blur.quality}: null
                                                  - rtgl-view w=120 g=xs:
                                                      - rtgl-text s=xs c=mu-fg: ${kernelLabel}
                                                      - rtgl-select#blurKernelSize${groupIndex}x${i} data-index=${visual.visualIndex} data-blur-field=kernelSize w=f no-clear :selectedValue=${visual.blur.kernelSize} :options=${defaultValues.blurKernelSizeOptions}: null
                                                  - rtgl-view w=160 g=xs:
                                                      - rtgl-text s=xs c=mu-fg: ${repeatEdgeLabel}
                                                      - rtgl-segmented-control#blurRepeatEdgePixels${groupIndex}x${i} data-index=${visual.visualIndex} data-blur-field=repeatEdgePixels w=f no-clear :selectedValue=${visual.blur.repeatEdgePixels} :options=${defaultValues.blurRepeatEdgeOptions}: null
                                          - rtgl-text s=sm c=mu-fg: ${transformLabel}
                                          - rtgl-segmented-control#customTransformMode${groupIndex}x${i} data-index=${visual.visualIndex} w=f no-clear :selectedValue=${visual.customTransform} :options=${defaultValues.transformModeOptions}: null
                                          - $if visual.customTransform:
                                              - rtgl-view d=h av=c w=f g=md:
                                                  - rtgl-view d=h av=c w=1fg g=sm wrap:
                                                      - $for item, j in visual.customTransformDetails:
                                                          - 'rtgl-view#customTransformChip${groupIndex}x${i}x${j} data-index=${visual.visualIndex} d=h av=c g=sm bw=xs bc=bo h-bc=pr br=full bgc=mu ph=md pv=sm cur=pointer style="max-width: 220px; box-sizing: border-box;"':
                                                              - rtgl-text s=xs c=mu-fg ellipsis: ${item.label}
                                                              - 'rtgl-text s=sm style="font-variant-numeric: tabular-nums; white-space: nowrap;"': ${item.value}
                                                  - rtgl-button#customTransformButton${groupIndex}x${i} data-index=${visual.visualIndex} v=se: ${editButtonLabel}
                                            $else:
                                              - rtgl-text s=sm c=mu-fg: ${predefinedTransformLabel}
                                              - rtgl-select#transform${groupIndex}x${i} data-index=${visual.visualIndex} key=${visual.transformId} :options=${defaultValues.transformOptions} :selectedValue=${visual.transformId} w=f no-clear: null
                                          - rtgl-text s=sm c=mu-fg: ${animationLabel}
                                          - rtgl-select#animation${groupIndex}x${i} data-index=${visual.visualIndex} key=${visual.animationId} :options=${defaultValues.animationOptions} :selectedValue=${visual.animationId} w=f placeholder=${selectAnimationPlaceholder}: null
                  - rtgl-button#addVisualButton v=ol w=f mt=md: ${addVisualButtonLabel}
          - 'rtgl-view d=h av=c ah=e w=f g=lg style="flex: 0 0 auto;"':
              - rtgl-button#submitButton: ${submitButtonLabel}
      - $if mode == 'resource-select':
          - rtgl-view d=h g=md:
              - rtgl-breadcrumb#breadcumb :items=${breadcrumb}: null
          - rtgl-view d=h w=f av=c g=md:
              - rtgl-tabs#tabs selected-tab=${tab} :items=${tabs}: null
              - rtgl-view w=1fg: null
              - rtgl-input#searchInput s=sm placeholder=${searchPlaceholder} value=${searchQuery} h=1fg: null
          - 'rtgl-view d=h w=f g=lg mt=sm h=1fg style="min-height: 0;"':
              - rtgl-view h=f w=1fg sv:
                  - rvn-base-file-explorer#baseFileExplorer :items=${resourceItems}: null
              - rtgl-view#galleryScroll h=f w=2fg sv g=lg:
                  - $for group, i in resourceGroups:
                      - rtgl-view data-group-id=${group.groupId} g=md:
                          - rtgl-view d=h av=c g=md:
                              - rtgl-svg svg=folder wh=16: null
                              - rtgl-text: ${group.fullLabel}
                          - rtgl-view d=h w=f wrap g=lg:
                              - $for item, j in group.children:
                                  - rtgl-view#resourceItem${i}x${j} data-resource-id=${item.id} data-resource-type=${item.resourceType} cur=pointer bw=xs bc=${item.itemBorderColor} h-bc=${item.itemHoverBorderColor} br=sm:
                                      - rtgl-view p=md g=md br=md:
                                          - $if item.resourceType == 'video':
                                              - rtgl-view pos=rel w=200 h=120:
                                                  - $if item.previewFileId:
                                                      - rvn-file-image fileId=${item.previewFileId} w=200 h=120: null
                                                    $else:
                                                      - rtgl-view w=200 h=120 av=c ah=c bgc=mu-fg:
                                                          - rtgl-text s=sm c=mu-fg: ${noThumbnailLabel}
                                                  - rtgl-view pos=abs w=f h=f av=c ah=c bgc=bg-60:
                                                      - rtgl-icon icon=play s=xl c=fg: null
                                            $elif item.resourceType == 'layout':
                                              - $if item.previewFileId:
                                                  - rvn-file-image fileId=${item.previewFileId} w=200 h=120: null
                                                $else:
                                                  - rtgl-view w=200 h=120 av=c ah=c bgc=mu-fg:
                                                      - rtgl-text s=sm c=mu-fg: ${noThumbnailLabel}
                                            $elif item.previewFileId:
                                              - rvn-file-image fileId=${item.previewFileId} w=200 h=120: null
                                            $else:
                                              - rtgl-view w=200 h=120 av=c ah=c bgc=mu-fg:
                                                  - rtgl-text s=sm c=mu-fg: ${item.resourceTypeLabel}
                                          - rtgl-text s=xs c=mu-fg ellipsis w=200: ${item.name}
          - 'rtgl-view d=h av=c ah=e w=f g=lg style="flex: 0 0 auto;"':
              - rtgl-button#buttonSelect: ${selectButtonLabel}
  - rtgl-popover#addVisualPopover ?open=${addVisualPopover.isOpen} x=${addVisualPopover.position.x} y=${addVisualPopover.position.y} place=bs:
      - rtgl-form#addVisualForm key=${addVisualPopover.key} slot=content :defaultValues=${addVisualDefaultValues} :form=${addVisualForm} w=320: null
  - rtgl-dropdown-menu#dropdownMenu :items=${dropdownMenu.items} x=${dropdownMenu.position.x} y=${dropdownMenu.position.y} ?open=${dropdownMenu.isOpen}: null
  - $if backgroundTransformEditor.isOpen:
      - 'rtgl-view pos=abs edge=f z=20 bgc=bg d=v style="pointer-events: auto; min-width: 0; min-height: 0;"':
          - rtgl-view h=48 bwb=xs w=f d=h av=c ph=md g=md:
              - rtgl-text s=sm w=1fg: ${transformEditorTitle}
              - rtgl-button#backgroundTransformEditorDoneButton v=pr: ${doneButtonLabel}
          - 'rtgl-view w=f h=1fg ah=c av=c style="min-width: 0; min-height: 0;"':
              - 'rtgl-view h=f style="width: ${backgroundTransformEditor.previewMaxWidth}; max-width: 100%; min-width: 0; min-height: 0;"':
                  - rvn-scene-editor-preview-canvas#backgroundTransformPreviewCanvasHost canvas-aspect-ratio="${backgroundTransformEditor.canvasAspectRatio}": null
          - rtgl-view w=f bwt=xs d=h av=c ph=md pv=sm g=lg bgc=bg wrap:
              - rtgl-view d=h av=c g=xs:
                  - rtgl-text s=xs c=mu-fg: x
                  - rtgl-text s=sm: ${backgroundTransformEditor.metrics.x}
              - rtgl-view d=h av=c g=xs:
                  - rtgl-text s=xs c=mu-fg: y
                  - rtgl-text s=sm: ${backgroundTransformEditor.metrics.y}
              - rtgl-view d=h av=c g=xs:
                  - rtgl-text s=xs c=mu-fg: scaleX
                  - rtgl-text s=sm: ${backgroundTransformEditor.metrics.scaleX}
              - rtgl-view d=h av=c g=xs:
                  - rtgl-text s=xs c=mu-fg: scaleY
                  - rtgl-text s=sm: ${backgroundTransformEditor.metrics.scaleY}
  - $when: fullImagePreviewVisible
    rtgl-view#previewOverlay pos=fix edge=f z=3000 cur=pointer:
      - rtgl-view w=f h=f pos=fix edge=f bgc=bg: null
      - $if fullImagePreviewFileId:
          - rtgl-view pos=fix edge=f ah=c av=c z=3001:
              - rvn-file-image fileId=${fullImagePreviewFileId} w=80% h=80% bc=ac bw=xs br=md: null
