componentName: rvn-layout-editor-canvas
propsSchema:
  type: object
  properties:
    resolution:
      type: object
      properties:
        width:
          type: number
        height:
          type: number
    layoutState:
      type: object
    selectedItemId:
      type: string
    previewData:
      type: object
    disableMoveDrag:
      type: boolean
    disableInteraction:
      type: boolean
methods:
  type: object
  properties:
    restartPreview:
      description: Restarts the interactive layout preview from its initial state.
      params: []
      returns: void
    captureThumbnailImage:
      description: Captures the current layout preview as an image.
      params: []
      returns: object
    useDefaultSelectionOccurrence:
      description: Uses the first rendered occurrence for the currently selected authored item.
      params: []
      returns: void
