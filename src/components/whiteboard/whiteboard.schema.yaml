componentName: rvn-whiteboard
propsSchema:
  type: object
  properties:
    items:
      type: array
      items:
        type: object
        properties:
          id:
            type: string
          name:
            type: string
          x:
            type: number
          'y':
            type: number
    cursor:
      type: string
    selectedItemId:
      type: string
    isTouchMode:
      type: boolean
    showMinimapInTouchMode:
      type: boolean
    minimapPlacement:
      type: string
    minimapHeightScale:
      type: number
methods:
  properties:
    ensureItemVisible:
      description: Pans the whiteboard just enough to bring an item fully into view. Pass behavior smooth and durationMs for animated panning.
      params: []
      returns: void
