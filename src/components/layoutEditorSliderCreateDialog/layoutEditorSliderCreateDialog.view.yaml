refs:
  sliderCreateForm: {}
  sliderCreateImageField*:
    eventListeners:
      click:
        handler: handleImageFieldClick
  clearSliderCreateImage*:
    eventListeners:
      click:
        handler: handleImageClearClick
  imageSelectorDialog:
    eventListeners:
      close:
        handler: handleImageSelectorCancel
  baseFileExplorer:
    eventListeners:
      item-click:
        handler: handleFileExplorerClickItem
  imageSelector:
    eventListeners:
      image-selected:
        handler: handleImageSelected
      image-dblclick:
        handler: handleImageDoubleClick
  confirmImageSelection:
    eventListeners:
      click:
        handler: handleImageSelectorSubmit
  cancelImageSelection:
    eventListeners:
      click:
        handler: handleImageSelectorCancel
  previewOverlay:
    eventListeners:
      click:
        handler: handlePreviewOverlayClick
styles:
  ".layoutEditorImageFieldTransparencyGrid":
    background-color: "#eef2f7"
    background-image: 'linear-gradient(45deg, #94a3b8 25%, transparent 25%), linear-gradient(-45deg, #94a3b8 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #94a3b8 75%), linear-gradient(-45deg, transparent 75%, #94a3b8 75%)'
    background-position: "0 0, 0 6px, 6px -6px, -6px 0"
    background-repeat: repeat
    background-size: 12px 12px
template:
  - rtgl-view g=md w=f:
      - rtgl-form#sliderCreateForm key=${formKey} :defaultValues=${defaultValues} :form=${form} w=f:
          - rtgl-view slot=slider-bar-image g=xs:
              - rtgl-view#sliderCreateImageFieldBar data-field-name=barImageId w=280 h=84 bw=xs bc=bo br=md cur=pointer av=c ah=c overflow=hidden:
                  - $if images.barImageId:
                      - 'div.layoutEditorImageFieldTransparencyGrid style="display: block; width: 100%; height: 100%; overflow: hidden;"':
                          - rvn-file-image imageId=${images.barImageId} source="thumbnail" w=f h=f: null
                    $else:
                      - rtgl-text c=mu-fg: Select bar image
              - $if validationErrors.barImageId:
                  - rtgl-text s=sm c=de: ${validationErrors.barImageId}
          - rtgl-view slot=slider-thumb-image g=xs:
              - rtgl-view#sliderCreateImageFieldThumb data-field-name=thumbImageId w=140 h=140 bw=xs bc=bo br=md cur=pointer av=c ah=c overflow=hidden:
                  - $if images.thumbImageId:
                      - 'div.layoutEditorImageFieldTransparencyGrid style="display: block; width: 100%; height: 100%; overflow: hidden;"':
                          - rvn-file-image imageId=${images.thumbImageId} source="thumbnail" w=f h=f: null
                    $else:
                      - rtgl-text c=mu-fg ta=c: Select thumb image
              - $if validationErrors.thumbImageId:
                  - rtgl-text s=sm c=de: ${validationErrors.thumbImageId}
          - rtgl-view slot=slider-hover-bar-image d=h g=sm av=c:
              - rtgl-view#sliderCreateImageFieldHoverBar data-field-name=hoverBarImageId w=280 h=84 bw=xs bc=bo br=md cur=pointer av=c ah=c overflow=hidden:
                  - $if images.hoverBarImageId:
                      - 'div.layoutEditorImageFieldTransparencyGrid style="display: block; width: 100%; height: 100%; overflow: hidden;"':
                          - rvn-file-image imageId=${images.hoverBarImageId} source="thumbnail" w=f h=f: null
                    $else:
                      - rtgl-text c=mu-fg: Select hover bar image
              - $if images.hoverBarImageId:
                  - rtgl-button#clearSliderCreateImageHoverBar data-field-name=hoverBarImageId variant=se size=sm: Clear
          - rtgl-view slot=slider-hover-thumb-image d=h g=sm av=c:
              - rtgl-view#sliderCreateImageFieldHoverThumb data-field-name=hoverThumbImageId w=140 h=140 bw=xs bc=bo br=md cur=pointer av=c ah=c overflow=hidden:
                  - $if images.hoverThumbImageId:
                      - 'div.layoutEditorImageFieldTransparencyGrid style="display: block; width: 100%; height: 100%; overflow: hidden;"':
                          - rvn-file-image imageId=${images.hoverThumbImageId} source="thumbnail" w=f h=f: null
                    $else:
                      - rtgl-text c=mu-fg ta=c: Select hover thumb image
              - $if images.hoverThumbImageId:
                  - rtgl-button#clearSliderCreateImageHoverThumb data-field-name=hoverThumbImageId variant=se size=sm: Clear
  - rtgl-dialog#imageSelectorDialog ?open=${imageSelectorDialog.open} s=xl:
      - rtgl-view slot=content d=v w=f g=md:
          - 'rtgl-view d=h w=f h=70vh g=lg style="min-width: 0; min-height: 0;"':
              - 'rtgl-view w=300 h=f style="min-width: 0; min-height: 0;"':
                  - rvn-base-file-explorer#baseFileExplorer :items=${fileExplorerItems} shrinkable: null
              - 'rtgl-view w=1fg h=f style="min-width: 0; min-height: 0;"':
                  - rvn-image-selector#imageSelector selectedImageId=${imageSelectorDialog.selectedImageId}: null
          - rtgl-view d=h g=sm w=f ah=e:
              - rtgl-button#cancelImageSelection variant=se: Cancel
              - rtgl-button#confirmImageSelection variant=pr: OK
  - $when: fullImagePreviewVisible
    rtgl-view#previewOverlay pos=fix edge=f z=10000 cur=pointer:
      - rtgl-view w=f h=f pos=fix edge=f bgc=bg: null
      - $if fullImagePreviewImageId:
          - rtgl-view pos=fix edge=f ah=c av=c z=10001:
              - rvn-file-image imageId=${fullImagePreviewImageId} w=80% h=80% bc=ac bw=xs br=md: null
