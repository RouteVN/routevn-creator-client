refs:
  searchInput:
    eventListeners:
      value-input:
        handler: handleSearchInput
  tagFilterButton:
    eventListeners:
      click:
        handler: handleTagFilterButtonClick
  tagFilterPopover:
    eventListeners:
      close:
        handler: handleTagFilterPopoverClose
  tagFilterOption*:
    eventListeners:
      click:
        handler: handleTagFilterOptionClick
  tagFilterClear:
    eventListeners:
      click:
        handler: handleTagFilterClearClick
  tagFilterApply:
    eventListeners:
      click:
        handler: handleTagFilterApplyClick
  menuButton:
    eventListeners:
      click:
        handler: handleMenuClick
  contextMenu:
    eventListeners:
      close:
        handler: handleCloseContextMenu
      item-click:
        handler: handleContextMenuClickItem
  zoomButton:
    eventListeners:
      click:
        handler: handleZoomButtonClick
  zoomPopover:
    eventListeners:
      close:
        handler: handleZoomPopoverClose
  zoomSlider:
    eventListeners:
      value-change:
        handler: handleZoomChange
      value-input:
        handler: handleZoomChange
  zoomOut:
    eventListeners:
      click:
        handler: handleZoomOut
  zoomIn:
    eventListeners:
      click:
        handler: handleZoomIn
  addBtn*:
    eventListeners:
      click:
        handler: handleAddButtonClick
  groupToggle*:
    eventListeners:
      click:
        handler: handleGroupClick
  item*:
    eventListeners:
      click:
        handler: handleItemClick
      dblclick:
        handler: handleItemDoubleClick
      contextmenu:
        handler: handleItemContextMenu
template:
  - 'rtgl-view w=f h=f g=sm style="min-width: 0; min-height: 0;"':
      - 'rtgl-view h=48 w=f bgc=bg bwb=xs ph=md av=c style="position: sticky; top: 0px; z-index: 1000;"':
          - rtgl-view w=f d=h av=c g=md wrap:
              - rtgl-view av=c g=sm d=h w=1fg:
                  - $if showMenuButton:
                      - rtgl-view#menuButton w=36 h=36 ah=c av=c cur=pointer:
                          - rtgl-svg svg=hamburger wh=22 c=mu-fg: null
                  - $if navTitle:
                      - rtgl-text c=mu-fg: ${navTitle}
              - $if showZoomControls:
                  - rtgl-view#zoomButton w=36 h=36 bw=xs br=md ah=c av=c cur=pointer bgc=bg bc=bo:
                      - rtgl-svg svg=zoomIn wh=16 c=mu-fg: null
              - $if showSearch:
                  - rtgl-input#searchInput s=sm placeholder=${searchPlaceholder} value=${searchQuery} h=1fg: null
              - $if showTagFilter:
                  - rtgl-view#tagFilterButton w=36 h=36 bw=xs br=md ah=c av=c cur=pointer bgc=${tagFilterButtonBackgroundColor} bc=${tagFilterButtonBorderColor}:
                      - rtgl-svg svg=filter wh=16 c=${tagFilterButtonIconColor}: null
      - 'rtgl-view h=1fg w=f sv style="min-width: 0;"':
          - $if groups.length > 0:
              - $for group, gIndex in groups:
                  - rtgl-view w=f ph=md pos=rel:
                      - 'rtgl-view d=h w=f av=c bgc=${group.headerBackgroundColor} z=100 pv=sm style="position: sticky; top: 0px;"':
                          - rtgl-view#groupToggleRef${gIndex} data-group-id=${group.id} d=h av=c g=md cur=pointer:
                              - $if group.isCollapsed:
                                  - rtgl-svg wh=16 svg=folderArrowRight: null
                                $else:
                                  - rtgl-svg wh=16 svg=folderArrowDown: null
                              - rtgl-svg wh=16 svg=folder: null
                              - rtgl-text: ${group.fullLabel}
                          - rtgl-view w=1fg: null
                          - rtgl-button#addBtnHeaderRef${gIndex} data-group-id=${group.id} s=sm w=1fg pre=plus: ${addText}
                      - $if !group.isCollapsed:
                          - 'rtgl-grid w=f ph=sm pt=md pb=sm mb=lg g=md cols="${cardGridColumns}" style="min-width: 0;"':
                              - $if group.hasChildren:
                                  - $for item, itemIndex in group.children:
                                      - rtgl-view#itemRef${gIndex}x${itemIndex} data-item-id=${item.id} w=${item.itemWidth} cur=pointer bw=xs bc=${item.itemBorderColor} h-bc=${item.itemHoverBorderColor} br=md style="${item.itemContainerStyle}":
                                          - 'rtgl-view w=f br=md style="overflow: hidden;"':
                                              - $if item.useFullWidthPreview:
                                                  - 'rtgl-view w=f br=md style="aspect-ratio: ${item.previewAspectRatio}; overflow: hidden;"':
                                                      - rvn-font-preview fontFamily=${item.fontStyle} previewText="${item.previewText}" fileId=${item.fontFileId} fontSize=${item.fontSize} lineHeight=${item.lineHeight} color=${item.color} strokeColor=${item.strokeColor} strokeWidth=${item.strokeWidth} fontWeight=${item.fontWeight} width=f height=f padding=8 showBorder=false: null
                                                $else:
                                                  - rvn-font-preview fontFamily=${item.fontStyle} previewText="${item.previewText}" fileId=${item.fontFileId} fontSize=${item.fontSize} lineHeight=${item.lineHeight} color=${item.color} strokeColor=${item.strokeColor} strokeWidth=${item.strokeWidth} fontWeight=${item.fontWeight} width=${item.previewWidth} height=96 padding=8 showBorder=false: null
                                              - rtgl-view w=f p=md:
                                                  - rtgl-text s=xs c=mu-fg ellipsis w=f: ${item.name}
                                $else:
                                  - 'rtgl-view#addBtnEmptyRef${gIndex} data-group-id=${group.id} w=f h=150 av=c ah=c g=md p=lg bw=xs bc=bo br=lg cur=pointer style="grid-column: 1 / -1;"':
                                      - rtgl-svg svg=plus wh=24 c=pr: null
                                      - rtgl-text s=md c=pr fw=500: ${addText}
            $elif searchQuery || selectedTagFilterValues.length > 0:
              - rtgl-view w=f h=400 av=c ah=c:
                  - rtgl-text s=lg c=mu-fg: ${emptyMessage}
            $else:
              - rtgl-view w=f h=f av=c ah=c:
                  - rtgl-text s=lg c=mu-fg: No data
  - rtgl-popover#tagFilterPopover ?open=${tagFilterPopover.isOpen} x=${tagFilterPopover.position.x} y=${tagFilterPopover.position.y} place=bs content-w=320 content-g=sm content-sv=true content-ph=md content-pv=md:
      - $if showFilterPopoverSearch:
          - rtgl-text s=md: Filter
          - rtgl-input#searchInput s=sm placeholder=${searchPlaceholder} value=${searchQuery} w=f: null
      - $if !tagFilterPopover.hasOptions:
          - rtgl-text s=sm c=mu-fg: No tags available
      - $if tagFilterPopover.hasOptions:
          - rtgl-view d=h wrap g=sm w=f:
              - $for option, i in tagFilterPopover.options:
                  - rtgl-view#tagFilterOptionRef${i} data-tag-id=${option.value} cur=pointer:
                      - 'rtgl-tag v=mu style="${option.tagStyle}"':
                          ${option.label}
      - rtgl-view d=h av=c g=sm w=f pt=sm:
          - rtgl-view w=1fg: null
          - rtgl-button#tagFilterClear v=se s=sm ?disabled=${tagFilterPopover.clearDisabled}: Clear
          - rtgl-button#tagFilterApply v=pr s=sm: Save
  - $if showZoomControls:
      - rtgl-popover#zoomPopover ?open=${zoomPopover.isOpen} x=${zoomPopover.position.x} y=${zoomPopover.position.y} place=bs content-w=260 content-g=sm content-ph=md content-pv=md:
          - rtgl-text s=md: Zoom
          - rtgl-view d=h av=c g=sm w=f:
              - rtgl-button#zoomOut sq v="gh" s=sm: '-'
              - rtgl-slider#zoomSlider w=160 min=${zoomControlMin} max=${zoomControlMax} step=${zoomControlStep} value=${zoomControlValue}: null
              - rtgl-button#zoomIn sq v="gh" s=sm: +
  - rtgl-dropdown-menu#contextMenu :items=${dropdownMenu.items} ?open=${dropdownMenu.isOpen} x=${dropdownMenu.x} y=${dropdownMenu.y}: null
