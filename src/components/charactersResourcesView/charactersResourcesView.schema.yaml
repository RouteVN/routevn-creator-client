componentName: rvn-characters-resources-view
propsSchema:
  type: object
  properties:
    navTitle:
      type: string
      description: Optional title to display in the header
    groups:
      type: array
      description: Array of character groups to display
    selectedItemId:
      type: string
      description: ID of the currently selected character
    selectedFolderId:
      type: string
      description: ID of the currently selected folder
    searchQuery:
      type: string
      description: Current search query
    searchPlaceholder:
      type: string
      description: Placeholder text for search input
    emptyMessage:
      type: string
      description: Message to show when no items match
    tagFilterOptions:
      type: array
      description: Available tag filter options
    selectedTagFilterValues:
      type: array
      description: Currently selected tag ids
    tagFilterPlaceholder:
      type: string
      description: Placeholder text for the tag filter
    showTagFilter:
      type: boolean
      description: Whether the tag filter should be shown
    showSearch:
      type: boolean
      description: Whether to render the search input
    searchInFilterPopover:
      type: boolean
      description: Whether search should render inside the filter popover
    showMenuButton:
      type: boolean
      description: Whether to show a menu icon in the header
    menuButtonPlacement:
      type: string
      enum:
        - leading
        - trailing
      description: Where the menu icon renders in the header
    progressiveRender:
      type: boolean
      description: Whether to progressively render character cards
    progressiveInitialItemCount:
      type: number
      description: Number of character cards to render before progressive hydration begins
    progressiveHydrationDelayFrameCount:
      type: number
      description: Number of animation frames to wait before rendering the next progressive batch
    mobileLayout:
      type: boolean
      description: Whether cards should use the touch/mobile full-width layout
    scrollBottomPadding:
      type: string
      description: Extra bottom padding inside the scroll container
    addText:
      type: string
      description: Text to display in add affordances
