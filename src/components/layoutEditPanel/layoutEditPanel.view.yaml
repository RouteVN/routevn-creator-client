refs:
  conditionItem*:
    eventListeners:
      click:
        handler: handleVisibilityConditionItemClick
      contextmenu:
        handler: handleVisibilityConditionContextMenu
  dropdownMenu:
    eventListeners:
      close:
        handler: handleCloseContextMenu
      item-click:
        handler: handleContextMenuClickItem
  paginationItem*:
    eventListeners:
      click:
        handler: handleSaveLoadPaginationItemClick
  childInteractionItem*:
    eventListeners:
      contextmenu:
        handler: handleChildInteractionContextMenu
  groupItem*:
    eventListeners:
      click:
        handler: handleGroupItemClick
      wheel:
        handler: handleGroupItemWheel
  selectItem*:
    eventListeners:
      value-change:
        handler: handleOptionSelected
  popoverForm:
    eventListeners:
      close:
        handler: handlePopverFormClose
  popoverPreset*:
    eventListeners:
      click:
        handler: handlePopoverPresetClick
  visibilityConditionDialog:
    eventListeners:
      close:
        handler: handleVisibilityConditionDialogClose
  form:
    eventListeners:
      form-action:
        handler: handleFormActions
      form-change:
        handler: handlePopoverFormChange
  visibilityConditionForm:
    eventListeners:
      form-action:
        handler: handleVisibilityConditionFormAction
      form-change:
        handler: handleVisibilityConditionFormChange
  saveLoadPaginationDialog:
    eventListeners:
      close:
        handler: handleSaveLoadPaginationDialogClose
  childInteractionDialog:
    eventListeners:
      close:
        handler: handleChildInteractionDialogClose
  conditionalOverrideConditionDialog:
    eventListeners:
      close:
        handler: handleConditionalOverrideConditionDialogClose
  conditionalOverrideAttributeDialog:
    eventListeners:
      close:
        handler: handleConditionalOverrideAttributeDialogClose
  saveLoadPaginationForm:
    eventListeners:
      form-action:
        handler: handleSaveLoadPaginationFormAction
  childInteractionForm:
    eventListeners:
      form-action:
        handler: handleChildInteractionFormAction
  conditionalOverrideConditionForm:
    eventListeners:
      form-action:
        handler: handleConditionalOverrideConditionFormAction
      form-change:
        handler: handleConditionalOverrideConditionFormChange
  conditionalOverrideAttributeForm:
    eventListeners:
      form-action:
        handler: handleConditionalOverrideAttributeFormAction
  conditionalOverrideCondition*:
    eventListeners:
      click:
        handler: handleConditionalOverrideConditionClick
  conditionalOverrideDelete*:
    eventListeners:
      click:
        handler: handleConditionalOverrideConditionDeleteClick
  conditionalOverrideAddAttribute*:
    eventListeners:
      click:
        handler: handleConditionalOverrideAddAttributeClick
  conditionalOverrideAttribute*:
    eventListeners:
      click:
        handler: handleConditionalOverrideAttributeClick
  conditionalOverrideAttributeDelete*:
    eventListeners:
      click:
        handler: handleConditionalOverrideAttributeDeleteClick
  sectionAction*:
    eventListeners:
      click:
        handler: handleSectionActionClick
  systemActions:
    eventListeners:
      actions-change:
        handler: handleActionsChange
  listItem*:
    eventListeners:
      click:
        handler: handleListItemClick
      contextmenu:
        handler: handleListItemRightClick
  imageSelectorDialog:
    eventListeners:
      close:
        handler: handleImageSelectorCancel
  imageSelectorFileExplorer:
    eventListeners:
      item-click:
        handler: handleImageSelectorFileExplorerClickItem
  imageSelector:
    eventListeners:
      image-selected:
        handler: handleImageSelectorImageSelected
      image-dblclick:
        handler: handleImageSelectorImageDoubleClick
  confirmImageSelection:
    eventListeners:
      click:
        handler: handleImageSelectorSubmit
  cancelImageSelection:
    eventListeners:
      click:
        handler: handleImageSelectorCancel
  previewOverlay:
    eventListeners:
      click:
        handler: handlePreviewOverlayClick
  listBarItem*:
    eventListeners:
      click:
        handler: handleListBarItemClick
      contextmenu:
        handler: handleListBarItemRightClick
template:
  - $for section, i in config.sections:
      - $if i > 0:
          - rtgl-view h=1 w=f bgc=mu mv=lg: null
      - rtgl-view key=${section.viewKey} w=f g=md ph=md:
          - $if section.labelAction:
              - rtgl-view d=h w=f av=c:
                  - rtgl-text s=sm: ${section.label}
                  - rtgl-view w=1fg: null
                  - rtgl-button#sectionAction${i} data-id=${section.id} pre=${section.labelAction} sq s=sm v=gh: null
            $else:
              - rtgl-text s=sm: ${section.label}
          - $for item, j in section.items:
              - rtgl-view key=${item.viewKey} w=f:
                  - $if item.type == 'group':
                      - rtgl-view d=h w=f g=md av=c:
                          - $for field, k in item.fields:
                              - $if field.label:
                                  - rtgl-text s=sm w=60: ${field.label}
                              - rtgl-view#groupItem${i}x${j}x${k} data-name=${field.name} w=1fg d=h pv=sm ph=md bgc=mu br=md av=c g=md cur=pointer bw=xs bc=bg h-bc=ac h=28:
                                  - rtgl-view d=h av=c g=md w=1fg:
                                      - $if field.svg:
                                          - rtgl-svg svg=${field.svg} wh=16: null
                                      - rtgl-text s=xs: ${field.value}
                                  - $if field.metaValue:
                                      - rtgl-text s=xs c=mu-fg: ${field.metaValue}
                    $elif item.type == 'select':
                      - rtgl-view d=h av=c w=f:
                          - rtgl-text s=xs w=65: ${item.label}
                          - 'rtgl-view style="width: calc(100% - 65px);"':
                              - rtgl-select#selectItem${i}x${j} data-name=${item.name} w=f no-clear :selectedValue=${item.value} :options=${item.options}: null
                    $elif item.type == 'segmented-control':
                      - rtgl-view d=h av=c w=f:
                          - rtgl-text s=xs w=65: ${item.label}
                          - 'rtgl-view style="width: calc(100% - 65px);"':
                              - rtgl-segmented-control#selectItem${i}x${j} data-name=${item.name} w=f no-clear :selectedValue=${item.value} :options=${item.options}: null
                    $elif item.type == 'reveal-effect-select':
                      - rtgl-view d=h av=c w=f:
                          - rtgl-text s=xs w=65: ${item.label}
                          - 'rtgl-view style="width: calc(100% - 65px);"':
                              - rtgl-segmented-control#selectItem${i}x${j} data-name=${item.name} w=f no-clear :selectedValue=${revealEffectValue} :options=${revealEffectOptions}: null
                    $elif item.type == 'list-item':
                      - $for listItem, k in item.items:
                          - rtgl-view#listItem${i}x${j}x${k} key=${listItem.viewKey} data-id=${listItem.id} data-interaction=${listItem.interactionType} d=h w=f g=md av=c p=md br=md bw=xs h-bgc=mu cur=pointer:
                              - rtgl-svg svg=${listItem.svg} wh=16: null
                              - rtgl-text s=xs: ${listItem.label}
                    $elif item.type == 'list-bar':
                      - $for barItem, k in item.items:
                          - rtgl-view#listBarItem${i}x${j}x${k} key=${barItem.viewKey} data-name=${barItem.name} d=h w=f g=md av=c ph=md h-bgc=mu bw=xs br=md cur=pointer:
                              - rtgl-text s=xs: ${barItem.label}
                              - rtgl-view w=1fg: null
                              - $if barItem.imageId:
                                  - rvn-file-image imageId=${barItem.imageId} source="thumbnail" h=32: null
                                $else:
                                  - rtgl-view d=h av=c ah=c h=32 ph=sm bgc=mu br=sm:
                                      - rtgl-text s=xs c=mu: Not set
                    $elif item.type == 'spritesheet-preview':
                      - 'rvn-spritesheet-preview key=${item.previewKey} fileId=${item.fileId} :atlas=${item.atlas} :animation=${item.animation} h=180 emptyLabel="Select a spritesheet animation"': null
                    $elif item.type == 'popover-input':
                      - rtgl-view#groupItem${i}x${j} data-name=${item.name} d=h pv=sm ph=md bgc=mu br=md av=c g=md cur=pointer bw=xs bc=bg h-bc=ac h=32 w=1fg:
                          - rtgl-text s=sm: ${item.value}
                    $elif item.type == 'condition-summary':
                      - rtgl-view#conditionItem${i}x${j} data-name=${item.name} d=h pv=sm ph=md bgc=mu br=md av=c g=md cur=pointer bw=xs bc=bg h-bc=ac h=32 w=1fg:
                          - rtgl-text s=sm: ${item.value}
                    $elif item.type == 'conditional-override-list':
                      - $if item.items.length > 0:
                          - $for conditionalItem, k in item.items:
                              - rtgl-view key=${conditionalItem.viewKey} w=f g=sm p=md bgc=mu br=md bw=xs bc=bg:
                                  - rtgl-view d=h g=sm av=c w=f:
                                      - rtgl-view#conditionalOverrideCondition${i}x${j}x${k} data-index=${conditionalItem.index} w=1fg p=sm bgc=bg br=md bw=xs bc=bg h-bc=ac cur=pointer:
                                          - rtgl-text s=sm: ${conditionalItem.summary}
                                      - rtgl-button#conditionalOverrideDelete${i}x${j}x${k} data-index=${conditionalItem.index} variant=se s=sm: Delete
                                  - $if conditionalItem.attributeItems.length > 0:
                                      - $for attributeItem, m in conditionalItem.attributeItems:
                                          - rtgl-view key=${attributeItem.viewKey} d=h g=sm av=c w=f:
                                              - rtgl-view#conditionalOverrideAttribute${i}x${j}x${k}x${m} data-index=${conditionalItem.index} data-field-name=${attributeItem.fieldName} w=1fg p=sm bgc=bg br=md bw=xs bc=bg h-bc=ac cur=pointer:
                                                  - rtgl-text s=xs: ${attributeItem.summary}
                                              - rtgl-button#conditionalOverrideAttributeDelete${i}x${j}x${k}x${m} data-index=${conditionalItem.index} data-field-name=${attributeItem.fieldName} variant=se s=sm: Remove
                                    $else:
                                      - rtgl-text s=xs c=mu-fg: No attributes yet
                                  - rtgl-view d=h w=f ah=e:
                                      - rtgl-button#conditionalOverrideAddAttribute${i}x${j}x${k} data-index=${conditionalItem.index} pre=plus s=sm v=gh: Add Attribute
                    $elif item.type == 'pagination-summary':
                      - rtgl-view#paginationItem${i}x${j} data-name=${item.name} d=h pv=sm ph=md bgc=mu br=md av=c g=md cur=pointer bw=xs bc=bg h-bc=ac h=32 w=1fg:
                          - rtgl-text s=sm: ${item.value}
                    $elif item.type == 'child-interaction-list':
                      - rtgl-view d=h w=f wrap g=sm:
                          - $for childItem, k in item.items:
                              - rtgl-view#childInteractionItem${i}x${j}x${k} key=${childItem.viewKey} data-name=${childItem.name} d=h pv=sm ph=md bgc=mu br=md av=c g=md cur=context-menu bw=xs bc=bg h-bc=ac h=32:
                                  - rtgl-text s=sm: ${childItem.label}
  - rtgl-view h=1 w=f bgc=mu mv=lg: null
  - rvn-system-actions#systemActions :actions=${actionsData} actionType=system :hiddenModes=${hiddenSystemActionModes}: null
  - rtgl-popover#popoverForm ?open=${popover.open} place=b x=${popover.x} y=${popover.y}:
      - $if popover.open:
          - $if popover.context.isPositionPopover:
              - rtgl-view slot=content w=360:
                  - rtgl-form#form autofocus key=${popover.key} :form=${popover.form} :defaultValues=${popover.defaultValues} :context=${popover.context} w=f:
                      - rtgl-view slot="position-presets" d=h wrap g=sm:
                          - $for preset, i in popover.context.positionPresetItems:
                              - rtgl-button#popoverPreset${i} data-value=${preset.value} v=ol s=sm: ${preset.label}
            $else:
              - rtgl-form#form autofocus key=${popover.key} slot=content :form=${popover.form} :defaultValues=${popover.defaultValues} :context=${popover.context}: null
  - rtgl-dialog#visibilityConditionDialog ?open=${visibilityConditionDialog.open} s=md:
      - $if visibilityConditionDialog.open:
          - rtgl-view slot=content g=md:
              - rtgl-form#visibilityConditionForm key=${visibilityConditionDialog.key} :form=${visibilityConditionDialogForm} :defaultValues=${visibilityConditionDialogDefaults} :context=${visibilityConditionDialogContext} w=f: null
  - rtgl-dropdown-menu#dropdownMenu :items=${dropdownMenu.items} ?open=${dropdownMenu.isOpen} x=${dropdownMenu.x} y=${dropdownMenu.y}: null
  - rtgl-dialog#saveLoadPaginationDialog ?open=${saveLoadPaginationDialog.open} s=md:
      - $if saveLoadPaginationDialog.open:
          - rtgl-view slot=content g=md:
              - rtgl-form#saveLoadPaginationForm key=${saveLoadPaginationDialog.key} :form=${saveLoadPaginationDialogForm} :defaultValues=${saveLoadPaginationDialogDefaults} w=f: null
  - rtgl-dialog#childInteractionDialog ?open=${childInteractionDialog.open} s=md:
      - $if childInteractionDialog.open:
          - rtgl-view slot=content g=md:
              - rtgl-form#childInteractionForm key=${childInteractionDialog.key} :form=${childInteractionDialogForm} :defaultValues=${childInteractionDialogDefaults} w=f: null
  - rtgl-dialog#conditionalOverrideConditionDialog ?open=${conditionalOverrideConditionDialog.open} s=md:
      - $if conditionalOverrideConditionDialog.open:
          - rtgl-view slot=content g=md:
              - rtgl-form#conditionalOverrideConditionForm key=${conditionalOverrideConditionDialog.key} :form=${conditionalOverrideConditionForm} :defaultValues=${conditionalOverrideConditionDefaults} :context=${conditionalOverrideConditionDialogContext} w=f: null
  - rtgl-dialog#conditionalOverrideAttributeDialog ?open=${conditionalOverrideAttributeDialog.open} s=md:
      - $if conditionalOverrideAttributeDialog.open:
          - rtgl-view slot=content g=md:
              - rtgl-form#conditionalOverrideAttributeForm key=${conditionalOverrideAttributeDialog.key} :form=${conditionalOverrideAttributeForm} :defaultValues=${conditionalOverrideAttributeDefaults} :context=${conditionalOverrideAttributeDialogContext} w=f: null
  - rtgl-dialog#imageSelectorDialog ?open=${imageSelectorDialog.open} s=xl:
      - $if imageSelectorDialog.open:
          - rtgl-view slot=content d=v w=f g=md:
              - 'rtgl-view d=h w=f h=70vh g=lg style="min-width: 0; min-height: 0;"':
                  - 'rtgl-view w=300 h=f style="min-width: 0; min-height: 0;"':
                      - rvn-base-file-explorer#imageSelectorFileExplorer :items=${imageFolderItems} shrinkable: null
                  - 'rtgl-view w=1fg h=f style="min-width: 0; min-height: 0;"':
                      - rvn-image-selector#imageSelector selectedImageId=${tempSelectedImageId}: null
              - rtgl-view d=h g=sm w=f ah=e:
                  - rtgl-button#cancelImageSelection variant=se: Cancel
                  - rtgl-button#confirmImageSelection variant=pr: OK
  - $when: fullImagePreviewVisible
    rtgl-view#previewOverlay pos=fix edge=f z=3000 cur=pointer:
      - rtgl-view w=f h=f pos=fix edge=f bgc=bg: null
      - $if fullImagePreviewImageId:
          - rtgl-view pos=fix edge=f ah=c av=c z=3001:
              - rvn-file-image imageId=${fullImagePreviewImageId} w=80% h=80% bc=ac bw=xs br=md: null
