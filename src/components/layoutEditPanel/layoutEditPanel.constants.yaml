numberPopoverForm: &numberPopoverForm
  fields:
    - name: value
      type: input-number
  actions:
    buttons:
      - id: submit
        variant: pr
        label: Submit

opacityPopoverForm: &opacityPopoverForm
  fields:
    - name: value
      type: input-number
      min: 0
      max: 1
      step: 0.05
  actions:
    buttons:
      - id: submit
        variant: pr
        label: Submit

textPopoverForm: &textPopoverForm
  fields:
    - name: value
      type: input-text
  actions:
    buttons:
      - id: submit
        variant: pr
        label: Submit

layoutSections:
  - "$when": "!isInsideDirectedContainer"
    label: Position
    items:
      - type: group
        fields:
          - type: clickable-value
            svg: x
            name: x
            value: "${values.x}"
            popoverForm: *numberPopoverForm
          - type: clickable-value
            svg: y
            name: y
            value: "${values.y}"
            popoverForm: *numberPopoverForm
  - "$when": "showLayoutSizeSection"
    label: Layout
    items:
      - "$when": "supportsWidthMode"
        type: segmented-control
        label: Width
        name: widthMode
        value: "${widthMode}"
        options:
          - label: Auto
            value: auto
          - label: Fixed
            value: fixed
      - "$when": "supportsHeightMode"
        type: segmented-control
        label: Height
        name: heightMode
        value: "${heightMode}"
        options:
          - label: Auto
            value: auto
          - label: Fixed
            value: fixed
      - "$when": "showWidthField || showHeightField"
        type: group
        fields:
          - "$when": "showWidthField"
            type: clickable-value
            svg: w
            name: width
            value: "${values.width}"
            popoverForm: *numberPopoverForm
          - "$when": "showHeightField"
            type: clickable-value
            svg: h
            name: height
            value: "${values.height}"
            popoverForm: *numberPopoverForm
      - "$when": "showAspectRatioMode"
        type: segmented-control
        label: Ratio
        name: aspectRatioMode
        value: "${values.aspectRatioMode}"
        options:
          - label: Free
            value: free
          - label: Fixed
            value: fixed
  - label: Appearance
    items:
      - type: group
        fields:
          - type: clickable-value
            label: Opacity
            name: opacity
            value: "${values.opacity}"
            popoverForm: *opacityPopoverForm
      - "$when": "supportsAnchor"
        type: select
        label: Anchor
        name: anchor
        value: "${values.anchor}"
        options:
          - label: Top Left
            value:
              x: 0
              y: 0
          - label: Top Center
            value:
              x: 0.5
              y: 0
          - label: Top Right
            value:
              x: 1
              y: 0
          - label: Center Left
            value:
              x: 0
              y: 0.5
          - label: Center
            value:
              x: 0.5
              y: 0.5
          - label: Center Right
            value:
              x: 1
              y: 0.5
          - label: Bottom Left
            value:
              x: 0
              y: 1
          - label: Bottom Center
            value:
              x: 0.5
              y: 1
          - label: Bottom Right
            value:
              x: 1
              y: 1
  - "$when": "supportsDirection"
    label: Direction
    items:
      - type: segmented-control
        label: Direction
        name: direction
        value: "${values.direction}"
        options:
          - label: Absolute
            value: absolute
          - label: Horizontal
            value: horizontal
          - label: Vertical
            value: vertical
      - "$when": "showsGapField"
        type: group
        fields:
          - type: clickable-value
            label: Gap X
            name: gapX
            value: "${values.gapX}"
            popoverForm: *numberPopoverForm
          - type: clickable-value
            label: Gap Y
            name: gapY
            value: "${values.gapY}"
            popoverForm: *numberPopoverForm
  - "$when": "supportsScroll"
    label: Scroll
    items:
      - type: segmented-control
        label: Scroll
        name: scroll
        value: "${values.scroll}"
        options:
          - label: Disabled
            value: false
          - label: Enabled
            value: true
  - "$when": "supportsChildInteractionInheritance"
    id: childInteraction
    label: Child Interaction
    "$if canAddChildInteractionInheritance":
      labelAction: plus
    items:
      - "$when": "hasChildInteractionInheritance"
        type: child-interaction-list
        name: childInteraction
        items: "${childInteractionItems}"
  - "$when": "supportsSpritesheetAnimation"
    id: spritesheet
    label: Spritesheet
    items:
      - type: spritesheet-preview
        key: "${selectedSpritesheetPreviewKey}"
        fileId: "${selectedSpritesheetFileId}"
        atlas: "${selectedSpritesheetAtlas}"
        animation: "${selectedSpritesheetAnimation}"
      - type: select
        label: Animation
        name: spritesheetSelection
        value: "${spritesheetSelectionValue}"
        options: "${spritesheetSelectionItems}"
  - "$when": "supportsParticleSelection"
    id: particle
    label: Particle
    items:
      - type: select
        label: Effect
        name: particleId
        value: "${values.particleId}"
        options: "${particleSelectionItems}"
  - "$when": "supportsSpriteImages"
    id: images
    label: Image
    "$if canAddSpriteImageVariant":
      labelAction: plus
    items:
      - type: list-bar
        items:
          - "$when": "values.imageId"
            name: imageId
            label: Default
            imageId: "${values.imageId}"
          - "$when": "values.hoverImageId"
            name: hoverImageId
            label: Hover
            imageId: "${values.hoverImageId}"
          - "$when": "values.clickImageId"
            name: clickImageId
            label: Click
            imageId: "${values.clickImageId}"
  - "$when": "supportsSliderImages"
    id: slider-images
    label: Slider Bar
    items:
      - type: list-bar
        items:
          - name: barImageId
            label: Default
            imageId: "${values.barImageId}"
          - name: hoverBarImageId
            label: Hover
            imageId: "${values.hoverBarImageId}"
  - "$when": "supportsSliderImages"
    id: slider-thumb
    label: Slider Thumb
    items:
      - type: list-bar
        items:
          - name: thumbImageId
            label: Default
            imageId: "${values.thumbImageId}"
          - name: hoverThumbImageId
            label: Hover
            imageId: "${values.hoverThumbImageId}"
  - "$when": "supportsSliderValues"
    label: Slider Values
    items:
      - type: select
        label: Value
        name: sliderRuntimeValueId
        value: "${values.sliderRuntimeValueId}"
        options: "${sliderValueOptions}"
      - "$when": "!values.sliderRuntimeValueId"
        type: group
        fields:
          - type: clickable-value
            label: Initial
            name: sliderManualInitialValue
            value: "${values.sliderManualInitialValue}"
            popoverForm: *numberPopoverForm
      - type: group
        fields:
          - type: clickable-value
            label: Min
            name: min
            value: "${values.min}"
            popoverForm: *numberPopoverForm
          - type: clickable-value
            label: Max
            name: max
            value: "${values.max}"
            popoverForm: *numberPopoverForm
      - type: group
        fields:
          - type: clickable-value
            label: Step
            name: step
            value: "${values.step}"
            popoverForm: *numberPopoverForm
  - "$when": "supportsTextEditing"
    label: Text
    items:
      - type: group
        fields:
          - type: clickable-value
            name: text
            value: "${values.text}"
            popoverForm: *textPopoverForm
  - "$when": "supportsTextRevealEffect"
    label: Revealing
    items:
      - type: reveal-effect-select
        label: Effect
        name: revealEffect
        value: "${values.revealEffect}"
  - "$when": "supportsTextStyles"
    id: textStyles
    label: Text Styles
    "$if canAddTextStyleVariant":
      labelAction: plus
    items:
      - type: select
        label: Default
        name: textStyleId
        value: "${values.textStyleId}"
        options: "${textStyleItems}"
      - "$when": "values.hoverTextStyleId"
        type: select
        label: Hover
        name: hoverTextStyleId
        value: "${values.hoverTextStyleId}"
        options: "${textStyleItemsWithNone}"
      - "$when": "values.clickTextStyleId"
        type: select
        label: Clicked
        name: clickTextStyleId
        value: "${values.clickTextStyleId}"
        options: "${textStyleItemsWithNone}"
  - "$when": "supportsTextAlignment"
    label: Text Alignment
    items:
      - type: segmented-control
        label: Alignment
        name: textStyle.align
        value: "${values.textStyle.align}"
        options:
          - label: Left
            value: left
          - label: Center
            value: center
          - label: Right
            value: right
  - id: visibilityCondition
    label: Visibility
    labelAction: plus
    items:
      - "$when": "hasVisibilityCondition"
        type: condition-summary
        name: visibilityCondition
        value: "${visibilityConditionSummary}"
  - "$when": 'itemType == "fragment-ref"'
    label: Fragment
    items:
      - type: select
        label: Fragment
        name: fragmentLayoutId
        value: "${values.fragmentLayoutId}"
        options: "${fragmentLayoutOptions}"
  - "$when": 'itemType == "container-ref-save-load-slot"'
    label: Pagination
    items:
      - type: pagination-summary
        name: pagination
        value: "${paginationSummary}"
  - "$when": "supportsActions"
    id: actions
    label: Actions
    labelAction: plus
    items:
      - type: list-item
        items: "${values.actions}"
  - "$when": "supportsTextStyles || supportsSpriteImages"
    id: conditionalOverrides
    label: Conditional
    labelAction: plus
    items:
      - type: conditional-override-list
        items: "${conditionalOverrideItems}"

controlSections:
  - "$when": "!isInsideDirectedContainer"
    label: Position
    items:
      - type: group
        fields:
          - type: clickable-value
            svg: x
            name: x
            value: "${values.x}"
            popoverForm: *numberPopoverForm
          - type: clickable-value
            svg: y
            name: y
            value: "${values.y}"
            popoverForm: *numberPopoverForm
  - label: Layout
    items:
      - "$when": "supportsWidthMode"
        type: segmented-control
        label: Width
        name: widthMode
        value: "${widthMode}"
        options:
          - label: Auto
            value: auto
          - label: Fixed
            value: fixed
      - type: group
        fields:
          - "$when": '!supportsWidthMode || widthMode == "fixed"'
            type: clickable-value
            svg: w
            name: width
            value: "${values.width}"
            popoverForm: *numberPopoverForm
          - type: clickable-value
            svg: h
            name: height
            value: "${values.height}"
            popoverForm: *numberPopoverForm
  - label: Appearance
    items:
      - type: group
        fields:
          - type: clickable-value
            label: Opacity
            name: opacity
            value: "${values.opacity}"
            popoverForm: *opacityPopoverForm
  - id: visibilityCondition
    label: Visibility
    labelAction: plus
    items:
      - "$when": "hasVisibilityCondition"
        type: condition-summary
        name: visibilityCondition
        value: "${visibilityConditionSummary}"
  - "$when": "supportsActions"
    id: actions
    label: Actions
    labelAction: plus
    items:
      - type: list-item
        items: "${values.actions}"
