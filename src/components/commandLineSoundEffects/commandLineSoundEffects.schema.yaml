componentName: rvn-command-line-sound-effects
propsSchema:
  type: object
  properties:
    sfx:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              resourceId:
                type: string
              loop:
                type: boolean
              volume:
                type: number
              muted:
                type: boolean
              pan:
                type: number
              startDelayMs:
                type: number
              playbackRate:
                type: number
              startAt:
                type: number
              endAt:
                type: [number, "null"]
        channels:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              volume:
                type: number
              muted:
                type: boolean
              pan:
                type: number
              interruption:
                type: string
                enum: [immediate, loopEnd]
              sounds:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    resourceId:
                      type: string
                    loop:
                      type: boolean
                    volume:
                      type: number
                    muted:
                      type: boolean
                    pan:
                      type: number
                    startDelayMs:
                      type: number
                    playbackRate:
                      type: number
                    startAt:
                      type: number
                    endAt:
                      type: [number, "null"]
