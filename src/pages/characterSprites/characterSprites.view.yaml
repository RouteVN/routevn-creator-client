      close:
        handler: handleSpritesheetDialogClose
  spritesheetDialogForm:
    eventListeners:
      form-action:
        handler: handleSpritesheetDialogFormAction
      form-change:
        handler: handleSpritesheetDialogFormChange
      add-option-click:
        handler: handleSpritesheetDialogFormAddOptionClick
  spritesheetDialogImageSourceButton:
    eventListeners:
      click:
        handler: handleSpritesheetDialogImageSourceClick
  spritesheetDialogAtlasSourceButton:
    eventListeners:
      click:
