    eventListeners:
      close:
        handler: handleClipFpsDialogClose
  clipFpsForm:
    eventListeners:
      form-action:
        handler: handleClipFpsFormAction
styles:
  ".imagePreviewEdge":
    position: absolute
    top: "0"
    bottom: "0"
    width: 28%
    min-width: 72px
    z-index: "1"
    opacity: "0"
    transition: opacity 140ms ease
    cursor: pointer
  ".imagePreviewEdge:hover":
    opacity: "1"
  ".imagePreviewEdgePrevious":
    left: "0"
    background: linear-gradient(to right, rgba(0, 0, 0, 0.62), rgba(0, 0, 0, 0))
  ".imagePreviewEdgeNext":
    right: "0"
    background: linear-gradient(to left, rgba(0, 0, 0, 0.62), rgba(0, 0, 0, 0))
  ".imagePreviewTransparencyGrid":
    background-color: "#eef2f7"
    background-image: 'linear-gradient(45deg, #94a3b8 25%, transparent 25%), linear-gradient(-45deg, #94a3b8 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #94a3b8 75%), linear-gradient(-45deg, transparent 75%, #94a3b8 75%)'
    background-position: "0 0, 0 12px, 12px -12px, -12px 0"
    background-repeat: repeat
    background-size: 24px 24px
  ".imagePreviewFrame":
    position: relative
    box-shadow: 0 0 0 1px var(--border)
    overflow: hidden
    cursor: default
  ".imageDetailPreviewFrame":
    display: block
    width: 100%
    aspect-ratio: 16 / 9
    box-shadow: 0 0 0 1px var(--border)
    border-radius: 6px
    overflow: hidden
    cursor: pointer
template:
  - 'rtgl-view d=h w=f h=f style="min-width: 0; min-height: 0;"':
      - 'rtgl-view d=h h=f w=f style="min-width: 0; min-height: 0;"':
          - $if showExplorerPanel:
              - rvn-resizable-panel#fileExplorerPanel w=300 min-w=200 max-w=500 resize-side="right":
                  - rtgl-view slot="content" w=f h=f:
                      - rvn-resource-types :resourceCategory=${resourceCategory} :selectedResourceId=${selectedResourceId}: null
                      - rvn-base-file-explorer#fileExplorer :items=${flatItems} shrinkable dropdown-menu allowDrag start-collapsed=${startCollapsedFileExplorer} :folderContextMenuItems=${folderContextMenuItems} :itemContextMenuItems=${itemContextMenuItems} :emptyContextMenuItems=${emptyContextMenuItems}: null
          - 'rtgl-view w=1fg h=f pl=${contentLeftPadding} pos=rel style="min-width: 0; min-height: 0;"':
              - 'rtgl-view pos=abs h=1 bgc=bo style="left: 0; right: 0; top: 47px; z-index: 1001; pointer-events: none;"': null
              - 'div#fileExplorerKeyboardScope tabindex=-1 style="width: 100%; height: 100%; min-width: 0; min-height: 0; outline: none;"':
                  - $if showMobileTopTabs:
                      - 'rvn-media-resources-view#groupview w=f h=f show-back-button show-menu-button menu-button-placement=trailing show-zoom-controls zoom-in-popover zoom-control-mode=columns default-items-per-row=2 items-per-row-config-key="groupCharacterSpritesView.itemsPerRow" show-search=false search-in-filter-popover show-tag-filter progressive-render progressive-hydration-delay-frame-count=4 lazy-image-cards image-card-aspect-ratio="16 / 9" :mobileLayout=${mobileLayout} :navTitle=${title} :groups=${mediaGroups} :selectedItemId=${selectedItemId} :selectedFolderId=${selectedFolderId} :searchQuery=${searchQuery} :tagFilterOptions=${tagFilterOptions} :selectedTagFilterValues=${selectedTagFilterValues} :tagFilterPlaceholder=${tagFilterPlaceholder} :uploadText=${uploadText} :acceptedFileTypes=${acceptedFileTypes} :imageHeight=${imageHeight} :maxWidth=${maxWidth} :itemContextMenuItems=${centerItemContextMenuItems}': null
                    $else:
                      - 'rvn-media-resources-view#groupview w=f h=f show-back-button show-zoom-controls zoom-control-mode=columns default-items-per-row=6 items-per-row-config-key="groupCharacterSpritesView.itemsPerRow" search-in-filter-popover show-tag-filter progressive-render progressive-hydration-delay-frame-count=4 lazy-image-cards image-card-aspect-ratio="16 / 9" :navTitle=${title} :groups=${mediaGroups} :selectedItemId=${selectedItemId} :selectedFolderId=${selectedFolderId} :searchQuery=${searchQuery} :tagFilterOptions=${tagFilterOptions} :selectedTagFilterValues=${selectedTagFilterValues} :tagFilterPlaceholder=${tagFilterPlaceholder} :uploadText=${uploadText} :acceptedFileTypes=${acceptedFileTypes} :imageHeight=${imageHeight} :maxWidth=${maxWidth} :itemContextMenuItems=${centerItemContextMenuItems}': null
          - $if showDetailPanel:
              - rvn-resizable-panel panel-type=detail-panel w=270 min-w=200 max-w=500 resize-side="left":
                  - rtgl-view wh=f slot="content":
                      - 'div#fileExplorerDetailKeyboardScope tabindex=-1 style="width: 100%; height: 100%; min-width: 0; min-height: 0; outline: none;"':
                          - $if selectedDetailId:
                              - rtgl-view d=v w=f h=f:
                                  - rtgl-view#detailHeader h=48 w=f d=h bgc=bg bwb=xs ph=md av=c g=sm cur=pointer:
                                      - rtgl-text w=1fg ellipsis=true: ${selectedDetailName}
                                      - rtgl-svg svg=edit wh=16: null
                                  - rvn-detail-view#detailView key=${selectedDetailId} w=f h=1fg :fields=${detailFields}:
                                      - $if selectedItemId:
                                          - $if selectedItemType == 'image':
                                              - $if selectedPreviewFileId:
                                                  - 'div#detailImage.imageDetailPreviewFrame.imagePreviewTransparencyGrid slot="image-file-id"':
                                                      - rvn-file-image fileId=${selectedPreviewFileId} w=f h=f: null
                                          - $if selectedItemType == 'spritesheet':
                                              - 'rvn-spritesheet-preview slot="spritesheet-preview" key=${detailPreviewKey} fileId=${detailPreviewFileId} :atlas=${detailPreviewAtlas} :animation=${detailPreviewAnimation} :paused=${detailPreviewPaused} h=220 :emptyLabel=${emptyPreviewLabel}': null
                                          - rtgl-tag-select#detailTagSelect key=${selectedItemId} slot="sprite-tags" w=f :options=${tagFilterOptions} :selectedValues=${selectedItemTagIds} :draftSelectedValues=${detailTagDraftValues} :open=${isDetailTagSelectOpen} :addOption=${detailTagAddOption} :placeholder=${addTagPlaceholder}: null
                                          - 'rtgl-view slot="sprite-groups" d=v w=f g=sm':
                                              - $if selectedItemSpriteGroups.length > 0:
                                                  - $for spriteGroup, i in selectedItemSpriteGroups:
                                                      - rtgl-view d=v w=f g=xs p=md bw=xs bc=bo br=md:
                                                          - rtgl-text s=sm: ${spriteGroup.name}
                                                          - $if spriteGroup.tagSummary:
                                                              - rtgl-text s=xs c=mu-fg: ${spriteGroup.tagSummary}
                                                $else:
                                                  - rtgl-text s=xs c=mu-fg: ${noSpriteGroups}
                                          - $if selectedItemType == 'spritesheet':
                                              - 'rtgl-view slot="spritesheet-animations" d=v w=f g=sm':
                                                  - rtgl-text s=sm c=mu-fg: ${animationsLabel}
                                                  - $if detailClipOptions.length > 0:
                                                      - $for clip, clipIndex in detailClipOptions:
                                                          - 'rtgl-view#detailClipButton${clipIndex} data-clip-name=${clip.name} d=v w=f g=xs p=sm bw=xs bc=${clip.borderColor} br=md bgc=${clip.backgroundColor} h-bgc=mu cur=pointer':
                                                              - rtgl-view d=h w=f av=c g=sm:
                                                                  - rtgl-text w=1fg s=sm: ${clip.name}
                                                                  - rtgl-text s=xs c=mu-fg: ${clip.loopLabel}
                                                              - rtgl-text s=xs c=mu-fg: ${clip.summaryLabel}
                                                    $else:
                                                      - rtgl-view w=f p=sm bgc=mu br=md:
                                                          - rtgl-text s=xs c=mu-fg: ${noAnimationsFound}
                            $else:
                              - rtgl-view wh=f av=c ah=c bgc=mu-fg:
                                  - rtgl-text s=md c=mu-fg: ${noSelectionLabel}
  - $if showMobileFileExplorer:
      - 'rtgl-view pos=fix edge=f z=1250 bgc=bg d=v style="min-width: 0; min-height: 0; padding-top: var(--rvn-mobile-overlay-top-inset, 0px); padding-bottom: env(safe-area-inset-bottom); box-sizing: border-box;"':
          - rtgl-view h=48 w=f d=h av=c ph=md bgc=bg bwb=xs g=md:
              - rtgl-text w=1fg s=md: ${filesLabel}
              - rtgl-button#mobileFileExplorerClose sq pre=x v=ol: null
          - 'rtgl-view w=f h=1fg style="min-height: 0;"':
              - rvn-base-file-explorer#fileExplorer :items=${flatItems} shrinkable dropdown-menu allowDrag start-collapsed=${startCollapsedFileExplorer} :folderContextMenuItems=${folderContextMenuItems} :itemContextMenuItems=${itemContextMenuItems} :emptyContextMenuItems=${emptyContextMenuItems}: null
  - $if showMobileDetailSheet:
      - rvn-mobile-sheet#mobileDetailSheet ?open=${showMobileDetailSheet}:
          - rtgl-view slot=content d=v w=f h=f:
              - rtgl-view#detailHeader h=36 w=f d=h bgc=bg bwb=xs ph=md av=c g=sm cur=pointer:
                  - rtgl-text w=1fg ellipsis=true: ${selectedItemName}
                  - rtgl-svg svg=edit wh=16: null
              - rtgl-view d=h w=f g=sm p=md bgc=su bwb=xs:
                  - rtgl-button#mobileDetailPreviewButton w=1fg v=se pre=zoomIn: ${previewButton}
                  - rtgl-button#mobileDetailDeleteButton w=1fg v=se pre=trash: ${deleteButton}
              - 'rtgl-view w=f h=1fg sv style="min-height: 0;"':
                  - rvn-detail-view#mobileDetailView key=${selectedItemId} w=f :fields=${mobileDetailFields} :fillHeight=${mobileDetailFillHeight}:
                      - rtgl-tag-select#detailTagSelect key=${selectedItemId} slot="sprite-tags" w=f :options=${tagFilterOptions} :selectedValues=${selectedItemTagIds} :draftSelectedValues=${detailTagDraftValues} :open=${isDetailTagSelectOpen} :addOption=${detailTagAddOption} :placeholder=${addTagPlaceholder}: null
  - rtgl-dialog#editDialog ?open=${isEditDialogOpen} s=md:
      - rtgl-view slot=content g=md:
          - rtgl-form#editForm key=${isEditDialogOpen} :defaultValues=${editDefaultValues} :form=${editForm} w=f:
              - $if editPreviewFileId:
                  - rtgl-view slot=image-slot av=c ah=c:
                      - rvn-file-image#editDialogImage fileId=${editPreviewFileId} h=120 bw=xs bc=bo br=md cur=pointer key=${editPreviewFileId}: null
                $else:
                  - rtgl-view slot=image-slot av=c ah=c:
                      - rtgl-view#editDialogImagePlaceholder w=120 h=120 av=c ah=c bgc=bg bc=bo bw=xs br=md cur=pointer:
                          - rtgl-text c=mu-fg s=sm: ${clickToUploadLabel}
  - rtgl-dialog#folderNameDialog ?open=${isFolderNameDialogOpen} s=sm:
      - rtgl-form#folderNameForm key=${folderNameDialogItemId} slot=content :defaultValues=${folderNameDialogDefaultValues} :form=${folderNameForm} w=f: null
  - rtgl-dialog#spritesheetDialog ?open=${isSpritesheetDialogOpen} s=lg:
      - $if isSpritesheetDialogPreviewMode:
          - 'rtgl-view slot="content" d=v w=f g=lg style="min-width: min(960px, 100vw - 64px);"':
              - 'rvn-spritesheet-preview key=${spritesheetDialogPreviewKey} src=${spritesheetDialogPreviewUrl} fileId=${spritesheetDialogPreviewFileId} :atlas=${spritesheetDialogPreviewAtlas} :animation=${spritesheetDialogPreviewAnimation} h=320 :emptyLabel=${emptyPreviewLabel}': null
              - rtgl-view d=v w=f g=sm:
                  - rtgl-text s=sm c=mu-fg: ${clipsLabel}
                  - $if spritesheetDialogClipOptions.length > 0:
                      - $for clip, clipIndex in spritesheetDialogClipOptions:
                          - 'rtgl-view#spritesheetDialogClipButton${clipIndex} data-clip-name=${clip.name} d=v w=f g=xs p=sm bw=xs bc=${clip.borderColor} br=md bgc=${clip.backgroundColor} h-bgc=mu cur=pointer':
                              - rtgl-view d=h w=f av=c g=sm:
                                  - rtgl-text w=1fg s=sm: ${clip.name}
                                  - rtgl-text s=xs c=mu-fg: ${clip.loopLabel}
                              - rtgl-text s=xs c=mu-fg: ${clip.summaryLabel}
                    $else:
                      - rtgl-view w=f p=sm bgc=mu br=md:
                          - rtgl-text s=xs c=mu-fg: ${noAnimationsFound}
        $else:
          - 'rtgl-view slot="content" d=h lg-d=v w=f g=lg style="min-width: min(960px, 100vw - 64px);"':
              - rtgl-view w=5fg lg-w=f d=v g=md:
                  - rtgl-view d=v g=xs:
                      - rtgl-text s=sm: ${spritesheetDialogTitle}
                      - rtgl-text s=xs c=mu-fg: ${dialogInstructions}
                  - rtgl-form#spritesheetDialogForm key=${spritesheetDialogFormKey} :defaultValues=${spritesheetDialogValues} :form=${spritesheetDialogForm} w=f:
                      - rtgl-view slot=spritesheet-image-source d=v g=xs:
                          - rtgl-view w=120 h=120 av=c ah=c:
                              - $if spritesheetDialogImageSourcePreviewUrl:
                                  - rtgl-image#spritesheetDialogImageSourceButton src=${spritesheetDialogImageSourcePreviewUrl} w=120 h=120 of=con bw=xs bc=bo br=md cur=pointer: null
                                $elif spritesheetDialogImageSourceFileId:
                                  - rvn-file-image#spritesheetDialogImageSourceButton fileId=${spritesheetDialogImageSourceFileId} w=120 h=120 bw=xs bc=bo br=md cur=pointer: null
                                $else:
                                  - rtgl-view#spritesheetDialogImageSourceButton w=120 h=120 av=c ah=c bgc=bg bc=bo bw=xs br=md cur=pointer:
                                      - rtgl-text c=mu-fg s=sm ta=c: ${clickToUploadLabel}
                      - rtgl-view slot=spritesheet-atlas-source d=v g=xs:
                          - rtgl-view d=h g=sm av=c:
                              - rtgl-input w=f :value=${spritesheetDialogAtlasFieldValue} disabled=true placeholder=${spritesheetDialogAtlasFieldPlaceholder}: null
                              - rtgl-button#spritesheetDialogAtlasSourceButton variant=se size=sm pre=upload: ${spritesheetDialogAtlasSourceLabel}
              - rtgl-view w=6fg lg-w=f d=v g=md:
                  - 'rvn-spritesheet-preview key=${spritesheetDialogPreviewKey} src=${spritesheetDialogPreviewUrl} fileId=${spritesheetDialogPreviewFileId} :atlas=${spritesheetDialogPreviewAtlas} :animation=${spritesheetDialogPreviewAnimation} h=260 emptyLabel=""': null
                  - rtgl-view d=v w=f g=sm:
                      - rtgl-text s=sm c=mu-fg: ${clipsLabel}
                      - $if spritesheetDialogClipOptions.length > 0:
                          - $for clip, clipIndex in spritesheetDialogClipOptions:
                              - 'rtgl-view#spritesheetDialogClipButton${clipIndex} data-clip-name=${clip.name} d=v w=f g=xs p=sm bw=xs bc=${clip.borderColor} br=md bgc=${clip.backgroundColor} h-bgc=mu cur=pointer':
                                  - rtgl-view d=h w=f av=c g=sm:
                                      - rtgl-text w=1fg s=sm: ${clip.name}
                                      - rtgl-text s=xs c=mu-fg: ${clip.loopLabel}
                                  - rtgl-text s=xs c=mu-fg: ${clip.summaryLabel}
                        $else:
                          - rtgl-view w=f p=sm bgc=mu br=md:
                              - rtgl-text s=xs c=mu-fg: ${selectValidJsonToDetectClips}
  - rtgl-dialog#clipFpsDialog ?open=${isClipFpsDialogOpen} s=sm:
      - rtgl-form#clipFpsForm key=${clipFpsDialogKey} slot=content :defaultValues=${clipFpsDialogValues} :form=${clipFpsForm} w=f: null
  - rtgl-dialog#createTagDialog ?open=${isCreateTagDialogOpen} s=sm:
      - rtgl-form#createTagForm key=${isCreateTagDialogOpen} slot=content :defaultValues=${createTagDefaultValues} :form=${createTagForm} w=f: null
  - $when: fullImagePreviewVisible
    'div#previewOverlay tabindex=0 style="position: fixed; inset: 0; z-index: 3000; cursor: default; outline: none; background-color: rgba(0, 0, 0, 0.9);"':
      - $if fullImagePreviewFileId:
          - 'rtgl-view pos=fix z=3002 d=h g=xs bgc=bg bw=xs bc=bo br=md p=xs style="top: 8px; left: 50%; transform: translateX(-50%); box-shadow: 0 8px 24px rgba(15, 23, 42, 0.18);"':
              - 'rtgl-button#previewCanvasModeButton sq pre=canvas-scale v=${fullImagePreviewCanvasModeButton.variant} aria-label="${fullImagePreviewCanvasModeLabel}" aria-pressed="${fullImagePreviewCanvasModeButton.selected}" title="${fullImagePreviewCanvasModeLabel}"': null
              - 'rtgl-button#previewFitModeButton sq pre=fit-to-frame v=${fullImagePreviewFitModeButton.variant} aria-label="${fullImagePreviewFitModeLabel}" aria-pressed="${fullImagePreviewFitModeButton.selected}" title="${fullImagePreviewFitModeLabel}"': null
          - rtgl-view pos=fix edge=f ah=c av=c z=3001:
              - 'div#previewImageFrame.imagePreviewFrame.imagePreviewTransparencyGrid style="${fullImagePreviewFrameStyle}"':
                  - 'div style="${fullImagePreviewImageWrapperStyle}"':
                      - rvn-file-image fileId=${fullImagePreviewFileId} w=f h=f: null
                  - $if fullImagePreviewPreviousVisible:
                      - div#previewPrevious.imagePreviewEdge.imagePreviewEdgePrevious role=button aria-label="${fullImagePreviewPreviousLabel}": null
                  - $if fullImagePreviewNextVisible:
                      - div#previewNext.imagePreviewEdge.imagePreviewEdgeNext role=button aria-label="${fullImagePreviewNextLabel}": null
