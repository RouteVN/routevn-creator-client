refs:
  fileExplorer:
    eventListeners:
      file-action:
        handler: handleFileExplorerAction
      target-changed:
        required: true
        handler: handleFileExplorerTargetChanged
      item-click:
        handler: handleFileExplorerItemClick
  groupview:
    eventListeners:
      layout-add-click:
        handler: handleAddLayoutClick
  layoutEditorPreview:
    eventListeners:
      preview-data-change:
        handler: handleLayoutEditorPreviewDataChange
      play:
        handler: handleLayoutEditorPreviewPlay
  backButton:
    eventListeners:
      click:
        handler: handleBackClick
  saveButton:
    eventListeners:
      click:
        handler: handleSaveButtonClick
  nodeButton:
    eventListeners:
      click:
        handler: handleNodeButtonClick
  previewButton:
    eventListeners:
      click:
        handler: handlePreviewButtonClick
  mobileFileExplorerClose:
    eventListeners:
      click:
        handler: handleMobileFileExplorerClose
  layoutEditPanel:
    eventListeners:
      update:
        handler: handleLayoutEditPanelUpdateHandler
  layoutEditorCanvas:
    eventListeners:
      selected-element-metrics-change:
        handler: handleLayoutEditorCanvasMetricsChange
      drag-update:
        handler: handleLayoutEditorCanvasDragUpdate
      update:
        handler: handleLayoutEditorCanvasUpdate
template:
  - 'rtgl-view d=h w=f h=f style="min-width: 0; min-height: 0;"':
      - $if showExplorerPanel:
          - 'rtgl-view d=h h=f style="min-width: 0; min-height: 0;"':
              - rvn-resizable-panel w=300 min-w=200 max-w=500 resize-side="right":
                  - rtgl-view slot="content" w=f h=f:
                      - rvn-resource-types :resourceCategory=${resourceCategory} :selectedResourceId=${selectedResourceId}: null
                      - rvn-base-file-explorer#fileExplorer :items=${flatItems} shrinkable dropdown-menu allowDrag :contextMenuItems=${contextMenuItems} :emptyContextMenuItems=${emptyContextMenuItems}: null
      - 'rtgl-view w=1fg h=f style="min-width: 0; min-height: 0;"':
          - rtgl-view h=48 bwb=xs bc=bo d=h av=c w=f ph=md:
              - rtgl-button#backButton sq pre=chevronLeft v=ol mr=sm: null
              - 'rtgl-view w=1fg style="min-width: 0;"':
                  - rtgl-text w=f ellipsis=true: ${layout.name}
              - $if showMobileNodeButton:
                  - rtgl-button#nodeButton ml=sm v=se: ${nodeButtonLabel}
              - $if showMobilePreviewButton:
                  - rtgl-button#previewButton ml=sm v=se: ${previewTitle}
              - $if showTopSavePreviewButton:
                  - rtgl-button#saveButton ml=sm: ${savePreviewButton}
          - 'rtgl-view d=v h=1fg w=f style="min-height: 0;"':
              - 'rtgl-view w=f style="min-width: 0;"':
                  - 'div style="position: relative; width: ${layoutEditorCanvasMaxWidth}; max-width: 100%; margin-left: auto; margin-right: auto;"':
                      - 'rvn-layout-editor-canvas#layoutEditorCanvas style="display: block; width: 100%;" :resolution=${projectResolution} :layoutState=${layoutState} selectedItemId=${selectedItemId} :previewData=${previewData} :disableMoveDrag=${selectedItemIsInsideDirectedContainer}': null
              - 'rtgl-view h=1fg w=f sv style="min-height: 0; ${previewPanelVisibilityStyle}"':
                  - $if showMobilePreviewHeader:
                      - 'rtgl-view h=48 w=f d=h bgc=bg bwb=xs ph=md av=c style="position: sticky; top: 0px; z-index: 1000;"':
                          - rtgl-text w=1fg s=md ellipsis=true: ${previewTitle}
                          - rtgl-button#saveButton ml=sm v=se: ${savePreviewButton}
                  - $if isPreviewMounted:
                      - rvn-layout-editor-preview#layoutEditorPreview :layoutState=${layoutState} :initialPreviewData=${previewHydrationData} :charactersData=${charactersData}: null
                    $else:
                      - rtgl-view wh=f av=c ah=c bgc=mu-fg:
                          - rtgl-text s=sm c=mu-fg: ${loadingPreviewLabel}
                  - 'rtgl-view w=f h=32vh style="flex-shrink: 0;"': null
              - $if showMobileSelectedNodeDetail:
                  - 'rtgl-view d=v h=1fg w=f style="min-height: 0;"':
                      - rtgl-view h=48 w=f d=h bgc=bg bwb=xs ph=md av=c:
                          - 'rtgl-view d=h av=c w=1fg g=xs style="min-width: 0;"':
                              - rtgl-text w=1fg ellipsis=true: ${item.name}
                              - rtgl-text s=xs c=mu-fg: ${item.type}
                      - 'rtgl-view w=f h=1fg sv pv=md style="min-height: 0;"':
                          - rvn-layout-edit-panel#layoutEditPanel layout-type=${layout.layoutType} resource-type=${layout.resourceType} item-type=${item.type} :projectResolution=${projectResolution} :selectedElementMetrics=${selectedElementMetrics} :isInsideSaveLoadSlot=${isInsideSaveLoadSlot} :isInsideDirectedContainer=${isInsideDirectedContainer} :values=${item} :imagesData=${imagesData} :soundsData=${soundsData} :spritesheetsData=${spritesheetsData} :particlesData=${particlesData} :charactersData=${charactersData} :textStylesData=${textStylesData} :variablesData=${variablesData} :layoutsData=${layoutsData}: null
                          - 'rtgl-view w=f h=32vh style="flex-shrink: 0;"': null
      - $if showDetailPanel:
          - rvn-resizable-panel#resizableDetailPanel panel-type=detail-panel w=300 min-w=200 max-w=500 resize-side="left":
              - rtgl-view wh=f slot="content":
                  - $if detailPanelSelectedItemId:
                      - rtgl-view d=v w=f h=f:
                          - rtgl-view h=48 w=f d=h bgc=bg bwb=xs ph=md av=c:
                              - rtgl-view d=h av=c w=1fg g=xs:
                                  - rtgl-text w=1fg ellipsis=true: ${item.name}
                                  - rtgl-text s=xs c=mu-fg: ${item.type}
                          - rtgl-view w=f h=1fg sv pv=md:
                              - rvn-layout-edit-panel#layoutEditPanel layout-type=${layout.layoutType} resource-type=${layout.resourceType} item-type=${item.type} :projectResolution=${projectResolution} :selectedElementMetrics=${selectedElementMetrics} :isInsideSaveLoadSlot=${isInsideSaveLoadSlot} :isInsideDirectedContainer=${isInsideDirectedContainer} :values=${item} :imagesData=${imagesData} :soundsData=${soundsData} :spritesheetsData=${spritesheetsData} :particlesData=${particlesData} :charactersData=${charactersData} :textStylesData=${textStylesData} :variablesData=${variablesData} :layoutsData=${layoutsData}: null
                    $else:
                      - rtgl-view wh=f av=c ah=c bgc=mu-fg:
                          - rtgl-text s=md c=mu-fg: ${noSelectionLabel}
  - $if showMobileNodeExplorer:
      - 'rtgl-view pos=fix edge=f z=1250 bgc=bg d=v style="min-width: 0; min-height: 0;"':
          - rtgl-view h=48 w=f d=h av=c ph=md bgc=bg bwb=xs g=md:
              - rtgl-text w=1fg s=md: ${nodeExplorerTitle}
              - rtgl-button#mobileFileExplorerClose sq pre=x v=ol: null
          - 'rtgl-view w=f h=1fg style="min-height: 0;"':
              - rvn-base-file-explorer#fileExplorer :items=${flatItems} shrinkable dropdown-menu allowDrag bottom-empty-space-height=80vh :contextMenuItems=${contextMenuItems} :emptyContextMenuItems=${emptyContextMenuItems}: null
