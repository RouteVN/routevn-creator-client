refs:
  fileExplorer:
    eventListeners:
      file-action:
        handler: handleFileExplorerAction
      target-changed:
        required: true
        handler: handleFileExplorerTargetChanged
      item-click:
        handler: handleFileExplorerItemClick
  groupview:
    eventListeners:
      layout-add-click:
        handler: handleAddLayoutClick
  layoutEditorPreview:
    eventListeners:
      preview-data-change:
        handler: handleLayoutEditorPreviewDataChange
      play:
        handler: handleLayoutEditorPreviewPlay
  backButton:
    eventListeners:
      click:
        handler: handleBackClick
  saveButton:
    eventListeners:
      click:
        handler: handleSaveButtonClick
  layoutEditPanel:
    eventListeners:
      update:
        handler: handleLayoutEditPanelUpdateHandler
  layoutEditorCanvas:
    eventListeners:
      selected-element-metrics-change:
        handler: handleLayoutEditorCanvasMetricsChange
      drag-update:
        handler: handleLayoutEditorCanvasDragUpdate
      update:
        handler: handleLayoutEditorCanvasUpdate
template:
  - 'rtgl-view d=h w=f h=f style="min-width: 0; min-height: 0;"':
      - 'rtgl-view d=h h=f style="min-width: 0; min-height: 0;"':
          - rvn-resizable-panel w=300 min-w=200 max-w=500 resize-side="right":
              - rtgl-view slot="content" w=f h=f:
                  - rvn-resource-types :resourceCategory=${resourceCategory} :selectedResourceId=${selectedResourceId}: null
                  - rvn-base-file-explorer#fileExplorer :items=${flatItems} shrinkable dropdown-menu allowDrag :contextMenuItems=${contextMenuItems} :emptyContextMenuItems=${emptyContextMenuItems}: null
      - 'rtgl-view w=1fg h=f style="min-width: 0; min-height: 0;"':
          - rtgl-view h=48 bwb=xs bc=bo d=h av=c w=f ph=md:
              - rtgl-button#backButton sq pre="chevronLeft" v="gh" mr=sm: null
              - rtgl-view w=1fg:
                  - rtgl-text: ${layout.name}
              - rtgl-button#saveButton ml=sm: Save Preview
          - 'rtgl-view d=v h=1fg w=f style="min-height: 0;"':
              - rvn-layout-editor-canvas#layoutEditorCanvas :resolution=${projectResolution} :layoutState=${layoutState} selectedItemId=${selectedItemId} :previewData=${previewData} :disableMoveDrag=${isInsideDirectedContainer}: null
              - 'rtgl-view h=1fg w=f sv style="min-height: 0;"':
                  - rvn-layout-editor-preview#layoutEditorPreview :layoutState=${layoutState} :initialPreviewData=${initialPreviewData} :charactersData=${charactersData}: null
      - rvn-resizable-panel#resizableDetailPanel panel-type=detail-panel w=300 min-w=200 max-w=500 resize-side="left":
          - rtgl-view wh=f slot="content":
              - $if selectedItemId:
                  - rtgl-view d=v w=f h=f:
                      - rtgl-view h=48 w=f d=h bgc=bg bwb=xs ph=md av=c:
                          - rtgl-view d=h av=c w=1fg g=xs:
                              - rtgl-text w=1fg ellipsis=true: ${item.name}
                              - rtgl-text s=xs c=mu-fg: ${item.type}
                      - rtgl-view w=f h=1fg sv pv=md:
                          - rvn-layout-edit-panel#layoutEditPanel key=${layoutEditPanelKey} layout-type=${layout.layoutType} resource-type=${layout.resourceType} item-type=${item.type} :projectResolution=${projectResolution} :isInsideSaveLoadSlot=${isInsideSaveLoadSlot} :isInsideDirectedContainer=${isInsideDirectedContainer} :selectedElementMetrics=${selectedElementMetrics} :values=${item} :imagesData=${imagesData} :spritesheetsData=${spritesheetsData} :particlesData=${particlesData} :charactersData=${charactersData} :textStylesData=${textStylesData} :variablesData=${variablesData} :layoutsData=${layoutsData}: null
                $else:
                  - rtgl-view wh=f av=c ah=c bgc=mu-fg:
                      - rtgl-text s=md c=mu-fg: No selection
