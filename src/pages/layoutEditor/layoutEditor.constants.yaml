dialogueForm:
  title: Preview
  description: Edit to see how the layout will look like with different data
  fields:
    - name: dialogue-character-name
      description: Character Name
      type: input-text
    - name: dialogue-content
      description: Dialogue Content
      type: input-text

nvlForm:
  title: Preview
  description: Edit to see how the layout will look like with different content items
  fields:
    - name: linesNum
      type: select
      description: Number of Lines
      options:
        - label: "1"
          value: 1
        - label: "2"
          value: 2
        - label: "3"
          value: 3
        - label: "4"
          value: 4
        - label: "5"
          value: 5
        - label: "6"
          value: 6
      placeholder: Select number of lines
      required: true
    - "$each": 'line, i in lines'
      type: section
      fields:
        - name: 'characterName${i}'
          type: input-text
          description: Character name
          placeholder: Enter character name
        - name: 'line${i}'
          type: input-text
          description: Line content text
          placeholder: Enter line text

choiceForm:
  title: Preview
  description: Edit to see how the layout will look like with different data
  fields:
    - name: choicesNum
      type: select
      description: Number of Choices
      options:
        - label: "1"
          value: 1
        - label: "2"
          value: 2
        - label: "3"
          value: 3
        - label: "4"
          value: 4
        - label: "5"
          value: 5
        - label: "6"
          value: 6
      placeholder: Select number of choices
      required: true
    - "$each": 'choice, i in choices'
      name: 'choice${i}'
      type: input-text
      description: Choice content text
      placeholder: Enter choice text

saveLoadForm:
  title: Preview
  description: Edit to see how the layout will look like with different save slot data
  fields:
    - "$when": "showSlotsNum"
      name: slotsNum
      type: select
      description: Number of Slots
      options:
        - label: "1"
          value: 1
        - label: "2"
          value: 2
        - label: "3"
          value: 3
        - label: "4"
          value: 4
        - label: "5"
          value: 5
        - label: "6"
          value: 6
      placeholder: Select number of slots
      required: true
    - "$each": 'slot, i in slots'
      type: section
      fields:
        - name: 'saveImageId${i}'
          type: select
          description: Save image
          clearable: true
          options: "${imageOptions}"
          placeholder: Select image
        - name: 'saveDate${i}'
          type: input-text
          description: Save date
          placeholder: Enter save date

sliderCreateForm:
  title: Create Slider
  description: Choose the slider images before inserting it into the layout
  fields:
    - name: name
      type: input-text
      label: Name
      required: true
    - name: direction
      type: select
      label: Direction
      required: true
      options:
        - label: Horizontal
          value: horizontal
        - label: Vertical
          value: vertical
    - type: slot
      slot: slider-bar-image
      label: Bar Image
    - type: slot
      slot: slider-thumb-image
      label: Thumb Image
    - type: slot
      slot: slider-hover-bar-image
      label: Hover Bar Image
    - type: slot
      slot: slider-hover-thumb-image
      label: Hover Thumb Image
  actions:
    buttons:
      - id: submit
        variant: pr
        label: Create Slider

fragmentCreateForm:
  title: Insert Fragment
  description: Choose which fragment layout to insert into this layout
  fields:
    - name: fragmentLayoutId
      type: select
      label: Fragment
      required: true
      clearable: false
      options: "${fragmentLayoutOptions}"
  actions:
    buttons:
      - id: cancel
        variant: se
        label: Cancel
      - id: submit
        variant: pr
        label: Insert Fragment
