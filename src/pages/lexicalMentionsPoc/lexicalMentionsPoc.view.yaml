template:
  - rtgl-view h=48 w=f bgc=bg bwb=xs ph=md av=c:
      - rtgl-view d=v:
          - rtgl-text s=sm c=mu-fg: Experiment
          - rtgl-text s=h4: Lexical Mentions POC
      - rtgl-view w=1fg: null
      - rtgl-text s=xs c=mu-fg: /project/lexical-mentions-poc
  - rtgl-view w=f h=1fg sv p=lg:
      - 'rtgl-view d=v g=lg style="max-width: 1200px; margin: 0 auto; width: 100%;"':
          - rtgl-view d=v g=xs:
              - rtgl-text s=sm: This page stays isolated from scene editing.
              - rtgl-text s=sm: It validates a Lexical-based single-line editor with inline mentions.
              - rtgl-text s=xs c=mu-fg: Text items keep the current segment shape, and mention items are additive objects in the same content array.
          - 'rvn-lexical-mention-editor-poc style="width: 100%;"': null
