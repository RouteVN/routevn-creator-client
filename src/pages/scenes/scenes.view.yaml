refs:
  fileexplorer:
    eventListeners:
      file-action:
        handler: handleFileExplorerAction
      target-changed:
        handler: handleFileExplorerTargetChanged
      item-click:
        handler: handleFileExplorerSelectionChanged
      dblclick-item:
        handler: handleFileExplorerDoubleClick
  whiteboard:
    eventListeners:
      item-position-changed:
        handler: handleWhiteboardItemPositionChanged
      item-position-updating:
        handler: handleWhiteboardItemPositionUpdating
      item-selected:
        handler: handleWhiteboardItemSelected
      item-double-click:
        handler: handleWhiteboardItemDoubleClick
      canvas-click:
        handler: handleWhiteboardClick
      canvas-context-menu:
        handler: handleWhiteboardCanvasContextMenu
      item-delete:
        handler: handleWhiteboardItemDelete
      item-context-menu:
        handler: handleWhiteboardItemContextMenu
      zoom-changed:
        handler: handleWhiteboardZoomChanged
      pan-changed:
        handler: handleWhiteboardPanChanged
  sceneForm:
    eventListeners:
      form-action:
        handler: handleSceneFormAction
  sceneFormPopover:
    eventListeners:
      close:
        handler: handleSceneFormClose
  editDialog:
    eventListeners:
      close:
        handler: handleEditDialogClose
  editForm:
    eventListeners:
      form-action:
        handler: handleEditFormAction
  dropdownMenu:
    eventListeners:
      close:
        handler: handleDropdownMenuClose
      item-click:
        handler: handleDropdownMenuClickItem
  sectionsListToggle:
    eventListeners:
      click:
        handler: handleSectionsListToggle
  sectionsListItem*:
    eventListeners:
      click:
        handler: handleSectionsListItemClick
  sectionsListWarning*:
    eventListeners:
      mouseenter:
        handler: handleDeadEndWarningMouseEnter
      mouseleave:
        handler: handleDeadEndWarningMouseLeave
  vnPreview:
    eventListeners:
      close:
        action: hidePreviewScene
  mapAddHintClose:
    eventListeners:
      click:
        handler: handleMapAddHintClose
  detailHeader:
    eventListeners:
      click:
        handler: handleDetailHeaderClick
  detailPreviewButton:
    eventListeners:
      click:
        handler: handleDetailPreviewClick
  mobileFileExplorerOpenButton:
    eventListeners:
      click:
        handler: handleMobileFileExplorerOpen
  mobileFileExplorerClose:
    eventListeners:
      click:
        handler: handleMobileFileExplorerClose
  fileExplorerKeyboardScope:
    eventListeners:
      click:
        handler: handleFileExplorerKeyboardScopeClick
      keydown:
        handler: handleFileExplorerKeyboardScopeKeyDown
  fileExplorerDetailKeyboardScope:
    eventListeners:
      click:
        handler: handleFileExplorerKeyboardScopeClick
      keydown:
        handler: handleFileExplorerKeyboardScopeKeyDown
template:
  - 'rtgl-view d=h w=f h=f pos=rel style="min-width: 0; min-height: 0;"':
      - 'rtgl-view d=h h=f w=f style="min-width: 0; min-height: 0;"':
          - $if showExplorerPanel:
              - rvn-resizable-panel#fileExplorer w=300 min-w=200 max-w=500 resize-side="right":
                  - rtgl-view slot="content" w=f h=f:
                      - rtgl-text ml=lg s=sm c=mu-fg mv=md: ${title}
                      - rvn-base-file-explorer#fileexplorer :items=${flatItems} shrinkable dropdown-menu allowDrag :folderContextMenuItems=${folderContextMenuItems} :itemContextMenuItems=${itemContextMenuItems} :emptyContextMenuItems=${emptyContextMenuItems}: null
          - 'rtgl-view w=1fg h=f style="min-width: 0; min-height: 0;"':
              - 'div#fileExplorerKeyboardScope tabindex=-1 style="width: 100%; height: 100%; min-width: 0; min-height: 0; outline: none;"':
                  - rvn-whiteboard#whiteboard :items=${whiteboardItems} :cursor=${whiteboardCursor} :selectedItemId=${selectedItemId} :isTouchMode=${isTouchMode} :showArrows=${showWhiteboardConnections} :showMinimapInTouchMode=${showWhiteboardMinimapInTouchMode} :minimapPlacement=${whiteboardMinimapPlacement} :minimapHeightScale=${whiteboardMinimapHeightScale}: null
          - $if showDetailPanel:
              - rvn-resizable-panel panel-type=detail-panel w=270 min-w=200 max-w=500 resize-side="left":
                  - rtgl-view wh=f slot="content":
                      - 'div#fileExplorerDetailKeyboardScope tabindex=-1 style="width: 100%; height: 100%; min-width: 0; min-height: 0; outline: none;"':
                          - $if selectedDetailId:
                              - rtgl-view d=v w=f h=f:
                                  - rtgl-view#detailHeader h=48 w=f d=h bgc=bg bwb=xs ph=md av=c g=sm cur=pointer:
                                      - rtgl-text w=1fg ellipsis=true: ${selectedItemName}
                                      - rtgl-svg svg=edit wh=16: null
                                  - 'rtgl-view d=v w=f h=1fg sv style="min-height: 0;"':
                                      - $if selectedDetailType == "scene":
                                          - rtgl-view d=h w=f av=c ph=md pt=md:
                                              - rtgl-view w=1fg: null
                                              - rtgl-button#detailPreviewButton s=sm v=se: ${previewButton}
                                          - $if selectedItemDescription:
                                              - rtgl-view w=f ph=md pt=md:
                                                  - rtgl-text c=mu-fg: ${selectedItemDescription}
                                          - rtgl-view h=1 w=f bgc=mu mv=md: null
                                          - rtgl-view d=v w=f g=md ph=md pb=md:
                                              - rtgl-view#sectionsListToggle d=h w=f av=c cur=pointer:
                                                  - rtgl-text s=sm: ${sectionsLabel}
                                                  - rtgl-view w=1fg: null
                                                  - $if sectionsListOpen:
                                                      - rtgl-svg svg=folderArrowDown wh=16 c=mu-fg: null
                                                    $else:
                                                      - rtgl-svg svg=folderArrowRight wh=16 c=mu-fg: null
                                              - $if sectionsListOpen:
                                                  - $if selectedSceneSections.length == 0:
                                                      - rtgl-view d=h av=c ph=md bw=xs bc=mu bgc=bg br=sm h=36 w=f:
                                                          - rtgl-text s=sm c=mu-fg: ${noSectionsLabel}
                                                    $else:
                                                      - rtgl-view d=v w=f g=sm:
                                                          - $for section, sectionIndex in selectedSceneSections:
                                                              - rtgl-view#sectionsListItem${sectionIndex} data-scene-id="${selectedItemId}" data-section-id="${section.id}" g=md d=h av=c ph=md bgc=mu h-bgc=ac br=md h=36 w=f cur=pointer:
                                                                  - 'rtgl-text s=sm w=1fg ellipsis=true style="min-width: 0"': ${section.name}
                                                                  - $if section.isDeadEnd:
                                                                      - rtgl-svg#sectionsListWarning${sectionIndex} svg=warning-dead-end wh=16: null
                                        $elif selectedDetailType == "folder":
                                          - rvn-detail-view#detailView key=${selectedDetailId} w=f h=1fg :fields=${detailFields}: null
                            $else:
                              - rtgl-view wh=f av=c ah=c bgc=mu-fg:
                                  - rtgl-text s=md c=mu-fg: ${noSelectionLabel}
      - rtgl-popover#sceneFormPopover ?open=${showSceneForm} x=${sceneFormPosition.x} y=${sceneFormPosition.y}:
          - rtgl-form#sceneForm key=${sceneFormKey} slot=content :defaultValues=${sceneFormData} :form=${sceneFormFields} w=320: null
      - rtgl-dialog#editDialog ?open=${isEditDialogOpen} s=md:
          - rtgl-view slot=content g=md:
              - rtgl-form#editForm key=${isEditDialogOpen} :defaultValues=${editDefaultValues} :form=${editForm} w=f: null
      - rtgl-dropdown-menu#dropdownMenu :items=${dropdownMenu.items} x=${dropdownMenu.position.x} y=${dropdownMenu.position.y} ?open=${dropdownMenu.isOpen}: null
      - rtgl-tooltip ?open=${deadEndTooltip.open} x=${deadEndTooltip.x} y=${deadEndTooltip.y} place="t" content="${deadEndTooltip.content}": null
      - $if showMobileScenesControls:
          - 'rtgl-view pos=abs z=200 style="right: 8px; top: 8px;"':
              - rtgl-view#mobileFileExplorerOpenButton w=40 h=40 bw=xs br=md ah=c av=c cur=pointer bgc=bg bc=bo title="${title}":
                  - rtgl-svg svg=hamburger wh=20 c=mu-fg: null
      - $if showMobileFileExplorer:
          - 'rtgl-view pos=fix edge=f z=1250 bgc=bg d=v style="min-width: 0; min-height: 0;"':
              - rtgl-view h=48 w=f d=h av=c ph=md bgc=bg bwb=xs g=md:
                  - rtgl-text w=1fg s=md: ${title}
                  - rtgl-view#mobileFileExplorerClose w=40 h=40 bw=xs br=md ah=c av=c cur=pointer bgc=bg bc=bo:
                      - rtgl-svg svg=x wh=20 c=mu-fg: null
              - 'rtgl-view w=f h=1fg style="min-height: 0;"':
                  - rvn-base-file-explorer#fileexplorer :items=${flatItems} shrinkable dropdown-menu allowDrag :folderContextMenuItems=${folderContextMenuItems} :itemContextMenuItems=${itemContextMenuItems} :emptyContextMenuItems=${emptyContextMenuItems}: null
      - $if showMapAddHint:
          - 'rtgl-view pos=abs z=150 style="left: 50%; bottom: 24px; transform: translateX(-50%);"':
              - rtgl-view d=h av=c g=sm bgc=mu bc=bo bw=xs br=sm pv=md ph=md:
                  - rtgl-text c=fg s=sm mh=xl: ${mapAddHint}
                  - rtgl-view#mapAddHintClose d=h av=c ah=c w=20 h=20 cur=pointer:
                      - rtgl-svg svg=x wh=14 c=mu-fg: null
  - $if previewVisible:
      - rvn-vn-preview#vnPreview scene-id="${previewSceneId}": null
