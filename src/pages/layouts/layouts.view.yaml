refs:
  fileExplorer:
    eventListeners:
      file-action:
        handler: handleFileExplorerAction
      target-changed:
        handler: handleFileExplorerTargetChanged
      item-click:
        handler: handleFileExplorerSelectionChanged
      dblclick-item:
        handler: handleItemDoubleClick
  groupview:
    eventListeners:
      item-click:
        handler: handleLayoutItemClick
      item-dblclick:
        handler: handleItemDoubleClick
      add-click:
        handler: handleAddLayoutClick
      search-input:
        handler: handleSearchInput
      item-delete:
        handler: handleItemDelete
  addLayoutDialog:
    eventListeners:
      close:
        handler: handleAddDialogClose
  layoutForm:
    eventListeners:
      form-action:
        handler: handleLayoutFormActionClick
  keyboardAddButton:
    eventListeners:
      click:
        handler: handleKeyboardAddClick
  keyboardItem*:
    eventListeners:
      click:
        handler: handleKeyboardItemClick
      contextmenu:
        handler: handleKeyboardItemRightClick
  keyboardSystemActions:
    eventListeners:
      actions-change:
        handler: handleKeyboardActionsChange
      close:
        handler: handleKeyboardActionsClose
template:
  - 'rtgl-view d=h w=f h=f style="min-width: 0; min-height: 0;"':
      - 'rtgl-view d=h h=f w=f style="min-width: 0; min-height: 0;"':
          - rvn-resizable-panel#fileExplorerPanel w=300 min-w=200 max-w=500 resize-side="right":
              - rtgl-view slot="content" w=f h=f:
                  - rvn-resource-types :resourceCategory=resourceCategory :selectedResourceId=selectedResourceId: null
                  - rvn-base-file-explorer#fileExplorer :items=flatItems shrinkable dropdown-menu allowDrag :folderContextMenuItems=folderContextMenuItems :itemContextMenuItems=itemContextMenuItems :emptyContextMenuItems=emptyContextMenuItems: null
          - 'rtgl-view w=1fg h=f style="min-width: 0; min-height: 0;"':
              - rvn-catalog-resources-view#groupview w=f h=f :navTitle=title :groups=catalogGroups :selectedItemId=selectedItemId :searchQuery=searchQuery :addText=addText :itemContextMenuItems=centerItemContextMenuItems: null
          - rvn-resizable-panel panel-type=detail-panel w=270 min-w=200 max-w=500 resize-side="left":
              - rtgl-view wh=f slot="content":
                  - $if selectedItemId:
                      - rtgl-view d=v w=f h=f:
                          - rtgl-view h=48 w=f bgc=bg bwb=xs ph=md av=c:
                              - rtgl-text c=mu-fg: ${selectedItemName}
                          - rvn-detail-view#detailView key=${selectedItemId} w=f :fields=detailFields: null
                          - $if isBaseLayoutSelected:
                              - rtgl-view h=1 w=f bgc=mu: null
                              - 'rtgl-view d=v w=f h=1fg p=md g=md style="min-height: 0; overflow: auto;"':
                                  - rtgl-view d=h w=f av=c:
                                      - rtgl-text s=sm: Keyboard
                                      - rtgl-view w=1fg: null
                                      - rtgl-button#keyboardAddButton pre=plus sq s=sm v=gh: null
                                  - $if keyboardItems.length > 0:
                                      - $for item, i in keyboardItems:
                                          - rtgl-view#keyboardItem${i} data-key=${item.key} d=h w=f av=c g=md p=md bw=xs br=md h-bgc=mu cur=pointer:
                                              - rtgl-view d=v g=xs w=1fg:
                                                  - rtgl-text s=sm: ${item.keyLabel}
                                                  - rtgl-text s=xs c=mu-fg: ${item.actionLabel}
                                  - $if keyboardItems.length == 0:
                                      - rtgl-view w=f p=md bgc=mu br=md:
                                          - rtgl-text s=xs c=mu-fg: ${keyboardEmptyMessage}
                    $else:
                      - rtgl-view wh=f av=c ah=c bgc=mu-fg:
                          - rtgl-text s=md c=mu-fg: No selection
  - rvn-system-actions#keyboardSystemActions :actions=keyboardEditorActions actionType=system: null
  - rtgl-dialog#addLayoutDialog ?open=${isAddDialogOpen} s=md:
      - rtgl-form#layoutForm slot=content :defaultValues=layoutFormDefaults :form=layoutForm w=f: null
