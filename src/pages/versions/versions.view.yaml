refs:
  saveVersionBtn:
    eventListeners:
      click:
        handler: handleSaveVersionClick
  versionItemRef*:
    eventListeners:
      click:
        handler: handleVersionItemClick
      dblclick:
        handler: handleVersionItemDoubleClick
      contextmenu:
        handler: handleVersionContextMenu
  detailDownloadBtn:
    eventListeners:
      click:
        handler: handleDownloadZipClick
  detailWindowsExeBtn:
    eventListeners:
      click:
        handler: handleDownloadWindowsExecutableClick
  detailWindowsInstallerBtn:
    eventListeners:
      click:
        handler: handleDownloadWindowsInstallerClick
  detailMacosApplicationBtn:
    eventListeners:
      click:
        handler: handleDownloadMacosApplicationClick
  detailHeader:
    eventListeners:
      click:
        handler: handleDetailHeaderClick
  mobileDetailSheet:
    eventListeners:
      close:
        handler: handleMobileDetailSheetClose
  versionForm:
    eventListeners:
      form-action:
        handler: handleVersionFormAction
  versionDialog:
    eventListeners:
      close:
        handler: handleVersionFormClose
  dropdownMenu:
    eventListeners:
      close:
        handler: handleDropdownMenuClose
      item-click:
        handler: handleDropdownMenuClickItem
template:
  - 'rtgl-view d=h w=f h=f style="min-width: 0; min-height: 0;"':
      - 'rtgl-view d=h h=f w=f style="min-width: 0; min-height: 0;"':
          - $if showExplorerPanel:
              - rvn-resizable-panel#fileExplorer w=300 min-w=200 max-w=500 resize-side="right":
                  - rtgl-view slot="content" w=f h=f:
                      - rvn-resource-types :resourceCategory=${resourceCategory} :selectedResourceId=${selectedResourceId}: null
          - 'rtgl-view w=1fg h=f pl=${contentLeftPadding} pos=rel style="min-width: 0; min-height: 0;"':
              - 'rtgl-view pos=abs h=1 bgc=bo style="left: 0; right: 0; top: 47px; z-index: 1001; pointer-events: none;"': null
              - 'rtgl-view w=f h=f g=sm style="min-width: 0; min-height: 0;"':
                  - 'rtgl-view h=48 w=f bgc=bg bwb=xs ph=md av=c style="position: sticky; top: 0px; z-index: 1000;"':
                      - rtgl-view w=f d=h av=c g=md wrap:
                          - rtgl-view av=c g=sm d=h w=1fg:
                              - rtgl-text: ${title}
                          - 'rtgl-button#saveVersionBtn v=pr sq pre=plus title="${addButton}" aria-label="${addButton}"': null
                  - 'rtgl-view h=1fg w=f sv style="min-width: 0;"':
                      - $if versions.length == 0:
                          - rtgl-view w=f h=f av=c ah=c:
                              - rtgl-view d=v ah=c g=md:
                                  - rtgl-text s=lg c=mu-fg: ${noVersionsMessage}
                        $else:
                          - 'rtgl-view d=v g=md w=f ph=md pt=md pb=sm mb=lg style="min-width: 0;"':
                              - $for item, i in versions:
                                  - rtgl-view#versionItemRef${i} data-version-id="${item.id}" h=auto w=f bw=xs bc=${item.itemBorderColor} h-bc=${item.itemHoverBorderColor} br=md pt=md pb=sm ph=lg d=h av=c cur=pointer:
                                      - rtgl-view w=1fg d=v g=xs:
                                          - rtgl-text s=lg: ${item.name}
                                          - $if item.description:
                                              - rtgl-text s=sm c=mu-fg: ${item.description}
                                          - rtgl-text s=xs c=mu-fg: ${item.actionSummary}
                              - rtgl-view w=f h=30vh: null
          - $if showDetailPanel:
              - rvn-resizable-panel panel-type=detail-panel w=270 min-w=200 max-w=500 resize-side="left":
                  - rtgl-view wh=f slot="content":
                      - $if selectedItemId:
                          - rtgl-view d=v w=f h=f:
                              - rtgl-view#detailHeader h=48 w=f d=h bgc=bg bwb=xs ph=md av=c g=sm cur=pointer:
                                  - rtgl-text w=1fg ellipsis=true: ${selectedItemName}
                                  - rtgl-svg svg=edit wh=16: null
                              - rvn-detail-view#detailView key=${selectedItemId} w=f h=1fg :fields=${detailFields}:
                                  - rtgl-view slot=actions d=v g=sm w=f:
                                      - rtgl-button#detailDownloadBtn data-version-id="${selectedItemId}" v=se s=sm pre=download w=f: ${exportWebButton}
                                      - $if canExportWindowsExecutable:
                                          - rtgl-button#detailWindowsExeBtn data-version-id="${selectedItemId}" v=se s=sm pre=download w=f: ${exportWindowsExecutableButton}
                                      - $if canExportWindowsInstaller:
                                          - rtgl-button#detailWindowsInstallerBtn data-version-id="${selectedItemId}" v=se s=sm pre=download w=f: ${exportWindowsInstallerButton}
                                      - $if canExportMacosApplication:
                                          - rtgl-button#detailMacosApplicationBtn data-version-id="${selectedItemId}" v=se s=sm pre=download w=f: ${exportMacosApplicationButton}
                        $else:
                          - rtgl-view wh=f av=c ah=c bgc=mu-fg:
                              - rtgl-text s=md c=mu-fg: ${noSelectionLabel}
  - $if showMobileDetailSheet:
      - rvn-mobile-sheet#mobileDetailSheet ?open=${showMobileDetailSheet}:
          - rtgl-view slot=content d=v w=f h=f:
              - rtgl-view#detailHeader h=36 w=f d=h bgc=bg bwb=xs ph=md av=c g=sm cur=pointer:
                  - rtgl-text w=1fg ellipsis=true: ${selectedItemName}
                  - rtgl-svg svg=edit wh=16: null
              - 'rtgl-view w=f h=1fg sv style="min-height: 0;"':
                  - rvn-detail-view#mobileDetailView key=${selectedItemId} w=f :fields=${mobileDetailFields} :fillHeight=${mobileDetailFillHeight}:
                      - rtgl-view slot=actions d=v g=sm w=f:
                          - rtgl-button#detailDownloadBtn data-version-id="${selectedItemId}" v=se s=sm pre=download w=f: ${exportWebButton}
                          - $if canExportWindowsExecutable:
                              - rtgl-button#detailWindowsExeBtn data-version-id="${selectedItemId}" v=se s=sm pre=download w=f: ${exportWindowsExecutableButton}
                          - $if canExportWindowsInstaller:
                              - rtgl-button#detailWindowsInstallerBtn data-version-id="${selectedItemId}" v=se s=sm pre=download w=f: ${exportWindowsInstallerButton}
                          - $if canExportMacosApplication:
                              - rtgl-button#detailMacosApplicationBtn data-version-id="${selectedItemId}" v=se s=sm pre=download w=f: ${exportMacosApplicationButton}
  - rtgl-dialog#versionDialog ?open=${isVersionDialogOpen} s=md:
      - rtgl-view slot=content w=f:
          - rtgl-form#versionForm :form=${versionForm} w=f: null
  - rtgl-dropdown-menu#dropdownMenu ?open=${dropdownMenu.isOpen} x=${dropdownMenu.x} y=${dropdownMenu.y} :items=${dropdownMenu.items}: null
