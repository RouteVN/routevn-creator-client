refs:
  backButton:
    eventListeners:
      click:
        handler: handleBackClick
  playButton:
    eventListeners:
      click:
        handler: handleReplayAnimation
  savePreviewButton:
    eventListeners:
      click:
        handler: handleSavePreviewClick
  addPropertiesButton:
    eventListeners:
      click:
        handler: handleAddPropertiesClick
  updateTimeline:
    eventListeners:
      add-keyframe:
        handler: handleAddKeyframeInDialog
      ruler-time-hover:
        handler: handleRulerTimeHover
      ruler-time-leave:
        handler: handleRulerTimeLeave
      keyframe-click:
        handler: handleKeyframeClick
      auto-track-click:
        handler: handleAutoTrackClick
      keyframe-right-click:
        handler: handleKeyframeRightClick
      property-name-click:
        handler: handlePropertyNameClick
      initial-value-click:
        handler: handleInitialValueClick
  transitionRuler:
    eventListeners:
      ruler-time-hover:
        handler: handleRulerTimeHover
      ruler-time-leave:
        handler: handleRulerTimeLeave
  previousTimeline:
    eventListeners:
      add-keyframe:
        handler: handleAddKeyframeInDialog
      keyframe-click:
        handler: handleKeyframeClick
      keyframe-right-click:
        handler: handleKeyframeRightClick
      property-name-click:
        handler: handlePropertyNameClick
      initial-value-click:
        handler: handleInitialValueClick
  nextTimeline:
    eventListeners:
      add-keyframe:
        handler: handleAddKeyframeInDialog
      keyframe-click:
        handler: handleKeyframeClick
      keyframe-right-click:
        handler: handleKeyframeRightClick
      property-name-click:
        handler: handlePropertyNameClick
      initial-value-click:
        handler: handleInitialValueClick
  addPropertyPopover:
    eventListeners:
      close:
        handler: handleClosePopover
  maskDialog:
    eventListeners:
      close:
        handler: handleClosePopover
  addPropertyForm:
    eventListeners:
      form-action:
        handler: handleAddPropertyFormSubmit
      form-change:
        handler: handleAddPropertyFormChange
  addKeyframeForm:
    eventListeners:
      form-action:
        handler: handleAddKeyframeFormSubmit
  editKeyframeForm:
    eventListeners:
      form-action:
        handler: handleEditKeyframeFormSubmit
  editAutoForm:
    eventListeners:
      form-action:
        handler: handleEditAutoFormSubmit
  editInitialValueForm:
    eventListeners:
      form-action:
        handler: handleEditInitialValueFormSubmit
      form-change:
        handler: handleEditInitialValueFormChange
  keyframeDropdownMenu:
    eventListeners:
      close:
        handler: handleClosePopover
      item-click:
        handler: handleKeyframeDropdownItemClick
  addPropertySideMenu:
    eventListeners:
      close:
        handler: handleClosePopover
      item-click:
        handler: handleAddPropertySideMenuItemClick
  disableMaskButton:
    eventListeners:
      click:
        handler: handleDisableMaskClick
  editMaskButton:
    eventListeners:
      click:
        handler: handleEditMaskClick
  openAddMaskButton:
    eventListeners:
      click:
        handler: handleOpenAddMaskClick
  addMaskButton:
    eventListeners:
      click:
        handler: handleAddMaskClick
  cancelMaskButton:
    eventListeners:
      click:
        handler: handleClosePopover
  editMaskDoneButton:
    eventListeners:
      click:
        handler: handleClosePopover
  previewImageButton*:
    eventListeners:
      click:
        handler: handlePreviewImageClick
  maskKindSelect:
    eventListeners:
      value-change:
        handler: handleMaskKindChange
  maskChannelSelect:
    eventListeners:
      value-change:
        handler: handleMaskChannelChange
  maskInvertSelect:
    eventListeners:
      value-change:
        handler: handleMaskInvertChange
  maskSampleSelect:
    eventListeners:
      value-change:
        handler: handleMaskSampleChange
  maskCombineSelect:
    eventListeners:
      value-change:
        handler: handleMaskCombineChange
  maskSoftnessInput:
    eventListeners:
      value-input:
        handler: handleMaskSoftnessInput
  maskProgressDurationInput:
    eventListeners:
      value-input:
        handler: handleMaskProgressDurationInput
  maskProgressEasingSelect:
    eventListeners:
      value-change:
        handler: handleMaskProgressEasingChange
  singleMaskImageButton:
    eventListeners:
      click:
        handler: handleSingleMaskImageClick
      contextmenu:
        handler: handleSingleMaskImageRightClick
  sequenceMaskAddButton:
    eventListeners:
      click:
        handler: handleSequenceMaskAddClick
  sequenceMaskImageButton*:
    eventListeners:
      click:
        handler: handleSequenceMaskImageClick
  sequenceMaskMoveUpButton*:
    eventListeners:
      click:
        handler: handleSequenceMaskMoveUpClick
  sequenceMaskMoveDownButton*:
    eventListeners:
      click:
        handler: handleSequenceMaskMoveDownClick
  sequenceMaskRemoveButton*:
    eventListeners:
      click:
        handler: handleSequenceMaskRemoveClick
  compositeMaskAddButton:
    eventListeners:
      click:
        handler: handleCompositeMaskAddClick
  compositeMaskImageButton*:
    eventListeners:
      click:
        handler: handleCompositeMaskImageClick
  compositeMaskChannelSelect*:
    eventListeners:
      value-change:
        handler: handleCompositeMaskChannelChange
  compositeMaskInvertSelect*:
    eventListeners:
      value-change:
        handler: handleCompositeMaskInvertChange
  compositeMaskMoveUpButton*:
    eventListeners:
      click:
        handler: handleCompositeMaskMoveUpClick
  compositeMaskMoveDownButton*:
    eventListeners:
      click:
        handler: handleCompositeMaskMoveDownClick
  compositeMaskRemoveButton*:
    eventListeners:
      click:
        handler: handleCompositeMaskRemoveClick
  imageSelectorDialog:
    eventListeners:
      close:
        handler: handleCloseMaskImageSelectorDialog
  imageSelectorFileExplorer:
    eventListeners:
      item-click:
        handler: handleMaskImageFileExplorerClickItem
  imageSelectorKeyboardScope:
    eventListeners:
      click:
        handler: handleImageSelectorKeyboardScopeClick
      keydown:
        handler: handleImageSelectorKeyboardScopeKeyDown
  imageSelector:
    eventListeners:
      image-selected:
        handler: handleMaskImageSelected
      image-dblclick:
        handler: handleMaskImageDoubleClick
  confirmMaskImageSelection:
    eventListeners:
      click:
        handler: handleConfirmMaskImageSelection
  cancelMaskImageSelection:
    eventListeners:
      click:
        handler: handleCancelMaskImageSelection
  previewOverlay:
    eventListeners:
      click:
        handler: handleMaskImagePreviewOverlayClick
  canvas: {}
template:
  - 'rtgl-view d=h w=f h=f style="min-width: 0; min-height: 0;"':
      - rvn-resizable-panel w=300 min-w=200 max-w=500 resize-side="right":
          - rtgl-view slot="content" w=f h=f:
              - rvn-resource-types :resourceCategory=${resourceCategory} :selectedResourceId=${selectedResourceId}: null
              - rtgl-view w=f h=f bgc=bg: null
      - 'rtgl-view w=2fg h=f style="min-width: 0; min-height: 0;"':
          - rtgl-view h=48 bwb=xs bc=bo d=h av=c w=f ph=md g=md:
              - rtgl-button#backButton sq pre="chevronLeft" v="gh": null
              - rtgl-view w=1fg:
                  - rtgl-text: ${animationName}
              - rtgl-button#playButton s=sm: Play
          - rtgl-view h=1fg sv w=f p=md g=lg:
              - rtgl-view d=v w=f g=md:
                  - 'rtgl-view w=f bgc=fg pos=rel style="aspect-ratio: ${canvasAspectRatio};"':
                      - rtgl-view pos=abs cor=full:
                          - 'div#canvas style="width: 100%; height: 100%; display: flex;"': null
              - rtgl-view d=v w=f g=md:
                  - rtgl-view d=h av=c w=f:
                      - rtgl-text: Tween Properties
                      - rtgl-view w=1fg: null
                      - $if dialogType == 'update' && updateAddPropertyButtonVisible:
                          - rtgl-button#addPropertiesButton data-side=update pre=plus s=sm: Add
                      - $if dialogType == 'transition' && transitionAddPropertyButtonVisible:
                          - rtgl-button#addPropertiesButton pre=plus s=sm: Add
                  - $if dialogType == 'update':
                      - rvn-keyframe-timeline#updateTimeline editable=true ?showRuler=true ?interactiveRuler=true side=update ?indicatorVisible=${previewPlayheadVisible} indicatorTimeMs=${previewPlayheadTimeMs} :properties=${updateProperties} :defaultValues=${updateTimelineDefaultValues}: null
                    $else:
                      - rtgl-view d=v w=f g=md:
                          - rvn-keyframe-timeline#transitionRuler ?showRuler=true ?showTracks=false ?interactiveRuler=true ?indicatorVisible=${previewPlayheadVisible} indicatorTimeMs=${previewPlayheadTimeMs} timelineDuration=${transitionTimelineDuration}: null
                          - rtgl-view d=v w=f g=xs:
                              - rtgl-text s=sm c=mu-fg: Out
                              - rvn-keyframe-timeline#previousTimeline editable=true side=prev ?showRuler=false ?showTotalDuration=false timelineDuration=${transitionTimelineDuration} ?indicatorVisible=${previewPlayheadVisible} indicatorTimeMs=${previewPlayheadTimeMs} :properties=${previousProperties} :defaultValues=${transitionTimelineDefaultValues}: null
                          - rtgl-view d=v w=f g=xs:
                              - rtgl-text s=sm c=mu-fg: In
                              - rvn-keyframe-timeline#nextTimeline editable=true side=next ?showRuler=false ?showTotalDuration=false timelineDuration=${transitionTimelineDuration} ?indicatorVisible=${previewPlayheadVisible} indicatorTimeMs=${previewPlayheadTimeMs} :properties=${nextProperties} :defaultValues=${transitionTimelineDefaultValues}: null
      - 'rtgl-view w=1fg h=f bgc=bg bwl=xs bc=bo d=v style="min-width: 0; min-height: 0;"':
          - 'rtgl-view w=f h=1fg d=v style="min-height: 0;"':
              - rtgl-view h=48 w=f d=h av=c ph=md bwb=xs bc=bo g=sm:
                  - rtgl-text w=1fg: Mask
                  - $if dialogType == 'transition' && !transitionMaskPanel.enabled && popover.mode != 'addMask':
                      - rtgl-button#openAddMaskButton pre=plus s=sm: Add Mask
                  - $if transitionMaskPanel.enabled && !transitionMaskPanel.unsupported:
                      - rtgl-button#editMaskButton s=sm: Edit
                  - $if transitionMaskPanel.enabled:
                      - rtgl-button#disableMaskButton s=sm v=se: Remove
              - 'rtgl-view w=f h=1fg p=md sv style="min-height: 0;"':
                  - $if !transitionMaskPanel.enabled:
                      - rtgl-view w=f h=f av=c ah=c:
                          - rtgl-view w=300 h=160 bw=xs bc=bo br=md ah=c av=c:
                              - rtgl-text s=sm c=mu-fg ta=c: No mask available.
                    $else:
                      - $if transitionMaskPanel.unsupported:
                          - rtgl-view d=v w=f g=sm p=md bgc=mu bc=bo bw=xs br=md:
                              - rtgl-text s=sm: ${transitionMaskPanel.unsupportedKind} masks are hidden for now
                              - rtgl-text s=xs c=mu-fg: This existing mask will be preserved when you save. Remove it if you want to add a new single-image mask.
                        $else:
                          - rtgl-view d=v w=f g=lg:
                              - rtgl-view d=v g=xs w=f:
                                  - rtgl-text s=sm c=mu-fg: Kind
                                  - rtgl-text s=sm: ${transitionMaskPanel.kindLabel}
                              - rtgl-view d=v g=xs w=f:
                                  - rtgl-text s=sm c=mu-fg: Channel
                                  - rtgl-text s=sm: ${transitionMaskPanel.channelLabel}
                              - rtgl-view d=v g=xs w=f:
                                  - rtgl-text s=sm c=mu-fg: Invert
                                  - rtgl-text s=sm: ${transitionMaskPanel.invertLabel}
                              - rtgl-view d=v g=xs w=f:
                                  - rtgl-text s=sm c=mu-fg: Softness
                                  - rtgl-text s=sm: ${transitionMaskPanel.softness}
                              - rtgl-view d=v g=xs w=f:
                                  - rtgl-text s=sm c=mu-fg: Image
                                  - $if transitionMaskPanel.imageItems.length > 0:
                                      - rtgl-view d=h wrap g=md w=f:
                                          - $for image, i in transitionMaskPanel.imageItems:
                                              - 'rtgl-view bw=xs bc=bo br=md w=160 style="max-width: 100%; box-sizing: border-box;"':
                                                  - 'rtgl-view p=md g=md br=md w=f style="max-width: 100%; box-sizing: border-box;"':
                                                      - $if image.previewFileId:
                                                          - 'rtgl-view w=f br=md style="aspect-ratio: ${image.previewAspectRatio}; overflow: hidden;"':
                                                              - rvn-file-image br=md w=f h=f fileId=${image.previewFileId}: null
                                                        $else:
                                                              - rtgl-view w=f h=90 br=md bw=xs bc=bo av=c ah=c:
                                                              - rtgl-text s=xs c=mu-fg: No preview
                                                      - rtgl-text s=xs c=mu-fg ellipsis w=f: ${image.name}
                                    $else:
                                      - rtgl-text s=sm c=mu-fg: ${transitionMaskPanel.imageLabel}
                              - rtgl-view d=v g=xs w=f:
                                  - rtgl-text s=sm c=mu-fg: Progress Duration (ms)
                                  - rtgl-text s=sm: ${transitionMaskPanel.progressDurationLabel}
                              - rtgl-view d=v g=xs w=f:
                                  - rtgl-text s=sm c=mu-fg: Progress Easing
                                  - rtgl-text s=sm: ${transitionMaskPanel.progressEasingLabel}
          - rtgl-view w=f h=1 bgc=bo: null
          - 'rtgl-view w=f h=1fg d=v style="min-height: 0;"':
              - rtgl-view h=48 w=f d=h av=c ph=md bwb=xs bc=bo g=sm:
                  - rtgl-text w=1fg: Preview
                  - rtgl-button#savePreviewButton s=sm: Save
              - 'rtgl-view w=f h=1fg p=md sv style="min-height: 0;"':
                  - rtgl-view d=v w=f g=md:
                      - $for item, i in previewPanel.items:
                          - rtgl-view d=v w=f g=xs:
                              - rtgl-text s=sm c=mu-fg: ${item.label}
                              - $if item.image:
                                  - 'rtgl-view#previewImageButton${i} data-target=${item.target} cur=pointer bw=xs bc=${item.image.itemBorderColor} h-bc=${item.image.itemHoverBorderColor} br=md w=160 style="max-width: 100%; box-sizing: border-box;"':
                                      - 'rtgl-view p=md g=md br=md w=f style="max-width: 100%; box-sizing: border-box;"':
                                          - $if item.image.previewFileId:
                                              - 'rtgl-view w=f br=md style="aspect-ratio: ${item.image.previewAspectRatio}; overflow: hidden;"':
                                                  - rvn-file-image br=md w=f h=f fileId=${item.image.previewFileId}: null
                                            $else:
                                              - rtgl-view w=f h=90 br=md bw=xs bc=bo av=c ah=c:
                                                  - rtgl-text s=xs c=mu-fg: No preview
                                          - rtgl-text s=xs c=mu-fg ellipsis w=f: ${item.image.name}
                                $else:
                                  - 'rtgl-view#previewImageButton${i} data-target=${item.target} w=160 h=90 av=c ah=c bgc=bg bc=bo bw=xs br=md cur=pointer style="max-width: 100%; box-sizing: border-box;"':
                                      - rtgl-text c=mu-fg s=sm: Select image
  - rtgl-popover#addPropertyPopover ?open=${popover.popoverIsOpen} x=${popover.x} y=${popover.y}:
      - $if popover.mode == 'addProperty':
          - rtgl-view slot=content:
              - rtgl-form#addPropertyForm :form=${addPropertyForm} :context=${addPropertyContext} :defaultValues=${addPropertyFormDefaultValues}: null
      - $if popover.mode == 'addKeyframe':
          - rtgl-view slot=content:
              - rtgl-form#addKeyframeForm :form=${addKeyframeForm} :defaultValues=${addKeyframeDefaultValues}: null
      - $if popover.mode == 'editKeyframe':
          - rtgl-view slot=content:
              - rtgl-form#editKeyframeForm :form=${updateKeyframeForm} :defaultValues=${editKeyframeDefaultValues}: null
      - $if popover.mode == 'editAuto':
          - rtgl-view slot=content:
              - rtgl-form#editAutoForm :form=${editAutoForm} :defaultValues=${editAutoDefaultValues}: null
      - $if popover.mode == 'editInitialValue':
          - rtgl-view slot=content:
              - rtgl-form#editInitialValueForm :form=${editInitialValueForm} :defaultValues=${editInitialValueDefaultValues} :context=${editInitialValueContext}: null
  - rtgl-dialog#maskDialog ?open=${popover.maskDialogIsOpen} s=sm:
      - $if popover.mode == 'editMask' || popover.mode == 'addMask':
          - 'rtgl-view slot=content d=v w=f g=md style="max-width: calc(100vw - 32px);"':
              - $if popover.mode == 'addMask':
                  - rtgl-text: Add Mask
                $else:
                  - rtgl-text: Edit Mask
              - $if maskEditorPanel.unsupported:
                  - rtgl-view d=v w=f g=sm p=md bgc=mu bc=bo bw=xs br=md:
                      - rtgl-text s=sm: ${maskEditorPanel.unsupportedKind} masks are hidden for now
                      - rtgl-text s=xs c=mu-fg: This existing mask will be preserved when you save. Remove it if you want to add a new single-image mask.
                $else:
                  - rtgl-view d=v w=f g=md:
                      - rtgl-view d=v g=xs w=f:
                          - rtgl-text s=sm c=mu-fg: Kind
                          - rtgl-segmented-control#maskKindSelect w=f no-clear :selectedValue=${maskEditorPanel.kind} :options=${maskKindOptions}: null
                      - rtgl-view d=v g=xs w=f:
                          - rtgl-text s=sm c=mu-fg: Channel
                          - rtgl-segmented-control#maskChannelSelect w=f no-clear :selectedValue=${maskEditorPanel.channelValue} :options=${maskChannelOptions}: null
                      - rtgl-view d=v g=xs w=f:
                          - rtgl-text s=sm c=mu-fg: Invert
                          - rtgl-segmented-control#maskInvertSelect w=f no-clear :selectedValue=${maskEditorPanel.invertValue} :options=${maskBooleanOptions}: null
                      - rtgl-view d=v g=xs w=f:
                          - rtgl-text s=sm c=mu-fg: Softness
                          - rtgl-input#maskSoftnessInput type=number min=0 step=0.01 w=f value=${maskEditorPanel.softness}: null
                      - rtgl-view d=v g=xs w=f:
                          - rtgl-text s=sm c=mu-fg: Image
                          - $if maskEditorPanel.singleImage:
                              - rtgl-view#singleMaskImageButton w=f cur=pointer bw=xs bc=${maskEditorPanel.singleImage.itemBorderColor} h-bc=${maskEditorPanel.singleImage.itemHoverBorderColor} br=sm:
                                  - rtgl-view p=md g=md br=md w=f:
                                      - rvn-file-image w=f h=120 imageId=${maskEditorPanel.singleImage.imageId} source="thumbnail": null
                                      - rtgl-text s=xs c=mu-fg ellipsis w=f: ${maskEditorPanel.singleImage.name}
                            $else:
                              - rtgl-view#singleMaskImageButton w=f h=96 av=c ah=c bgc=bg bc=bo bw=xs br=md cur=pointer:
                                  - rtgl-text c=mu-fg: Select image
                      - rtgl-view d=v g=xs w=f:
                          - rtgl-text s=sm c=mu-fg: Progress Duration (ms)
                          - rtgl-input#maskProgressDurationInput type=number min=1 step=1 w=f value=${maskEditorPanel.progressDuration}: null
                      - rtgl-view d=v g=xs w=f:
                          - rtgl-text s=sm c=mu-fg: Progress Easing
                          - rtgl-select#maskProgressEasingSelect w=f no-clear :selectedValue=${maskEditorPanel.progressEasing} :options=${maskProgressEasingOptions}: null
              - $if popover.mode == 'addMask':
                  - rtgl-view d=h g=sm w=f ah=e pt=sm:
                      - rtgl-button#cancelMaskButton s=sm v=se: Cancel
                      - rtgl-button#addMaskButton s=sm v=pr: Add Mask
              - $if popover.mode == 'editMask':
                  - rtgl-view d=h g=sm w=f ah=e pt=sm:
                      - rtgl-button#editMaskDoneButton s=sm v=pr: Done
  - rtgl-dropdown-menu#keyframeDropdownMenu :items=${keyframeDropdownItems} ?open=${popover.dropdownMenuIsOpen} x=${popover.x} y=${popover.y}: null
  - rtgl-dropdown-menu#addPropertySideMenu :items=${addPropertySideMenuItems} ?open=${popover.addPropertySideMenuIsOpen} x=${popover.x} y=${popover.y}: null
  - rtgl-dialog#imageSelectorDialog ?open=${imageSelectorDialog.open} s=xl:
      - $if imageSelectorDialog.open:
          - rtgl-view slot=content d=v w=f g=md:
              - 'rtgl-view d=h w=f h=70vh g=lg style="min-width: 0; min-height: 0;"':
                  - 'rtgl-view w=300 h=f style="min-width: 0; min-height: 0;"':
                      - rvn-base-file-explorer#imageSelectorFileExplorer :items=${imageFolderItems} shrinkable: null
                  - 'rtgl-view#imageSelectorKeyboardScope tabindex=-1 w=1fg h=f style="min-width: 0; min-height: 0; outline: none;"':
                      - rvn-image-selector#imageSelector selectedImageId=${imageSelectorDialog.selectedImageId}: null
              - rtgl-view d=h g=sm w=f ah=e:
                  - rtgl-button#cancelMaskImageSelection variant=se: Cancel
                  - rtgl-button#confirmMaskImageSelection variant=pr: OK
  - $when: fullImagePreviewVisible
    rtgl-view#previewOverlay pos=fix edge=f z=3000 cur=pointer:
      - rtgl-view w=f h=f pos=fix edge=f bgc=bg: null
      - $if fullImagePreviewImageId:
          - rtgl-view pos=fix edge=f ah=c av=c z=3001:
              - rvn-file-image imageId=${fullImagePreviewImageId} w=80% h=80% bc=ac bw=xs br=md: null
