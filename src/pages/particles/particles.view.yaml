refs:
  fileExplorer:
    eventListeners:
      file-action:
        handler: handleFileExplorerAction
      target-changed:
        handler: handleFileExplorerTargetChanged
      item-click:
        handler: handleFileExplorerSelectionChanged
      dblclick-item:
        handler: handleParticleItemDoubleClick
  groupview:
    eventListeners:
      item-click:
        handler: handleParticleItemClick
      item-dblclick:
        handler: handleParticleItemDoubleClick
      add-click:
        handler: handleAddParticleClick
      search-input:
        handler: handleSearchInput
      tag-filter-change:
        handler: handleTagFilterChange
      tag-filter-add-option-click:
        handler: handleTagFilterAddOptionClick
      item-delete:
        handler: handleItemDelete
      menu-click:
        handler: handleMobileFileExplorerOpen
  mobileFileExplorerClose:
    eventListeners:
      click:
        handler: handleMobileFileExplorerClose
  mobileDetailSheet:
    eventListeners:
      close:
        handler: handleMobileDetailSheetClose
  fileExplorerKeyboardScope:
    eventListeners:
      click:
        handler: handleFileExplorerKeyboardScopeClick
      keydown:
        handler: handleFileExplorerKeyboardScopeKeyDown
  fileExplorerDetailKeyboardScope:
    eventListeners:
      click:
        handler: handleFileExplorerKeyboardScopeClick
      keydown:
        handler: handleFileExplorerKeyboardScopeKeyDown
  particleDialog:
    eventListeners:
      close:
        handler: handleParticleDialogClose
  particleForm:
    eventListeners:
      form-action:
        handler: handleParticleFormActionClick
      form-change:
        handler: handleParticleFormChange
      add-option-click:
        handler: handleParticleFormAddOptionClick
  tabs:
    eventListeners:
      item-click:
        handler: handleParticleFormTabClick
  detailHeader:
    eventListeners:
      click:
        handler: handleDetailHeaderClick
  detailTagSelect:
    eventListeners:
      value-change:
        handler: handleDetailTagValueChange
      draft-value-change:
        handler: handleDetailTagDraftValueChange
      open-change:
        handler: handleDetailTagOpenChange
      add-option-click:
        handler: handleDetailTagAddOptionClick
  createTagDialog:
    eventListeners:
      close:
        handler: handleCreateTagDialogClose
  createTagForm:
    eventListeners:
      form-action:
        handler: handleCreateTagFormAction
  detailCanvas: {}
  dialogCanvas: {}
template:
  - 'rtgl-view d=h w=f h=f style="min-width: 0; min-height: 0;"':
      - 'rtgl-view d=h h=f w=f style="min-width: 0; min-height: 0;"':
          - $if showExplorerPanel:
              - rvn-resizable-panel#fileExplorerPanel w=300 min-w=200 max-w=500 resize-side="right":
                  - rtgl-view slot="content" w=f h=f:
                      - rvn-resource-types :resourceCategory=${resourceCategory} :selectedResourceId=${selectedResourceId}: null
                      - rvn-base-file-explorer#fileExplorer :items=${flatItems} shrinkable dropdown-menu allowDrag :folderContextMenuItems=${folderContextMenuItems} :itemContextMenuItems=${itemContextMenuItems} :emptyContextMenuItems=${emptyContextMenuItems}: null
          - 'rtgl-view w=1fg h=f pl=${contentLeftPadding} style="min-width: 0; min-height: 0;"':
              - 'div#fileExplorerKeyboardScope tabindex=-1 style="width: 100%; height: 100%; min-width: 0; min-height: 0; outline: none;"':
                  - $if showMobileTopTabs:
                      - 'rtgl-view d=v w=f h=f style="min-width: 0; min-height: 0;"':
                          - 'rvn-catalog-resources-view#groupview w=f h=f :navTitle=${title} show-menu-button show-search=false show-tag-filter :mobileLayout=${mobileLayout} :groups=${catalogGroups} :selectedItemId=${selectedItemId} :searchQuery=${searchQuery} :tagFilterOptions=${tagFilterOptions} :selectedTagFilterValues=${selectedTagFilterValues} :tagFilterPlaceholder=${tagFilterPlaceholder} :emptyMessage=${emptyMessage} :addText=${addText} :itemContextMenuItems=${centerItemContextMenuItems}': null
                    $else:
                      - rvn-catalog-resources-view#groupview w=f h=f :navTitle=${title} show-tag-filter :groups=${catalogGroups} :selectedItemId=${selectedItemId} :searchQuery=${searchQuery} :tagFilterOptions=${tagFilterOptions} :selectedTagFilterValues=${selectedTagFilterValues} :tagFilterPlaceholder=${tagFilterPlaceholder} :emptyMessage=${emptyMessage} :addText=${addText} :itemContextMenuItems=${centerItemContextMenuItems}: null
          - $if showDetailPanel:
              - rvn-resizable-panel panel-type=detail-panel w=300 min-w=220 max-w=520 resize-side="left":
                  - rtgl-view wh=f slot="content":
                      - 'div#fileExplorerDetailKeyboardScope tabindex=-1 style="width: 100%; height: 100%; min-width: 0; min-height: 0; outline: none;"':
                          - $if selectedItemId && selectedItem:
                              - rtgl-view d=v w=f h=f:
                                  - rtgl-view#detailHeader h=48 w=f d=h bgc=bg bwb=xs ph=md av=c g=sm cur=pointer:
                                      - rtgl-text w=1fg ellipsis=true: ${selectedItemName}
                                      - rtgl-svg svg=edit wh=16: null
                                  - rvn-detail-view#detailView key=${selectedItemId} w=f h=1fg :fields=${detailFields}:
                                      - $if selectedItem:
                                          - rtgl-view slot="particle-preview" w=f d=v g=sm:
                                              - 'rtgl-view w=f pos=rel br=md bw=xs bc=bo style="aspect-ratio: ${selectedPreviewAspectRatio}; overflow: hidden; background: #000;"':
                                                  - rtgl-view pos=abs cor=full:
                                                      - 'div#detailCanvas style="width: 100%; height: 100%; display: flex; overflow: hidden;"': null
                                      - $if selectedTextureImageFileId:
                                          - rtgl-view slot="particle-texture-image" w=f d=v g=xs:
                                              - rvn-file-image fileId=${selectedTextureImageFileId} w=f h=120 bw=xs bc=bo br=md key=${selectedTextureImageFileId}: null
                                              - rtgl-text w=f s=sm ellipsis=true: ${selectedTextureImageName}
                                      - rtgl-tag-select#detailTagSelect slot="particle-tags" w=f :options=${tagFilterOptions} :selectedValues=${selectedItemTagIds} :draftSelectedValues=${detailTagDraftValues} :open=${isDetailTagSelectOpen} :addOption=${detailTagAddOption} placeholder="Add tag": null
                            $else:
                              - rtgl-view wh=f av=c ah=c bgc=mu-fg:
                                  - rtgl-text s=md c=mu-fg: No selection
  - $if showMobileFileExplorer:
      - 'rtgl-view pos=fix edge=f z=1250 bgc=bg d=v style="min-width: 0; min-height: 0;"':
          - rtgl-view h=56 w=f d=h av=c ph=md bgc=bg bwb=xs g=md:
              - rtgl-text w=1fg s=md: Files
              - rtgl-view#mobileFileExplorerClose w=40 h=40 ah=c av=c cur=pointer:
                  - rtgl-svg svg=x wh=20 c=mu-fg: null
          - 'rtgl-view w=f h=1fg style="min-height: 0;"':
              - rvn-base-file-explorer#fileExplorer :items=${flatItems} shrinkable dropdown-menu allowDrag :folderContextMenuItems=${folderContextMenuItems} :itemContextMenuItems=${itemContextMenuItems} :emptyContextMenuItems=${emptyContextMenuItems}: null
  - $if showMobileDetailSheet:
      - rvn-mobile-sheet#mobileDetailSheet ?open=${showMobileDetailSheet}:
          - rtgl-view slot=content d=v w=f h=f:
              - rtgl-view#detailHeader h=56 w=f d=h bgc=bg bwb=xs ph=md av=c g=sm cur=pointer:
                  - rtgl-text w=1fg ellipsis=true: ${selectedItemName}
                  - rtgl-svg svg=edit wh=16: null
              - 'rtgl-view w=f h=1fg sv style="min-height: 0;"':
                  - rvn-detail-view#mobileDetailView key=${selectedItemId} w=f :fields=${mobileDetailFields} :fillHeight=${mobileDetailFillHeight}:
                      - $if selectedTextureImageFileId:
                          - rtgl-view slot="particle-texture-image" w=f d=v g=xs:
                              - rvn-file-image fileId=${selectedTextureImageFileId} w=f h=120 bw=xs bc=bo br=md key=${selectedTextureImageFileId}: null
                              - rtgl-text w=f s=sm ellipsis=true: ${selectedTextureImageName}
                      - rtgl-tag-select#detailTagSelect slot="particle-tags" w=f :options=${tagFilterOptions} :selectedValues=${selectedItemTagIds} :draftSelectedValues=${detailTagDraftValues} :open=${isDetailTagSelectOpen} :addOption=${detailTagAddOption} placeholder="Add tag": null
  - rtgl-dialog#particleDialog ?open=${isDialogOpen} s=lg:
      - 'rtgl-view slot="content" d=h lg-d=v ah=c g=lg w=f h=70vh style="min-height: 0;"':
          - $if isDialogOpen:
              - $if !isPreviewOnlyDialog:
                  - 'rtgl-view w=4fg lg-w=f d=v g=md h=f style="min-width: 0; min-height: 0;"':
                      - 'rtgl-view w=f h=1fg sv style="min-height: 0;"':
                          - rtgl-form#particleForm key=${particleFormKey} :defaultValues=${dialogFormValues} :form=${particleForm} w=f:
                              - $if showParticleFormTabs:
                                  - rtgl-tabs#tabs slot=particle-form-tabs selected-tab=${selectedParticleFormTab} :items=${particleFormTabs}: null
              - 'rtgl-view w=6fg lg-w=f d=v av=c g=md h=f style="min-width: 0; min-height: 0;"':
                  - 'rtgl-view w=f pos=rel br=md bw=xs bc=bo style="aspect-ratio: ${dialogPreviewAspectRatio}; overflow: hidden; background: #000;"':
                      - rtgl-view pos=abs cor=full:
                          - 'div#dialogCanvas style="width: 100%; height: 100%; display: flex; overflow: hidden;"': null
  - rtgl-dialog#createTagDialog ?open=${isCreateTagDialogOpen} s=sm:
      - rtgl-form#createTagForm key=${isCreateTagDialogOpen} slot=content :defaultValues=${createTagDefaultValues} :form=${createTagForm} w=f: null
