refs:
  projectTitle:
    eventListeners:
      click:
        handler: handleEditButtonClick
  projectDescription:
    eventListeners:
      click:
        handler: handleEditButtonClick
  projectImage:
    eventListeners:
      click:
        handler: handleEditButtonClick
  backButton:
    eventListeners:
      click:
        handler: handleBackToProjects
      keydown:
        handler: handleBackButtonKeyDown
  projectActionsButton:
    eventListeners:
      click:
        handler: handleProjectActionsClick
  projectActionMenu:
    eventListeners:
      close:
        handler: handleProjectActionMenuClose
      item-click:
        handler: handleProjectActionMenuClickItem
  editDialog:
    eventListeners:
      close:
        handler: handleEditDialogClose
  editForm:
    eventListeners:
      form-action:
        handler: handleEditFormAction
  editDialogIcon:
    eventListeners:
      click:
        handler: handleEditDialogIconClick
  editIconCropDialog:
    eventListeners:
      close:
        handler: handleEditIconCropDialogClose
      confirm:
        handler: handleEditIconCropDialogConfirm
template:
  - rtgl-view h=48 w=f bgc=bg bwb=xs ph=md av=c:
      - rtgl-view w=f d=h av=c g=sm:
          - 'rtgl-button#backButton sq pre=chevronLeft v=ol title="${i18n.projectPage.backToProjects}" aria-label="${i18n.projectPage.backToProjects}"': null
          - rtgl-text s=sm ml=xs: ${i18n.projectPage.backToProjects}
          - $if projectSource == 'cloud':
              - rtgl-text s=xs c=mu-fg: ${i18n.projectPage.cloudProject}
          - rtgl-view w=1fg: null
          - $if showAndroidProjectActions:
              - 'rtgl-button#projectActionsButton sq pre=ellipsis v=ol title="${i18n.projectPage.exportProject}" aria-label="${i18n.projectPage.exportProject}"': null
  - rtgl-view w=f h=f pt=md:
      - rtgl-view w=f h=f d=v:
          - rvn-detail-view#detailView w=f h=1fg :fields=${detailFields}:
              - rtgl-view#projectTitle slot=project-title cur=pointer:
                  - rtgl-text s=h3: ${projectName}
              - rtgl-view#projectDescription slot=project-description cur=pointer:
                  - rtgl-text c=mu-fg: ${projectDescription}
              - $if projectIconFileId:
                  - rvn-file-image#projectImage slot=project-icon fileId=${projectIconFileId} w=128 h=128 bw=xs bc=bo br=md cur=pointer: null
                $else:
                  - rtgl-image#projectImage slot=project-icon src="/public/project_logo_placeholder.png" w=128 h=128 bw=xs bc=bo br=md cur=pointer: null
  - rtgl-dialog#editDialog ?open=${isEditDialogOpen} s=md:
      - rtgl-view slot=content:
          - rtgl-form#editForm key=${isEditDialogOpen} :defaultValues=${editDefaultValues} :form=${editForm} w=f:
              - $if editIconFileId:
                  - rvn-file-image#editDialogIcon fileId=${editIconFileId} w=120 h=120 slot=project-icon-edit bw=xs bc=bo br=md cur=pointer: null
                $else:
                  - rtgl-view#editDialogIcon slot=project-icon-edit w=120 h=120 ah=c av=c bw=xs bc=bo br=md cur=pointer:
                      - rtgl-text c=mu-fg ta=c: ${i18n.projectPage.clickToUpload}
  - rtgl-dropdown-menu#projectActionMenu :items=${projectActionMenu.items} x=${projectActionMenu.x} y=${projectActionMenu.y} ?open=${projectActionMenu.isOpen}: null
  - rvn-square-image-crop-dialog#editIconCropDialog :open=${isEditIconCropDialogOpen} :file=${editIconCropFile}: null
  - $if isProjectExportLoading:
      - 'rtgl-view pos=fix edge=f z=2050 d=v ah=c av=c g=sm style="min-width: 0; min-height: 0; pointer-events: auto; background: rgba(0, 0, 0, 0.42);"':
          - rtgl-view bgc=su bc=bo bw=xs br=md shadow=md ph=lg pv=md:
              - rtgl-text s=sm c=fg: ${projectExportLoadingStatusText}
