refs:
  form:
    eventListeners:
      form-change:
        handler: handleFormChange
  iconImage:
    eventListeners:
      click:
        handler: handleFormExtraEvent
  backButton:
    eventListeners:
      click:
        handler: handleBackToProjects
template:
  - rtgl-view d=h av=c g=sm mt=lg:
      - rtgl-button#backButton pre=chevronLeft v=gh: Back to Projects
      - rtgl-text s=xs c=mu-fg: ${projectSource} Project
  - rtgl-view w=f h=f ph=lg:
      - rtgl-form#form :form=form :context=context w=240 :defaultValues=defaultValues:
          - rvn-file-image#iconImage fileId=${defaultValues.iconFileId} wh=128 slot=icon-file-id bc=bo bw=xs cur=pointer: null
