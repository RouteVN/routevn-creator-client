refs:
  helpFloatingButton:
    eventListeners:
      click:
        handler: handleHelpFloatingButtonClick
  mobileTabItem*:
    eventListeners:
      click:
        handler: handleMobileTabClick
  mobileSheet:
    eventListeners:
      close:
        handler: handleMobileSheetClose
subscriptions:
  - from: routePop
    handler: handleWindowPop
template:
  - 'rtgl-view d=${appShellDirection} w=f h=f style="min-width: 0; min-height: 0; height: 100vh; max-height: 100vh; overflow: hidden;"':
      - $if showSidebar:
          - rvn-sidebar: []
      - 'rtgl-view style="width: ${contentWidth}; height: ${contentHeight}; min-width: 0; min-height: 0; overflow: hidden; box-sizing: border-box; flex-shrink: 1;"':
          - $if isRepositoryLoading:
              - rtgl-view w=f h=f d=v ah=c av=c g=sm:
                  - rtgl-text s=sm c=mu-fg: ${repositoryLoadingStatusText}
            $else:
              - $if currentRoutePattern == "/projects":
                  - rvn-projects: []
                $elif currentRoutePattern == "/authenticate":
                  - rvn-authenticate: []
                $elif currentRoutePattern == "/project":
                  - rvn-project: []
                $elif currentRoutePattern == "/project/images":
                  - rvn-images: []
                $elif currentRoutePattern == "/project/spritesheets":
                  - rvn-spritesheets: []
                $elif currentRoutePattern == "/project/characters":
                  - rvn-characters: []
                $elif currentRoutePattern == "/project/character-sprites":
                  - rvn-character-sprites: []
                $elif currentRoutePattern == "/project/sounds":
                  - rvn-sounds: []
                $elif currentRoutePattern == "/project/transforms":
                  - rvn-transforms: []
                $elif currentRoutePattern == "/project/animations":
                  - rvn-animations: []
                $elif currentRoutePattern == "/project/particles":
                  - rvn-particles: []
                $elif currentRoutePattern == "/project/videos":
                  - rvn-videos: []
                $elif currentRoutePattern == "/project/text-styles":
                  - rvn-text-styles: []
                $elif currentRoutePattern == "/project/appearance":
                  - rvn-appearance: []
                $elif currentRoutePattern == "/project/controls":
                  - rvn-controls: []
                $elif currentRoutePattern == "/project/variables":
                  - rvn-variables: []
                $elif currentRoutePattern == "/project/scenes":
                  - rvn-scenes: []
                $elif currentRoutePattern == "/project/scene-editor":
                  - rvn-scene-editor: []
                $elif currentRoutePattern == "/project/segmented-text-poc":
                  - rvn-segmented-text-poc: []
                $elif currentRoutePattern == "/project/lexical-mentions-poc":
                  - rvn-lexical-mentions-poc: []
                $elif currentRoutePattern == "/project/animation-editor":
                  - rvn-animation-editor: []
                $elif currentRoutePattern == "/project/about":
                  - rvn-about: []
                $elif currentRoutePattern == "/project/user":
                  - rvn-settings-user: []
                $elif currentRoutePattern == "/project/colors":
                  - rvn-colors: []
                $elif currentRoutePattern == "/project/fonts":
                  - rvn-fonts: []
                $elif currentRoutePattern == "/project/layouts":
                  - rvn-layouts: []
                $elif currentRoutePattern == "/project/layout-editor":
                  - rvn-layout-editor: []
                $elif currentRoutePattern == "/project/releases":
                  - rvn-versions: []
                $elif currentRoutePattern == "/project/releases/versions":
                  - rvn-versions: []
                $elif currentRoutePattern == "/project/releases/web-server":
                  - rvn-web-server: []
      - $if showMobileTabBar:
          - 'rtgl-view w=f bgc=bg style="border-top: 1px solid var(--border); padding-bottom: env(safe-area-inset-bottom); flex-shrink: 0;"':
              - rtgl-view w=f h=64 d=h av=c:
                  - $for item, i in mobileTabBarItems:
                      - rtgl-view#mobileTabItem${i} data-tab-id=${item.id} w=1fg h=f d=v ah=c av=c g=xs cur=pointer:
                          - rtgl-svg wh=22 svg=${item.icon} c=mu-fg: null
                          - rtgl-text s=xs c=mu-fg: ${item.label}
  - $if isMobileSheetOpen:
      - rvn-mobile-sheet#mobileSheet ?open=${isMobileSheetOpen}:
          - rvn-mobile-sidebar slot=content variant=${mobileSheetVariant} w=f h=f: []
  - 'rtgl-view#helpFloatingButton pos=fix z=1200 w=56 h=56 ah=c av=c bgc=bg bw=xs bc=bo h-bc=ac br=f cur=pointer style="right: 24px; bottom: ${helpButtonBottom}; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);"':
      - rtgl-text s=h4 c=mu-fg: '?'
