refs:
  fileExplorer:
    eventListeners:
      file-action:
        handler: handleFileExplorerAction
      target-changed:
        handler: handleFileExplorerTargetChanged
      item-click:
        handler: handleFileExplorerSelectionChanged
      dblclick-item:
        handler: handleColorItemDoubleClick
  groupview:
    eventListeners:
      item-click:
        handler: handleColorItemClick
      item-dblclick:
        handler: handleColorItemDoubleClick
      add-click:
        handler: handleAddColorClick
      search-input:
        handler: handleSearchInput
      tag-filter-change:
        handler: handleTagFilterChange
      tag-filter-add-option-click:
        handler: handleTagFilterAddOptionClick
      item-delete:
        handler: handleItemDelete
  fileExplorerKeyboardScope:
    eventListeners:
      click:
        handler: handleFileExplorerKeyboardScopeClick
      keydown:
        handler: handleFileExplorerKeyboardScopeKeyDown
  fileExplorerDetailKeyboardScope:
    eventListeners:
      click:
        handler: handleFileExplorerKeyboardScopeClick
      keydown:
        handler: handleFileExplorerKeyboardScopeKeyDown
  detailColorPreview:
    eventListeners:
      click:
        handler: handleFormFieldClick
  detailHeader:
    eventListeners:
      click:
        handler: handleDetailHeaderClick
  editDialog:
    eventListeners:
      close:
        handler: handleEditDialogClose
  previewDialog:
    eventListeners:
      close:
        handler: handlePreviewDialogClose
  editForm:
    eventListeners:
      form-action:
        handler: handleEditFormAction
      add-option-click:
        handler: handleEditFormAddOptionClick
  addColorDialog:
    eventListeners:
      close:
        handler: handleAddDialogClose
  addColorForm:
    eventListeners:
      form-action:
        handler: handleAddFormAction
      add-option-click:
        handler: handleAddFormAddOptionClick
  detailTagSelect:
    eventListeners:
      value-change:
        handler: handleDetailTagValueChange
      draft-value-change:
        handler: handleDetailTagDraftValueChange
      open-change:
        handler: handleDetailTagOpenChange
      add-option-click:
        handler: handleDetailTagAddOptionClick
  createTagDialog:
    eventListeners:
      close:
        handler: handleCreateTagDialogClose
  createTagForm:
    eventListeners:
      form-action:
        handler: handleCreateTagFormAction
template:
  - 'rtgl-view d=h w=f h=f style="min-width: 0; min-height: 0;"':
      - 'rtgl-view d=h h=f w=f style="min-width: 0; min-height: 0;"':
          - rvn-resizable-panel#fileExplorerPanel w=300 min-w=200 max-w=500 resize-side="right":
              - rtgl-view slot="content" w=f h=f:
                  - rvn-resource-types :resourceCategory=${resourceCategory} :selectedResourceId=${selectedResourceId}: null
                  - rvn-base-file-explorer#fileExplorer :items=${flatItems} shrinkable dropdown-menu allowDrag :folderContextMenuItems=${folderContextMenuItems} :itemContextMenuItems=${itemContextMenuItems} :emptyContextMenuItems=${emptyContextMenuItems}: null
          - 'rtgl-view w=1fg h=f pl=sm style="min-width: 0; min-height: 0;"':
              - 'div#fileExplorerKeyboardScope tabindex=-1 style="width: 100%; height: 100%; min-width: 0; min-height: 0; outline: none;"':
                  - rvn-catalog-resources-view#groupview w=f h=f :navTitle=${title} show-tag-filter :groups=${catalogGroups} :selectedItemId=${selectedItemId} :searchQuery=${searchQuery} :tagFilterOptions=${tagFilterOptions} :selectedTagFilterValues=${selectedTagFilterValues} :tagFilterPlaceholder=${tagFilterPlaceholder} :addText=${addText} :itemContextMenuItems=${centerItemContextMenuItems}: null
          - rvn-resizable-panel panel-type=detail-panel w=270 min-w=200 max-w=500 resize-side="left":
              - rtgl-view wh=f slot="content":
                  - 'div#fileExplorerDetailKeyboardScope tabindex=-1 style="width: 100%; height: 100%; min-width: 0; min-height: 0; outline: none;"':
                      - $if selectedItemId:
                          - rtgl-view d=v w=f h=f:
                              - rtgl-view#detailHeader h=48 w=f d=h bgc=bg bwb=xs ph=md av=c g=sm cur=pointer:
                                  - rtgl-text w=1fg ellipsis=true: ${selectedItemName}
                                  - rtgl-svg svg=edit wh=16: null
                              - rvn-detail-view#detailView key=${selectedItemId} w=f h=1fg :fields=${detailFields}:
                                  - 'rtgl-view#detailColorPreview slot="color-preview" w=f h=130 br=md bw=xs bc=bo cur=pointer style="background-color: ${selectedColorHex};"': null
                                  - rtgl-tag-select#detailTagSelect slot="color-tags" w=f :options=${tagFilterOptions} :selectedValues=${selectedItemTagIds} :draftSelectedValues=${detailTagDraftValues} :open=${isDetailTagSelectOpen} :addOption=${detailTagAddOption} placeholder="Add tag": null
                        $else:
                          - rtgl-view wh=f av=c ah=c bgc=mu-fg:
                              - rtgl-text s=md c=mu-fg: No selection
  - rtgl-dialog#editDialog ?open=${isEditDialogOpen} s=sm:
      - rtgl-form#editForm key=${isEditDialogOpen} slot=content :defaultValues=${editDefaultValues} :form=${editForm}: null
  - rtgl-dialog#previewDialog ?open=${isPreviewDialogOpen} s=md:
      - rtgl-view slot=content d=v g=md:
          - 'rtgl-view w=f h=240 br=md bw=xs bc=bo style="background-color: ${previewColorHex};"': null
  - rtgl-dialog#addColorDialog ?open=${isAddDialogOpen} s=sm:
      - rtgl-form#addColorForm key=${isAddDialogOpen} slot=content :defaultValues=${addDefaultValues} :form=${addForm} w=f: null
  - rtgl-dialog#createTagDialog ?open=${isCreateTagDialogOpen} s=sm:
      - rtgl-form#createTagForm key=${isCreateTagDialogOpen} slot=content :defaultValues=${createTagDefaultValues} :form=${createTagForm} w=f: null
