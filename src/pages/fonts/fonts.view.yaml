refs:
  fileExplorer:
    eventListeners:
      file-action:
        handler: handleFileExplorerAction
      target-changed:
        handler: handleFileExplorerTargetChanged
      item-click:
        handler: handleFileExplorerSelectionChanged
      dblclick-item:
        handler: handleFontItemDoubleClick
  groupview:
    eventListeners:
      item-click:
        handler: handleFontItemClick
      item-dblclick:
        handler: handleFontItemDoubleClick
      item-edit:
        handler: handleFontItemEdit
      files-dropped:
        handler: handleFilesDropped
      upload-click:
        handler: handleUploadClick
      search-input:
        handler: handleSearchInput
      item-delete:
        handler: handleItemDelete
  fileExplorerKeyboardScope:
    eventListeners:
      click:
        handler: handleFileExplorerKeyboardScopeClick
      keydown:
        handler: handleFileExplorerKeyboardScopeKeyDown
  fileExplorerDetailKeyboardScope:
    eventListeners:
      click:
        handler: handleFileExplorerKeyboardScopeClick
      keydown:
        handler: handleFileExplorerKeyboardScopeKeyDown
  fontDialog:
    eventListeners:
      close:
        handler: handleCloseModal
  closeButton:
    eventListeners:
      click:
        handler: handleCloseModal
  detailHeader:
    eventListeners:
      click:
        handler: handleDetailHeaderClick
  editDialog:
    eventListeners:
      close:
        handler: handleEditDialogClose
  editForm:
    eventListeners:
      form-action:
        handler: handleEditFormAction
  editDialogFontPreview:
    eventListeners:
      click:
        handler: handleEditDialogFontClick
  editDialogFontPreviewPlaceholder:
    eventListeners:
      click:
        handler: handleEditDialogFontClick
template:
  - 'rtgl-view d=h w=f h=f style="min-width: 0; min-height: 0;"':
      - 'rtgl-view d=h h=f w=f style="min-width: 0; min-height: 0;"':
          - rvn-resizable-panel#fileExplorerPanel w=300 min-w=200 max-w=500 resize-side="right":
              - rtgl-view slot="content" w=f h=f:
                  - rvn-resource-types :resourceCategory=${resourceCategory} :selectedResourceId=${selectedResourceId}: null
                  - rvn-base-file-explorer#fileExplorer :items=${flatItems} shrinkable dropdown-menu allowDrag :folderContextMenuItems=${folderContextMenuItems} :itemContextMenuItems=${itemContextMenuItems} :emptyContextMenuItems=${emptyContextMenuItems}: null
          - 'rtgl-view w=1fg h=f pl=sm style="min-width: 0; min-height: 0;"':
              - 'div#fileExplorerKeyboardScope tabindex=-1 style="width: 100%; height: 100%; min-width: 0; min-height: 0; outline: none;"':
                  - rvn-media-resources-view#groupview :navTitle=${title} :groups=${mediaGroups} :selectedItemId=${selectedItemId} :searchQuery=${searchQuery} :uploadText=${uploadText} :acceptedFileTypes=${acceptedFileTypes} :itemContextMenuItems=${centerItemContextMenuItems}: null
          - rvn-resizable-panel panel-type=detail-panel w=270 min-w=200 max-w=500 resize-side="left":
              - rtgl-view wh=f slot="content":
                  - 'div#fileExplorerDetailKeyboardScope tabindex=-1 style="width: 100%; height: 100%; min-width: 0; min-height: 0; outline: none;"':
                      - $if selectedItemId:
                          - rtgl-view d=v w=f h=f:
                              - rtgl-view#detailHeader h=48 w=f d=h bgc=bg bwb=xs ph=md av=c g=sm cur=pointer:
                                  - rtgl-text w=1fg ellipsis=true: ${selectedItemName}
                                  - rtgl-svg svg=edit wh=16: null
                              - rvn-detail-view#detailView key=${selectedItemId} w=f h=1fg :fields=${detailFields}: null
                        $else:
                          - rtgl-view wh=f av=c ah=c bgc=mu-fg:
                              - rtgl-text s=md c=mu-fg: No selection
      - rtgl-dialog#editDialog ?open=${isEditDialogOpen} s=md:
          - rtgl-view slot=content g=md:
              - rtgl-form#editForm key=${isEditDialogOpen} :defaultValues=${editDefaultValues} :form=${editForm} w=f:
                  - $if editPreviewFileId:
                      - rtgl-view#editDialogFontPreview slot="font-slot" bw=xs bc=bo br=md p=md cur=pointer:
                          - rvn-font-preview fileId=${editPreviewFileId} fontFamily=${editPreviewFontFamily} previewText="Aa" fontSize=60 width=320 height=120 av=c ah=c: null
                    $else:
                      - rtgl-view#editDialogFontPreviewPlaceholder slot="font-slot" h=120 bw=xs bc=bo br=md av=c ah=c cur=pointer:
                          - rtgl-text c=mu-fg s=sm: Click to Upload
      - rtgl-dialog#fontDialog ?open=${isModalOpen} s=lg:
          - rtgl-view slot="content" p=xl:
              - $if modalFontInfo:
                  - rtgl-view d=v g=md:
                      - $if modalPreviewRows.length:
                          - $for previewRow in modalPreviewRows:
                              - rtgl-view p=md bgc=bg-hover br=sm:
                                  - 'rtgl-view d=h wrap ah=s style="gap: 4px;"':
                                      - $for glyph in previewRow.glyphs:
                                          - rtgl-view wh=40 d=v av=c ah=c br=xs bgc=bg:
                                              - 'rtgl-text style="font-family: ${modalFontInfo.fontFamily}; font-size: 24px; line-height: 1;"': ${glyph.char}
                      - $if modalGlyphList.length:
                          - rtgl-view p=md bgc=bg-hover br=sm:
                              - 'rtgl-view d=h wrap ah=s style="gap: 4px;"':
                                  - $for glyph in modalGlyphList:
                                      - rtgl-view wh=40 d=v av=c ah=c br=xs bgc=bg:
                                          - 'rtgl-text style="font-family: ${modalFontInfo.fontFamily}; font-size: 24px; line-height: 1;"': ${glyph.char}
                $else:
                  - rtgl-view d=v av=c ah=c h=200:
                      - rtgl-text c=mu-fg: Loading...
