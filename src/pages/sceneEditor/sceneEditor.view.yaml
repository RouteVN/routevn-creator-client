refs:
  linesEditor:
    eventListeners:
      editor-data-changed:
        handler: handleEditorDataChanged
      composition-state-changed:
        handler: handleEditorCompositionStateChanged
      editor-blur:
        handler: handleEditorBlur
      newLine:
        handler: handleNewLine
      splitLine:
        handler: handleSplitLine
      line-navigation:
        handler: handleLineNavigation
      mergeLines:
        handler: handleMergeLines
      swapLine:
        handler: handleSwapLine
      delete-action:
        handler: handleLineDeleteActionItem
      pasteLines:
        handler: handlePasteLines
      preview-shortcut:
        handler: handlePreviewShortcut
      dialogue-character-shortcut:
        handler: handleDialogueCharacterShortcut
      delete-line-shortcut:
        handler: handleDeleteLineShortcut
  sectionTab*:
    eventListeners:
      click:
        handler: handleSectionTabClick
      contextmenu:
        handler: handleSectionTabRightClick
  sectionsTabsScroll:
    eventListeners:
      wheel:
        handler: handleSectionsTabsWheel
  sectionAdd:
    eventListeners:
      click:
        handler: handleSectionAddClick
  sectionsOverview:
    eventListeners:
      click:
        handler: handleSectionsOverviewClick
  sectionOverviewRow*:
    eventListeners:
      click:
        handler: handleSectionsOverviewRowClick
  sectionsOverviewWarning*:
    eventListeners:
      mouseenter:
        handler: handleSectionsOverviewWarningMouseEnter
      mouseleave:
        handler: handleSectionsOverviewWarningMouseLeave
  previewCanvasHost: {}
  dropdownMenu:
    eventListeners:
      close:
        handler: handleDropdownMenuClickOverlay
      item-click:
        handler: handleDropdownMenuClickItem
  popover:
    eventListeners:
      close:
        handler: handlePopoverClickOverlay
  form:
    eventListeners:
      form-action:
        handler: handleFormActionClick
  sectionCreateDialog:
    eventListeners:
      close:
        handler: handleSectionCreateDialogClose
  sectionsOverviewDialog:
    eventListeners:
      close:
        handler: handleSectionsOverviewClose
  sectionCreateForm:
    eventListeners:
      form-action:
        handler: handleSectionCreateFormActionClick
  addActionsButton:
    eventListeners:
      click:
        handler: handleAddActionsButtonClick
  toggleSectionsGraphView:
    eventListeners:
      click:
        handler: handleToggleSectionsGraphView
  actionsDialog:
    eventListeners:
      close:
        handler: handleActionsDialogClose
  systemActions:
    eventListeners:
      action-delete:
        handler: handleSystemActionsActionDelete
      actions-change:
        handler: handleCommandLineSubmit
  backButton:
    eventListeners:
      click:
        handler: handleBackClick
  sceneSettingsButton:
    eventListeners:
      click:
        handler: handleSceneSettingsClick
  sceneSettingsDialog:
    eventListeners:
      close:
        handler: handleSceneSettingsDialogClose
  sceneSettingsForm:
    eventListeners:
      form-action:
        handler: handleSceneSettingsFormAction
  previewButton:
    eventListeners:
      click:
        handler: handlePreviewClick
  vnPreview:
    eventListeners:
      close:
        handler: handleHidePreviewScene
  canvas: {}
template:
  - $if isScenePageLoading:
      - rtgl-view d=v w=f h=f av=c ah=c g=sm:
          - rtgl-text s=sm c=mu-fg: Loading scene...
    $else:
      - 'rtgl-view d=h w=f h=f style="min-width: 0; min-height: 0;"':
          - 'rtgl-view w="calc((100vw - 64px) / 2)" d=v h=f style="min-width: 0; min-height: 0;"':
              - rtgl-view bwb=xs w=f h=48 av=c ph=sm d=h:
                  - rtgl-button#backButton sq pre="chevronLeft" v="gh" mr=sm: null
                  - rtgl-view w=1fg d=h av=c:
                      - rtgl-text w=1fg ellipsis=true: ${scene.name}
                      - rtgl-button#sceneSettingsButton sq pre=settings v="gh" ml=sm: null
              - $if sectionsGraphView:
                  - rtgl-view w=f h=1fg:
                      - rtgl-view d=h w=f:
                          - rtgl-view w=1fg: null
                      - rtgl-view:
                          - rtgl-text: ${sectionsGraph}
                $else:
                  - 'rtgl-view#sceneEditorLeftEditor d=v w=f h=1fg style="min-width: 0; min-height: 0;"':
                      - rtgl-view d=h g=xs w=f:
                          - rtgl-view#sectionsTabsScroll d=h sh g=xs:
                              - $for section, sectionIndex in sections:
                                      - rtgl-view#sectionTab${sectionIndex} data-section-id=${section.id} w=120 h=32 av=c ah=c bgc=${section.bgc} cur=pointer:
                                          - rtgl-text s=sm w=80 ta=c ellipsis=true: ${section.name}
                          - rtgl-view#sectionAdd h=32 av=c ph=lg ah=c cur=pointer bgc=mu:
                              - rtgl-text s=sm: +
                          - rtgl-view#sectionsOverview h=32 av=c ph=lg ah=c cur=pointer bgc=mu:
                              - rtgl-text s=sm: ...
                          - rtgl-view w=1fg: null
                      - rtgl-view w=f ph=sm pv=md sv h=1fg:
                          - rvn-lines-editor#linesEditor key=${linesEditorKey} :lines=${currentLines} :selectedLineId=${selectedLineId} :keyboardHandlingDisabled=${previewVisible} :showLineNumbers=${sceneSettings.showLineNumbers}: null
                          - rtgl-view h=30vh: null
          - rtgl-view w=1 h=f bgc=mu: null
          - 'rtgl-view w=1fg d=v h=f style="min-width: 0; min-height: 0;"':
              - rtgl-view bwb=xs w=f h=48 av=c ph=sm d=h jc=e g=sm:
                  - rtgl-button#previewButton: Preview
              - 'rtgl-view w=f h=1fg sv style="min-height: 0;"':
                  - 'rtgl-view w=f style="min-width: 0;"':
                      - 'rtgl-view pos=rel w=f':
                          - rvn-scene-editor-preview-canvas#previewCanvasHost canvas-aspect-ratio="${canvasAspectRatio}": null
                          - $if isSceneAssetLoading:
                              - rtgl-view pos=abs cor=full w=f h=f bgc=bg op=0.7 av=c ah=c:
                                  - rtgl-text s=h3: Loading assets...
                  - rtgl-view w=f h=1 bgc=mu: null
                  - rtgl-view w=f m=md:
                      - rtgl-view d=h av=c:
                          - rtgl-text s=sm c=mu-fg: State
                      - rtgl-view g=md w=f pv=md:
                          - rvn-system-actions#systemActions :showSelected=${true} :actions=${selectedLineActions} :selectedLineId=${selectedLineId} :selectedLine=${selectedLine} :currentSceneId=${scene.id} actionType=presentation :presentationState=${presentationState}: null
      - rtgl-dropdown-menu#dropdownMenu :items=${dropdownMenu.items} x=${dropdownMenu.position.x} y=${dropdownMenu.position.y} ?open=${dropdownMenu.isOpen}: null
      - rtgl-popover#popover ?open=${popover.isOpen} x=${popover.position.x} y=${popover.position.y}:
          - rtgl-form#form slot=content :form=${form}: null
      - rtgl-dialog#sectionCreateDialog ?open=${sectionCreateDialog.isOpen} s=md:
          - rtgl-view slot=content g=md:
              - rtgl-form#sectionCreateForm key=${sectionCreateDialog.formKey} :form=${sectionCreateForm} :defaultValues=${sectionCreateDialog.defaultValues} w=f: null
      - rtgl-dialog#sceneSettingsDialog ?open=${sceneSettingsDialog.isOpen} s=md:
          - rtgl-view slot=content g=md:
              - rtgl-form#sceneSettingsForm key=${sceneSettingsDialog.formKey} :form=${sceneSettingsForm} :defaultValues=${sceneSettingsDialog.defaultValues} w=f: null
      - rtgl-dialog#sectionsOverviewDialog ?open=${sectionsOverviewOpen} s=md:
          - rtgl-view slot=content w=f p=lg br=md:
              - rtgl-text s=sm c=mu-fg: Sections
              - rtgl-view d=v w=f sv g=sm mt=lg h=60vh:
                  - $for section, sectionIndex in sectionsOverviewItems:
                      - rtgl-view#sectionOverviewRow${sectionIndex} data-section-id=${section.id} g=md d=h av=c ph=md bgc=mu h-bgc=ac br=md h=36 w=f cur=pointer:
                          - rtgl-text s=sm w=1fg ellipsis=true: ${section.name}
                          - $if section.isDeadEnd:
                              - rtgl-svg#sectionsOverviewWarning${sectionIndex} data-section-id=${section.id} svg=warning-dead-end wh=16: null
      - rtgl-tooltip ?open=${deadEndTooltip.open} x=${deadEndTooltip.x} y=${deadEndTooltip.y} place="t" content="${deadEndTooltip.content}": null
      - $if previewVisible:
          - rvn-vn-preview#vnPreview scene-id="${previewSceneId}" section-id="${previewSectionId}" line-id="${previewLineId}": null
