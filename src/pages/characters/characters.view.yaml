refs:
  fileExplorer:
    eventListeners:
      file-action:
        handler: handleFileExplorerAction
      target-changed:
        handler: handleFileExplorerTargetChanged
      item-click:
        handler: handleFileExplorerSelectionChanged
      dblclick-item:
        handler: handleSpritesButtonClick
  charactersView:
    eventListeners:
      item-click:
        handler: handleCharacterItemClick
      item-dblclick:
        handler: handleCharacterItemDoubleClick
      sprites-button-click:
        handler: handleSpritesButtonClick
      add-click:
        handler: handleAddCharacterClick
      search-input:
        handler: handleSearchInput
      tag-filter-change:
        handler: handleTagFilterChange
      tag-filter-add-option-click:
        handler: handleTagFilterAddOptionClick
      item-delete:
        handler: handleItemDelete
      menu-click:
        handler: handleMobileFileExplorerOpen
  mobileFileExplorerClose:
    eventListeners:
      click:
        handler: handleMobileFileExplorerClose
  mobileDetailSheet:
    eventListeners:
      close:
        handler: handleMobileDetailSheetClose
  fileExplorerKeyboardScope:
    eventListeners:
      click:
        handler: handleFileExplorerKeyboardScopeClick
      keydown:
        handler: handleFileExplorerKeyboardScopeKeyDown
  fileExplorerDetailKeyboardScope:
    eventListeners:
      click:
        handler: handleFileExplorerKeyboardScopeClick
      keydown:
        handler: handleFileExplorerKeyboardScopeKeyDown
  addCharacterDialog:
    eventListeners:
      close:
        handler: handleCloseDialog
  characterForm:
    eventListeners:
      form-action:
        handler: handleDialogFormActionClick
      add-option-click:
        handler: handleCharacterFormAddOptionClick
  avatarImage:
    eventListeners:
      click:
        handler: handleDialogAvatarClick
  avatarPlaceholder:
    eventListeners:
      click:
        handler: handleDialogAvatarClick
  avatarCropDialog:
    eventListeners:
      close:
        handler: handleAvatarCropDialogClose
      confirm:
        handler: handleAvatarCropDialogConfirm
  editDialog:
    eventListeners:
      close:
        handler: handleEditDialogClose
  editAvatarImage:
    eventListeners:
      click:
        handler: handleEditDialogAvatarClick
  editAvatarPlaceholder:
    eventListeners:
      click:
        handler: handleEditDialogAvatarClick
  editForm:
    eventListeners:
      form-action:
        handler: handleEditFormAction
      add-option-click:
        handler: handleEditFormAddOptionClick
  .spriteGroupAddButton:
    eventListeners:
      click:
        handler: handleSpriteGroupAddClick
  .spriteGroupCard:
    eventListeners:
      click:
        handler: handleSpriteGroupCardClick
      contextmenu:
        handler: handleSpriteGroupContextMenu
  spriteGroupDialog:
    eventListeners:
      close:
        handler: handleSpriteGroupDialogClose
  spriteGroupForm:
    eventListeners:
      form-action:
        handler: handleSpriteGroupFormAction
  spriteGroupDropdownMenu:
    eventListeners:
      close:
        handler: handleSpriteGroupDropdownMenuClose
      item-click:
        handler: handleSpriteGroupDropdownMenuItemClick
  detailHeader:
    eventListeners:
      click:
        handler: handleDetailHeaderClick
  folderNameDialog:
    eventListeners:
      close:
        handler: handleFolderNameDialogClose
  folderNameForm:
    eventListeners:
      form-action:
        handler: handleFolderNameFormAction
  detailTagSelect:
    eventListeners:
      value-change:
        handler: handleDetailTagValueChange
      draft-value-change:
        handler: handleDetailTagDraftValueChange
      open-change:
        handler: handleDetailTagOpenChange
      add-option-click:
        handler: handleDetailTagAddOptionClick
  createTagDialog:
    eventListeners:
      close:
        handler: handleCreateTagDialogClose
  createTagForm:
    eventListeners:
      form-action:
        handler: handleCreateTagFormAction
template:
  - 'rtgl-view d=h w=f h=f style="min-width: 0; min-height: 0;"':
      - 'rtgl-view d=h h=f w=f style="min-width: 0; min-height: 0;"':
          - $if showExplorerPanel:
              - rvn-resizable-panel#fileExplorerPanel w=300 min-w=200 max-w=500 resize-side="right":
                  - rtgl-view slot="content" w=f h=f:
                      - rvn-resource-types :resourceCategory=${resourceCategory} :selectedResourceId=${selectedResourceId}: null
                      - rvn-base-file-explorer#fileExplorer :items=${flatItems} shrinkable dropdown-menu allowDrag :folderContextMenuItems=${folderContextMenuItems} :itemContextMenuItems=${itemContextMenuItems} :emptyContextMenuItems=${emptyContextMenuItems}: null
          - 'rtgl-view w=1fg h=f pl=${contentLeftPadding} style="min-width: 0; min-height: 0;"':
              - 'div#fileExplorerKeyboardScope tabindex=-1 style="width: 100%; height: 100%; min-width: 0; min-height: 0; outline: none;"':
                  - $if showMobileTopTabs:
                      - 'rvn-characters-resources-view#charactersView w=f h=f :navTitle=${title} show-menu-button show-search=false search-in-filter-popover show-tag-filter :mobileLayout=${mobileLayout} :groups=${flatGroups} :selectedItemId=${selectedItemId} :selectedFolderId=${selectedFolderId} :searchQuery=${searchQuery} :tagFilterOptions=${tagFilterOptions} :selectedTagFilterValues=${selectedTagFilterValues} :tagFilterPlaceholder=${tagFilterPlaceholder} :addText=${addText}': null
                    $else:
                      - rvn-characters-resources-view#charactersView w=f h=f :navTitle=${title} search-in-filter-popover :groups=${flatGroups} :selectedItemId=${selectedItemId} :selectedFolderId=${selectedFolderId} :searchQuery=${searchQuery} show-tag-filter :tagFilterOptions=${tagFilterOptions} :selectedTagFilterValues=${selectedTagFilterValues} :tagFilterPlaceholder=${tagFilterPlaceholder} :addText=${addText}: null
          - $if showDetailPanel:
              - rvn-resizable-panel panel-type=detail-panel w=270 min-w=200 max-w=500 resize-side="left":
                  - rtgl-view wh=f slot="content":
                      - 'div#fileExplorerDetailKeyboardScope tabindex=-1 style="width: 100%; height: 100%; min-width: 0; min-height: 0; outline: none;"':
                          - $if selectedDetailId:
                              - rtgl-view d=v w=f h=f:
                                  - rtgl-view#detailHeader h=48 w=f d=h bgc=bg bwb=xs ph=md av=c g=sm cur=pointer:
                                      - rtgl-text w=1fg ellipsis=true: ${selectedDetailName}
                                      - rtgl-svg svg=edit wh=16: null
                                  - rvn-detail-view#detailView key=${selectedDetailId} w=f h=1fg :fields=${detailFields}:
                                      - $if selectedItemId:
                                          - $if selectedAvatarFileId:
                                              - rvn-file-image slot="avatar" w=128 h=128 bw=xs bc=bo br=f fileId="${selectedAvatarFileId}": null
                                            $else:
                                              - rtgl-view slot="avatar" w=128 h=128 av=c ah=c bgc=bg bc=bo bw=xs br=f:
                                                  - rtgl-text c=mu-fg s=sm: No Avatar
                                          - rtgl-tag-select#detailTagSelect slot="character-tags" w=f :options=${tagFilterOptions} :selectedValues=${selectedItemTagIds} :draftSelectedValues=${detailTagDraftValues} :open=${isDetailTagSelectOpen} :addOption=${detailTagAddOption} placeholder="Add tag": null
                                          - 'rtgl-view slot="character-sprite-groups" d=v w=f g=sm':
                                              - $if selectedItemSpriteGroups.length > 0:
                                                  - $for spriteGroup, i in selectedItemSpriteGroups:
                                                      - rtgl-view d=v w=f g=xs p=md bw=xs bc=bo br=md:
                                                          - rtgl-text s=sm: ${spriteGroup.name}
                                                          - rtgl-text s=xs c=mu-fg: ${spriteGroup.tagSummary}
                                                $else:
                                                  - rtgl-text s=xs c=mu-fg: No sprite groups
                            $else:
                              - rtgl-view wh=f av=c ah=c bgc=mu-fg:
                                  - rtgl-text s=md c=mu-fg: No selection
  - $if showMobileFileExplorer:
      - 'rtgl-view pos=fix edge=f z=1250 bgc=bg d=v style="min-width: 0; min-height: 0;"':
          - rtgl-view h=56 w=f d=h av=c ph=md bgc=bg bwb=xs g=md:
              - rtgl-text w=1fg s=md: Files
              - rtgl-view#mobileFileExplorerClose w=40 h=40 ah=c av=c cur=pointer:
                  - rtgl-svg svg=x wh=20 c=mu-fg: null
          - 'rtgl-view w=f h=1fg style="min-height: 0;"':
              - rvn-base-file-explorer#fileExplorer :items=${flatItems} shrinkable dropdown-menu allowDrag :folderContextMenuItems=${folderContextMenuItems} :itemContextMenuItems=${itemContextMenuItems} :emptyContextMenuItems=${emptyContextMenuItems}: null
  - $if showMobileDetailSheet:
      - rvn-mobile-sheet#mobileDetailSheet ?open=${showMobileDetailSheet}:
          - rtgl-view slot=content d=v w=f h=f:
              - rtgl-view#detailHeader h=56 w=f d=h bgc=bg bwb=xs ph=md av=c g=sm cur=pointer:
                  - rtgl-text w=1fg ellipsis=true: ${selectedItemName}
                  - rtgl-svg svg=edit wh=16: null
              - 'rtgl-view w=f h=1fg sv style="min-height: 0;"':
                  - rvn-detail-view#mobileDetailView key=${selectedItemId} w=f :fields=${mobileDetailFields} :fillHeight=${mobileDetailFillHeight}:
                      - rtgl-tag-select#detailTagSelect slot="character-tags" w=f :options=${tagFilterOptions} :selectedValues=${selectedItemTagIds} :draftSelectedValues=${detailTagDraftValues} :open=${isDetailTagSelectOpen} :addOption=${detailTagAddOption} placeholder="Add tag": null
  - rtgl-dialog#folderNameDialog ?open=${isFolderNameDialogOpen} s=sm:
      - rtgl-form#folderNameForm key=${folderNameDialogItemId} slot=content :defaultValues=${folderNameDialogDefaultValues} :form=${folderNameForm} w=f: null
  - rtgl-dialog#addCharacterDialog ?open=${isDialogOpen} s=md:
      - rtgl-view slot=content g=md:
          - rtgl-form#characterForm key=${isDialogOpen} :defaultValues=${dialogDefaultValues} :form=${dialogForm} w=f:
              - $if avatarFileId:
                  - rtgl-view slot=avatar-slot w=120 h=120 av=c ah=c:
                      - rvn-file-image#avatarImage fileId=${avatarFileId} w=120 h=120 cur=pointer br=md: null
                $else:
                  - rtgl-view slot=avatar-slot w=120 h=120 av=c ah=c:
                      - rtgl-view#avatarPlaceholder w=120 h=120 av=c ah=c bgc=bg bc=bo bw=xs br=md cur=pointer:
                          - rtgl-text c=mu-fg s=sm: Click to Upload
  - rtgl-dialog#editDialog ?open=${isEditDialogOpen} s=md:
      - rtgl-view slot=content g=md:
          - rtgl-form#editForm key=${isEditDialogOpen} :defaultValues=${editDefaultValues} :form=${editForm} w=f:
              - $if editAvatarFileId:
                  - rtgl-view slot=avatar-slot w=120 h=120 av=c ah=c:
                      - rvn-file-image#editAvatarImage fileId=${editAvatarFileId} w=120 h=120 cur=pointer br=md: null
                $else:
                  - rtgl-view slot=avatar-slot w=120 h=120 av=c ah=c:
                      - rtgl-view#editAvatarPlaceholder w=120 h=120 av=c ah=c bgc=bg bc=bo bw=xs br=md cur=pointer:
                          - rtgl-text c=mu-fg s=sm: Click to Upload
              - 'rtgl-view slot="sprite-groups-slot" d=v w=f g=md':
                  - $if editSpriteGroupTagOptions.length > 0:
                      - rtgl-view d=h w=f ah=e:
                          - rtgl-view w=1fg: null
                          - rtgl-button.spriteGroupAddButton data-target=edit s=sm v=gh pre=plus: Add Group
                      - $if editSpriteGroups.length > 0:
                          - $for spriteGroup, i in editSpriteGroups:
                              - rtgl-view.spriteGroupCard data-target=edit data-index=${i} d=v w=f g=xs p=md bw=xs bc=bo h-bc=ac br=md cur=pointer:
                                  - rtgl-text s=sm: ${spriteGroup.name}
                                  - $if spriteGroup.tagSummary:
                                      - rtgl-text s=xs c=mu-fg: ${spriteGroup.tagSummary}
                        $else:
                          - rtgl-view w=f p=md bgc=mu br=md:
                              - rtgl-text s=xs c=mu-fg: No sprite groups yet
                    $else:
                      - rtgl-view w=f p=md bgc=mu br=md:
                          - rtgl-text s=xs c=mu-fg: ${editSpriteGroupsMessage}
  - rtgl-dialog#spriteGroupDialog ?open=${isSpriteGroupDialogOpen} s=sm:
      - rtgl-form#spriteGroupForm key=${isSpriteGroupDialogOpen} slot=content :defaultValues=${spriteGroupDialogDefaultValues} :form=${spriteGroupDialogForm} w=f: null
  - rtgl-dialog#createTagDialog ?open=${isCreateTagDialogOpen} s=sm:
      - rtgl-form#createTagForm key=${isCreateTagDialogOpen} slot=content :defaultValues=${createTagDefaultValues} :form=${createTagForm} w=f: null
  - rtgl-dropdown-menu#spriteGroupDropdownMenu :items=${spriteGroupDropdownMenu.items} ?open=${spriteGroupDropdownMenu.isOpen} x=${spriteGroupDropdownMenu.x} y=${spriteGroupDropdownMenu.y}: null
  - rvn-square-image-crop-dialog#avatarCropDialog :open=${isAvatarCropDialogOpen} :file=${avatarCropFile}: null
