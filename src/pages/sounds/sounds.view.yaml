refs:
  fileExplorer:
    eventListeners:
      file-action:
        handler: handleFileExplorerAction
      target-changed:
        handler: handleFileExplorerTargetChanged
      item-click:
        handler: handleFileExplorerSelectionChanged
      dblclick-item:
        handler: handleFileExplorerDoubleClick
  groupview:
    eventListeners:
      item-click:
        handler: handleSoundItemClick
      item-dblclick:
        handler: handleSoundItemDoubleClick
      item-preview:
        handler: handleSoundItemPreview
      item-edit:
        handler: handleSoundItemEdit
      files-dropped:
        handler: handleFilesDropped
      files-drop-rejected:
        handler: handleFilesDropRejected
      upload-click:
        handler: handleUploadClick
      search-input:
        handler: handleSearchInput
      tag-filter-change:
        handler: handleTagFilterChange
      tag-filter-add-option-click:
        handler: handleTagFilterAddOptionClick
      item-delete:
        handler: handleItemDelete
      menu-click:
        handler: handleMobileFileExplorerOpen
  mobileFileExplorerClose:
    eventListeners:
      click:
        handler: handleMobileFileExplorerClose
  mobileDetailSheet:
    eventListeners:
      close:
        handler: handleMobileDetailSheetClose
  fileExplorerKeyboardScope:
    eventListeners:
      click:
        handler: handleFileExplorerKeyboardScopeClick
      keydown:
        handler: handleFileExplorerKeyboardScopeKeyDown
  fileExplorerDetailKeyboardScope:
    eventListeners:
      click:
        handler: handleFileExplorerKeyboardScopeClick
      keydown:
        handler: handleFileExplorerKeyboardScopeKeyDown
  rvnAudioPlayer:
    eventListeners:
      audio-player-close:
        handler: handleAudioPlayerClose
  detailWaveform:
    eventListeners:
      click:
        handler: handleFormExtraEvent
  detailWaveformPlaceholder:
    eventListeners:
      click:
        handler: handleFormExtraEvent
  detailHeader:
    eventListeners:
      click:
        handler: handleDetailHeaderClick
  editDialog:
    eventListeners:
      close:
        handler: handleEditDialogClose
  editForm:
    eventListeners:
      form-action:
        handler: handleEditFormAction
      add-option-click:
        handler: handleEditFormAddOptionClick
  editDialogWaveform:
    eventListeners:
      click:
        handler: handleEditDialogSoundClick
  editDialogWaveformPlaceholder:
    eventListeners:
      click:
        handler: handleEditDialogSoundClick
  detailTagSelect:
    eventListeners:
      value-change:
        handler: handleDetailTagValueChange
      draft-value-change:
        handler: handleDetailTagDraftValueChange
      open-change:
        handler: handleDetailTagOpenChange
      add-option-click:
        handler: handleDetailTagAddOptionClick
  createTagDialog:
    eventListeners:
      close:
        handler: handleCreateTagDialogClose
  createTagForm:
    eventListeners:
      form-action:
        handler: handleCreateTagFormAction
template:
  - 'rtgl-view d=h w=f h=f style="min-width: 0; min-height: 0;"':
      - 'rtgl-view d=h h=f w=f style="min-width: 0; min-height: 0;"':
          - $if showExplorerPanel:
              - rvn-resizable-panel#fileExplorerPanel w=300 min-w=200 max-w=500 resize-side="right":
                  - rtgl-view slot="content" w=f h=f:
                      - rvn-resource-types :resourceCategory=${resourceCategory} :selectedResourceId=${selectedResourceId}: null
                      - rvn-base-file-explorer#fileExplorer :items=${flatItems} shrinkable dropdown-menu allowDrag :folderContextMenuItems=${folderContextMenuItems} :itemContextMenuItems=${itemContextMenuItems} :emptyContextMenuItems=${emptyContextMenuItems}: null
          - 'rtgl-view w=1fg h=f pl=${contentLeftPadding} style="min-width: 0; min-height: 0;"':
              - 'div#fileExplorerKeyboardScope tabindex=-1 style="width: 100%; height: 100%; min-width: 0; min-height: 0; outline: none;"':
                  - $if showMobileTopTabs:
                      - 'rtgl-view d=v w=f h=f style="min-width: 0; min-height: 0;"':
                          - 'rvn-media-resources-view#groupview w=f h=f :navTitle=${title} show-menu-button show-search=false show-tag-filter :mobileLayout=${mobileLayout} :groups=${mediaGroups} :selectedItemId=${selectedItemId} :searchQuery=${searchQuery} :tagFilterOptions=${tagFilterOptions} :selectedTagFilterValues=${selectedTagFilterValues} :tagFilterPlaceholder=${tagFilterPlaceholder} :uploadText=${uploadText} :acceptedFileTypes=${acceptedFileTypes} :itemContextMenuItems=${centerItemContextMenuItems}': null
                    $else:
                      - rvn-media-resources-view#groupview w=f h=f :navTitle=${title} show-tag-filter :groups=${mediaGroups} :selectedItemId=${selectedItemId} :searchQuery=${searchQuery} :tagFilterOptions=${tagFilterOptions} :selectedTagFilterValues=${selectedTagFilterValues} :tagFilterPlaceholder=${tagFilterPlaceholder} :uploadText=${uploadText} :acceptedFileTypes=${acceptedFileTypes} :itemContextMenuItems=${centerItemContextMenuItems}: null
          - $if showDetailPanel:
              - rvn-resizable-panel panel-type=detail-panel w=270 min-w=200 max-w=500 resize-side="left":
                  - rtgl-view wh=f slot="content":
                      - 'div#fileExplorerDetailKeyboardScope tabindex=-1 style="width: 100%; height: 100%; min-width: 0; min-height: 0; outline: none;"':
                          - $if selectedItemId:
                              - rtgl-view d=v w=f h=f:
                                  - rtgl-view#detailHeader h=48 w=f d=h bgc=bg bwb=xs ph=md av=c g=sm cur=pointer:
                                      - rtgl-text w=1fg ellipsis=true: ${selectedItemName}
                                      - rtgl-svg svg=edit wh=16: null
                                  - rvn-detail-view#detailView key=${selectedItemId} w=f h=1fg :fields=${detailFields}:
                                      - $if selectedPreviewFileId:
                                          - rtgl-view slot="sound-waveform" p=sm bw=xs bc=bo br=md cur=pointer:
                                              - rvn-waveform-visualizer#detailWaveform waveformDataFileId=${selectedPreviewFileId} w=220 h=100: null
                                        $else:
                                          - rtgl-view#detailWaveformPlaceholder slot="sound-waveform" w=f h=100 av=c ah=c bgc=bg bc=bo bw=xs br=md cur=pointer:
                                              - rtgl-text c=mu-fg s=sm: Click to Upload
                                      - rtgl-tag-select#detailTagSelect slot="sound-tags" w=f :options=${tagFilterOptions} :selectedValues=${selectedItemTagIds} :draftSelectedValues=${detailTagDraftValues} :open=${isDetailTagSelectOpen} :addOption=${detailTagAddOption} placeholder="Add tag": null
                            $else:
                              - rtgl-view wh=f av=c ah=c bgc=mu-fg:
                                  - rtgl-text s=md c=mu-fg: No selection
  - $if showMobileFileExplorer:
      - 'rtgl-view pos=fix edge=f z=1250 bgc=bg d=v style="min-width: 0; min-height: 0;"':
          - rtgl-view h=56 w=f d=h av=c ph=md bgc=bg bwb=xs g=md:
              - rtgl-text w=1fg s=md: Files
              - rtgl-view#mobileFileExplorerClose w=40 h=40 ah=c av=c cur=pointer:
                  - rtgl-svg svg=x wh=20 c=mu-fg: null
          - 'rtgl-view w=f h=1fg style="min-height: 0;"':
              - rvn-base-file-explorer#fileExplorer :items=${flatItems} shrinkable dropdown-menu allowDrag :folderContextMenuItems=${folderContextMenuItems} :itemContextMenuItems=${itemContextMenuItems} :emptyContextMenuItems=${emptyContextMenuItems}: null
  - $if showMobileDetailSheet:
      - rvn-mobile-sheet#mobileDetailSheet ?open=${showMobileDetailSheet}:
          - rtgl-view slot=content d=v w=f h=f:
              - rtgl-view#detailHeader h=56 w=f d=h bgc=bg bwb=xs ph=md av=c g=sm cur=pointer:
                  - rtgl-text w=1fg ellipsis=true: ${selectedItemName}
                  - rtgl-svg svg=edit wh=16: null
              - 'rtgl-view w=f h=1fg sv style="min-height: 0;"':
                  - rvn-detail-view#mobileDetailView key=${selectedItemId} w=f :fields=${mobileDetailFields} :fillHeight=${mobileDetailFillHeight}:
                      - rtgl-tag-select#detailTagSelect slot="sound-tags" w=f :options=${tagFilterOptions} :selectedValues=${selectedItemTagIds} :draftSelectedValues=${detailTagDraftValues} :open=${isDetailTagSelectOpen} :addOption=${detailTagAddOption} placeholder="Add tag": null
  - rtgl-dialog#editDialog ?open=${isEditDialogOpen} s=md:
      - rtgl-view slot=content g=md:
          - rtgl-form#editForm key=${isEditDialogOpen} :defaultValues=${editDefaultValues} :form=${editForm} w=f:
              - $if editPreviewFileId:
                  - rtgl-view slot="sound-slot" p=sm bw=xs bc=bo br=md cur=pointer:
                      - rvn-waveform-visualizer#editDialogWaveform waveformDataFileId=${editPreviewFileId} w=400 h=110: null
                $else:
                  - rtgl-view#editDialogWaveformPlaceholder slot="sound-slot" w=f h=110 av=c ah=c bgc=bg bc=bo bw=xs br=md cur=pointer:
                      - rtgl-text c=mu-fg s=sm: Click to Upload
  - rtgl-dialog#createTagDialog ?open=${isCreateTagDialogOpen} s=sm:
      - rtgl-form#createTagForm key=${isCreateTagDialogOpen} slot=content :defaultValues=${createTagDefaultValues} :form=${createTagForm} w=f: null
  - $if showAudioPlayer:
      - 'rtgl-view h=72 pos=fix edge=b z=1001 style="left: ${audioPlayerLeft}px; right: ${audioPlayerRight}px;"':
          - rvn-audio-player#rvnAudioPlayer fileId=${playingSound.fileId} autoPlay=true :title=${playingSound.title}: null
