refs:
  sectionEditor*:
    eventListeners:
      scene-lines-changed:
        handler: handleEditorDataChanged
      composition-state-changed:
        handler: handleEditorCompositionStateChanged
      editor-blur:
        handler: handleEditorBlur
      selected-line-changed:
        handler: handleSelectedLineChanged
      newLine:
        handler: handleNewLine
      preview-shortcut:
        handler: handlePreviewShortcut
      swapLine:
        handler: handleSwapLine
      dialogue-character-shortcut:
        handler: handleDialogueCharacterShortcut
      delete-line-shortcut:
        handler: handleDeleteLineShortcut
      line-context-menu-request:
        handler: handleLineContextMenuRequest
      line-context-menu-dismiss:
        handler: handleLineContextMenuDismiss
  sectionHeader*:
    eventListeners:
      contextmenu:
        handler: handleSectionTabRightClick
  sectionMenu*:
    eventListeners:
      click:
        handler: handleSectionMenuClick
  sectionsOverview:
    eventListeners:
      click:
        handler: handleSectionsOverviewClick
  sectionOverviewRow*:
    eventListeners:
      click:
        handler: handleSectionsOverviewRowClick
  sectionsOverviewWarning*:
    eventListeners:
      mouseenter:
        handler: handleSectionsOverviewWarningMouseEnter
      mouseleave:
        handler: handleSectionsOverviewWarningMouseLeave
  dropdownMenu:
    eventListeners:
      close:
        handler: handleDropdownMenuClickOverlay
      item-click:
        handler: handleDropdownMenuClickItem
  popover:
    eventListeners:
      close:
        handler: handlePopoverClickOverlay
  form:
    eventListeners:
      form-action:
        handler: handleFormActionClick
  sectionCreateDialog:
    eventListeners:
      close:
        handler: handleSectionCreateDialogClose
  sectionMoveSceneDialog:
    eventListeners:
      close:
        handler: handleSectionMoveSceneDialogClose
  sectionsOverviewDialog:
    eventListeners:
      close:
        handler: handleSectionsOverviewClose
  sectionCreateForm:
    eventListeners:
      form-action:
        handler: handleSectionCreateFormActionClick
  sectionMoveSceneForm:
    eventListeners:
      form-action:
        handler: handleSectionMoveSceneFormActionClick
  addActionsButton:
    eventListeners:
      click:
        handler: handleAddActionsButtonClick
  toggleSectionsGraphView:
    eventListeners:
      click:
        handler: handleToggleSectionsGraphView
  actionsDialog:
    eventListeners:
      close:
        handler: handleActionsDialogClose
  systemActions:
    eventListeners:
      actions-dialog-open:
        handler: handleSystemActionsDialogOpen
      action-delete:
        handler: handleSystemActionsActionDelete
      actions-change:
        handler: handleCommandLineSubmit
      temporary-presentation-state-change:
        handler: handleTemporaryPresentationStateChange
      background-transform-customize:
        handler: handleBackgroundTransformCustomize
      background-transform-editor-done:
        handler: handleBackgroundTransformEditorDone
      background-transform-editor-cancel:
        handler: handleBackgroundTransformEditorCancel
      action-transform-customize:
        handler: handleActionTransformCustomize
      action-transform-editor-done:
        handler: handleActionTransformEditorDone
      close:
        handler: handleActionsDialogClose
  backButton:
    eventListeners:
      click:
        handler: handleBackClick
  sceneSettingsButton:
    eventListeners:
      click:
        handler: handleSceneSettingsClick
  sceneSettingsDialog:
    eventListeners:
      close:
        handler: handleSceneSettingsDialogClose
  sceneSettingsForm:
    eventListeners:
      form-action:
        handler: handleSceneSettingsFormAction
  previewButton:
    eventListeners:
      mousedown:
        handler: handlePreviewButtonMouseDown
      click:
        handler: handlePreviewClick
  vnPreview:
    eventListeners:
      close:
        handler: handleHidePreviewScene
      current-line-changed:
        handler: handlePreviewCurrentLineChanged
  previewCanvasHost: {}
  mobileKeyboardToolbar:
    eventListeners:
      action-click:
        handler: handleMobileKeyboardToolbarActionClick
      keyboard-state-change:
        handler: handleMobileKeyboardStateChange
template:
  - 'rtgl-view pos=rel w=f h=f style="min-width: 0; min-height: 0;"':
      - $if isTouchMode:
          - 'rtgl-view pos=fix d=v bgc=bg style="z-index: 1100; left: 0; right: 0; top: 0; bottom: ${mobileSceneEditorBottomInset}; min-width: 0; min-height: 0; overflow: hidden; overscroll-behavior: none;"':
              - 'rtgl-view w=f bwb=xs style="min-width: 0; flex-shrink: 0;"':
                  - $if backgroundTransformEditor.isOpen == false:
                      - 'rtgl-view w=f p=sm style="min-width: 0;"':
                          - 'div style="position: relative; width: ${mobilePreviewCanvasMaxWidth}; max-width: 100%; margin-left: auto; margin-right: auto;"':
                              - 'rvn-scene-editor-preview-canvas#previewCanvasHost style="display: block; width: 100%;" canvas-aspect-ratio="${canvasAspectRatio}"': null
                              - $if isSceneAssetLoading:
                                  - rtgl-view pos=abs cor=full w=f h=f bgc=bg op=0.7 av=c ah=c:
                                      - rtgl-text s=h3: ${loadingAssetsLabel}
              - $if sectionsGraphView:
                  - rtgl-view w=f h=1fg sv:
                      - rtgl-text: ${sectionsGraph}
                $else:
                  - 'rtgl-view#sceneEditorLeftEditor d=v w=f h=1fg style="min-width: 0; min-height: 0;"':
                      - 'rtgl-view#sceneEditorSectionsScroll w=f ph=sm pb=md sv h=1fg style="min-width: 0; scroll-behavior: smooth; scroll-padding-top: 40px; overscroll-behavior: contain;"':
                          - $for section, sectionIndex in sectionEditorItems:
                              - 'rtgl-view#sectionBlock${sectionIndex} data-section-block-id=${section.id} data-section-id=${section.id} w=f mb=xl style="min-width: 0; scroll-margin-top: 0;"':
                                  - 'rtgl-view#sectionHeader${sectionIndex} data-section-id=${section.id} d=h av=c h=40 bgc=bg bwb=xs style="position: sticky; top: 0px; z-index: 5; min-width: 0; box-sizing: border-box; width: calc(100% + var(--spacing-md)); margin-left: calc(var(--spacing-sm) * -1); padding-left: var(--spacing-md); padding-right: var(--spacing-sm);"':
                                      - rtgl-text s=sm w=1fg ellipsis=true: ${section.name}
                                      - rtgl-button#sectionMenu${sectionIndex} data-section-id=${section.id} sq v=gh s=sm pre=ellipsis: null
                                  - rvn-scene-document-editor-lexical#sectionEditor${sectionIndex} key=${section.editorKey} data-section-id=${section.id} :lines=${section.documentEditorLines} :lineDecorations=${section.documentLineDecorations} :selectionActive=${section.selectionActive} :selectedLineId=${section.selectedLineId} :hasPreviousSectionLine=${section.hasPreviousSectionLine} :hasNextSectionLine=${section.hasNextSectionLine} :showLineNumbers=${sceneSettings.showLineNumbers} :fontSize=${sceneSettings.fontSize} :textStyles=${textStyles} :mentionTargets=${mentionTargets}: null
                          - rtgl-view h=${mobileEditorBottomSpacerHeight}: null
              - rvn-mobile-keyboard-toolbar#mobileKeyboardToolbar: null
              - 'rvn-system-actions#systemActions :actions=${selectedLineActions} :selectedLineId=${selectedLineId} :selectedLine=${selectedLine} :currentSceneId=${scene.id} actionType=presentation :presentationState=${presentationState} :backgroundTransformEditor=${backgroundTransformEditor} :suppressDialogClose=${backgroundTransformEditor.suppressActionsDialogClose}': null
        $else:
          - 'rtgl-view d=h w=f h=f style="min-width: 0; min-height: 0;"':
              - 'rtgl-view w="calc((100vw - 64px) / 2)" d=v h=f style="min-width: 0; min-height: 0;"':
                  - rtgl-view bwb=xs w=f h=48 av=c ph=sm d=h:
                      - rtgl-button#backButton sq pre=chevronLeft v=ol mr=sm: null
                      - rtgl-view w=1fg d=h av=c:
                          - rtgl-text w=1fg ellipsis=true: ${scene.name}
                          - rtgl-button#sectionsOverview sq pre=hamburger v=ol ml=sm: null
                          - rtgl-button#sceneSettingsButton sq pre=settings v=ol: null
                  - $if sectionsGraphView:
                      - rtgl-view w=f h=1fg:
                          - rtgl-view d=h w=f:
                              - rtgl-view w=1fg: null
                          - rtgl-view:
                              - rtgl-text: ${sectionsGraph}
                    $else:
                      - 'rtgl-view#sceneEditorLeftEditor d=v w=f h=1fg style="min-width: 0; min-height: 0;"':
                          - 'rtgl-view#sceneEditorSectionsScroll w=f ph=sm pb=md sv h=1fg style="min-width: 0; scroll-behavior: smooth; scroll-padding-top: 40px;"':
                              - $for section, sectionIndex in sectionEditorItems:
                                  - 'rtgl-view#sectionBlock${sectionIndex} data-section-block-id=${section.id} data-section-id=${section.id} w=f mb=xl style="min-width: 0; scroll-margin-top: 0;"':
                                      - 'rtgl-view#sectionHeader${sectionIndex} data-section-id=${section.id} d=h av=c h=40 bgc=bg bwb=xs style="position: sticky; top: 0px; z-index: 5; min-width: 0; box-sizing: border-box; width: calc(100% + var(--spacing-md)); margin-left: calc(var(--spacing-sm) * -1); padding-left: var(--spacing-md); padding-right: var(--spacing-sm);"':
                                          - rtgl-text s=sm w=1fg ellipsis=true: ${section.name}
                                          - rtgl-button#sectionMenu${sectionIndex} data-section-id=${section.id} sq v=gh s=sm pre=ellipsis: null
                                      - rvn-scene-document-editor-lexical#sectionEditor${sectionIndex} key=${section.editorKey} data-section-id=${section.id} :lines=${section.documentEditorLines} :lineDecorations=${section.documentLineDecorations} :selectionActive=${section.selectionActive} :selectedLineId=${section.selectedLineId} :hasPreviousSectionLine=${section.hasPreviousSectionLine} :hasNextSectionLine=${section.hasNextSectionLine} :showLineNumbers=${sceneSettings.showLineNumbers} :fontSize=${sceneSettings.fontSize} :textStyles=${textStyles} :mentionTargets=${mentionTargets}: null
                              - rtgl-view h=30vh: null
              - rtgl-view w=1 h=f bgc=mu: null
              - 'rtgl-view w=1fg d=v h=f style="min-width: 0; min-height: 0;"':
                  - rtgl-view bwb=xs w=f h=48 av=c ph=sm d=h jc=e g=sm:
                      - rtgl-button#previewButton: ${previewButton}
                  - 'rtgl-view w=f h=1fg sv style="min-height: 0;"':
                      - $if backgroundTransformEditor.isOpen == false:
                          - 'rtgl-view w=f style="min-width: 0;"':
                              - 'div style="position: relative; width: ${previewCanvasMaxWidth}; max-width: 100%; margin-left: auto; margin-right: auto;"':
                                  - 'rvn-scene-editor-preview-canvas#previewCanvasHost style="display: block; width: 100%;" canvas-aspect-ratio="${canvasAspectRatio}"': null
                                  - $if isSceneAssetLoading:
                                      - rtgl-view pos=abs cor=full w=f h=f bgc=bg op=0.7 av=c ah=c:
                                          - rtgl-text s=h3: ${loadingAssetsLabel}
                      - rtgl-view w=f h=1 bgc=mu: null
                      - rtgl-view w=f m=md:
                          - rtgl-view d=h av=c:
                              - rtgl-text s=sm c=mu-fg: ${stateTitle}
                          - rtgl-view g=md w=f pv=md:
                              - 'rvn-system-actions#systemActions :showSelected=${true} :actions=${selectedLineActions} :selectedLineId=${selectedLineId} :selectedLine=${selectedLine} :currentSceneId=${scene.id} actionType=presentation :presentationState=${presentationState} :backgroundTransformEditor=${backgroundTransformEditor} dialog-variant=scene-editor-left dialog-panel-width="${systemActionsDialogPanelWidth}" :suppressDialogClose=${backgroundTransformEditor.suppressActionsDialogClose}': null
      - rtgl-dropdown-menu#dropdownMenu :items=${dropdownMenu.items} x=${dropdownMenu.position.x} y=${dropdownMenu.position.y} ?open=${dropdownMenu.isOpen}: null
      - rtgl-popover#popover ?open=${popover.isOpen} x=${popover.position.x} y=${popover.position.y}:
          - rtgl-form#form slot=content :form=${form}: null
      - rtgl-dialog#sectionCreateDialog ?open=${sectionCreateDialog.isOpen} s=md:
          - rtgl-view slot=content g=md:
              - rtgl-form#sectionCreateForm key=${sectionCreateDialog.formKey} :form=${sectionCreateForm} :defaultValues=${sectionCreateDialog.defaultValues} w=f: null
      - rtgl-dialog#sectionMoveSceneDialog ?open=${sectionMoveSceneDialog.isOpen} s=md:
          - rtgl-view slot=content g=md:
              - rtgl-form#sectionMoveSceneForm key=${sectionMoveSceneDialog.formKey} :form=${sectionMoveSceneForm} :defaultValues=${sectionMoveSceneDialog.defaultValues} w=f: null
      - rtgl-dialog#sceneSettingsDialog ?open=${sceneSettingsDialog.isOpen} s=md:
          - rtgl-view slot=content g=md:
              - rtgl-form#sceneSettingsForm key=${sceneSettingsDialog.formKey} :form=${sceneSettingsForm} :defaultValues=${sceneSettingsDialog.defaultValues} w=f: null
      - rtgl-dialog#sectionsOverviewDialog ?open=${sectionsOverviewOpen} s=md:
          - rtgl-view slot=content w=f p=lg br=md:
              - rtgl-text s=sm c=mu-fg: ${sectionsTitle}
              - rtgl-view d=v w=f sv g=sm mt=lg h=60vh:
                  - $for section, sectionIndex in sectionsOverviewItems:
                      - rtgl-view#sectionOverviewRow${sectionIndex} data-section-id=${section.id} g=md d=h av=c ph=md bgc=mu h-bgc=ac br=md h=36 w=f cur=pointer:
                          - rtgl-text s=sm w=1fg ellipsis=true: ${section.name}
                          - $if section.isDeadEnd:
                              - rtgl-svg#sectionsOverviewWarning${sectionIndex} data-section-id=${section.id} svg=warning-dead-end wh=16: null
      - rtgl-tooltip ?open=${deadEndTooltip.open} x=${deadEndTooltip.x} y=${deadEndTooltip.y} place="t" content="${deadEndTooltip.content}": null
      - $if previewVisible:
          - rvn-vn-preview#vnPreview scene-id="${previewSceneId}" section-id="${previewSectionId}" line-id="${previewLineId}": null
      - $if isScenePageLoading:
          - 'rtgl-view pos=abs edge=f z=1000 bgc=bg av=c ah=c style="pointer-events: auto;"':
              - rtgl-text s=sm c=mu-fg: ${loadingSceneLabel}
