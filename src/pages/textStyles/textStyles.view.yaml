refs:
  fileExplorer:
    eventListeners:
      file-action:
        handler: handleFileExplorerAction
      target-changed:
        handler: handleFileExplorerTargetChanged
      item-click:
        handler: handleFileExplorerSelectionChanged
      selection-cleared:
        handler: handleFileExplorerSelectionChanged
      dblclick-item:
        handler: handleTextStyleItemDoubleClick
  typographyView:
    eventListeners:
      background-click:
        handler: handleResourceViewBackgroundClick
      item-click:
        handler: handleTextStyleItemClick
      item-edit:
        handler: handleTextStyleItemEdit
      item-dblclick:
        handler: handleTextStyleItemDoubleClick
      item-duplicate:
        handler: handleItemDuplicate
      add-click:
        handler: handleAddTextStyleClick
      search-input:
        handler: handleSearchInput
      tag-filter-change:
        handler: handleTagFilterChange
      tag-filter-add-option-click:
        handler: handleTagFilterAddOptionClick
      item-delete:
        handler: handleItemDelete
      menu-click:
        handler: handleMobileFileExplorerOpen
  mobileFileExplorerClose:
    eventListeners:
      click:
        handler: handleMobileFileExplorerClose
  mobileDetailSheet:
    eventListeners:
      close:
        handler: handleMobileDetailSheetClose
  mobileDetailEditButton:
    eventListeners:
      click:
        handler: handleMobileDetailEditClick
        preventDefault: true
        stopPropagation: true
  mobileDetailDuplicateButton:
    eventListeners:
      click:
        handler: handleMobileDetailDuplicateClick
        preventDefault: true
        stopPropagation: true
  mobileDetailDeleteButton:
    eventListeners:
      click:
        handler: handleMobileDetailDeleteClick
        preventDefault: true
        stopPropagation: true
  fileExplorerKeyboardScope:
    eventListeners:
      click:
        handler: handleFileExplorerKeyboardScopeClick
      keydown:
        handler: handleFileExplorerKeyboardScopeKeyDown
  fileExplorerDetailKeyboardScope:
    eventListeners:
      click:
        handler: handleFileExplorerKeyboardScopeClick
      keydown:
        handler: handleFileExplorerKeyboardScopeKeyDown
  detailTextStylePreview:
    eventListeners:
      click:
        handler: handleFormExtraEvent
  detailHeader:
    eventListeners:
      click:
        handler: handleDetailHeaderClick
  folderNameDialog:
    eventListeners:
      close:
        handler: handleFolderNameDialogClose
  folderNameForm:
    eventListeners:
      form-action:
        handler: handleFolderNameFormAction
  addTypographyDialog:
    eventListeners:
      close:
        handler: handleCloseDialog
  textStyleForm:
    eventListeners:
      form-action:
        handler: handleFormActionClick
      form-change:
        handler: handleDialogFormChange
      add-option-click:
        handler: handleTextStyleFormAddOptionClick
      keydown:
        handler: handleDesktopTextStyleFormKeyDown
  desktopTextStyleSubmitButton:
    eventListeners:
      click:
        handler: handleDesktopTextStyleSubmitClick
  previewTextInput:
    eventListeners:
      value-input:
        handler: handlePreviewTextInput
      value-change:
        handler: handlePreviewTextInput
  addColorDialog:
    eventListeners:
      close:
        handler: handleAddColorDialogClose
  addColorForm:
    eventListeners:
      form-action:
        handler: handleAddColorFormAction
  addFontDialog:
    eventListeners:
      close:
        handler: handleAddFontDialogClose
  fontDragDrop:
    eventListeners:
      file-selected:
        handler: handleFontFileSelected
      file-rejected:
        handler: handleFontFileRejected
  addFontForm:
    eventListeners:
      form-action:
        handler: handleAddFontFormAction
  detailTagSelect:
    eventListeners:
      value-change:
        handler: handleDetailTagValueChange
      draft-value-change:
        handler: handleDetailTagDraftValueChange
      open-change:
        handler: handleDetailTagOpenChange
      add-option-click:
        handler: handleDetailTagAddOptionClick
  createTagDialog:
    eventListeners:
      close:
        handler: handleCreateTagDialogClose
  createTagForm:
    eventListeners:
      form-action:
        handler: handleCreateTagFormAction
template:
  - 'rtgl-view d=h w=f h=f style="min-width: 0; min-height: 0;"':
      - 'rtgl-view d=h h=f w=f style="min-width: 0; min-height: 0;"':
          - $if showExplorerPanel:
              - rvn-resizable-panel#fileExplorerPanel w=300 min-w=200 max-w=500 resize-side="right":
                  - rtgl-view slot="content" w=f h=f:
                      - rvn-resource-types :resourceCategory=${resourceCategory} :selectedResourceId=${selectedResourceId}: null
                      - rvn-base-file-explorer#fileExplorer :items=${flatItems} shrinkable dropdown-menu allowDrag :folderContextMenuItems=${folderContextMenuItems} :itemContextMenuItems=${itemContextMenuItems} :emptyContextMenuItems=${emptyContextMenuItems}: null
          - 'rtgl-view w=1fg h=f pl=${contentLeftPadding} pos=rel style="min-width: 0; min-height: 0;"':
              - 'rtgl-view pos=abs h=1 bgc=bo style="left: 0; right: 0; top: 47px; z-index: 1001; pointer-events: none;"': null
              - 'div#fileExplorerKeyboardScope tabindex=-1 style="width: 100%; height: 100%; min-width: 0; min-height: 0; outline: none;"':
                  - $if showMobileTopTabs:
                      - 'rvn-text-style-resources-view#typographyView w=f h=f :navTitle=${title} show-menu-button menu-button-placement=trailing show-zoom-controls zoom-control-mode=columns default-items-per-row=2 items-per-row-config-key="groupTextStylesView.itemsPerRow" show-search=false search-in-filter-popover show-tag-filter progressive-render progressive-hydration-delay-frame-count=4 :mobileLayout=${mobileLayout} :groups=${flatGroups} :selectedItemId=${selectedItemId} :selectedFolderId=${selectedFolderId} :searchQuery=${searchQuery} :tagFilterOptions=${tagFilterOptions} :selectedTagFilterValues=${selectedTagFilterValues} :tagFilterPlaceholder=${tagFilterPlaceholder} :addText=${addText} :itemContextMenuItems=${centerItemContextMenuItems}': null
                    $else:
                      - 'rvn-text-style-resources-view#typographyView w=f h=f :navTitle=${title} show-zoom-controls zoom-control-mode=columns default-items-per-row=4 items-per-row-config-key="groupTextStylesView.itemsPerRow" search-in-filter-popover show-tag-filter progressive-render progressive-hydration-delay-frame-count=4 :groups=${flatGroups} :selectedItemId=${selectedItemId} :selectedFolderId=${selectedFolderId} :searchQuery=${searchQuery} :tagFilterOptions=${tagFilterOptions} :selectedTagFilterValues=${selectedTagFilterValues} :tagFilterPlaceholder=${tagFilterPlaceholder} :addText=${addText} :itemContextMenuItems=${centerItemContextMenuItems}': null
          - $if showDetailPanel:
              - rvn-resizable-panel panel-type=detail-panel w=270 min-w=200 max-w=500 resize-side="left":
                  - rtgl-view wh=f slot="content":
                      - 'div#fileExplorerDetailKeyboardScope tabindex=-1 style="width: 100%; height: 100%; min-width: 0; min-height: 0; outline: none;"':
                          - $if selectedDetailId:
                              - rtgl-view d=v w=f h=f:
                                  - rtgl-view#detailHeader h=48 w=f d=h bgc=bg bwb=xs ph=md av=c g=sm cur=pointer:
                                      - rtgl-text w=1fg ellipsis=true: ${selectedDetailName}
                                      - rtgl-svg svg=edit wh=16: null
                                  - rvn-detail-view#detailView key=${selectedDetailId} w=f h=1fg :fields=${detailFields}:
                                      - $if selectedItemId:
                                          - 'rtgl-view#detailTextStylePreview slot="text-style-preview" w=f bw=xs bc=bo br=md cur=pointer style="aspect-ratio: 16 / 9; min-width: 0; overflow: hidden;"':
                                              - rvn-font-preview mode=thumbnail h=f :fontFamilies=${detailPreviewFontFamilies} previewText="${detailPreviewText}" :fileIds=${detailPreviewFontFileIds} :fontWeightDescriptors=${detailPreviewFontWeightDescriptors} fontSize=${detailPreviewFontSize} lineHeight=${detailPreviewLineHeight} color=${detailPreviewColor} strokeColor=${detailPreviewStrokeColor} strokeWidth=${detailPreviewStrokeWidth} fontWeight=${detailPreviewFontWeight} shadowColor=${detailPreviewShadowColor} shadowAlpha=${detailPreviewShadowAlpha} shadowBlur=${detailPreviewShadowBlur} shadowOffsetX=${detailPreviewShadowOffsetX} shadowOffsetY=${detailPreviewShadowOffsetY} width=f padding=8 showBorder=false: null
                                          - rtgl-tag-select#detailTagSelect slot="text-style-tags" w=f :options=${tagFilterOptions} :selectedValues=${selectedItemTagIds} :draftSelectedValues=${detailTagDraftValues} :open=${isDetailTagSelectOpen} :addOption=${detailTagAddOption} placeholder="${addTagPlaceholder}": null
                            $else:
                              - rtgl-view wh=f av=c ah=c bgc=mu-fg:
                                  - rtgl-text s=md c=mu-fg: ${noSelectionLabel}
  - $if showMobileFileExplorer:
      - 'rtgl-view pos=fix edge=f z=1250 bgc=bg d=v style="min-width: 0; min-height: 0; padding-top: var(--rvn-mobile-overlay-top-inset, 0px); padding-bottom: env(safe-area-inset-bottom); box-sizing: border-box;"':
          - rtgl-view h=48 w=f d=h av=c ph=md bgc=bg bwb=xs g=md:
              - rtgl-text w=1fg s=md: ${filesLabel}
              - rtgl-button#mobileFileExplorerClose sq pre=x v=ol: null
          - 'rtgl-view w=f h=1fg style="min-height: 0;"':
              - rvn-base-file-explorer#fileExplorer :items=${flatItems} shrinkable dropdown-menu allowDrag :folderContextMenuItems=${folderContextMenuItems} :itemContextMenuItems=${itemContextMenuItems} :emptyContextMenuItems=${emptyContextMenuItems}: null
  - $if showMobileDetailSheet:
      - rvn-mobile-sheet#mobileDetailSheet ?open=${showMobileDetailSheet}:
          - rtgl-view slot=content d=v w=f h=f:
              - rtgl-view#detailHeader h=36 w=f d=h bgc=bg bwb=xs ph=md av=c g=sm cur=pointer:
                  - rtgl-text w=1fg ellipsis=true: ${selectedItemName}
                  - rtgl-svg svg=edit wh=16: null
              - rtgl-view d=h w=f g=sm p=md bgc=su bwb=xs:
                  - rtgl-button#mobileDetailEditButton w=1fg v=se pre=edit: ${editButton}
                  - rtgl-button#mobileDetailDuplicateButton w=1fg v=se pre=duplicate: ${duplicateButton}
                  - rtgl-button#mobileDetailDeleteButton w=1fg v=se pre=trash: ${deleteButton}
              - 'rtgl-view w=f h=1fg sv style="min-height: 0;"':
                  - rvn-detail-view#mobileDetailView key=${selectedItemId} w=f :fields=${mobileDetailFields} :fillHeight=${mobileDetailFillHeight}:
                      - rtgl-tag-select#detailTagSelect slot="text-style-tags" w=f :options=${tagFilterOptions} :selectedValues=${selectedItemTagIds} :draftSelectedValues=${detailTagDraftValues} :open=${isDetailTagSelectOpen} :addOption=${detailTagAddOption} placeholder="${addTagPlaceholder}": null
  - rtgl-dialog#folderNameDialog ?open=${isFolderNameDialogOpen} s=sm:
      - rtgl-form#folderNameForm key=${folderNameDialogItemId} slot=content :defaultValues=${folderNameDialogDefaultValues} :form=${folderNameForm} w=f: null
  - $if showDialogPreviewCanvas:
      - $if isDialogOpen:
          - rtgl-dialog#addTypographyDialog ?open=${isDialogOpen}:
              - 'rtgl-view slot=content d=h g=md w=800 h=70vh style="min-width: 0; min-height: 0; overflow: hidden;"':
                  - 'rtgl-view w=1fg h=f d=v style="min-width: 0; min-height: 0; overflow: hidden;"':
                      - 'rtgl-view#textStyleFormScroll w=f h=1fg sv style="min-height: 0;"':
                          - rtgl-form#textStyleForm key=${formKey} :defaultValues=${dialogDefaultValues} :form=${desktopDialogForm} w=f: null
                      - 'rtgl-view w=f d=h ah=e bgc=bg ph=md pt=lg pb=md style="flex-shrink: 0;"':
                          - rtgl-button#desktopTextStyleSubmitButton v=${dialogSubmitButton.variant}: ${dialogSubmitButton.label}
                  - 'rtgl-view w=1fg h=f p=md d=v g=md style="min-width: 0; min-height: 0;"':
                      - rtgl-text s=lg fw=b: ${previewLabel}
                      - 'rtgl-view w=f style="aspect-ratio: 32 / 9; min-width: 0; overflow: hidden;"':
                          - rvn-font-preview mode=live h=f :fontFamilies=${previewFontFamilies} previewText="${previewText}" :fileIds=${previewFontFileIds} :fontWeightDescriptors=${previewFontWeightDescriptors} fontSize=${previewFontSize} lineHeight=${previewLineHeight} color=${previewColor} strokeColor=${previewStrokeColor} strokeWidth=${previewStrokeWidth} fontWeight=${previewFontWeight} shadowColor=${previewShadowColor} shadowAlpha=${previewShadowAlpha} shadowBlur=${previewShadowBlur} shadowOffsetX=${previewShadowOffsetX} shadowOffsetY=${previewShadowOffsetY} width=f padding=8 showBorder=true: null
                      - rtgl-view d=v g=sm w=f:
                          - rtgl-text: ${previewTextLabel}
                          - rtgl-input#previewTextInput key=${formKey} w=f value="${previewTextInputValue}": null
    $else:
      - $if isDialogOpen:
          - rtgl-dialog#addTypographyDialog ?open=${isDialogOpen} s=md:
              - rtgl-view slot=content g=md:
                  - rtgl-form#textStyleForm key=${formKey} :defaultValues=${dialogDefaultValues} :form=${dialogForm} w=f: null
  - rtgl-dialog#addColorDialog ?open=${isAddColorDialogOpen} s=sm:
      - $if isAddColorDialogOpen:
          - rtgl-form#addColorForm slot=content :defaultValues=${addColorDefaultValues} :form=${addColorForm} w=f: null
  - rtgl-dialog#addFontDialog ?open=${isAddFontDialogOpen}:
      - $if isAddFontDialogOpen:
          - rtgl-form#addFontForm slot=content :defaultValues=${addFontDefaultValues} :form=${addFontForm} w=f:
              - rtgl-view slot=font-upload d=v g=sm:
                  - rvn-drag-drop#fontDragDrop uploadText="${dragDropText}" :acceptedFileTypes=${fontFileTypes}: null
                  - $if hasSelectedFont:
                      - rtgl-view d=h g=sm av=c mt=sm:
                          - rtgl-text s=sm c=success: '${fontSelectedLabel} ${selectedFontFileName}'
  - rtgl-dialog#createTagDialog ?open=${isCreateTagDialogOpen} s=sm:
      - rtgl-form#createTagForm key=${isCreateTagDialogOpen} slot=content :defaultValues=${createTagDefaultValues} :form=${createTagForm} w=f: null
