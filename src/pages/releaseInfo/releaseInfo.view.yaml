refs:
  addPlatformButton:
    eventListeners:
      click:
        handler: handleAddPlatformButtonClick
  addPlatformMenu:
    eventListeners:
      close:
        handler: handleAddPlatformMenuClose
      item-click:
        handler: handleAddPlatformMenuItemClick
  platformTabs:
    eventListeners:
      item-click:
        handler: handlePlatformTabClick
  platformEditButton:
    eventListeners:
      click:
        handler: handlePlatformEditButtonClick
  platformApplicationIcon:
    eventListeners:
      click:
        handler: handlePlatformEditButtonClick
  platformEditDialog:
    eventListeners:
      close:
        handler: handlePlatformEditDialogClose
  platformEditForm:
    eventListeners:
      form-action:
        handler: handlePlatformEditFormAction
  platformEditDialogIcon:
    eventListeners:
      click:
        handler: handlePlatformEditDialogIconClick
  platformEditIconCropDialog:
    eventListeners:
      close:
        handler: handlePlatformEditIconCropDialogClose
      confirm:
        handler: handlePlatformEditIconCropDialogConfirm
template:
  - 'rtgl-view d=h w=f h=f style="min-width: 0; min-height: 0;"':
      - 'rtgl-view d=h h=f w=f style="min-width: 0; min-height: 0;"':
          - $if showExplorerPanel:
              - rvn-resizable-panel#fileExplorer w=300 min-w=200 max-w=500 resize-side="right":
                  - rtgl-view slot="content" w=f h=f:
                      - rvn-resource-types :resourceCategory=${resourceCategory} :selectedResourceId=${selectedResourceId}: null
          - 'rtgl-view w=1fg h=f pl=${contentLeftPadding} d=v style="min-width: 0; min-height: 0;"':
              - 'rtgl-view h=48 w=f bgc=bg bwb=xs ph=md av=c style="flex-shrink: 0;"':
                  - rtgl-view w=f d=h av=c g=md:
                      - rtgl-text w=1fg: ${title}
                      - $if canAddPlatform:
                          - 'rtgl-button#addPlatformButton v=pr sq pre=plus title="${addPlatformButtonLabel}" aria-label="${addPlatformButtonLabel}"': null
              - 'rtgl-view w=f h=1fg pt=md sv style="min-width: 0; min-height: 0;"':
                  - $if hasPlatformReleaseInfo:
                      - rtgl-view w=f d=v g=md:
                          - rtgl-view w=f ph=md:
                              - rtgl-tabs#platformTabs selected-tab=${selectedPlatform} :items=${platformTabs}: null
                          - rtgl-view w=f h=48 ph=md d=h av=c g=md:
                              - rtgl-text w=1fg s=h3: ${selectedPlatformTitle}
                              - 'rtgl-button#platformEditButton v=ol sq pre=edit title="${platformEditButtonLabel}" aria-label="${platformEditButtonLabel}"': null
                          - rvn-detail-view#platformDetailView w=f :fields=${platformDetailFields} :fillHeight=${detailFillHeight}:
                              - $if platformApplicationIconFileId:
                                  - rvn-file-image#platformApplicationIcon slot=platform-application-icon fileId=${platformApplicationIconFileId} w=128 h=128 bw=xs bc=bo br=md cur=pointer: null
                                $else:
                                  - rtgl-image#platformApplicationIcon slot=platform-application-icon src="/public/project_logo_placeholder.png" w=128 h=128 bw=xs bc=bo br=md cur=pointer: null
                    $else:
                      - rtgl-view w=f h=f av=c ah=c ph=md:
                          - rtgl-text c=mu-fg ta=c: ${emptyPlatformsMessage}
                  - rtgl-view w=f h=md: null
  - rtgl-dropdown-menu#addPlatformMenu ?open=${addPlatformMenu.isOpen} x=${addPlatformMenu.x} y=${addPlatformMenu.y} :items=${addPlatformMenu.items}: null
  - rtgl-dialog#platformEditDialog ?open=${isPlatformEditDialogOpen} s=md:
      - $if isPlatformEditDialogOpen:
          - rtgl-view slot=content:
              - rtgl-form#platformEditForm key=${platformDialogKey} :defaultValues=${platformEditDefaultValues} :form=${platformEditForm} w=f:
                  - $if platformEditIconFileId:
                      - rvn-file-image#platformEditDialogIcon fileId=${platformEditIconFileId} w=120 h=120 slot=platform-application-icon-edit bw=xs bc=bo br=md cur=pointer: null
                    $else:
                      - rtgl-view#platformEditDialogIcon slot=platform-application-icon-edit w=120 h=120 ah=c av=c bw=xs bc=bo br=md cur=pointer:
                          - rtgl-text c=mu-fg ta=c: ${clickToUploadLabel}
  - rvn-square-image-crop-dialog#platformEditIconCropDialog :open=${isPlatformEditIconCropDialogOpen} :file=${platformEditIconCropFile}: null
