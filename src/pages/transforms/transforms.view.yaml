refs:
  fileExplorer:
    eventListeners:
      file-action:
        handler: handleFileExplorerAction
      target-changed:
        handler: handleFileExplorerTargetChanged
      item-click:
        handler: handleFileExplorerSelectionChanged
      dblclick-item:
        handler: handleTransformItemDoubleClick
  groupview:
    eventListeners:
      item-click:
        handler: handleTransformItemClick
      item-edit:
        handler: handleTransformItemEdit
      item-dblclick:
        handler: handleTransformItemDoubleClick
      add-click:
        handler: handleAddTransformClick
      search-input:
        handler: handleSearchInput
      tag-filter-change:
        handler: handleTagFilterChange
      tag-filter-add-option-click:
        handler: handleTagFilterAddOptionClick
      item-delete:
        handler: handleItemDelete
      item-duplicate:
        handler: handleItemDuplicate
      menu-click:
        handler: handleMobileFileExplorerOpen
  mobileFileExplorerClose:
    eventListeners:
      click:
        handler: handleMobileFileExplorerClose
  mobileDetailSheet:
    eventListeners:
      close:
        handler: handleMobileDetailSheetClose
  fileExplorerKeyboardScope:
    eventListeners:
      click:
        handler: handleFileExplorerKeyboardScopeClick
      keydown:
        handler: handleFileExplorerKeyboardScopeKeyDown
  fileExplorerDetailKeyboardScope:
    eventListeners:
      click:
        handler: handleFileExplorerKeyboardScopeClick
      keydown:
        handler: handleFileExplorerKeyboardScopeKeyDown
  transformDialog:
    eventListeners:
      close:
        handler: handleTransformDialogClose
  transformForm:
    eventListeners:
      form-action:
        handler: handleTransformFormActionClick
      form-change:
        handler: handleTransformFormChange
      add-option-click:
        handler: handleTransformFormAddOptionClick
  transformPreviewImageButton*:
    eventListeners:
      click:
        handler: handleTransformPreviewImageClick
  transformPreviewImageSelectorDialog:
    eventListeners:
      close:
        handler: handleTransformPreviewImageSelectorCancel
  transformPreviewImageSelectorKeyboardScope:
    eventListeners:
      click:
        handler: handleTransformPreviewImageSelectorKeyboardScopeClick
      keydown:
        handler: handleTransformPreviewImageSelectorKeyboardScopeKeyDown
  transformPreviewImageSelector:
    eventListeners:
      image-selected:
        handler: handleTransformPreviewImageSelected
      image-dblclick:
        handler: handleTransformPreviewImageDoubleClick
  transformPreviewImageSelectorFileExplorer:
    eventListeners:
      item-click:
        handler: handleTransformPreviewImageSelectorFileExplorerClick
  cancelTransformPreviewImageSelection:
    eventListeners:
      click:
        handler: handleTransformPreviewImageSelectorCancel
  confirmTransformPreviewImageSelection:
    eventListeners:
      click:
        handler: handleTransformPreviewImageSelectorSubmit
  previewOverlay:
    eventListeners:
      click:
        handler: handleTransformPreviewImagePreviewOverlayClick
  detailHeader:
    eventListeners:
      click:
        handler: handleDetailHeaderClick
  folderNameDialog:
    eventListeners:
      close:
        handler: handleFolderNameDialogClose
  folderNameForm:
    eventListeners:
      form-action:
        handler: handleFolderNameFormAction
  detailTagSelect:
    eventListeners:
      value-change:
        handler: handleDetailTagValueChange
      draft-value-change:
        handler: handleDetailTagDraftValueChange
      open-change:
        handler: handleDetailTagOpenChange
      add-option-click:
        handler: handleDetailTagAddOptionClick
  createTagDialog:
    eventListeners:
      close:
        handler: handleCreateTagDialogClose
  createTagForm:
    eventListeners:
      form-action:
        handler: handleCreateTagFormAction
  canvas: {}
template:
  - 'rtgl-view d=h w=f h=f style="min-width: 0; min-height: 0;"':
      - 'rtgl-view d=h h=f w=f style="min-width: 0; min-height: 0;"':
          - $if showExplorerPanel:
              - rvn-resizable-panel#fileExplorerPanel w=300 min-w=200 max-w=500 resize-side="right":
                  - rtgl-view slot="content" w=f h=f:
                      - rvn-resource-types :resourceCategory=${resourceCategory} :selectedResourceId=${selectedResourceId}: null
                      - rvn-base-file-explorer#fileExplorer :items=${flatItems} shrinkable dropdown-menu allowDrag :folderContextMenuItems=${folderContextMenuItems} :itemContextMenuItems=${itemContextMenuItems} :emptyContextMenuItems=${emptyContextMenuItems}: null
          - 'rtgl-view w=1fg h=f pl=${contentLeftPadding} style="min-width: 0; min-height: 0;"':
              - 'div#fileExplorerKeyboardScope tabindex=-1 style="width: 100%; height: 100%; min-width: 0; min-height: 0; outline: none;"':
                  - $if showMobileTopTabs:
                      - 'rtgl-view d=v w=f h=f style="min-width: 0; min-height: 0;"':
                          - 'rvn-catalog-resources-view#groupview w=f h=f :navTitle=${title} show-menu-button show-search=false search-in-filter-popover show-tag-filter :mobileLayout=${mobileLayout} :groups=${catalogGroups} :selectedItemId=${selectedItemId} :selectedFolderId=${selectedFolderId} :searchQuery=${searchQuery} :tagFilterOptions=${tagFilterOptions} :selectedTagFilterValues=${selectedTagFilterValues} :tagFilterPlaceholder=${tagFilterPlaceholder} :emptyMessage=${emptyMessage} :addText=${addText} :itemContextMenuItems=${centerItemContextMenuItems}': null
                    $else:
                      - 'rvn-catalog-resources-view#groupview w=f h=f :navTitle=${title} show-zoom-controls zoom-control-mode=columns default-items-per-row=6 items-per-row-config-key="groupTransformsView.itemsPerRow" search-in-filter-popover :groups=${catalogGroups} :selectedItemId=${selectedItemId} :selectedFolderId=${selectedFolderId} :searchQuery=${searchQuery} show-tag-filter :tagFilterOptions=${tagFilterOptions} :selectedTagFilterValues=${selectedTagFilterValues} :tagFilterPlaceholder=${tagFilterPlaceholder} :emptyMessage=${emptyMessage} :addText=${addText} :itemContextMenuItems=${centerItemContextMenuItems}': null
          - $if showDetailPanel:
              - rvn-resizable-panel panel-type=detail-panel w=270 min-w=200 max-w=500 resize-side="left":
                  - rtgl-view wh=f slot="content":
                      - 'div#fileExplorerDetailKeyboardScope tabindex=-1 style="width: 100%; height: 100%; min-width: 0; min-height: 0; outline: none;"':
                          - $if selectedDetailId:
                              - rtgl-view d=v w=f h=f:
                                  - rtgl-view#detailHeader h=48 w=f d=h bgc=bg bwb=xs ph=md av=c g=sm cur=pointer:
                                      - rtgl-text w=1fg ellipsis=true: ${selectedDetailName}
                                      - rtgl-svg svg=edit wh=16: null
                                  - rvn-detail-view#detailView key=${selectedDetailId} w=f h=1fg :fields=${detailFields}:
                                      - $if selectedItem:
                                          - 'rtgl-view slot="transform-preview" w=f bw=xs bc=bo br=md style="aspect-ratio: 16 / 9; overflow: hidden;"':
                                              - $if selectedItem.thumbnailFileId:
                                                  - rvn-file-image fileId=${selectedItem.thumbnailFileId} w=f h=f br=md: null
                                                $else:
                                                  - rtgl-view w=f h=f av=c ah=c bgc=bg:
                                                      - rtgl-view d=v av=c ah=c g=xs ph=sm:
                                                          - rtgl-text s=xs c=mu-fg: No preview image
                                                          - rtgl-text s=xs c=mu-fg: Update to set preview
                                      - $if selectedItemId:
                                          - rtgl-tag-select#detailTagSelect slot="transform-tags" w=f :options=${tagFilterOptions} :selectedValues=${selectedItemTagIds} :draftSelectedValues=${detailTagDraftValues} :open=${isDetailTagSelectOpen} :addOption=${detailTagAddOption} placeholder="Add tag": null
                            $else:
                              - rtgl-view wh=f av=c ah=c bgc=mu-fg:
                                  - rtgl-text s=md c=mu-fg: No selection
  - $if showMobileFileExplorer:
      - 'rtgl-view pos=fix edge=f z=1250 bgc=bg d=v style="min-width: 0; min-height: 0;"':
          - rtgl-view h=56 w=f d=h av=c ph=md bgc=bg bwb=xs g=md:
              - rtgl-text w=1fg s=md: Files
              - rtgl-view#mobileFileExplorerClose w=40 h=40 ah=c av=c cur=pointer:
                  - rtgl-svg svg=x wh=20 c=mu-fg: null
          - 'rtgl-view w=f h=1fg style="min-height: 0;"':
              - rvn-base-file-explorer#fileExplorer :items=${flatItems} shrinkable dropdown-menu allowDrag :folderContextMenuItems=${folderContextMenuItems} :itemContextMenuItems=${itemContextMenuItems} :emptyContextMenuItems=${emptyContextMenuItems}: null
  - $if showMobileDetailSheet:
      - rvn-mobile-sheet#mobileDetailSheet ?open=${showMobileDetailSheet}:
          - rtgl-view slot=content d=v w=f h=f:
              - rtgl-view#detailHeader h=56 w=f d=h bgc=bg bwb=xs ph=md av=c g=sm cur=pointer:
                  - rtgl-text w=1fg ellipsis=true: ${selectedItemName}
                  - rtgl-svg svg=edit wh=16: null
              - 'rtgl-view w=f h=1fg sv style="min-height: 0;"':
                  - rvn-detail-view#mobileDetailView key=${selectedItemId} w=f :fields=${mobileDetailFields} :fillHeight=${mobileDetailFillHeight}:
                      - rtgl-tag-select#detailTagSelect slot="transform-tags" w=f :options=${tagFilterOptions} :selectedValues=${selectedItemTagIds} :draftSelectedValues=${detailTagDraftValues} :open=${isDetailTagSelectOpen} :addOption=${detailTagAddOption} placeholder="Add tag": null
  - rtgl-dialog#folderNameDialog ?open=${isFolderNameDialogOpen} s=sm:
      - rtgl-form#folderNameForm key=${folderNameDialogItemId} slot=content :defaultValues=${folderNameDialogDefaultValues} :form=${folderNameForm} w=f: null
  - rtgl-dialog#transformDialog ?open=${isDialogOpen} s=lg:
      - rtgl-view slot="content" d=h lg-d=v ah=c g=lg w=f:
          - $if isDialogOpen:
              - $if !isPreviewOnlyDialog:
                  - rtgl-view w=4fg lg-w=f:
                      - rtgl-form#transformForm :defaultValues=${dialogDefaultValues} :form=${transformForm} w=f: null
              - $if isPreviewOnlyDialog:
                  - rtgl-view w=f d=v g=md:
                      - 'rtgl-view w=f style="aspect-ratio: 16 / 9; overflow: hidden;"':
                          - $if dialogPreviewFileId:
                              - rvn-file-image fileId=${dialogPreviewFileId} w=f h=f: null
                            $else:
                              - rtgl-view w=f h=f av=c ah=c bgc=bg:
                                  - rtgl-view d=v av=c ah=c g=xs ph=sm:
                                      - rtgl-text s=xs c=mu-fg: No preview image
                                      - rtgl-text s=xs c=mu-fg: Update to set preview
                $else:
                  - rtgl-view w=6fg lg-w=f d=v g=md:
                      - rtgl-text: Preview
                      - 'rtgl-view w=f bgc=fg pos=rel style="aspect-ratio: ${canvasAspectRatio};"':
                          - rtgl-view pos=abs cor=full:
                              - 'div#canvas style="width: 100%; height: 100%; display: flex; background: #000;"': null
                      - rtgl-view d=h lg-d=v wrap g=md w=f:
                          - $for item, i in previewPanel.items:
                              - rtgl-view d=v w=160 lg-w=f g=xs:
                                  - rtgl-text s=sm c=mu-fg: ${item.label}
                                  - $if item.image:
                                      - 'rtgl-view#transformPreviewImageButton${i} data-target=${item.target} cur=pointer bw=xs bc=${item.image.itemBorderColor} h-bc=${item.image.itemHoverBorderColor} br=md w=160 style="max-width: 100%; box-sizing: border-box;"':
                                          - 'rtgl-view p=md g=md br=md w=f style="max-width: 100%; box-sizing: border-box;"':
                                              - $if item.image.previewFileId:
                                                  - 'rtgl-view w=f br=md style="aspect-ratio: ${item.image.previewAspectRatio}; overflow: hidden;"':
                                                      - rvn-file-image br=md w=f h=f fileId=${item.image.previewFileId}: null
                                                $else:
                                                  - rtgl-view w=f h=90 br=md bw=xs bc=bo av=c ah=c:
                                                      - rtgl-text s=xs c=mu-fg: No preview
                                              - rtgl-text s=xs c=mu-fg ellipsis w=f: ${item.image.name}
                                    $else:
                                      - 'rtgl-view#transformPreviewImageButton${i} data-target=${item.target} w=160 h=90 av=c ah=c bgc=bg bc=bo bw=xs br=md cur=pointer style="max-width: 100%; box-sizing: border-box;"':
                                          - rtgl-text c=mu-fg s=sm: Select image
  - rtgl-dialog#transformPreviewImageSelectorDialog ?open=${imageSelectorDialog.open} s=xl:
      - $if imageSelectorDialog.open:
          - rtgl-view slot=content d=v w=f g=md:
              - 'rtgl-view d=h w=f h=70vh g=lg style="min-width: 0; min-height: 0;"':
                  - 'rtgl-view w=300 h=f style="min-width: 0; min-height: 0;"':
                      - rvn-base-file-explorer#transformPreviewImageSelectorFileExplorer :items=${imageFolderItems} shrinkable: null
                  - 'rtgl-view#transformPreviewImageSelectorKeyboardScope tabindex=-1 w=1fg h=f style="min-width: 0; min-height: 0; outline: none;"':
                      - rvn-image-selector#transformPreviewImageSelector selectedImageId=${imageSelectorDialog.selectedImageId}: null
              - rtgl-view d=h g=sm w=f ah=e:
                  - rtgl-button#cancelTransformPreviewImageSelection variant=se: Cancel
                  - rtgl-button#confirmTransformPreviewImageSelection variant=pr: OK
  - $when: fullImagePreviewVisible
    'div#previewOverlay tabindex=0 style="position: fixed; inset: 0; z-index: 3000; cursor: pointer; outline: none;"':
      - rtgl-view w=f h=f pos=fix edge=f bgc=bg: null
      - $if fullImagePreviewFileId:
          - rtgl-view pos=fix edge=f ah=c av=c z=3001:
              - rvn-file-image fileId=${fullImagePreviewFileId} w=80% h=80% bc=ac bw=xs br=md: null
  - rtgl-dialog#createTagDialog ?open=${isCreateTagDialogOpen} s=sm:
      - rtgl-form#createTagForm key=${isCreateTagDialogOpen} slot=content :defaultValues=${createTagDefaultValues} :form=${createTagForm} w=f: null
