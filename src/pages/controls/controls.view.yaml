refs:
  fileExplorer:
    eventListeners:
      file-action:
        handler: handleFileExplorerAction
      target-changed:
        handler: handleFileExplorerTargetChanged
      item-click:
        handler: handleFileExplorerSelectionChanged
      dblclick-item:
        handler: handleItemDoubleClick
  groupview:
    eventListeners:
      item-click:
        handler: handleControlItemClick
      item-dblclick:
        handler: handleItemDoubleClick
      add-click:
        handler: handleAddControlClick
      search-input:
        handler: handleSearchInput
      tag-filter-change:
        handler: handleTagFilterChange
      tag-filter-add-option-click:
        handler: handleTagFilterAddOptionClick
      item-delete:
        handler: handleItemDelete
      menu-click:
        handler: handleMobileFileExplorerOpen
  mobileFileExplorerClose:
    eventListeners:
      click:
        handler: handleMobileFileExplorerClose
  mobileDetailSheet:
    eventListeners:
      close:
        handler: handleMobileDetailSheetClose
  fileExplorerKeyboardScope:
    eventListeners:
      click:
        handler: handleFileExplorerKeyboardScopeClick
      keydown:
        handler: handleFileExplorerKeyboardScopeKeyDown
  fileExplorerDetailKeyboardScope:
    eventListeners:
      click:
        handler: handleFileExplorerKeyboardScopeClick
      keydown:
        handler: handleFileExplorerKeyboardScopeKeyDown
  addControlDialog:
    eventListeners:
      close:
        handler: handleAddDialogClose
  detailHeader:
    eventListeners:
      click:
        handler: handleDetailHeaderClick
  controlForm:
    eventListeners:
      form-action:
        handler: handleControlFormActionClick
      add-option-click:
        handler: handleControlFormAddOptionClick
  detailTagSelect:
    eventListeners:
      value-change:
        handler: handleDetailTagValueChange
      draft-value-change:
        handler: handleDetailTagDraftValueChange
      open-change:
        handler: handleDetailTagOpenChange
      add-option-click:
        handler: handleDetailTagAddOptionClick
  createTagDialog:
    eventListeners:
      close:
        handler: handleCreateTagDialogClose
  createTagForm:
    eventListeners:
      form-action:
        handler: handleCreateTagFormAction
  keyboardKeydownAddButton:
    eventListeners:
      click:
        handler: handleKeyboardAddClick
  keyboardKeyupAddButton:
    eventListeners:
      click:
        handler: handleKeyboardAddClick
  keyboardKeydownItem*:
    eventListeners:
      click:
        handler: handleKeyboardItemClick
      contextmenu:
        handler: handleKeyboardItemRightClick
  keyboardKeyupItem*:
    eventListeners:
      click:
        handler: handleKeyboardItemClick
      contextmenu:
        handler: handleKeyboardItemRightClick
  keyboardSystemActions:
    eventListeners:
      actions-change:
        handler: handleKeyboardActionsChange
      close:
        handler: handleKeyboardActionsClose
template:
  - 'rtgl-view d=h w=f h=f style="min-width: 0; min-height: 0;"':
      - 'rtgl-view d=h h=f w=f style="min-width: 0; min-height: 0;"':
          - $if showExplorerPanel:
              - rvn-resizable-panel#fileExplorerPanel w=300 min-w=200 max-w=500 resize-side="right":
                  - rtgl-view slot="content" w=f h=f:
                      - rvn-resource-types :resourceCategory=${resourceCategory} :selectedResourceId=${selectedResourceId}: null
                      - rvn-base-file-explorer#fileExplorer :items=${flatItems} shrinkable dropdown-menu allowDrag :folderContextMenuItems=${folderContextMenuItems} :itemContextMenuItems=${itemContextMenuItems} :emptyContextMenuItems=${emptyContextMenuItems}: null
          - 'rtgl-view w=1fg h=f pl=${contentLeftPadding} style="min-width: 0; min-height: 0;"':
              - 'div#fileExplorerKeyboardScope tabindex=-1 style="width: 100%; height: 100%; min-width: 0; min-height: 0; outline: none;"':
                  - $if showMobileTopTabs:
                      - 'rtgl-view d=v w=f h=f style="min-width: 0; min-height: 0;"':
                          - 'rvn-catalog-resources-view#groupview w=f h=f :navTitle=${title} show-menu-button show-search=false show-tag-filter :mobileLayout=${mobileLayout} :groups=${catalogGroups} :selectedItemId=${selectedItemId} :searchQuery=${searchQuery} :tagFilterOptions=${tagFilterOptions} :selectedTagFilterValues=${selectedTagFilterValues} :tagFilterPlaceholder=${tagFilterPlaceholder} :addText=${addText} :itemContextMenuItems=${centerItemContextMenuItems}': null
                    $else:
                      - 'rvn-catalog-resources-view#groupview w=f h=f :navTitle=${title} show-zoom-controls zoom-control-mode=columns default-items-per-row=6 items-per-row-config-key="groupControlsView.itemsPerRow" show-tag-filter :groups=${catalogGroups} :selectedItemId=${selectedItemId} :searchQuery=${searchQuery} :tagFilterOptions=${tagFilterOptions} :selectedTagFilterValues=${selectedTagFilterValues} :tagFilterPlaceholder=${tagFilterPlaceholder} :addText=${addText} :itemContextMenuItems=${centerItemContextMenuItems}': null
          - $if showDetailPanel:
              - rvn-resizable-panel panel-type=detail-panel w=270 min-w=200 max-w=500 resize-side="left":
                  - rtgl-view wh=f slot="content":
                      - 'div#fileExplorerDetailKeyboardScope tabindex=-1 style="width: 100%; height: 100%; min-width: 0; min-height: 0; outline: none;"':
                          - $if selectedItemId:
                              - rtgl-view d=v w=f h=f:
                                  - rtgl-view#detailHeader h=48 w=f d=h bgc=bg bwb=xs ph=md av=c g=sm cur=pointer:
                                      - rtgl-text w=1fg ellipsis=true: ${selectedItemName}
                                      - rtgl-svg svg=edit wh=16: null
                                  - rvn-detail-view#detailView key=${selectedItemId} w=f h=1fg :fields=${detailFields}:
                                      - rtgl-tag-select#detailTagSelect slot="control-tags" w=f :options=${tagFilterOptions} :selectedValues=${selectedItemTagIds} :draftSelectedValues=${detailTagDraftValues} :open=${isDetailTagSelectOpen} :addOption=${detailTagAddOption} placeholder="Add tag": null
                                      - 'rtgl-view slot="keyboard-slot" d=v w=f g=lg style="min-height: 0;"':
                                          - rtgl-view d=h w=f av=c:
                                              - rtgl-text s=sm: Keydown
                                              - rtgl-view w=1fg: null
                                              - rtgl-button#keyboardKeydownAddButton data-phase=keydown pre=plus sq s=sm v=gh: null
                                          - $if keydownKeyboardItems.length > 0:
                                              - $for item, i in keydownKeyboardItems:
                                                  - rtgl-view#keyboardKeydownItem${i} data-phase=keydown data-key=${item.key} d=h w=f av=c g=md p=md bw=xs br=md h-bgc=mu cur=pointer:
                                                      - rtgl-view d=v g=xs w=1fg:
                                                          - rtgl-text s=sm: ${item.keyLabel}
                                                          - rtgl-text s=xs c=mu-fg: ${item.actionLabel}
                                          - $if keydownKeyboardItems.length == 0:
                                              - rtgl-view w=f p=md bgc=mu br=md:
                                                  - rtgl-text s=xs c=mu-fg: ${keydownKeyboardEmptyMessage}
                                          - rtgl-view d=h w=f av=c:
                                              - rtgl-text s=sm: Keyup
                                              - rtgl-view w=1fg: null
                                              - rtgl-button#keyboardKeyupAddButton data-phase=keyup pre=plus sq s=sm v=gh: null
                                          - $if keyupKeyboardItems.length > 0:
                                              - $for item, i in keyupKeyboardItems:
                                                  - rtgl-view#keyboardKeyupItem${i} data-phase=keyup data-key=${item.key} d=h w=f av=c g=md p=md bw=xs br=md h-bgc=mu cur=pointer:
                                                      - rtgl-view d=v g=xs w=1fg:
                                                          - rtgl-text s=sm: ${item.keyLabel}
                                                          - rtgl-text s=xs c=mu-fg: ${item.actionLabel}
                                          - $if keyupKeyboardItems.length == 0:
                                              - rtgl-view w=f p=md bgc=mu br=md:
                                                  - rtgl-text s=xs c=mu-fg: ${keyupKeyboardEmptyMessage}
                            $else:
                              - rtgl-view wh=f av=c ah=c bgc=mu-fg:
                                  - rtgl-text s=md c=mu-fg: No selection
  - $if showMobileFileExplorer:
      - 'rtgl-view pos=fix edge=f z=1250 bgc=bg d=v style="min-width: 0; min-height: 0;"':
          - rtgl-view h=56 w=f d=h av=c ph=md bgc=bg bwb=xs g=md:
              - rtgl-text w=1fg s=md: Files
              - rtgl-view#mobileFileExplorerClose w=40 h=40 ah=c av=c cur=pointer:
                  - rtgl-svg svg=x wh=20 c=mu-fg: null
          - 'rtgl-view w=f h=1fg style="min-height: 0;"':
              - rvn-base-file-explorer#fileExplorer :items=${flatItems} shrinkable dropdown-menu allowDrag :folderContextMenuItems=${folderContextMenuItems} :itemContextMenuItems=${itemContextMenuItems} :emptyContextMenuItems=${emptyContextMenuItems}: null
  - $if showMobileDetailSheet:
      - rvn-mobile-sheet#mobileDetailSheet ?open=${showMobileDetailSheet}:
          - rtgl-view slot=content d=v w=f h=f:
              - rtgl-view#detailHeader h=56 w=f d=h bgc=bg bwb=xs ph=md av=c g=sm cur=pointer:
                  - rtgl-text w=1fg ellipsis=true: ${selectedItemName}
                  - rtgl-svg svg=edit wh=16: null
              - 'rtgl-view w=f h=1fg sv style="min-height: 0;"':
                  - rvn-detail-view#mobileDetailView key=${selectedItemId} w=f :fields=${mobileDetailFields} :fillHeight=${mobileDetailFillHeight}:
                      - rtgl-tag-select#detailTagSelect slot="control-tags" w=f :options=${tagFilterOptions} :selectedValues=${selectedItemTagIds} :draftSelectedValues=${detailTagDraftValues} :open=${isDetailTagSelectOpen} :addOption=${detailTagAddOption} placeholder="Add tag": null
  - $if keyboardEditorKey:
      - rvn-system-actions#keyboardSystemActions :actions=${keyboardEditorActions} actionType=system: null
  - rtgl-dialog#addControlDialog ?open=${isDialogOpen} s=md:
      - rtgl-form#controlForm slot=content :defaultValues=${dialogDefaultValues} :form=${dialogForm} w=f: null
  - rtgl-dialog#createTagDialog ?open=${isCreateTagDialogOpen} s=sm:
      - rtgl-form#createTagForm slot=content :defaultValues=${createTagDefaultValues} :form=${createTagForm} w=f: null
