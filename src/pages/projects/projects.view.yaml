refs:
  createButton:
    eventListeners:
      click:
        required: true
        handler: handleCreateButtonClick
  openButton:
    eventListeners:
      click:
        required: true
        handler: handleOpenButtonClick
  mobileCreateMenuButton:
    eventListeners:
      click:
        handler: handleMobileCreateMenuButtonClick
  mobileActionMenu:
    eventListeners:
      close:
        handler: handleMobileActionMenuClose
      item-click:
        handler: handleMobileActionMenuClickItem
  appVersionButton:
    eventListeners:
      click:
        handler: handleAppVersionClick
  appVersionDropdownMenu:
    eventListeners:
      close:
        handler: handleAppVersionMenuClose
      item-click:
        handler: handleAppVersionMenuClickItem
  languageDialog:
    eventListeners:
      close:
        handler: handleLanguageDialogClose
  languageForm:
    eventListeners:
      form-action:
        handler: handleLanguageFormAction
  appearanceDialog:
    eventListeners:
      close:
        handler: handleAppearanceDialogClose
  appearanceForm:
    eventListeners:
      form-action:
        handler: handleAppearanceFormAction
  cloudCreateButton:
    eventListeners:
      click:
        handler: handleCloudCreateButtonClick
  loginButton:
    eventListeners:
      click:
        required: true
        handler: handleLoginButtonClick
  avatarButton:
    eventListeners:
      click:
        handler: handleAvatarButtonClick
  profileDropdownMenu:
    eventListeners:
      close:
        handler: handleProfileDropdownClose
      item-click:
        handler: handleProfileDropdownClickItem
  profileForm:
    eventListeners:
      form-action:
        handler: handleProfileFormAction
  editProfileDialog:
    eventListeners:
      close:
        handler: handleEditProfileDialogClose
  settingsDialog:
    eventListeners:
      close:
        handler: handleSettingsDialogClose
  settingsForm:
    eventListeners:
      form-action:
        handler: handleSettingsFormAction
  project*:
    eventListeners:
      click:
        required: true
        handler: handleProjectsClick
      contextmenu:
        handler: handleProjectContextMenu
  cloudProject*:
    eventListeners:
      click:
        required: true
        handler: handleProjectsClick
      contextmenu:
        handler: handleCloudProjectContextMenu
  cloudCreateForm:
    eventListeners:
      form-action:
        handler: handleCloudCreateFormAction
  addMemberForm:
    eventListeners:
      form-action:
        handler: handleAddMemberFormAction
  dropdownMenu:
    eventListeners:
      close:
        handler: handleDropdownMenuClose
      item-click:
        handler: handleDropdownMenuClickItem
  deleteProjectDialog:
    eventListeners:
      close:
        handler: handleDeleteDialogClose
  cloudCreateProjectDialog:
    eventListeners:
      close:
        handler: handleCloudCreateDialogClose
  createProjectDialog:
    eventListeners:
      close:
        handler: handleCreateDialogClose
  projectCreateDialogBody: {}
  createProjectCancelButton:
    eventListeners:
      click:
        handler: handleCreateDialogCancel
  createProjectSubmitButton:
    eventListeners:
      click:
        handler: handleCreateDialogSubmit
  addMemberDialog:
    eventListeners:
      close:
        handler: handleAddMemberDialogClose
  deleteConfirmButton:
    eventListeners:
      click:
        handler: handleDeleteDialogConfirm
template:
  - 'rtgl-view w=100vw d=v style="height: var(--rvn-app-viewport-height, 100vh);"':
      - 'rtgl-view w=f h=f d=v style="min-height: 0;"':
          - rtgl-view h=48 w=f bgc=bg bwb=xs ph=md av=c ah=c:
              - 'rtgl-view sm-w=f w=${navbarContentWidth} d=h av=c g=md wrap':
                  - rtgl-text: ${localTitle}
                  - rtgl-view w=1fg: null
                  - $if showMobileProjectActions:
                      - 'rtgl-button#mobileCreateMenuButton sq pre=plus v=ol title="${createButtonText}" aria-label="${createButtonText}"': null
                    $else:
                      - rtgl-view d=h g=sm:
                          - rtgl-button#createButton data-testid=create-project-button: ${createButtonText}
                          - $if platform == 'tauri' || platform == 'android' || platform == 'ios':
                              - rtgl-button#openButton variant=se: ${openButtonText}
                  - $if showProjectAccountActions:
                      - $if isLoggedIn:
                          - rtgl-view#avatarButton d=h av=c g=sm p=xs br=md cur=pointer h-bgc=mu:
                              - rtgl-text s=sm: ${profileDisplayName}
                              - rtgl-image wh=36 br=f bw=xs bc=bo of=cov src=${avatarImageSrc}: null
                        $else:
                          - rtgl-button#loginButton variant=se: ${loginButtonText}
          - 'rtgl-view w=f h=1fg ah=c sv style="min-height: 0;"':
              - 'rtgl-view w=f d=v pl=md style="max-width: 1280px;"':
                  - 'rtgl-view w=f ah=c':
                      - rtgl-view sm-w=f w=640 h=1fg d=v g=xl:
                          - rtgl-view w=f g=md pt=lg:
                              - $if localEmptyMessage:
                                  - rtgl-view w=f h=120 ah=c av=c:
                                      - rtgl-view d=v ah=c g=md:
                                          - rtgl-text s=lg c=mu-fg: ${localEmptyMessage}
                                          - rtgl-text s=sm c=mu-fg: ${localEmptySubMessage}
                              - $for project, i in projects:
                                  - rtgl-view#projectItem${i} data-project-id=${project.id} data-project-index=${i} h=auto w=f bw=xs bc=bo h-bc=ac p=md cur=pointer d=h av=c g=md:
                                      - $if project.iconUrl:
                                          - rtgl-image wh=56 src=${project.iconUrl} bw=xs bc=bo of=con br=md: null
                                        $else:
                                          - rtgl-image wh=56 src="/public/project_logo_placeholder.png" bw=xs bc=bo of=con br=md: null
                                      - rtgl-view w=1fg:
                                          - rtgl-text ellipsis w=f: ${project.name}
                                          - $if platform != 'android' && platform != 'ios' && project.projectPath:
                                              - 'rtgl-view d=h g=sm av=c mt=xs w=f style="min-width: 0;"':
                                                  - rtgl-svg wh=14 svg=folder c=mu-fg: null
                                                  - rtgl-text s=xs c=mu-fg ellipsis w=f: ${project.projectPath}
                              - rtgl-view h="33vh": null
                          - $if showCloudProjects:
                              - rtgl-view w=f d=v g=md:
                                  - rtgl-view d=h w=f av=c:
                                      - rtgl-text s=h3: ${cloudTitle}
                                      - rtgl-view w=1fg: null
                                      - $if isLoggedIn:
                                          - rtgl-button#cloudCreateButton variant=pr: ${createCloudButtonText}
                                  - rtgl-text s=sm c=mu-fg mb=xl: ${i18n.projectsPage.cloudDescription}
                                  - rtgl-view w=f g=md:
                                      - $if cloudEmptyMessage:
                                          - rtgl-view w=f h=120 ah=c av=c:
                                              - rtgl-view d=v ah=c g=md:
                                                  - rtgl-text s=lg c=mu-fg: ${cloudEmptyMessage}
                                                  - rtgl-text s=sm c=mu-fg: ${cloudEmptySubMessage}
                                  - $for project, i in cloudProjects:
                                      - rtgl-view#cloudProjectItem${i} data-project-id=${project.id} h=auto w=f bw=xs bc=bo h-bc=ac p=md d=h av=c g=md cur=pointer:
                                          - rtgl-image wh=56 src="/public/project_logo_placeholder.png" bw=xs bc=bo of=con br=md: null
                                          - rtgl-view w=1fg:
                                              - rtgl-view d=h av=c:
                                                  - rtgl-text ellipsis w=f: ${project.name}
                                                  - rtgl-view w=1fg: null
                                                  - rtgl-text s=xs c=mu-fg: ${project.role}
                                              - $if project.description:
                                                  - rtgl-text s=sm c=mu-fg mt=xs ellipsis w=f: ${project.description}
                                              - rtgl-view d=h g=sm av=c mt=xs:
                                                  - rtgl-text s=xs c=mu-fg: ${i18n.projectsPage.membersLabel}
                                                  - rtgl-text s=xs c=mu-fg: ${project.memberCount}
                                  - rtgl-view h="33vh": null
          - 'rtgl-view w=f ah=c bgc=bg style="flex-shrink: 0;"':
              - 'rtgl-view sm-w=f w=640 ph=md pv=lg ah=c':
                  - $if platform != 'web':
                      - rtgl-view#appVersionButton d=h av=c ah=c ph=md pv=sm br=sm h-bgc=mu cur=pointer:
                          - rtgl-text s=xs c=mu-fg: RouteVN Creator ${appVersion}
                    $else:
                      - rtgl-view d=h av=c ah=c ph=md pv=sm:
                          - rtgl-text s=xs c=mu-fg: RouteVN Creator ${appVersion}
  - rtgl-dialog#deleteProjectDialog ?open=${deleteDialog.isOpen} s=sm:
      - rtgl-view slot=content g=lg p=lg:
          - rtgl-view d=v g=md:
              - rtgl-text s=lg: ${deleteDialogTitle}
              - rtgl-text c=mu-fg: ${deleteDialogMessage}
          - rtgl-view d=h g=sm w=f ah=e:
              - rtgl-button#deleteConfirmButton v=pr: ${deleteDialogConfirmLabel}
  - rtgl-dialog#createProjectDialog ?open=${createDialog.isOpen} s=md:
      - rtgl-view slot=content w=f p=lg g=lg:
          - rvn-project-create-dialog#projectCreateDialogBody key=${createDialog.formKey} :platform=${platform} :defaultValues=${createDialog.defaultValues}: null
          - rtgl-view d=h g=sm w=f ah=e:
              - rtgl-button#createProjectCancelButton v=se: ${i18n.projectsPage.cancelButton}
              - rtgl-button#createProjectSubmitButton data-action-id=submit v=pr: ${i18n.projectsPage.submitButton}
  - rtgl-dialog#cloudCreateProjectDialog ?open=${cloudCreateDialog.isOpen} s=md:
      - rtgl-view slot=content w=f p=lg:
          - rtgl-form#cloudCreateForm key=${cloudCreateDialog.formKey} :form=${cloudCreateForm} :defaultValues=${cloudCreateDialog.defaultValues} w=f: null
  - rtgl-dialog#addMemberDialog ?open=${addMemberDialog.isOpen} s=md:
      - rtgl-view slot=content w=f p=lg:
          - rtgl-form#addMemberForm key=${addMemberDialog.formKey} :form=${addMemberForm} :defaultValues=${addMemberDialog.defaultValues} w=f: null
  - rtgl-dropdown-menu#dropdownMenu ?open=${dropdownMenu.isOpen} x=${dropdownMenu.x} y=${dropdownMenu.y} :items=${dropdownMenu.items}: null
  - rtgl-dropdown-menu#mobileActionMenu ?open=${mobileActionMenu.isOpen} x=${mobileActionMenu.x} y=${mobileActionMenu.y} place=be :items=${mobileActionMenu.items}: null
  - rtgl-dropdown-menu#appVersionDropdownMenu ?open=${appVersionMenu.isOpen} x=${appVersionMenu.x} y=${appVersionMenu.y} place=t :items=${appVersionMenu.items}: null
  - rtgl-dropdown-menu#profileDropdownMenu ?open=${profileMenu.isOpen} x=${profileMenu.x} y=${profileMenu.y} :items=${profileMenu.items}: null
  - rtgl-dialog#languageDialog ?open=${languageDialog.isOpen} s=sm:
      - rtgl-view slot=content w=f p=lg:
          - rtgl-form#languageForm key=${languageDialog.formKey} :form=${languageForm} :defaultValues=${languageDialog.defaultValues} w=f: null
  - rtgl-dialog#appearanceDialog ?open=${appearanceDialog.isOpen} s=sm:
      - rtgl-view slot=content w=f p=lg:
          - rtgl-form#appearanceForm key=${appearanceDialog.formKey} :form=${appearanceForm} :defaultValues=${appearanceDialog.defaultValues} w=f: null
  - rtgl-dialog#editProfileDialog ?open=${profileDialog.isOpen} s=f:
      - rtgl-view slot=content w=f h=f p=xl:
          - rtgl-view w=f h=f ah=c av=s:
              - rtgl-view w=560 sm-w=f:
                  - rtgl-form#profileForm key=${profileDialog.formKey} :form=${profileDialogForm} :defaultValues=${profileDialog.defaultValues} w=f: null
  - rtgl-dialog#settingsDialog ?open=${settingsDialog.isOpen} s=f:
      - rtgl-view slot=content w=f h=f p=xl:
          - rtgl-view w=f h=f ah=c av=s:
              - rtgl-view w=560 sm-w=f:
                  - rtgl-form#settingsForm key=${settingsDialog.formKey} :form=${settingsDialogForm} :defaultValues=${settingsDialog.defaultValues} w=f: null
