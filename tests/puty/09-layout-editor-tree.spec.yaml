        type: resource.create
        clientTs: 1001
        payload:
          resourceType: layouts
          resourceId: layout-hud
          data:
            name: HUD Layout
            layoutType: overlay
            elements:
              items: {}
              tree: []
      - id: cmd-layout-tree-panel-create
