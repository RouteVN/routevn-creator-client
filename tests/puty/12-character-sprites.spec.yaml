case: persists character sprite create update and delete commands
in:
  - projectId: project-puty-character-sprites-001
    actor:
      userId: user-puty-character-sprites
      clientId: client-puty-character-sprites
    sessionPartitions:
      - project:project-puty-character-sprites-001:resources
    commands:
      - id: cmd-character-create
        partitions:
          - project:project-puty-character-sprites-001:resources:characters
        type: resource.create
        clientTs: 401
        payload:
          resourceType: characters
          resourceId: char-hero
          data:
            name: Hero
            type: character
            sprites:
              items:
                sprite-folder-default:
                  name: Default Sprites
                  type: folder
              tree:
                - id: sprite-folder-default
      - id: cmd-character-sprite-create
        partitions:
          - project:project-puty-character-sprites-001:resources:characters
        type: character.sprite.create
        clientTs: 402
        payload:
          characterId: char-hero
          spriteId: sprite-idle
          parentId: sprite-folder-default
          index: 0
          data:
            type: image
            name: Idle
            fileId: sprite-idle.png
      - id: cmd-character-sprite-update
        partitions:
          - project:project-puty-character-sprites-001:resources:characters
        type: character.sprite.update
        clientTs: 403
        payload:
          characterId: char-hero
          spriteId: sprite-idle
          data:
            description: Idle pose
      - id: cmd-character-sprite-delete
        partitions:
          - project:project-puty-character-sprites-001:resources:characters
        type: character.sprite.delete
        clientTs: 404
        payload:
          characterId: char-hero
          spriteIds:
            - sprite-idle
