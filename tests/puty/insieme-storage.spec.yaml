        clientId: client-puty-1
        clientTs: 107
    - committedId: 7
      id: cmd-layout-element-create
      projectId: project-puty-storage-001
      userId: user-puty-1
      partitions:
        - project:project-puty-storage-001:layouts
      type: layout.element.create
      payload:
