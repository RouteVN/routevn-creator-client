---
file: ./insiemeStorageScenario.js
group: insieme storage
suites:
  - runInsiemeStorageScenario
---
suite: runInsiemeStorageScenario
exportName: runInsiemeStorageScenario
---
case: persists a mixed RouteVN command stream to sqlite storage
in:
  - projectId: project-puty-storage-001
    actor:
      userId: user-puty-1
      clientId: client-puty-1
    sessionPartitions:
      - project:project-puty-storage-001:resources
      - project:project-puty-storage-001:story
      - project:project-puty-storage-001:layouts
    commands:
      - id: cmd-image-create
        partitions:
          - project:project-puty-storage-001:resources:images
        type: image.create
        clientTs: 102
        payload:
          imageId: image-1
          data:
            name: Image 1
            type: image
            fileId: image-1.png
      - id: cmd-scene-create
        partitions:
          - project:project-puty-storage-001:story
          - project:project-puty-storage-001:story:scene:scene-1
        type: scene.create
        clientTs: 103
        payload:
          sceneId: scene-1
          data:
            name: Scene 1
      - id: cmd-section-create
        partitions:
          - project:project-puty-storage-001:story
          - project:project-puty-storage-001:story:scene:scene-1
        type: section.create
        clientTs: 104
        payload:
          sceneId: scene-1
          sectionId: section-1
          data:
            name: Section 1
      - id: cmd-line-insert
        partitions:
          - project:project-puty-storage-001:story
          - project:project-puty-storage-001:story:scene:scene-1
        type: line.create
        clientTs: 105
        payload:
          sectionId: section-1
          lines:
            - lineId: line-1
              data:
                actions:
                  dialogue:
                    content:
                      - text: Hello
                    mode: adv
      - id: cmd-line-dialogue-update
        partitions:
          - project:project-puty-storage-001:story
          - project:project-puty-storage-001:story:scene:scene-1
        type: line.update_actions
        clientTs: 106
        payload:
          lineId: line-1
          data:
            dialogue:
              content:
                - text: Hello
              mode: nvl
              ui:
                resourceId: layout-1
          replace: false
      - id: cmd-layout-resource-create
        partitions:
          - project:project-puty-storage-001:resources:layouts
        type: layout.create
        clientTs: 107
        payload:
          layoutId: layout-1
          data:
            type: layout
            name: Layout 1
            layoutType: normal
            elements:
              items: {}
              tree: []
      - id: cmd-layout-element-create
        partitions:
          - project:project-puty-storage-001:layouts
        type: layout.element.create
        clientTs: 108
        payload:
          layoutId: layout-1
          elementId: el-1
          data:
            type: text
            name: Text Element
            x: 10
            'y': 20
out:
  storedEvents:
    - committedId: 1
      id: cmd-image-create
      projectId: project-puty-storage-001
      userId: user-puty-1
      partitions:
        - project:project-puty-storage-001:resources:images
      type: image.create
      payload:
        imageId: image-1
        data:
          name: Image 1
          type: image
          fileId: image-1.png
      meta:
        clientId: client-puty-1
        clientTs: 102
    - committedId: 2
      id: cmd-scene-create
      projectId: project-puty-storage-001
      userId: user-puty-1
      partitions:
        - project:project-puty-storage-001:story
        - project:project-puty-storage-001:story:scene:scene-1
      type: scene.create
      payload:
        sceneId: scene-1
        data:
          name: Scene 1
      meta:
        clientId: client-puty-1
        clientTs: 103
    - committedId: 3
      id: cmd-section-create
      projectId: project-puty-storage-001
      userId: user-puty-1
      partitions:
        - project:project-puty-storage-001:story
        - project:project-puty-storage-001:story:scene:scene-1
      type: section.create
      payload:
        sceneId: scene-1
        sectionId: section-1
        data:
          name: Section 1
      meta:
        clientId: client-puty-1
        clientTs: 104
    - committedId: 4
      id: cmd-line-insert
      projectId: project-puty-storage-001
      userId: user-puty-1
      partitions:
        - project:project-puty-storage-001:story
        - project:project-puty-storage-001:story:scene:scene-1
      type: line.create
      payload:
        sectionId: section-1
        lines:
          - lineId: line-1
            data:
              actions:
                dialogue:
                  content:
                    - text: Hello
                  mode: adv
      meta:
        clientId: client-puty-1
        clientTs: 105
    - committedId: 5
      id: cmd-line-dialogue-update
      projectId: project-puty-storage-001
      userId: user-puty-1
      partitions:
        - project:project-puty-storage-001:story
        - project:project-puty-storage-001:story:scene:scene-1
      type: line.update_actions
