---
file: ./insiemeStorageScenario.js
group: insieme storage
suites:
  - runInsiemeStorageScenario
---
suite: runInsiemeStorageScenario
exportName: runInsiemeStorageScenario
---
case: persists a mixed RouteVN command stream to sqlite storage
in:
  - projectId: project-puty-storage-001
    actor:
      userId: user-puty-1
      clientId: client-puty-1
    commands:
      - id: cmd-file-create
        partition: m
        type: file.create
        clientTs: 101
        payload:
          fileId: image-1.png
          data:
            type: image
            mimeType: image/png
            size: 1024
            sha256: sha256-image-1
      - id: cmd-image-create
        partition: m
        type: image.create
        clientTs: 102
        payload:
          imageId: image-1
          data:
            name: Image 1
            type: image
            fileId: image-1.png
      - id: cmd-scene-create
        partition: m:s:5anJPz
        type: scene.create
        clientTs: 103
        payload:
          sceneId: scene-1
          data:
            name: Scene 1
      - id: cmd-section-create
        partition: m:s:5anJPz
        type: section.create
        clientTs: 104
        payload:
          sceneId: scene-1
          sectionId: section-1
          data:
            name: Section 1
      - id: cmd-line-insert
        partition: s:5anJPz
        type: line.create
        clientTs: 105
        payload:
          sectionId: section-1
          lines:
            - lineId: line-1
              data:
                actions:
                  dialogue:
                    content:
                    - text: Hello
                    mode: adv
      - id: cmd-line-dialogue-update
        partition: s:5anJPz
        type: line.update_actions
        clientTs: 106
        payload:
          lineId: line-1
          data:
            dialogue:
              content:
                - text: Hello
              mode: nvl
              ui:
              resourceId: layout-1
          replace: false
      - id: cmd-layout-resource-create
        partition: m
        type: layout.create
        clientTs: 107
        payload:
          layoutId: layout-1
          data:
            type: layout
            name: Layout 1
            layoutType: normal
            elements:
              items: {}
              tree: []
      - id: cmd-layout-element-create
        partition: m
        type: layout.element.create
        clientTs: 108
        payload:
          layoutId: layout-1
          elementId: el-1
          data:
            type: text
            name: Text Element
            x: 10
            'y': 20
