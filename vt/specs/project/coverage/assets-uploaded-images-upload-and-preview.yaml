---
title: Images Upload And Preview
description: Uploads an image fixture, filters to it, and captures the uploaded image detail panel, preview overlay, and edit dialog.
url: /projects
skipInitialScreenshot: true
viewport:
  id: wide
  width: 1440
  height: 900
steps:
  - action: waitFor
    selector: "[data-testid='create-project-button']"
    state: visible
    timeoutMs: 5000
  - action: wait
    ms: 250
  - action: select
    testId: create-project-button
    steps:
      - action: click
  - action: waitFor
    selector: rtgl-global-ui rtgl-form#createProjectForm rtgl-input#field0 input
    state: attached
    timeoutMs: 5000
  - action: select
    selector: rtgl-global-ui rtgl-form#createProjectForm rtgl-input#field0 input
    steps:
      - action: clear
      - action: write
        value: VT Images Upload And Preview
  - action: select
    selector: rtgl-global-ui rtgl-form#createProjectForm rtgl-input#field1 input
    steps:
      - action: clear
      - action: write
        value: Uploads an image fixture, filters to it, and captures the uploaded image detail panel, preview overlay, and edit dialog.
  - action: wait
    ms: 250
  - action: select
    selector: rtgl-global-ui rtgl-button[data-action-id='submit']
    steps:
      - action: click
  - action: waitFor
    selector: "#projectItem0"
    state: visible
    timeoutMs: 10000
  - action: wait
    ms: 500
  - action: select
    selector: "#projectItem0"
    steps:
      - action: click
  - action: waitFor
    selector: rvn-project
    state: attached
    timeoutMs: 10000
  - action: wait
    ms: 500
  - action: keypress
    key: g
  - action: wait
    ms: 120
  - action: keypress
    key: i
  - action: waitFor
    selector: rvn-images
    state: attached
    timeoutMs: 10000
  - action: assert
    type: url
    value: /project/images
  - action: wait
    ms: 450
  - action: screenshot
  - action: waitFor
    selector: "#uploadBtnHeaderRef0"
    state: visible
    timeoutMs: 10000
  - action: select
    selector: "#uploadBtnHeaderRef0"
    steps:
      - action: click
  - action: waitFor
    selector: "#rtglVtFilePickerInput"
    state: attached
    timeoutMs: 5000
  - action: select
    selector: "#rtglVtFilePickerInput"
    steps:
      - action: upload
        files:
          - vt/fixtures/spritesheet.png
  - action: wait
    ms: 1000
  - action: select
    selector: "#searchInput"
    steps:
      - action: clear
      - action: write
        value: spritesheet
  - action: wait
    ms: 400
  - action: waitFor
    selector: "#groupview #itemRef0x0[data-item-id]:not([data-item-id=''])"
    state: visible
    timeoutMs: 15000
  - action: select
    selector: "#groupview #itemRef0x0[data-item-id]:not([data-item-id=''])"
    steps:
      - action: click
  - action: waitFor
    selector: "#detailView"
    state: attached
    timeoutMs: 5000
  - action: wait
    ms: 400
  - action: screenshot
  - action: select
    selector: "#groupview #itemRef0x0[data-item-id]:not([data-item-id=''])"
    steps:
      - action: dblclick
  - action: waitFor
    selector: "#previewOverlay"
    state: visible
    timeoutMs: 10000
  - action: wait
    ms: 500
  - action: screenshot
  - action: select
    selector: "#previewOverlay"
    steps:
      - action: click
  - action: waitFor
    selector: "#previewOverlay"
    state: hidden
    timeoutMs: 10000
  - action: select
    selector: "#detailHeader"
    steps:
      - action: click
  - action: waitFor
    selector: "#editDialog[open]"
    state: attached
    timeoutMs: 5000
  - action: wait
    ms: 300
  - action: screenshot
