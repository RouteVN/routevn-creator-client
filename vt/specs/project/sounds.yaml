---
title: Sounds Workflow
description: Covers the sounds page upload, detail, keyboard audio preview, edit submit, and filtered search states.
url: /projects
skipInitialScreenshot: true
viewport:
  id: wide
  width: 1440
  height: 900
steps:
  - action: waitFor
    selector: "[data-testid='create-project-button']"
    state: visible
    timeoutMs: 5000
  - action: wait
    ms: 250
  - action: select
    testId: create-project-button
    steps:
      - action: click
  - action: waitFor
    selector: rtgl-form#createProjectForm rtgl-input#field0 input
    state: attached
    timeoutMs: 5000
  - action: select
    selector: rtgl-form#createProjectForm rtgl-input#field0 input
    steps:
      - action: clear
      - action: write
        value: VT Sounds Workflow
  - action: select
    selector: rtgl-form#createProjectForm rtgl-input#field1 input
    steps:
      - action: clear
      - action: write
        value: Covers the sounds page.
  - action: wait
    ms: 250
  - action: select
    selector: "#createProjectSubmitButton"
    steps:
      - action: click
  - action: waitFor
    selector: "#projectItem0"
    state: visible
    timeoutMs: 30000
  - action: wait
    ms: 500
  - action: select
    selector: "#projectItem0"
    steps:
      - action: click
  - action: waitFor
    selector: rvn-project
    state: attached
    timeoutMs: 10000
  - action: wait
    ms: 500
  - action: keypress
    key: g
  - action: wait
    ms: 120
  - action: keypress
    key: s
  - action: wait
    ms: 120
  - action: keypress
    key: o
  - action: waitFor
    selector: rvn-sounds
    state: attached
    timeoutMs: 10000
  - action: assert
    type: url
    value: /project/sounds
  - action: wait
    ms: 450
  - action: screenshot
  - action: waitFor
    selector: "#uploadBtnHeaderRef0"
    state: visible
    timeoutMs: 10000
  - action: select
    selector: "#uploadBtnHeaderRef0"
    steps:
      - action: click
  - action: waitFor
    selector: "#rtglVtFilePickerInput"
    state: attached
    timeoutMs: 5000
  - action: select
    selector: "#rtglVtFilePickerInput"
    steps:
      - action: upload
        files:
          - vt/fixtures/sine.wav
  - action: wait
    ms: 500
  - action: waitFor
    selector: "#groupview #itemRef0x0[data-item-id]:not([data-item-id=''])"
    state: visible
    timeoutMs: 10000
  - action: select
    selector: "#groupview #itemRef0x0[data-item-id]:not([data-item-id=''])"
    steps:
      - action: click
  - action: waitFor
    selector: "#detailView"
    state: attached
    timeoutMs: 5000
  - action: wait
    ms: 400
  - action: assert
    type: js
    fn: eval
    args:
      - "(() => { const deepQuery = (root, selector) => { if (!root) return undefined; const direct = root.querySelector?.(selector); if (direct) return direct; for (const node of root.querySelectorAll?.('*') ?? []) { const found = node.shadowRoot ? deepQuery(node.shadowRoot, selector) : undefined; if (found) return found; } return undefined; }; const preview = deepQuery(document, '#detailSoundPreview'); return preview ? getComputedStyle(preview).pointerEvents : undefined; })()"
    value: none
  - action: screenshot
  - action: keypress
    key: Enter
  - action: waitFor
    selector: "#rvnAudioPlayer"
    state: attached
    timeoutMs: 10000
  - action: waitFor
    selector: "#rvnAudioPlayer #playPauseBtn rtgl-svg[svg='pause']"
    state: attached
    timeoutMs: 5000
  - action: assert
    type: js
    fn: eval
    args:
      - "(() => { const deepQuery = (root, selector) => { if (!root) return undefined; const direct = root.querySelector?.(selector); if (direct) return direct; for (const node of root.querySelectorAll?.('*') ?? []) { const found = node.shadowRoot ? deepQuery(node.shadowRoot, selector) : undefined; if (found) return found; } return undefined; }; const player = deepQuery(document, '#rvnAudioPlayer'); const progressTrack = deepQuery(player?.shadowRoot, '#progressBar'); const playerBody = deepQuery(player?.shadowRoot, 'rtgl-view[bgc=\"mu\"]'); return Boolean(progressTrack && playerBody && getComputedStyle(progressTrack).backgroundColor !== getComputedStyle(playerBody).backgroundColor); })()"
    value: true
  - action: keypress
    key: Enter
  - action: waitFor
    selector: "#rvnAudioPlayer #playPauseBtn rtgl-svg[svg='play']"
    state: attached
    timeoutMs: 5000
  - action: keypress
    key: Enter
  - action: waitFor
    selector: "#rvnAudioPlayer #playPauseBtn rtgl-svg[svg='pause']"
    state: attached
    timeoutMs: 5000
  - action: wait
    ms: 700
  - action: screenshot
  - action: keypress
    key: Escape
  - action: waitFor
    selector: "#rvnAudioPlayer"
    state: hidden
    timeoutMs: 5000
  - action: select
    selector: "#detailHeader"
    steps:
      - action: click
  - action: waitFor
    selector: "#editDialog[open]"
    state: attached
    timeoutMs: 5000
  - action: wait
    ms: 300
  - action: select
    selector: "#editDialog rtgl-input#field0 input"
    steps:
      - action: clear
      - action: write
        value: Searchable Sine
  - action: screenshot
  - action: select
    selector: "#editDialog rtgl-button[data-action-id='submit']"
    steps:
      - action: click
  - action: waitFor
    selector: "#editDialog"
    state: hidden
    timeoutMs: 10000
  - action: wait
    ms: 500
  - action: screenshot
  - action: select
    selector: "#tagFilterButton"
    steps:
      - action: click
  - action: waitFor
    selector: "#tagFilterPopover[open]"
    state: attached
    timeoutMs: 5000
  - action: select
    selector: "#tagFilterPopover rtgl-input#searchInput"
    steps:
      - action: clear
      - action: write
        value: Searchable Sine
  - action: wait
    ms: 350
  - action: screenshot
---
