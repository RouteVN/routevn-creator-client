---
title: Project Scene Map Create
description: Creates a project, exercises the scene map add-scene flow from the whiteboard, and captures the created scene in both the map and explorer.
url: /projects
skipInitialScreenshot: true
viewport:
  id: wide
  width: 1440
  height: 900
steps:
  - action: waitFor
    selector: "[data-testid='create-project-button']"
    state: visible
    timeoutMs: 5000
  - action: select
    testId: create-project-button
    steps:
      - action: click
  - action: waitFor
    selector: "rtgl-global-ui rtgl-form#createProjectForm rtgl-input#field0 input"
    state: attached
    timeoutMs: 5000
  - action: select
    selector: "rtgl-global-ui rtgl-form#createProjectForm rtgl-input#field0 input"
    steps:
      - action: write
        value: VT Scene Map Create
  - action: select
    selector: "rtgl-global-ui rtgl-form#createProjectForm rtgl-input#field1 input"
    steps:
      - action: write
        value: Capture the whiteboard scene creation flow.
  - action: wait
    ms: 250
  - action: select
    selector: "rtgl-global-ui rtgl-button[data-action-id='submit']"
    steps:
      - action: click
  - action: waitFor
    selector: "#projectItem0"
    state: visible
    timeoutMs: 10000
  - action: select
    selector: "#projectItem0"
    steps:
      - action: click
  - action: waitFor
    selector: "rvn-project"
    state: attached
    timeoutMs: 10000
  - action: select
    selector: "#sidebar [data-item-id='/project/scenes']"
    steps:
      - action: click
  - action: waitFor
    selector: "rvn-scenes"
    state: attached
    timeoutMs: 10000
  - action: assert
    type: url
    value: /project/scenes
  - action: waitFor
    selector: "#whiteboard #container"
    state: visible
    timeoutMs: 10000
  - action: waitFor
    selector: "#mapAddHintClose"
    state: visible
    timeoutMs: 5000
  - action: screenshot
  - action: select
    selector: "#mapAddHintClose"
    steps:
      - action: click
  - action: assert
    type: hidden
    selector: "#mapAddHintClose"
  - action: select
    selector: "#whiteboard #container"
    steps:
      - action: rclick
  - action: wait
    ms: 250
  - action: waitFor
    selector: "#sceneFormPopover"
    state: attached
    timeoutMs: 5000
  - action: waitFor
    selector: "#sceneFormPopover rtgl-input[data-field-name='name']"
    state: attached
    timeoutMs: 5000
  - action: screenshot
  - action: select
    selector: "#sceneFormPopover rtgl-input[data-field-name='name']"
    steps:
      - action: write
        value: VT Map Added Scene
  - action: select
    selector: "#sceneFormPopover rtgl-button[data-action-id='submit']"
    steps:
      - action: click
  - action: waitFor
    selector: "#sceneFormPopover"
    state: hidden
    timeoutMs: 10000
  - action: wait
    ms: 600
  - action: screenshot
---
