    selector: "#editDialog rtgl-button[data-action-id='submit']"
    steps:
      - action: click
  - action: waitFor
    selector: "#editDialog"
    state: hidden
    timeoutMs: 10000
  - action: wait
    ms: 500
  - action: screenshot
  - action: select
    selector: "#searchInput"
    steps:
      - action: clear
      - action: write
        value: Searchable Pulse
  - action: wait
