    type: js
    fn: routevnVt.reset
    value:
      ok: true
  - action: assert
    type: js
    fn: routevnVt.createProject
    args:
      - id: vt-project-resources
        name: VT Resource Routes
        description: Seeded project for resource route screenshots.
    value:
      ok: true
      projectId: vt-project-resources
  - action: goto
    url: http://127.0.0.1:3001/project/resources/images?p=vt-project-resources
  - action: waitFor
    selector: "rvn-images"
    state: attached
    timeoutMs: 10000
  - action: wait
    ms: 500
  - action: screenshot
