---
title: Resource Pages
description: Walks the seeded project through the asset and configuration resource routes.
url: /projects
skipInitialScreenshot: true
viewport:
  id: wide
  width: 1440
  height: 900
steps:
  - action: waitFor
    selector: "[data-testid='create-project-button']"
    state: visible
    timeoutMs: 5000
