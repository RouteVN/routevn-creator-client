---
title: Projects Page
description: Captures the projects page and create flow across wide, laptop, tablet, and mobile viewports.
url: /projects
viewport:
  - id: wide
    width: 1440
    height: 900
  - id: laptop
    width: 1024
    height: 768
  - id: tablet
    width: 768
    height: 1024
  - id: mobile
    width: 390
    height: 844
steps:
  - action: waitFor
    selector: "[data-testid='create-project-button']"
    state: visible
    timeoutMs: 5000
  - action: wait
    ms: 300
  - action: screenshot
  - action: select
    testId: create-project-button
    steps:
      - action: click
  - action: waitFor
    selector: "rtgl-form#createProjectForm rtgl-input#field0 input"
    state: attached
    timeoutMs: 5000
  - action: wait
    ms: 250
  - action: screenshot
  - action: select
    selector: "rtgl-form#createProjectForm rtgl-input#field0 input"
    steps:
      - action: clear
      - action: write
        value: VT Projects Page
  - action: select
    selector: "rtgl-form#createProjectForm rtgl-input#field1 input"
    steps:
      - action: clear
      - action: write
        value: Created from the responsive projects VT workflow.
  - action: wait
    ms: 250
  - action: screenshot
  - action: select
    selector: "#createProjectSubmitButton"
    steps:
      - action: click
  - action: waitFor
    selector: "#projectItem0"
    state: visible
    timeoutMs: 30000
  - action: wait
    ms: 500
  - action: screenshot
