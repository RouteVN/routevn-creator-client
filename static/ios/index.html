<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <title>RouteVN Creator</title>
    <style>
      html,
      body {
        height: 100%;
        min-height: 100%;
        margin: 0;
        background: #f5f7fa;
      }

      body.dark {
        background: #050505;
      }

      body {
        --rvn-mobile-overlay-top-inset: env(safe-area-inset-top);
        --rvn-app-viewport-height: calc(
          100vh - env(safe-area-inset-top) - env(safe-area-inset-bottom)
        );
        box-sizing: border-box;
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }

      rvn-app {
        display: block;
        height: var(--rvn-app-viewport-height);
        min-height: 0;
      }
    </style>
    <script>
      window.env = {
        ROUTEVN_API_ENDPOINT: "https://api.example.invalid",
      };
    </script>
    <link rel="stylesheet" href="/public/theme.css" />
    <script src="/public/rtgl-icons.js"></script>
    <script src="/public/@rettangoli/ui@1.9.2/dist/rettangoli-iife-ui.min.js"></script>
    <script type="module" src="/public/main.js"></script>
    <script>
      window.addEventListener("load", () => {
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            window.webkit?.messageHandlers?.RouteVNIOS?.postMessage({
              method: "markSplashReady",
              payload: {},
            });
          });
        });
      });
    </script>
  </head>
  <body class="dark">
    <rvn-app></rvn-app>
    <rtgl-global-ui></rtgl-global-ui>
  </body>
</html>
