name: Windows Player Template

on:
  pull_request:
    paths:
      - "crates/routevn-packager/**"
      - "docker/windows-player-template/**"
      - "scripts/build-windows-player-template.js"
      - "scripts/build-windows-player-template-docker.sh"
      - "scripts/main.js"
      - "src/deps/services/shared/projectExportService.js"
      - "package.json"
      - "bun.lock"
      - "rust-toolchain.toml"
      - ".github/workflows/windows-player-template.yaml"
  workflow_dispatch:

jobs:
  build-template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Build Windows player template
        run: bun run player-template:build:win:docker

      - name: Upload Windows player template
        uses: actions/upload-artifact@v4
        with:
          name: RouteVNPlayerTemplate.exe
          path: src-tauri/assets/player-templates/windows/RouteVNPlayerTemplate.exe
          if-no-files-found: error
