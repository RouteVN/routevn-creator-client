name: macOS Player Template

on:
  workflow_dispatch:

jobs:
  build-template:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build universal macOS player template
        run: bun run player-template:build:mac

      - name: Upload macOS player template
        uses: actions/upload-artifact@v4
        with:
          name: RouteVNPlayerTemplate.app.zip
          path: src-tauri/assets/player-templates/macos/RouteVNPlayerTemplate.app.zip
          if-no-files-found: error
